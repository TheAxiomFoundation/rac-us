format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code §3111(a) imposes a 6.2 percent old-age, survivors,
    and disability insurance excise tax on every employer, measured by wages
    paid with respect to employment.
  source_verification:
    corpus_citation_path: us/statute/26/3111
rules:
  - name: employer_oasdi_excise_tax_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 3111(a)
    versions:
      - effective_from: '1990-01-01'
        formula: '0.062'
  - name: employer_oasdi_excise_tax
    kind: derived
    entity: Business
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3111(a)
    versions:
      - effective_from: '1990-01-01'
        formula: wages * employer_oasdi_excise_tax_rate
