format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code §3101(b)(2) — additional Medicare tax on wages
    above a filing-status-specific threshold.

    Filing-status encoding convention (matches PolicyEngine US):
        0 = single
        1 = joint / surviving spouse
        2 = married filing separately
        3 = head of household

    0.9% rate applied to wages above the threshold; thresholds set by
    26 USC §3101(b)(2)(A)-(C): $250,000 for a joint return or surviving
    spouse, one-half of that amount for a married individual filing
    separately, and $200,000 in any other case.
rules:
  - name: additional_medicare_tax_rate
    kind: parameter
    dtype: Rate
    source: 26 USC 3101(b)(2)(A)
    source_url: https://www.law.cornell.edu/uscode/text/26/3101
    versions:
      - effective_from: '2013-01-01'
        formula: '0.009'
  - name: additional_medicare_wage_tax_joint_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3101(b)(2)(A)-(C)
    source_url: https://www.law.cornell.edu/uscode/text/26/3101
    versions:
      - effective_from: '2013-01-01'
        formula: '250000'
  - name: additional_medicare_wage_tax_other_threshold
    kind: parameter
    dtype: Money
    unit: USD
    source: 26 USC 3101(b)(2)(A)-(C)
    source_url: https://www.law.cornell.edu/uscode/text/26/3101
    versions:
      - effective_from: '2013-01-01'
        formula: '200000'
  - name: additional_medicare_wage_tax_threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3101(b)(2)(A)-(C)
    source_url: https://www.law.cornell.edu/uscode/text/26/3101
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          match filing_status:
              1 => additional_medicare_wage_tax_joint_threshold
              2 => additional_medicare_wage_tax_joint_threshold / 2
              0 => additional_medicare_wage_tax_other_threshold
  - name: additional_medicare_excess_wages
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3101(b)(2)(A)
    source_url: https://www.law.cornell.edu/uscode/text/26/3101
    versions:
      - effective_from: '2013-01-01'
        formula: max(0, wages - additional_medicare_wage_tax_threshold)
  - name: additional_medicare_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    source: 26 USC 3101(b)(2)
    source_url: https://www.law.cornell.edu/uscode/text/26/3101
    versions:
      - effective_from: '2013-01-01'
        formula: additional_medicare_excess_wages * additional_medicare_tax_rate
