format: rulespec/v1
module:
  summary: |-
    Internal Revenue Code §3101(b)(2) — additional Medicare tax on wages
    above a filing-status-specific threshold.

    Filing-status encoding convention (matches PolicyEngine US):
        0 = single
        1 = joint / surviving spouse
        2 = married filing separately
        3 = head of household

    0.9% rate applied to wages above the threshold; thresholds set by
    26 USC §3101(b)(2)(A)-(C): $250,000 for a joint return or surviving
    spouse, $125,000 for a married individual filing separately, and $200,000
    in any other case.
rules:
  - name: additional_medicare_tax_rate
    kind: parameter
    dtype: Rate
    versions:
      - effective_from: '2013-01-01'
        formula: '0.009'
  - name: threshold
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2013-01-01'
        formula: |-
          match filing_status:
              0 => 200000
              1 => 250000
              2 => 125000
              3 => 200000
  - name: excess_wages
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2013-01-01'
        formula: max(0, wages - threshold)
  - name: additional_medicare_tax
    kind: derived
    entity: TaxUnit
    dtype: Money
    period: Year
    unit: USD
    versions:
      - effective_from: '2013-01-01'
        formula: excess_wages * additional_medicare_tax_rate
