- name: regular_allotment_subtracts_thirty_percent_and_rounds_down
  period: 2026-01
  input:
    household_size: 1
    snap_maximum_allotment: 298
    snap_one_person_thrifty_food_plan_cost: 298
    snap_net_income: 100
    snap_eligible: true
  output:
    snap_net_income_for_allotment: 100
    snap_household_food_contribution: 30
