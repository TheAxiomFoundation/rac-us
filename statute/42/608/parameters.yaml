# 42 USC 608 - TANF Eligibility and Benefit Parameters (Federal Framework)
#
# TANF is a block grant program. Unlike SSI or SNAP, there are no
# federally-specified benefit amounts. States set their own:
# - Need standards
# - Payment standards
# - Income disregards
# - Resource limits
#
# This file contains:
# 1. Federal default/example parameters
# 2. Typical state structures that can be overridden
#
# For specific state parameters, see:
# - states/california/calworks/parameters.yaml
# - states/[state]/tanf/parameters.yaml

variable: tanf_benefit
entity: TanfUnit
period: Month
dtype: Money

# Federal block grant (for reference - not used in individual calculations)
block_grant:
  description: "Annual TANF block grant amounts allocated to states per 42 USC 603(a)(1)"
  unit: USD
  note: "These are state allocations, not individual benefit amounts"
