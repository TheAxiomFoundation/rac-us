# TANF Maintenance of Effort (MOE) requirement
maintenance_of_effort:
  description: "State spending requirement as percentage of historic spending per 42 USC 609(a)(7)"
  unit: rate
  values:
    # States must maintain spending at 75-80% of 1994 levels
    1997-10-01:
      meeting_participation_rate: 0.75  # 75% if meeting work participation
      not_meeting_participation_rate: 0.80  # 80% if not meeting
  citations:
    - "42 USC 609(a)(7) - Maintenance of effort"

# Federal Poverty Level reference (shared with SNAP)
# Using 2024 values, link to shared FPL file
federal_poverty_level:
  description: "Federal Poverty Level for TANF income tests (monthly)"
  unit: USD
  period: month
  source: "statute/7/2014/c/income_limits.yaml#fpl_by_household_size"

# DEFAULT TANF PARAMETERS (for microsimulation baseline)
# These represent typical state values; states override with their own

# Default resource limit (many states use this)
resource_limit:
  description: "Maximum countable resources for TANF eligibility (typical state value)"
  unit: USD
  values:
    default:
      1997-10-01: 1000  # Historically low
      2000-01-01: 2000  # Many states increased
      2010-01-01: 2000  # Still common
      2024-01-01: 2500  # Trend upward, varies widely
    elderly_or_disabled:
      1997-10-01: 2000
      2000-01-01: 3000
      2024-01-01: 3500
  note: "Actual limits vary by state from $0 to $10,000+"
  citations:
    - "State TANF Plans per 42 USC 602(a)"

# Vehicle exclusion for resource test (varies widely by state)
vehicle_exclusion:
  description: "Vehicle value excluded from TANF resource test"
  unit: USD
  values:
    # Common approaches (state-specific):
    # - Full exclusion of one vehicle
    # - Fair market value limit
    # - Equity value limit
    default:
      1997-10-01: 1500  # Historic federal AFDC rule
      2010-01-01: 15000  # Many states liberalized
    full_exclusion:
      2000-01-01: true  # Many states fully exclude
  note: "Many states now fully exclude at least one vehicle"
  citations:
    - "State TANF Plans"

# Earned income disregard - flat amount (work expense deduction)
earned_income_standard_disregard:
  description: "Flat deduction from earned income before other calculations"
  unit: USD
  period: month
  values:
    default:
      1997-10-01: 90  # Historic AFDC work expense deduction
      2024-01-01: 90  # Still used by some states
  note: "States use various amounts; some have eliminated this"
  citations:
    - "State TANF Plans per 42 USC 602(a)"

# Earned income disregard - percentage
earned_income_disregard_rate:
  description: "Percentage of earned income disregarded after flat disregard"
  unit: rate
  values:
    default:
      1997-10-01: 0.50  # 50% disregard common under AFDC
      2000-01-01: 0.50  # Many states continue
    # Some states use higher rates for first months of employment
    transitional:
      1997-10-01: 1.00  # 100% disregard for first X months (varies)
  note: "Transitional disregards often higher for first 4-12 months"
  citations:
    - "State TANF Plans"

# Gross income limit (for initial eligibility screen)
gross_income_limit_rate:
  description: "Gross income limit as percentage of need standard for TANF eligibility"
  unit: rate
  values:
    1997-10-01: 1.85  # 185% of need standard typical
  note: "States vary; some use fixed dollar amounts instead"
  citations:
    - "State TANF Plans"

# Minimum benefit (some states pay this to prevent cliff effects)
minimum_benefit_amount:
  description: "Minimum monthly TANF benefit if eligible"
  unit: USD
  period: month
  values:
    default:
      1997-10-01: 0  # Most states have no minimum
    example_state:
      1997-10-01: 10  # Some states have small minimums
  citations:
    - "State TANF Plans"

# Child age limit for TANF eligibility
child_age_limit:
  description: "Maximum age for child to be included in TANF assistance unit per 42 USC 619"
  unit: year
  values:
    general:
      1997-10-01: 18
    in_school:
      1997-10-01: 19  # If enrolled in secondary school
  citations:
    - "42 USC 619 - definitions"
    - "State TANF Plans"

# Deprivation requirement (for two-parent families)
two_parent_coverage:
  description: "Whether state covers two-parent families and under what conditions"
  unit: boolean
  values:
    # Under AFDC, unemployment was required. States may now cover all.
    federal_requirement: false  # No federal requirement to cover
    state_option: true  # States may choose to cover
  note: "Most states now cover two-parent families without unemployment requirement"
  citations:
    - "42 USC 607(c)(1)(B) - Two-parent families"

# Noncitizen eligibility federal 5-year bar
noncitizen_5_year_bar:
  description: "Number of years qualified aliens must wait for TANF eligibility per 8 USC 1613"
  unit: year
  values:
    1997-08-22: 5  # PRWORA effective date
  exempt_categories:
    - refugees
    - asylees
    - cuban_haitian_entrants
    - certain_veterans
    - amerasian_immigrants
    - victims_of_trafficking
  citations:
    - "8 USC 1613 - Five-year limited eligibility"
    - "8 USC 1612(b) - Exceptions for certain qualified aliens"

# Drug felon ban - state opt-out status
drug_felon_ban:
  description: "Whether state enforces federal drug felon ban per 42 USC 608(a)(9)"
  unit: enumerated
  values:
    # States have largely opted out or modified this ban
    2024-01-01:
      full_ban_states: []  # No states still have full permanent ban
      modified_ban_states: 13  # Partial restrictions (time-limited, etc.)
      opted_out_states: 37  # Fully opted out
  citations:
    - "42 USC 608(a)(9)(A) - State option to opt out"
    - "CLASP 2023 analysis of state policies"
