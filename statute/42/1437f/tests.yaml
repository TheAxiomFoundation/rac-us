# 42 USC 1437f - Section 8 Housing Choice Voucher Tests
#
# Test cases for validating HCV implementation against known values.
# Uses 2024 fiscal year parameters.
#
# Key program rules:
# - Income eligibility: 50% of Area Median Income (AMI)
# - Targeting: 75% of admissions must be 30% AMI or below
# - Tenant contribution: 30% of adjusted monthly income
# - Deductions: $480/dependent, $400 elderly/disabled, childcare, medical
# - Housing Assistance Payment (HAP): Payment standard - tenant contribution

reference: "42 USC 1437f"
fiscal_year: 2024

# ============================================================
# INCOME ELIGIBILITY TESTS - 42 USC 1437f(a) and 24 CFR 5.609
# ============================================================

tests:
  # Test 1: Family clearly below 50% AMI - eligible
  - name: "4-person family below 50% AMI - eligible"
    description: "Family with $35,000 annual income, 50% AMI limit for 4-person is $51,050"
    inputs:
      household_size: 4
      annual_income: 35000
      metro_area: "national_median"  # Using national median as default
    expected:
      hcv_income_eligible: true
      hcv_extremely_low_income: true  # Below 30% AMI ($30,630)
    citations:
      - "42 USC 1437f(a): income eligibility at 50% AMI"
      - "24 CFR 5.603: Definitions of very low income family"

  # Test 2: Family at exactly 50% AMI threshold
  - name: "4-person family at 50% AMI threshold"
    inputs:
      household_size: 4
      annual_income: 51050
      metro_area: "national_median"
    expected:
      hcv_income_eligible: true
      hcv_extremely_low_income: false
    citations:
      - "42 USC 1437f(a): at-threshold eligibility"

  # Test 3: Family above 50% AMI - ineligible
  - name: "4-person family above 50% AMI - ineligible"
    inputs:
      household_size: 4
      annual_income: 60000
      metro_area: "national_median"
    expected:
      hcv_income_eligible: false
    citations:
      - "42 USC 1437f(a): income ceiling"

  # Test 4: Single person eligibility
  - name: "Single person below 50% AMI"
    inputs:
      household_size: 1
      annual_income: 25000
      metro_area: "national_median"  # 50% AMI for 1-person: $35,750
    expected:
      hcv_income_eligible: true
      hcv_extremely_low_income: true  # Below 30% AMI ($21,450)
    citations:
      - "24 CFR 5.603: Income limits vary by family size"

# ============================================================
# INCOME DEDUCTION TESTS - 24 CFR 5.611
# ============================================================

  # Test 5: Dependent deduction
  - name: "Family with 2 dependents - deduction calculation"
    description: "$480 per dependent, per 24 CFR 5.611(a)(1)"
    inputs:
      household_size: 4
      annual_income: 40000
      num_dependents: 2
      has_elderly_disabled: false
    expected:
      hcv_dependent_deduction: 960  # 2 * $480
    citations:
      - "24 CFR 5.611(a)(1): $480 per dependent"

  # Test 6: Elderly/disabled deduction
  - name: "Elderly household head - deduction applies"
    inputs:
      household_size: 2
      annual_income: 30000
      num_dependents: 0
      has_elderly_disabled: true
    expected:
      hcv_elderly_disabled_deduction: 400
    citations:
      - "24 CFR 5.611(a)(2): $400 elderly/disabled deduction"

  # Test 7: Child care deduction
  - name: "Working family with child care expenses"
    inputs:
      household_size: 3
      annual_income: 45000
      num_dependents: 1
      childcare_expense: 6000  # Annual childcare
      employment_income: 45000
    expected:
      hcv_childcare_deduction: 6000  # Actual expense, up to income earned
    citations:
      - "24 CFR 5.611(a)(3): Reasonable childcare enabling work"

  # Test 8: Medical expense deduction (elderly/disabled only)
  - name: "Elderly with medical expenses over threshold"
    inputs:
      household_size: 1
      annual_income: 25000
      has_elderly_disabled: true
      medical_expense: 1500  # Annual medical expenses
    expected:
      # Medical deduction = expenses exceeding 3% of annual income
      # $1,500 - ($25,000 * 0.03) = $1,500 - $750 = $750
      hcv_medical_deduction: 750
    citations:
      - "24 CFR 5.611(a)(4): Medical expenses exceeding 3% of income"

  # Test 9: Non-elderly household - no medical deduction
  - name: "Non-elderly with medical expenses - no deduction"
    inputs:
      household_size: 3
      annual_income: 35000
      has_elderly_disabled: false
      medical_expense: 2000
    expected:
      hcv_medical_deduction: 0
    citations:
      - "24 CFR 5.611(a)(4): Only elderly/disabled eligible for medical deduction"

# ============================================================
# ADJUSTED INCOME & TENANT CONTRIBUTION - 24 CFR 5.628
# ============================================================

  # Test 10: Basic adjusted income calculation
  - name: "Adjusted income with all deductions"
    inputs:
      household_size: 4
      annual_income: 36000
      num_dependents: 2
      has_elderly_disabled: true
      childcare_expense: 4800
      medical_expense: 1500
    expected:
      # Annual income: $36,000
      # Less: Dependent deduction (2 * $480) = $960
      # Less: Elderly/disabled deduction = $400
      # Less: Childcare deduction = $4,800
      # Less: Medical over 3% = $1,500 - $1,080 = $420
      # Adjusted income = $36,000 - $960 - $400 - $4,800 - $420 = $29,420
      hcv_annual_adjusted_income: 29420
      # Monthly TTP = 30% of adjusted / 12 = 30% * $29,420 / 12 = $735.50
      hcv_total_tenant_payment: 736  # Rounded
    citations:
      - "24 CFR 5.611: Income deductions"
      - "24 CFR 5.628(a): TTP = 30% adjusted monthly income"

  # Test 11: Tenant contribution - simple case
  - name: "Basic tenant contribution - 30% of adjusted income"
    inputs:
      household_size: 2
      annual_income: 24000
      num_dependents: 0
      has_elderly_disabled: false
    expected:
      hcv_annual_adjusted_income: 24000  # No deductions
      # Monthly = $24,000 / 12 = $2,000
      # TTP = 30% * $2,000 = $600
      hcv_total_tenant_payment: 600
    citations:
      - "42 USC 1437f(o)(2): tenant contribution of 30%"
      - "24 CFR 5.628: Total tenant payment calculation"

  # Test 12: Minimum rent
  - name: "Very low income - minimum rent applies"
    inputs:
      household_size: 1
      annual_income: 2400  # $200/month
      num_dependents: 0
      has_elderly_disabled: false
    expected:
      # 30% of $200 = $60, but many PHAs have $0-$50 minimum rent
      # Using $50 as typical minimum
      hcv_total_tenant_payment: 60  # 30% of $200
    citations:
      - "24 CFR 5.630: Minimum rent provisions"

# ============================================================
# HOUSING ASSISTANCE PAYMENT - 42 USC 1437f(o)
# ============================================================

  # Test 13: Basic HAP calculation
  - name: "Standard HAP calculation"
    description: "HAP = Payment standard - TTP"
    inputs:
      household_size: 3
      annual_income: 30000
      num_dependents: 1
      has_elderly_disabled: false
      payment_standard: 1800  # 3BR payment standard for metro area
    expected:
      # Adjusted income = $30,000 - $480 = $29,520
      # Monthly adjusted = $2,460
      # TTP = 30% * $2,460 = $738
      hcv_total_tenant_payment: 738
      # HAP = Payment standard - TTP = $1,800 - $738 = $1,062
      hcv_housing_assistance_payment: 1062
    citations:
      - "42 USC 1437f(o)(2): Assistance payment calculation"
      - "24 CFR 982.505: Payment standard and HAP"

  # Test 14: HAP with unit rent below payment standard
  - name: "Unit rent below payment standard"
    description: "HAP limited by gross rent"
    inputs:
      household_size: 2
      annual_income: 20000
      payment_standard: 1500
      gross_rent: 1200  # Unit rent below payment standard
    expected:
      # TTP = 30% of ($20,000/12) = $500
      # HAP = min(payment_standard, gross_rent) - TTP
      # HAP = min($1,500, $1,200) - $500 = $700
      hcv_housing_assistance_payment: 700
    citations:
      - "24 CFR 982.505(b): HAP limited to gross rent minus TTP"

  # Test 15: Zero HAP when income too high
  - name: "Income results in zero HAP"
    inputs:
      household_size: 2
      annual_income: 60000
      payment_standard: 1400
    expected:
      # TTP = 30% of $5,000/month = $1,500
      # HAP = $1,400 - $1,500 = negative, so 0
      hcv_housing_assistance_payment: 0
    citations:
      - "24 CFR 982.505: HAP cannot be negative"

# ============================================================
# BEDROOM SIZE / SUBSIDY STANDARDS - 24 CFR 982.402
# ============================================================

  # Test 16: Bedroom standard determination
  - name: "Family composition determines bedroom standard"
    inputs:
      household_size: 5
      family_composition:
        - head: true
          age: 35
        - spouse: true
          age: 33
        - child:
            age: 10
            sex: male
        - child:
            age: 8
            sex: female
        - child:
            age: 3
            sex: male
    expected:
      # Head/spouse: 1 BR
      # Children: 10M + 3M can share, 8F separate = 2 BR
      # Total: 3 BR
      hcv_voucher_size: 3
    citations:
      - "24 CFR 982.402: Subsidy standards"
      - "24 CFR 982.401: PHA policies on bedroom standards"

# ============================================================
# INTEGRATION TESTS - Full eligibility and benefit
# ============================================================

  # Test 17: Full eligibility and benefit calculation
  - name: "Complete HCV benefit - typical family"
    inputs:
      household_size: 4
      annual_income: 32000
      num_dependents: 2
      has_elderly_disabled: false
      childcare_expense: 3600
      metro_area: "national_median"
      payment_standard: 2000  # 4BR equivalent
      gross_rent: 1900
    expected:
      hcv_income_eligible: true
      # Deductions: 2 * $480 = $960 + $3,600 childcare = $4,560
      # Adjusted = $32,000 - $4,560 = $27,440
      hcv_annual_adjusted_income: 27440
      # TTP = 30% * ($27,440 / 12) = 30% * $2,286.67 = $686
      hcv_total_tenant_payment: 686
      # HAP = min($2,000, $1,900) - $686 = $1,214
      hcv_housing_assistance_payment: 1214
      hcv_eligible: true
    citations:
      - "42 USC 1437f: Complete HCV calculation"

  # Test 18: Zero income family
  - name: "Zero income family - maximum assistance"
    inputs:
      household_size: 2
      annual_income: 0
      payment_standard: 1400
      gross_rent: 1300
    expected:
      hcv_income_eligible: true
      hcv_total_tenant_payment: 0  # Or minimum rent
      # HAP = gross rent (capped by payment standard)
      hcv_housing_assistance_payment: 1300
    citations:
      - "24 CFR 5.628: Zero income TTP"
      - "24 CFR 982.505: Maximum HAP equals gross rent"

  # Test 19: Ineligible - over income
  - name: "Over-income family - not eligible"
    inputs:
      household_size: 3
      annual_income: 80000
      metro_area: "national_median"  # 50% AMI for 3-person: $45,850
    expected:
      hcv_income_eligible: false
      hcv_eligible: false
      hcv_housing_assistance_payment: 0
    citations:
      - "42 USC 1437f(a): Income eligibility requirement"

  # Test 20: Utility allowance impact
  - name: "HAP with utility allowance"
    description: "When tenant pays utilities, utility allowance affects TTP"
    inputs:
      household_size: 3
      annual_income: 28000
      payment_standard: 1600
      gross_rent: 1200
      utility_allowance: 200
    expected:
      # TTP = 30% of adjusted monthly income
      # Adjusted monthly = $28,000 / 12 = $2,333
      # TTP = 30% * $2,333 = $700
      # Gross rent to owner = contract rent
      # HAP = payment standard - TTP (or gross rent - TTP)
      hcv_total_tenant_payment: 700
      # HAP = min($1,600, $1,200 + $200) - $700 = $1,400 - $700 = $700
      hcv_housing_assistance_payment: 700
    citations:
      - "24 CFR 982.517: Utility allowance"
      - "24 CFR 5.611: Utility allowance affects gross rent"
