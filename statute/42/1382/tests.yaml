# Tests for 42 USC 1382 - Supplemental Security Income (SSI)
#
# SSI provides monthly cash assistance to aged, blind, and disabled individuals
# with limited income and resources. The benefit equals FBR minus countable income.
#
# Test organization:
# 1. Eligibility tests (age/disability, resources, income)
# 2. Income calculation tests (exclusions, deeming)
# 3. Benefit amount tests (FBR, living arrangements)

variable: ssi
calendar_year: 2024

# ==============================================================================
# 42 USC 1382(a)(1) - Age/Disability Eligibility Requirements
# "(A) has attained age 65 or is blind or disabled"
# ==============================================================================

test_cases:
  - name: "Age 65+ - eligible for aged SSI"
    description: "Individual age 65 qualifies on age alone"
    inputs:
      age: 65
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 1000
      is_us_citizen: true
      is_us_resident: true
    expected:
      is_aged: true
      is_ssi_categorical_eligible: true
    citations:
      - "42 USC 1382(a)(1)(A): has attained age 65"

  - name: "Age 64 not blind/disabled - ineligible"
    description: "Under 65 without disability does not qualify"
    inputs:
      age: 64
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 1000
      is_us_citizen: true
      is_us_resident: true
    expected:
      is_aged: false
      is_ssi_categorical_eligible: false
    citations:
      - "42 USC 1382(a)(1)(A): must be 65+ OR blind/disabled"

  - name: "Age 30 blind - eligible"
    description: "Blind individual qualifies regardless of age"
    inputs:
      age: 30
      is_blind: true
      is_disabled: false
      countable_income: 0
      countable_resources: 1000
      is_us_citizen: true
      is_us_resident: true
    expected:
      is_aged: false
      is_ssi_categorical_eligible: true
    citations:
      - "42 USC 1382(a)(1)(A): is blind"

  - name: "Age 45 disabled - eligible"
    description: "Disabled individual qualifies regardless of age"
    inputs:
      age: 45
      is_blind: false
      is_disabled: true
      countable_income: 0
      countable_resources: 1000
      is_us_citizen: true
      is_us_resident: true
    expected:
      is_aged: false
      is_ssi_categorical_eligible: true
    citations:
      - "42 USC 1382(a)(1)(A): is disabled"

# ==============================================================================
# 42 USC 1382(a)(3)(B) - Resource Test
# "the individual... has resources... not exceeding $2,000 (or $3,000
# in the case of such individual and his eligible spouse)"
# ==============================================================================

  - name: "Individual resources under limit - eligible"
    description: "Resources of $1,500 under $2,000 limit"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 1500
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      ssi_resource_limit: 2000
      is_ssi_resource_eligible: true
    citations:
      - "42 USC 1382(a)(3)(B): individual limit $2,000"

  - name: "Individual resources at limit - eligible"
    description: "Resources exactly at $2,000 limit"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 2000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      ssi_resource_limit: 2000
      is_ssi_resource_eligible: true
    citations:
      - "42 USC 1382(a)(3)(B): 'not exceeding' includes equal to limit"

  - name: "Individual resources over limit - ineligible"
    description: "Resources of $2,001 exceeds individual limit"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 2001
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      ssi_resource_limit: 2000
      is_ssi_resource_eligible: false
    citations:
      - "42 USC 1382(a)(3)(B): exceeds $2,000 individual limit"

  - name: "Couple resources under limit - eligible"
    description: "Couple with $2,500 resources under $3,000 limit"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 2500
      has_eligible_spouse: true
      is_us_citizen: true
      is_us_resident: true
    expected:
      ssi_resource_limit: 3000
      is_ssi_resource_eligible: true
    citations:
      - "42 USC 1382(a)(3)(B): couple limit $3,000"

  - name: "Couple resources over limit - ineligible"
    description: "Couple with $3,500 resources exceeds limit"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      countable_income: 0
      countable_resources: 3500
      has_eligible_spouse: true
      is_us_citizen: true
      is_us_resident: true
    expected:
      ssi_resource_limit: 3000
      is_ssi_resource_eligible: false
    citations:
      - "42 USC 1382(a)(3)(B): exceeds $3,000 couple limit"

# ==============================================================================
# 42 USC 1382a(b) - Income Exclusions
# (b)(2): "$20 of any income" (general exclusion)
# (b)(4): "$65 of earned income... plus one-half of the remainder"
# ==============================================================================

  - name: "General income exclusion - $20 unearned"
    description: "First $20 of any income excluded"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 100
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      general_income_exclusion: 20
      countable_unearned_income: 80
      countable_earned_income: 0
      ssi_countable_income: 80
    citations:
      - "42 USC 1382a(b)(2): first $20 of any income excluded"

  - name: "Earned income exclusions - standard case"
    description: "$65 exclusion plus 50% of remainder"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 500
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      # $500 - $20 general = $480; $480 - $65 = $415; $415 * 0.5 = $207.50
      general_income_exclusion: 20
      earned_income_exclusion: 65
      earned_income_remainder_exclusion: 207.50
      countable_earned_income: 207.50
      ssi_countable_income: 207.50
    citations:
      - "42 USC 1382a(b)(2): $20 general exclusion"
      - "42 USC 1382a(b)(4): $65 + 50% of remainder"

  - name: "Combined earned and unearned income"
    description: "General exclusion applied to unearned first, per SSA policy"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 200
      gross_earned_income: 400
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      # Unearned: $200 - $20 = $180
      # Earned: $400 - $65 = $335; $335 * 0.5 = $167.50
      # Total: $180 + $167.50 = $347.50
      countable_unearned_income: 180
      countable_earned_income: 167.50
      ssi_countable_income: 347.50
    citations:
      - "42 USC 1382a(b)(2): $20 applied to unearned first"
      - "42 USC 1382a(b)(4): $65 + 50% for earned"
      - "20 CFR 416.1124: order of exclusion application"

  - name: "Low earned income - exclusions exceed income"
    description: "When exclusions exceed income, countable = 0"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 50
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      # $50 - $20 = $30; $30 < $65, so all excluded
      countable_earned_income: 0
      ssi_countable_income: 0
    citations:
      - "42 USC 1382a(b): exclusions can reduce countable to zero"

# ==============================================================================
# 42 USC 1382(b) - Benefit Amount Calculation
# Federal Benefit Rate (FBR) minus countable income
# 2024: $943/month individual, $1,415/month couple
# ==============================================================================

  - name: "Maximum benefit - no income"
    description: "Full FBR when no countable income"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      federal_benefit_rate: 943
      ssi_countable_income: 0
      ssi: 943
    citations:
      - "42 USC 1382(b)(1): $943 individual FBR for 2024"

  - name: "Reduced benefit - with countable income"
    description: "FBR reduced dollar-for-dollar by countable income"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 300
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      # Countable: $300 - $20 = $280
      # Benefit: $943 - $280 = $663
      federal_benefit_rate: 943
      ssi_countable_income: 280
      ssi: 663
    citations:
      - "42 USC 1382(b)(1): FBR minus countable income"

  - name: "Zero benefit - income exceeds FBR"
    description: "No benefit when countable income exceeds FBR"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 1000
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      # Countable: $1000 - $20 = $980; $980 > $943
      ssi_countable_income: 980
      ssi: 0
    citations:
      - "42 USC 1382(b): benefit cannot be negative"

  - name: "Couple maximum benefit"
    description: "Full FBR for eligible couple"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 2000
      has_eligible_spouse: true
      spouse_age: 68
      spouse_is_blind: false
      spouse_is_disabled: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      federal_benefit_rate: 1415
      ssi: 1415
    citations:
      - "42 USC 1382(b)(1): $1,415 couple FBR for 2024"

# ==============================================================================
# 42 USC 1382(a)(2)(A) - Living Arrangement Reductions
# One-third reduction when receiving in-kind support and maintenance
# ==============================================================================

  - name: "Living in another's household - reduced FBR"
    description: "One-third reduction for in-kind support"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      living_in_others_household: true
      receiving_in_kind_support: true
      is_us_citizen: true
      is_us_resident: true
    expected:
      # Reduced FBR: $943 - $314 = $629
      one_third_reduction: 314
      applicable_fbr: 629
      ssi: 629
    citations:
      - "42 USC 1382(a)(2)(A): one-third reduction for in-kind support"

  - name: "Own household - full FBR"
    description: "No reduction when in own household"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      living_in_others_household: false
      receiving_in_kind_support: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      one_third_reduction: 0
      applicable_fbr: 943
      ssi: 943
    citations:
      - "42 USC 1382(b)(1): full FBR in own household"

# ==============================================================================
# 42 USC 1382c(a)(1) - Citizenship/Residency Requirements
# ==============================================================================

  - name: "Non-citizen - ineligible"
    description: "Must be US citizen or qualified alien"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: false
      is_qualified_alien: false
      is_us_resident: true
    expected:
      is_ssi_citizenship_eligible: false
      ssi: 0
    citations:
      - "42 USC 1382c(a)(1)(B): citizenship/qualified alien required"

  - name: "Non-resident - ineligible"
    description: "Must be US resident"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: false
    expected:
      is_ssi_residency_eligible: false
      ssi: 0
    citations:
      - "42 USC 1382c(a)(1)(A): US residency required"

# ==============================================================================
# Combined Eligibility Tests
# ==============================================================================

  - name: "Fully eligible individual with earned income"
    description: "Complete SSI calculation with income exclusions"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 100
      gross_earned_income: 600
      countable_resources: 1500
      has_eligible_spouse: false
      living_in_others_household: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      # Unearned: $100 - $20 = $80
      # Earned: $600 - $65 = $535; $535 * 0.5 = $267.50
      # Total countable: $80 + $267.50 = $347.50
      # Benefit: $943 - $347.50 = $595.50
      is_ssi_categorical_eligible: true
      is_ssi_resource_eligible: true
      is_ssi_income_eligible: true
      is_ssi_eligible: true
      ssi_countable_income: 347.50
      ssi: 595.50
    citations:
      - "42 USC 1382: all eligibility requirements"
      - "42 USC 1382a(b): income exclusions"
      - "42 USC 1382(b)(1): benefit calculation"

  - name: "Ineligible - resources over limit"
    description: "Categorical eligible but resources too high"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 0
      gross_earned_income: 0
      countable_resources: 5000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      is_ssi_categorical_eligible: true
      is_ssi_resource_eligible: false
      is_ssi_eligible: false
      ssi: 0
    citations:
      - "42 USC 1382(a)(3)(B): resources exceed $2,000 limit"

  - name: "Ineligible - income too high"
    description: "Would-be benefit reduced to zero by income"
    inputs:
      age: 70
      is_blind: false
      is_disabled: false
      gross_unearned_income: 1500
      gross_earned_income: 0
      countable_resources: 1000
      has_eligible_spouse: false
      is_us_citizen: true
      is_us_resident: true
    expected:
      is_ssi_categorical_eligible: true
      is_ssi_resource_eligible: true
      is_ssi_income_eligible: false  # Income exceeds FBR
      ssi_countable_income: 1480  # $1500 - $20
      ssi: 0
    citations:
      - "42 USC 1382(b): countable income exceeds FBR"
