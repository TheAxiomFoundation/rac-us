# Supplemental Security Income (SSI) Parameters
# 42 USC 1382 - Eligibility and Benefit Amounts
#
# SSI is indexed annually based on COLA (Cost of Living Adjustment)
# per 42 USC 1382f

variable: ssi
entity: Person
period: Month
dtype: Money

# Federal Benefit Rate (FBR)
# 42 USC 1382(b)(1) - Maximum monthly benefit amounts
federal_benefit_rate:
  description: "Maximum monthly SSI payment for eligible individuals and couples per 42 USC 1382(b)(1)"
  unit: USD
  period: month

  2024:
    individual: 943
    couple: 1415
    essential_person: 472  # Living with essential person providing care

  2025:
    individual: 967
    couple: 1450
    essential_person: 484

# Living Arrangement Reductions
# 42 USC 1382(a)(2)(A) - Reduced benefit when living in another's household
living_arrangement:
  description: "Benefit reduction for living in another's household per 42 USC 1382(a)(2)(A)"
  unit: USD
  period: month

  # One-third reduction rule: FBR reduced by 1/3 when receiving
  # in-kind support and maintenance in another's household
  2024:
    one_third_reduction:
      individual: 314  # 943 / 3 = 314.33, rounded
      couple: 472      # 1415 / 3 = 471.67, rounded
    reduced_fbr:
      individual: 629  # 943 - 314
      couple: 943      # 1415 - 472

  2025:
    one_third_reduction:
      individual: 322
      couple: 483
    reduced_fbr:
      individual: 645
      couple: 967

# Earned Income Exclusions
# 42 USC 1382a(b)(4) - Earned income disregards
earned_income:
  description: "Earned income exclusions per 42 USC 1382a(b)(4)"
  unit: USD
  period: month

  general_exclusion: 65           # First $65 of earned income excluded
  remainder_exclusion_rate: 0.50  # 50% of remainder excluded

# Unearned Income Exclusions
# 42 USC 1382a(b)(2) - General income exclusion
unearned_income:
  description: "Unearned income exclusions per 42 USC 1382a(b)(2)"
  unit: USD
  period: month

  general_exclusion: 20  # First $20 of any income excluded

# Student Earned Income Exclusion (SEIE)
# 42 USC 1382a(b)(4)(B)(ii) - For students under 22
student_earned_income_exclusion:
  description: "Student earned income exclusion for blind/disabled students under 22 per 42 USC 1382a(b)(4)(B)(ii)"
  unit: USD

  2024:
    monthly_limit: 2290
    annual_limit: 9230

  2025:
    monthly_limit: 2350
    annual_limit: 9480

# Resource Limits
# 42 USC 1382(a)(3)(B) - Maximum countable resources
resource_limit:
  description: "Maximum countable resources for SSI eligibility per 42 USC 1382(a)(3)(B)"
  unit: USD

  individual: 2000
  couple: 3000

# Resource Exclusions
# 42 USC 1382b(a) - Resources not counted
resource_exclusions:
  description: "Resources excluded from SSI resource counting per 42 USC 1382b(a)"

  # 42 USC 1382b(a)(1) - Principal residence
  home: true

  # 42 USC 1382b(a)(2) - Household goods and personal effects
  household_goods: true

  # 42 USC 1382b(a)(3) - One automobile
  automobile: true  # Regardless of value since 2005

  # 42 USC 1382b(a)(5) - Life insurance
  life_insurance_face_value_limit: 1500

  # 42 USC 1382b(a)(9) - Burial funds
  burial_funds_limit:
    individual: 1500
    couple: 3000

  # 42 USC 1382b(a)(10) - Burial spaces
  burial_spaces: true

# Age Threshold
# 42 USC 1382(a)(1)(A) - Age requirement
age:
  description: "Age threshold for SSI eligibility per 42 USC 1382(a)(1)(A)"
  unit: year

  threshold: 65

# Substantial Gainful Activity (SGA)
# Used to determine if someone is disabled
# 42 USC 1382c(a)(3)(A)
substantial_gainful_activity:
  description: "Monthly earnings threshold for disability determination per 42 USC 1382c(a)(3)(A)"
  unit: USD
  period: month

  2024:
    non_blind: 1550
    blind: 2590

  2025:
    non_blind: 1620
    blind: 2700

# Trial Work Period Earnings
# 42 USC 1382h(a)(2)
trial_work_period:
  description: "Monthly earnings threshold for trial work period per 42 USC 1382h(a)(2)"
  unit: USD
  period: month

  2024: 1110
  2025: 1160

# Deeming Thresholds
# 42 USC 1382c(f) - Parental/spousal income deemed to recipient
deeming:
  description: "Allocations for deeming income from ineligible spouse or parent per 42 USC 1382c(f)"
  unit: USD
  period: month

  2024:
    ineligible_spouse_allocation: 472
    ineligible_child_allocation: 472
    parent_allocation:
      one_parent: 943
      two_parents: 1415

  2025:
    ineligible_spouse_allocation: 484
    ineligible_child_allocation: 484
    parent_allocation:
      one_parent: 967
      two_parents: 1450
