# Tests for 42 USC 8624 - Low Income Home Energy Assistance (LIHEAP)
#
# LIHEAP provides heating and cooling assistance to low-income households.
# Eligibility per 42 USC 8624(b)(2):
#   (A) Income at or below 150% of FPL, OR
#   (A) Income at or below 60% of state median income, OR
#   (B) Categorical eligibility from SNAP, SSI, TANF, or needs-tested veterans programs

variable: liheap_eligible
fiscal_year: 2024

# =============================================================================
# INCOME ELIGIBILITY (42 USC 8624(b)(2)(A))
# 150% FPL or 60% State Median Income (whichever is greater)
# =============================================================================

test_cases:
  # --- FPL-Based Income Eligibility ---
  - name: "1-person, no income - eligible"
    description: "Zero income household meets income eligibility"
    inputs:
      household_size: 1
      annual_gross_income: 0
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_income_eligible: true
    citations:
      - "42 USC 8624(b)(2)(A): income eligibility"

  - name: "1-person, at 150% FPL - eligible"
    description: "Income at exactly 150% FPL ($22,590 in 2024)"
    inputs:
      household_size: 1
      annual_gross_income: 22590  # 150% of $15,060 FPL
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_income_eligible: true
    citations:
      - "42 USC 8624(b)(2)(A): 150 percent of poverty level"

  - name: "1-person, over 150% FPL but under 60% SMI - eligible"
    description: "Over FPL limit but under state median income limit"
    inputs:
      household_size: 1
      annual_gross_income: 25000  # Over 150% FPL but under 60% SMI in most states
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"  # CA SMI is high
    expected:
      liheap_eligible: true
      liheap_income_eligible: true
    citations:
      - "42 USC 8624(b)(2)(A): 60 percent of State median income"

  - name: "1-person, over both limits - ineligible"
    description: "Income exceeds both 150% FPL and 60% SMI"
    inputs:
      household_size: 1
      annual_gross_income: 50000  # Over both limits
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: false
      liheap_income_eligible: false
    citations:
      - "42 USC 8624(b)(2)(A): exceeds income limits"

  # --- Household Size Scaling ---
  - name: "4-person, at 150% FPL - eligible"
    description: "4-person household at FPL limit ($46,800 in 2024)"
    inputs:
      household_size: 4
      annual_gross_income: 46800  # 150% of $31,200 FPL for 4-person
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_income_eligible: true
    citations:
      - "42 USC 8624(b)(2)(A): scaled by household size"

  - name: "8-person, moderate income - eligible"
    description: "Large household with scaled income limit"
    inputs:
      household_size: 8
      annual_gross_income: 75000  # Under 150% FPL for 8-person
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_income_eligible: true
    citations:
      - "42 USC 8624(b)(2)(A): household size scaling"

# =============================================================================
# CATEGORICAL ELIGIBILITY (42 USC 8624(b)(2)(B))
# Automatic eligibility from participation in other programs
# =============================================================================

  - name: "SNAP recipient - categorically eligible"
    description: "SNAP recipients are automatically LIHEAP eligible"
    inputs:
      household_size: 1
      annual_gross_income: 60000  # Would be over income limits
      receives_snap: true
      receives_ssi: false
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_categorically_eligible: true
    citations:
      - "42 USC 8624(b)(2)(B): SNAP categorical eligibility"

  - name: "SSI recipient - categorically eligible"
    description: "SSI recipients are automatically LIHEAP eligible"
    inputs:
      household_size: 1
      annual_gross_income: 60000
      receives_snap: false
      receives_ssi: true
      receives_tanf: false
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_categorically_eligible: true
    citations:
      - "42 USC 8624(b)(2)(B): SSI categorical eligibility"

  - name: "TANF recipient - categorically eligible"
    description: "TANF recipients are automatically LIHEAP eligible"
    inputs:
      household_size: 3
      annual_gross_income: 60000
      receives_snap: false
      receives_ssi: false
      receives_tanf: true
      state: "CA"
    expected:
      liheap_eligible: true
      liheap_categorically_eligible: true
    citations:
      - "42 USC 8624(b)(2)(B): TANF categorical eligibility"

# =============================================================================
# BENEFIT CALCULATION (42 USC 8624(b)(5))
# Energy burden-based benefit targeting
# =============================================================================

  - name: "High energy burden - higher benefit"
    description: "Household with high energy costs relative to income"
    inputs:
      household_size: 2
      annual_gross_income: 20000
      annual_energy_costs: 3000  # 15% energy burden
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
      is_heating_season: true
    expected:
      liheap_eligible: true
      liheap_energy_burden: 0.15
    citations:
      - "42 USC 8624(b)(5): target benefits to households with highest energy burden"

  - name: "Low energy burden - lower benefit"
    description: "Household with lower energy costs relative to income"
    inputs:
      household_size: 2
      annual_gross_income: 30000
      annual_energy_costs: 1500  # 5% energy burden
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
      is_heating_season: true
    expected:
      liheap_eligible: true
      liheap_energy_burden: 0.05
    citations:
      - "42 USC 8624(b)(5): energy burden calculation"

# =============================================================================
# HEATING AND COOLING ASSISTANCE (42 USC 8624(b)(1))
# =============================================================================

  - name: "Heating assistance in winter"
    description: "Heating assistance during heating season"
    inputs:
      household_size: 2
      annual_gross_income: 20000
      annual_energy_costs: 2400
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
      is_heating_season: true
      is_cooling_season: false
    expected:
      liheap_eligible: true
      liheap_heating_eligible: true
      liheap_cooling_eligible: false
    citations:
      - "42 USC 8624(b)(1)(A): home heating assistance"

  - name: "Cooling assistance in summer"
    description: "Cooling assistance during cooling season"
    inputs:
      household_size: 2
      annual_gross_income: 20000
      annual_energy_costs: 2400
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "AZ"
      is_heating_season: false
      is_cooling_season: true
    expected:
      liheap_eligible: true
      liheap_heating_eligible: false
      liheap_cooling_eligible: true
    citations:
      - "42 USC 8624(b)(1)(B): home cooling assistance"

# =============================================================================
# VULNERABLE POPULATIONS (42 USC 8624(b)(5))
# Priority for elderly, disabled, and households with young children
# =============================================================================

  - name: "Elderly household - priority"
    description: "Households with elderly members get priority"
    inputs:
      household_size: 1
      annual_gross_income: 18000
      annual_energy_costs: 2000
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
      has_elderly_member: true
      has_disabled_member: false
      has_young_children: false
    expected:
      liheap_eligible: true
      liheap_vulnerable_household: true
    citations:
      - "42 USC 8624(b)(5)(A): priority for elderly"

  - name: "Disabled household - priority"
    description: "Households with disabled members get priority"
    inputs:
      household_size: 2
      annual_gross_income: 22000
      annual_energy_costs: 2400
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
      has_elderly_member: false
      has_disabled_member: true
      has_young_children: false
    expected:
      liheap_eligible: true
      liheap_vulnerable_household: true
    citations:
      - "42 USC 8624(b)(5)(A): priority for disabled"

  - name: "Household with young children - priority"
    description: "Households with children under 6 get priority"
    inputs:
      household_size: 3
      annual_gross_income: 25000
      annual_energy_costs: 2800
      receives_snap: false
      receives_ssi: false
      receives_tanf: false
      state: "CA"
      has_elderly_member: false
      has_disabled_member: false
      has_young_children: true
    expected:
      liheap_eligible: true
      liheap_vulnerable_household: true
    citations:
      - "42 USC 8624(b)(5)(A): priority for young children"
