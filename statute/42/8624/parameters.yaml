# Low Income Home Energy Assistance Program (LIHEAP) Parameters
# 42 USC 8624 - Applications and Requirements
#
# LIHEAP provides financial assistance to help low-income households
# meet their home heating and cooling needs.

variable: liheap
entity: Household
period: Year
dtype: Money

# Income Eligibility Thresholds
# 42 USC 8624(b)(2)(A) - Income limits for eligibility
income_eligibility:
  description: "Income eligibility thresholds per 42 USC 8624(b)(2)(A)"

  # Maximum income as percentage of Federal Poverty Level
  fpl_percentage:
    description: "Maximum income as percentage of FPL"
    unit: rate
    values:
      1981-01-01: 1.50  # 150% of poverty level
    citations:
      - "42 USC 8624(b)(2)(A)(i): 150 percent of the poverty level"

  # Alternative: 60% of State Median Income
  smi_percentage:
    description: "Maximum income as percentage of State Median Income"
    unit: rate
    values:
      1981-01-01: 0.60  # 60% of state median income
    citations:
      - "42 USC 8624(b)(2)(A)(ii): 60 percent of State median income"

# State Median Income by Household Size
# Published annually by HHS
# Values for FY2024 (July 2023 - June 2024)
state_median_income:
  description: "State Median Income by household size for LIHEAP eligibility per 42 USC 8624(b)(2)(A)(ii)"
  unit: USD
  period: year

  # 48 Contiguous States (weighted average for reference)
  # States may use their own SMI values
  2024:
    by_household_size:
      1: 45000
      2: 58900
      3: 72750
      4: 86600
      5: 100450
      6: 114300
      7: 116950
      8: 119600
      additional_per_person: 2650
  citations:
    - "HHS LIHEAP State Median Income Guidelines"
    - "42 USC 8624(b)(2)(A)(ii)"

# Federal Poverty Level for LIHEAP
# Using same FPL as other programs
fpl_by_household_size:
  description: "Annual Federal Poverty Level by household size (48 states + DC)"
  unit: USD
  period: year
  values:
    by_household_size:
      1:
        2025-01-01: 15540
        2024-01-01: 15060
        2023-01-01: 14580
      additional_per_person:
        2025-01-01: 5460
        2024-01-01: 5280
        2023-01-01: 5110
  citations:
    - "HHS Poverty Guidelines"
    - "42 USC 8624(b)(2)(A)(i)"

# Benefit Targeting
# 42 USC 8624(b)(5) - Priority for high energy burden households
benefit_targeting:
  description: "Benefit targeting requirements per 42 USC 8624(b)(5)"

  # Minimum benefit amount (many states set their own)
  minimum_benefit:
    description: "Minimum LIHEAP benefit amount"
    unit: USD
    values:
      2024: 100
      2023: 100
    citations:
      - "42 USC 8624(b)(5)(B): avoid making payments of very small amounts"

  # High energy burden threshold
  high_energy_burden_threshold:
    description: "Energy burden percentage considered high (energy costs / income)"
    unit: rate
    values:
      1981-01-01: 0.06  # 6% is commonly used as high burden threshold
    citations:
      - "42 USC 8624(b)(5)(A): highest energy burden"

# Categorical Eligibility
# 42 USC 8624(b)(2)(B) - Automatic eligibility from other programs
categorical_eligibility:
  description: "Programs that confer automatic LIHEAP eligibility per 42 USC 8624(b)(2)(B)"

  eligible_programs:
    - snap  # Supplemental Nutrition Assistance Program
    - ssi   # Supplemental Security Income
    - tanf  # Temporary Assistance for Needy Families
    - veterans_pension  # Needs-tested veterans benefits

  citations:
    - "42 USC 8624(b)(2)(B): households receiving SNAP, SSI, TANF, or certain veterans benefits"

# Vulnerable Population Priority
# 42 USC 8624(b)(5)(A) - Priority populations
vulnerable_populations:
  description: "Priority populations for LIHEAP targeting per 42 USC 8624(b)(5)(A)"

  elderly_age_threshold:
    description: "Age threshold for elderly classification"
    unit: year
    values:
      1981-01-01: 60
    citations:
      - "42 USC 8624(b)(5)(A): households with elderly individuals"

  young_child_age_threshold:
    description: "Age threshold for young children classification"
    unit: year
    values:
      1981-01-01: 6
    citations:
      - "42 USC 8624(b)(5)(A): households with young children"

# Assistance Types
# 42 USC 8624(b)(1) - Types of assistance
assistance_types:
  description: "Types of LIHEAP assistance per 42 USC 8624(b)(1)"

  heating:
    description: "Home heating assistance"
    citations:
      - "42 USC 8624(b)(1)(A): payments to or on behalf of households for home heating costs"

  cooling:
    description: "Home cooling assistance"
    citations:
      - "42 USC 8624(b)(1)(B): payments to or on behalf of households for home cooling costs"

  crisis:
    description: "Energy crisis intervention"
    citations:
      - "42 USC 8624(b)(1)(C): energy crisis intervention"

  weatherization:
    description: "Low-cost residential weatherization"
    citations:
      - "42 USC 8624(b)(1)(D): low-cost residential weatherization"

# Maximum Income Limit
# States may NOT exceed 150% FPL (or 60% SMI if higher)
# but may set lower limits
maximum_income_limit:
  description: "States may set income limits at or below statutory maximum"
  max_fpl_percentage: 1.50
  max_smi_percentage: 0.60
  citations:
    - "42 USC 8624(b)(2)(A): household income which does not exceed the greater of 150% FPL or 60% SMI"

# Benefit Calculation Weights
# 42 USC 8624(b)(5) - Targeting based on income and energy burden
benefit_calculation:
  description: "Weights for benefit targeting calculation per 42 USC 8624(b)(5)"

  # Weight for income factor in targeting score
  income_factor_weight:
    description: "Weight applied to income factor in benefit calculation"
    unit: rate
    values:
      1981-01-01: 0.5
    citations:
      - "42 USC 8624(b)(5): highest level of assistance to lowest incomes"

  # Weight for energy burden factor in targeting score
  burden_factor_weight:
    description: "Weight applied to energy burden factor in benefit calculation"
    unit: rate
    values:
      1981-01-01: 0.5
    citations:
      - "42 USC 8624(b)(5): highest energy costs in relation to income"

  # Multiplier for priority households (vulnerable populations)
  priority_multiplier:
    description: "Benefit multiplier for priority households"
    unit: rate
    values:
      1981-01-01: 1.25
    citations:
      - "42 USC 8624(b)(5)(A): priority for elderly, disabled, young children"

  # Base benefit placeholder (state-specific)
  base_benefit_placeholder:
    description: "Placeholder base benefit amount (actual varies by state/year)"
    unit: USD
    values:
      2024-01-01: 500
    citations:
      - "State LIHEAP plans - actual benefits vary $100 to $2,000+"

  # Cooling assistance fraction (relative to heating)
  cooling_assistance_fraction:
    description: "Cooling assistance as fraction of total LIHEAP benefit"
    unit: rate
    values:
      1981-01-01: 0.5
    citations:
      - "State LIHEAP plans - cooling typically smaller portion of benefit"

  # Minimum income factor floor
  income_factor_floor:
    description: "Minimum value for income factor in benefit calculation"
    unit: rate
    values:
      1981-01-01: 0.1
    citations:
      - "42 USC 8624(b)(5): ensures minimum benefit for all eligible households"
