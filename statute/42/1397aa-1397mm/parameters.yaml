# =============================================================================
# COST SHARING - 42 USC 1397cc(e)
# Premiums and cost-sharing cannot exceed 5% of family income
# Lower-income families exempt from certain cost-sharing
# =============================================================================

cost_sharing:
  description: "CHIP cost-sharing limits per 42 USC 1397cc(e)"

  # Maximum aggregate monthly cost-sharing as % of income
  # 42 USC 1397cc(e)(3)(A)
  max_out_of_pocket_rate:
    description: "Maximum aggregate cost-sharing as percentage of family income"
    unit: rate
    values:
      1997-08-05: 0.05  # 5% of family income
    citations:
      - "42 USC 1397cc(e)(3)(A): cumulative cost-sharing limit of 5%"
      - "P.L. 105-33 Section 4901"

  # Income threshold below which cost-sharing is restricted
  # 42 USC 1397cc(e)(3)(B) and CHIPRA amendments
  cost_sharing_exempt_threshold:
    description: "Income threshold below which certain cost-sharing is prohibited (fraction of FPL)"
    unit: rate
    values:
      1997-08-05: 1.50  # Original BBA
      2009-02-04: 1.50  # CHIPRA maintained
    citations:
      - "42 USC 1397cc(e)(3)(B): restrictions below 150% FPL"
      - "CHIPRA 2009 cost-sharing provisions"

  # Premium exemption threshold
  premium_exempt_threshold:
    description: "Income threshold below which premiums cannot be charged (fraction of FPL)"
    unit: rate
    values:
      2009-02-04: 1.50  # CHIPRA established
    citations:
      - "42 USC 1397cc(e)(3)(B): no premiums below 150% FPL"
      - "P.L. 111-3 CHIPRA Section 504"

  # Limited tier threshold (150-200% FPL)
  limited_tier_threshold:
    description: "Upper income threshold for limited cost-sharing tier (fraction of FPL)"
    unit: rate
    values:
      1997-08-05: 2.00  # 200% FPL
    citations:
      - "42 USC 1397cc(e): Cost-sharing tiered by income"
      - "State CHIP cost-sharing structures typically use 200% FPL tier"

  # Nominal cost-sharing annual cap (for those below 150% FPL)
  nominal_cost_sharing_cap:
    description: "Approximate annual cap on nominal cost-sharing for exempt individuals (USD)"
    unit: currency-USD
    values:
      1997-08-05: 100  # Approximate based on Medicaid nominal rules
    citations:
      - "42 USC 1397cc(e)(3)(B): Medicaid-level cost-sharing for those below 150% FPL"
      - "42 CFR 447.52-56: Medicaid nominal cost-sharing rules"

# =============================================================================
# WAITING PERIOD - 42 USC 1397bb(b)(1)(B)(ii)
# States may impose waiting period for children with prior coverage
# CHIPRA limits to 90 days maximum
# =============================================================================

waiting_period:
  description: "CHIP waiting period parameters per 42 USC 1397bb"

  max_days:
    description: "Maximum waiting period for children with prior insurance (days)"
    unit: day
    values:
      1997-08-05: 365  # States could set up to 12 months
      2009-02-04: 90   # CHIPRA limited to 90 days
    citations:
      - "42 USC 1397bb(b)(1)(B)(ii): waiting period provision"
      - "P.L. 111-3 CHIPRA Section 111: 90-day limit"

# =============================================================================
# IMMIGRATION ELIGIBILITY
# Generally requires lawful presence (same as Medicaid)
# Five-year bar applies to qualified immigrants
# =============================================================================

immigration:
  description: "CHIP immigration eligibility requirements"

  # Undocumented immigrants ineligible
  requires_lawful_presence:
    description: "Whether lawful immigration status is required for CHIP"
    unit: boolean
    values:
      1997-08-05: true
    citations:
      - "8 USC 1611: Aliens ineligible for federal public benefits"
      - "42 USC 1397jj(b)(2): Targeted low-income child requirements"

  # Five-year waiting period for qualified immigrants
  # Can be waived by states using state-only funds
  immigrant_waiting_period_years:
    description: "Waiting period for qualified immigrants before CHIP eligibility (years)"
    unit: year
    values:
      1996-08-22: 5  # PRWORA established
      2009-02-04: 0  # CHIPRA gave states option to cover immediately
    citations:
      - "8 USC 1613: Five-year bar for qualified aliens"
      - "P.L. 111-3 CHIPRA Section 214: State option to cover lawfully residing children"

# =============================================================================
# ENROLLMENT AND SPENDING DATA (CALIBRATION)
# Per-capita values from MACPAC for benefit calculations
# =============================================================================

calibration:
  description: "CHIP enrollment and spending data for per-capita benefit calculations"
  citations:
    - "MACPAC: CHIP Spending by State"
    - "https://www.macpac.gov/publication/chip-spending-by-state/"

  # Average per-capita spending (federal default, states may vary)
  per_capita_spending:
    description: "National average per-capita CHIP spending"
    unit: currency-USD
    values:
      2023-10-01: 3200  # Approximate annual per-enrollee
      2022-10-01: 3100
      2021-10-01: 2900
    citations:
      - "MACPAC MACStats: CHIP Expenditures"

# =============================================================================
# UTILIZATION AND BURDEN FACTORS
# Modeling assumptions for benefit calculations
# =============================================================================

utilization:
  description: "Utilization factors for benefit calculations"

  # Estimated average utilization of max out-of-pocket
  estimated_oop_utilization_rate:
    description: "Estimated average utilization rate of maximum out-of-pocket costs"
    unit: rate
    values:
      1997-08-05: 0.5  # 50% of max OOP as average utilization
    citations:
      - "Actuarial assumption for benefit modeling"
      - "Based on typical healthcare utilization patterns"

  # Threshold for determining if cost-sharing is burdensome
  coverage_gap_burden_threshold:
    description: "Threshold ratio of max OOP to benefit above which cost-sharing is considered burdensome"
    unit: rate
    values:
      1997-08-05: 0.2  # 20% of benefit value
    citations:
      - "Policy analysis threshold for coverage gap identification"
      - "42 USC 1397cc(e)(3): Cost-sharing affordability concerns"
