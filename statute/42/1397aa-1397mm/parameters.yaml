# 42 USC 1397aa-1397mm - Children's Health Insurance Program (CHIP)
#
# Title XXI of the Social Security Act - State Children's Health Insurance Program
# Originally enacted by Balanced Budget Act of 1997 (P.L. 105-33)
# Reauthorized by CHIPRA 2009 (P.L. 111-3) and MACRA 2015 (P.L. 114-10)
#
# CHIP provides health coverage for uninsured children in families with incomes
# too high for Medicaid but unable to afford private coverage. States administer
# CHIP with flexibility to set eligibility levels up to 300% FPL (or higher with
# approval) and choose program structure (Medicaid expansion, separate program,
# or combination).
#
# Key sections:
# - 42 USC 1397aa (section 2101): Purpose and state allotments
# - 42 USC 1397bb (section 2102): State child health plans
# - 42 USC 1397cc (section 2103): Coverage requirements and cost-sharing
# - 42 USC 1397dd (section 2104): Allotments
# - 42 USC 1397ee (section 2105): Payments and federal matching
# - 42 USC 1397jj (section 2110): Definitions (child, targeted low-income child)
#
# Reference sources:
# - CMS Medicaid/CHIP eligibility levels: https://www.medicaid.gov/medicaid/national-medicaid-chip-program-information
# - MACPAC reports: https://www.macpac.gov/chip/
# - State Plan Amendment (SPA) database: https://www.medicaid.gov/state-resource-center

variable: chip
entity: Person
period: Year
dtype: Money

# =============================================================================
# AGE ELIGIBILITY - 42 USC 1397jj(c)(1)
# "Child" means an individual under 19 years of age
# =============================================================================

age:
  description: "Maximum age for CHIP eligibility per 42 USC 1397jj(c)(1)"

  max_age:
    description: "Child must be under this age for CHIP eligibility"
    unit: year
    values:
      1997-08-05: 19  # BBA 1997 established program
    citations:
      - "42 USC 1397jj(c)(1): child means an individual under 19 years of age"
      - "P.L. 105-33 Section 4901"

