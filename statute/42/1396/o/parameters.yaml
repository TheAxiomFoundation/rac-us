# 42 USC 1396o - Cost Sharing Parameters
#
# Federal limits on Medicaid cost sharing (premiums, copayments, deductibles)
# These are MAXIMUM limits - states may impose less cost sharing.
#
# Key regulatory sources:
# - 42 USC 1396o (original cost sharing limits)
# - 42 USC 1396o-1 (DRA 2005 alternative cost sharing)
# - 42 CFR 447.52-447.57 (implementing regulations)
#
# Reference: https://www.medicaid.gov/medicaid/cost-sharing/index.html

variable: medicaid_cost_sharing
entity: Person
period: Month
dtype: Money

# =============================================================================
# NOMINAL COPAYMENT LIMITS (Below 100% FPL)
# 42 USC 1396o(a)(3), 42 CFR 447.54
# =============================================================================

nominal_copayment_max:
  description: "Maximum nominal copayment for beneficiaries below 100% FPL per 42 CFR 447.54"
  unit: currency-USD
  values:
    2024-01-01: 4.00    # $4 maximum nominal copay (most services)
    2016-01-01: 4.00    # Increased from $3
    2006-02-08: 3.00    # DRA 2005 levels
  citations:
    - "42 CFR 447.54(a): Maximum nominal copayment"
    - "CMS State Medicaid Manual"

nominal_copayment_preferred_drug:
  description: "Maximum copayment for preferred drugs for beneficiaries below 100% FPL"
  unit: currency-USD
  values:
    2024-01-01: 4.00
    2016-01-01: 4.00
    2006-02-08: 3.00
  citations:
    - "42 CFR 447.54(a)(2): Preferred drug copayment"

nominal_copayment_nonpreferred_drug:
  description: "Maximum copayment for non-preferred drugs for beneficiaries below 100% FPL"
  unit: currency-USD
  values:
    2024-01-01: 8.00    # $8 for non-preferred drugs
    2016-01-01: 8.00
    2006-02-08: 6.00
  citations:
    - "42 CFR 447.54(a)(3): Non-preferred drug copayment"

# =============================================================================
# PERCENTAGE-BASED COST SHARING (Above 100% FPL)
# 42 USC 1396o(c), 42 CFR 447.53
# =============================================================================

copayment_rate_100_150_fpl:
  description: "Maximum copayment rate for beneficiaries at 100-150% FPL"
  unit: rate
  values:
    2006-02-08: 0.10    # Up to 10% of service cost
  citations:
    - "42 USC 1396o(c)(1): Cost sharing for 100-150% FPL"
    - "42 CFR 447.53(b)"

copayment_rate_150_plus_fpl:
  description: "Maximum copayment rate for beneficiaries above 150% FPL"
  unit: rate
  values:
    2006-02-08: 0.20    # Up to 20% of service cost
  citations:
    - "42 USC 1396o(c)(2): Cost sharing above 150% FPL"
    - "42 CFR 447.53(c)"

# =============================================================================
# AGGREGATE COST SHARING LIMIT
# 42 USC 1396o(e), 42 CFR 447.56
# =============================================================================

aggregate_cost_share_limit:
  description: "Maximum aggregate cost sharing as percentage of household income"
  unit: rate
  values:
    2006-02-08: 0.05    # 5% of household income
  citations:
    - "42 USC 1396o(e): Aggregate limit on cost sharing"
    - "42 CFR 447.56(f): 5% quarterly income limit"

aggregate_cost_share_quarterly_limit:
  description: "Aggregate cost sharing limit applied quarterly"
  unit: rate
  values:
    2006-02-08: 0.05    # 5% of quarterly income
  citations:
    - "42 CFR 447.56(f): Quarterly calculation period"

# =============================================================================
# INPATIENT HOSPITAL COPAYMENT LIMITS
# 42 CFR 447.54(b)
# =============================================================================

inpatient_copay_max_per_day:
  description: "Maximum copayment per day for inpatient hospital stay (below 100% FPL)"
  unit: currency-USD
  values:
    2024-01-01: 75.00
    2016-01-01: 75.00
    2006-02-08: 50.00
  citations:
    - "42 CFR 447.54(b)(1): Inpatient daily copayment"

inpatient_copay_max_per_admission:
  description: "Maximum copayment per admission for inpatient hospital (below 100% FPL)"
  unit: currency-USD
  values:
    2024-01-01: 200.00  # Aggregate per-admission cap
    2016-01-01: 200.00
  citations:
    - "42 CFR 447.54(b): Inpatient admission copayment"

# =============================================================================
# PREMIUM LIMITS
# 42 USC 1396o(c)(3), 42 CFR 447.55
# =============================================================================

premium_max_100_150_fpl:
  description: "Maximum monthly premium for beneficiaries at 100-150% FPL"
  unit: currency-USD
  values:
    # Generally premiums not allowed for mandatory groups below 150% FPL
    # States may charge minimal premiums for optional groups
    2006-02-08: 0.00
  citations:
    - "42 USC 1396o(c)(3): Premium restrictions"
    - "42 CFR 447.55: Premium limitations"

premium_max_150_plus_fpl:
  description: "Maximum monthly premium for beneficiaries above 150% FPL"
  unit: rate
  values:
    # Premiums capped at 5% of income in aggregate with other cost sharing
    2006-02-08: 0.05    # Rate applied to monthly income
  citations:
    - "42 USC 1396o(c)(3): Premiums for higher-income groups"
    - "42 CFR 447.55(a)(2)"

# =============================================================================
# EXPANSION ADULT COST SHARING
# 42 USC 1396o-1 as applied to ACA expansion population
# =============================================================================

expansion_adult_copay_max:
  description: "Maximum copayment for ACA expansion adults per service"
  unit: currency-USD
  values:
    2024-01-01: 4.00    # Nominal for those under 100% FPL
    2014-01-01: 4.00
  citations:
    - "42 CFR 447.52: Expansion population cost sharing"

expansion_adult_premium_allowed_above_100_fpl:
  description: "Whether premiums may be charged to expansion adults above 100% FPL"
  unit: boolean
  values:
    2014-01-01: true    # States may charge premiums above 100% FPL
  citations:
    - "42 CFR 447.55(a)(4): ACA expansion premium authority"

# =============================================================================
# NON-EMERGENCY USE OF ED
# 42 USC 1396o-1(e) - Higher cost sharing for non-emergency ED use
# =============================================================================

non_emergency_ed_copay_max:
  description: "Maximum copayment for non-emergency use of emergency department"
  unit: currency-USD
  values:
    2024-01-01: 8.00    # May be higher than standard copay
    2006-02-08: 8.00
  citations:
    - "42 USC 1396o-1(e): Non-emergency ED cost sharing"
    - "42 CFR 447.54(d): ED copayment limit"

# =============================================================================
# TOBACCO CESSATION PREMIUM REDUCTION
# Some states offer premium reductions for tobacco cessation participation
# =============================================================================

tobacco_cessation_premium_reduction:
  description: "Premium reduction for tobacco cessation program participation"
  unit: rate
  values:
    2014-01-01: 0.00    # State option, not federally mandated
  citations:
    - "State option under Medicaid expansion waivers"
