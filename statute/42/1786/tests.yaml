      age: 22
      is_pregnant: true
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 8000  # Over 185% FPL
      household_size: 1
      is_us_resident: true
      receives_snap: true
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_categorical_eligible: true
      is_wic_adjunctively_eligible: true
      is_wic_income_eligible: true
      is_wic_eligible: true
    citations:
      - "42 USC 1786(d): categorical + adjunctive eligibility"

  - name: "Eligible child - Medicaid recipient"
    description: "Child on Medicaid qualifies"
    inputs:
      age: 3
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 5000  # Over 185% FPL for small household
      household_size: 2
      is_us_resident: true
      receives_snap: false
      receives_medicaid: true
      receives_tanf: false
    expected:
      is_wic_categorical_eligible: true
      is_wic_adjunctively_eligible: true
      is_wic_eligible: true
    citations:
      - "42 USC 1786(d): child with Medicaid adjunctive eligibility"

  - name: "Ineligible - over income without adjunctive"
    description: "Child in high-income family without program participation"
    inputs:
      age: 2
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 10000
      household_size: 2
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_categorical_eligible: true
      is_wic_income_eligible: false
      is_wic_eligible: false
    citations:
      - "42 USC 1786(d)(2): income exceeds limit"

  - name: "Ineligible - adult without qualifying status"
    description: "Adult not in categorical group"
    inputs:
      age: 40
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 1000
      household_size: 1
      is_us_resident: true
      receives_snap: true
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_categorical_eligible: false
      is_wic_eligible: false
    citations:
      - "42 USC 1786(d)(1): not in categorical group"

  - name: "Ineligible - non-resident"
    description: "Non-resident fails residency requirement"
    inputs:
      age: 2
      is_pregnant: false
      is_breastfeeding: false
      is_postpartum: false
      household_gross_income: 1000
      household_size: 2
      is_us_resident: false
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_categorical_eligible: true
      is_wic_residency_eligible: false
      is_wic_eligible: false
    citations:
      - "42 USC 1786(d)(3): residency requirement"

  - name: "Breastfeeding woman - extended eligibility"
    description: "Breastfeeding women eligible up to 12 months postpartum"
    inputs:
      age: 27
      is_pregnant: false
      is_breastfeeding: true
      is_postpartum: false
      months_postpartum: 10
      household_gross_income: 2000
      household_size: 2
      is_us_resident: true
      receives_snap: false
      receives_medicaid: false
      receives_tanf: false
    expected:
      is_wic_categorical_eligible: true
      wic_category: "breastfeeding_woman"
      is_wic_eligible: true
    citations:
      - "42 USC 1786(b)(3): breastfeeding up to 1 year"
