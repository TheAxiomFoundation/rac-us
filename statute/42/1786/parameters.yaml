      1: 1255    # 15060 / 12
      2: 1703    # 20440 / 12
      3: 2152    # 25820 / 12
      4: 2600    # 31200 / 12
      5: 3048    # 36580 / 12
      6: 3497    # 41960 / 12
      7: 3945    # 47340 / 12
      8: 4393    # 52720 / 12
    additional_per_person: 448  # 5380 / 12

  2025:
    by_household_size:
      1: 1304    # 15650 / 12
      2: 1763    # 21150 / 12
      3: 2221    # 26650 / 12
      4: 2679    # 32150 / 12
      5: 3138    # 37650 / 12
      6: 3596    # 43150 / 12
      7: 4054    # 48650 / 12
      8: 4513    # 54150 / 12
