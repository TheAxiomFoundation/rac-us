# Special Supplemental Nutrition Program for Women, Infants, and Children (WIC)
# 42 USC 1786 - Program parameters
#
# WIC provides supplemental foods, nutrition education, and health care referrals
# to low-income pregnant, breastfeeding, and postpartum women, and to infants
# and children up to age 5 who are at nutritional risk.
#
# Key statute sections:
# - 42 USC 1786(b): Definitions
# - 42 USC 1786(d): Eligibility requirements
# - 42 USC 1786(f): Program benefits

variable: wic_eligible
entity: Person
period: Month
dtype: Boolean

# ==============================================================================
# Income Eligibility
# 42 USC 1786(d)(2)(B): "at or below 185 percent of the poverty income guidelines"
# ==============================================================================

income:
  description: "WIC income eligibility parameters per 42 USC 1786(d)(2)"

  limit_pct_fpl:
    description: "Maximum income as percentage of Federal Poverty Level per 42 USC 1786(d)(2)(B)"
    unit: ratio
    value: 1.85  # 185% of FPL

# ==============================================================================
# Age Thresholds
# 42 USC 1786(b)(4): "child... 1 through 4 years of age"
# 42 USC 1786(b)(6): "infant... up to the infant's first birthday"
# ==============================================================================

age:
  description: "Age thresholds for WIC categorical eligibility per 42 USC 1786(b)"

  infant_max_years:
    description: "Maximum age for infant category (exclusive) per 42 USC 1786(b)(6)"
    unit: year
    value: 1  # Under 1 year old

  child_max_years:
    description: "Maximum age for child category (exclusive) per 42 USC 1786(b)(4)"
    unit: year
    value: 5  # 1-4 years old (up to 5th birthday)

# ==============================================================================
# Postpartum and Breastfeeding Duration
# 42 USC 1786(b)(3): breastfeeding women up to 1 year
# 42 USC 1786(b)(14): postpartum women up to 6 months (or 1 year if breastfeeding)
# ==============================================================================

postpartum:
  description: "Postpartum eligibility duration limits per 42 USC 1786(b)"

  max_months_non_breastfeeding:
    description: "Maximum months postpartum for non-breastfeeding women per 42 USC 1786(b)(14)"
    unit: month
    value: 6

  max_months_breastfeeding:
    description: "Maximum months postpartum for breastfeeding women per 42 USC 1786(b)(3)"
    unit: month
    value: 12

# ==============================================================================
# Federal Poverty Level Guidelines
# Used for WIC income eligibility determination
# Values updated annually by HHS
# ==============================================================================

fpl:
  description: "Federal Poverty Level guidelines for 48 contiguous states per HHS annual update"
  unit: USD
  period: year

  # 2024 HHS Poverty Guidelines (48 contiguous states + DC)
  2024:
    by_household_size:
      1: 15060
      2: 20440
      3: 25820
      4: 31200
      5: 36580
      6: 41960
      7: 47340
      8: 52720
    additional_per_person: 5380

  # 2025 HHS Poverty Guidelines (48 contiguous states + DC)
  2025:
    by_household_size:
      1: 15650
      2: 21150
      3: 26650
      4: 32150
      5: 37650
      6: 43150
      7: 48650
      8: 54150
    additional_per_person: 5500

# ==============================================================================
# Monthly FPL (derived for monthly income comparisons)
# ==============================================================================

fpl_monthly:
  description: "Monthly Federal Poverty Level (annual FPL / 12)"
  unit: USD
  period: month

  2024:
    by_household_size:
      1: 1255    # 15060 / 12
      2: 1703    # 20440 / 12
      3: 2152    # 25820 / 12
      4: 2600    # 31200 / 12
      5: 3048    # 36580 / 12
      6: 3497    # 41960 / 12
      7: 3945    # 47340 / 12
      8: 4393    # 52720 / 12
    additional_per_person: 448  # 5380 / 12

  2025:
    by_household_size:
      1: 1304    # 15650 / 12
      2: 1763    # 21150 / 12
      3: 2221    # 26650 / 12
      4: 2679    # 32150 / 12
      5: 3138    # 37650 / 12
      6: 3596    # 43150 / 12
      7: 4054    # 48650 / 12
      8: 4513    # 54150 / 12
    additional_per_person: 458  # 5500 / 12

# ==============================================================================
# Food Package Assignment
# 7 CFR 246.10 - Supplemental foods
# ==============================================================================

food_package:
  description: "WIC food package definitions per 7 CFR 246.10"

  # Food package codes by category
  # Note: Actual food package contents are defined in 7 CFR 246.10
  # and vary by participant category. States have flexibility in
  # offering state-specific food lists within federal guidelines.

  packages:
    description: "Food package categories per 7 CFR 246.10(c)"
    I:
      description: "Fully breastfed infants (no formula)"
      participant_type: "infant"
      reference: "7 CFR 246.10(c)(1)"
    II:
      description: "Formula-fed or partially breastfed infants"
      participant_type: "infant"
      reference: "7 CFR 246.10(c)(2)"
    III:
      description: "Children ages 1-4"
      participant_type: "child"
      reference: "7 CFR 246.10(c)(3)"
    IV:
      description: "Pregnant women and partially breastfeeding women"
      participant_type: "woman"
      reference: "7 CFR 246.10(c)(4)"
    V:
      description: "Non-breastfeeding postpartum women"
      participant_type: "woman"
      reference: "7 CFR 246.10(c)(5)"
    VI:
      description: "Fully breastfeeding postpartum women (enhanced)"
      participant_type: "woman"
      reference: "7 CFR 246.10(c)(6)"
    VII:
      description: "Fully breastfeeding women (up to infant's 1st birthday)"
      participant_type: "woman"
      reference: "7 CFR 246.10(c)(7)"

# ==============================================================================
# Priority System
# 7 CFR 246.7(e) - Nationwide WIC priority system
# ==============================================================================

priority:
  description: "WIC priority system for enrollment per 7 CFR 246.7(e)"

  levels:
    description: "Priority levels for selection when funding is limited"

    1:
      description: "Pregnant, breastfeeding women and infants at nutritional risk from documented medical conditions"
      reference: "7 CFR 246.7(e)(1)(i)"

    2:
      description: "Infants up to 6 months of age of WIC/Medicaid participating mothers"
      reference: "7 CFR 246.7(e)(1)(ii)"

    3:
      description: "Children at nutritional risk from documented medical conditions"
      reference: "7 CFR 246.7(e)(1)(iii)"

    4:
      description: "Pregnant, breastfeeding women and infants at nutritional risk from dietary deficiency"
      reference: "7 CFR 246.7(e)(1)(iv)"

    5:
      description: "Children at nutritional risk from dietary deficiency"
      reference: "7 CFR 246.7(e)(1)(v)"

    6:
      description: "Non-breastfeeding postpartum women at nutritional risk"
      reference: "7 CFR 246.7(e)(1)(vi)"

    7:
      description: "Individuals at nutritional risk solely from homelessness or migrancy"
      reference: "7 CFR 246.7(e)(1)(vii)"

  # Default priority assignment by category (assuming dietary risk)
  # Clinical assessments would override to Priorities I-III
  by_category:
    pregnant_woman: 4
    breastfeeding_woman: 4
    infant: 4
    child: 5
    postpartum_woman: 6

  # Priority level thresholds for categorization
  ranges:
    high_max: 3         # Priorities 1-3 are high priority
    standard_min: 4     # Priority 4-5 are standard
    standard_max: 5
    lower_min: 6        # Priority 6-7 are lower priority
    lower_max: 7
