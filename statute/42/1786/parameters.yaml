# Special Supplemental Nutrition Program for Women, Infants, and Children (WIC)
# 42 USC 1786 - Program parameters
#
# WIC provides supplemental foods, nutrition education, and health care referrals
# to low-income pregnant, breastfeeding, and postpartum women, and to infants
# and children up to age 5 who are at nutritional risk.
#
# Key statute sections:
# - 42 USC 1786(b): Definitions
# - 42 USC 1786(d): Eligibility requirements
# - 42 USC 1786(f): Program benefits

variable: wic_eligible
entity: Person
period: Month
dtype: Boolean

# ==============================================================================
# Income Eligibility
# 42 USC 1786(d)(2)(B): "at or below 185 percent of the poverty income guidelines"
# ==============================================================================

income:
  description: "WIC income eligibility parameters per 42 USC 1786(d)(2)"

  limit_pct_fpl:
    description: "Maximum income as percentage of Federal Poverty Level per 42 USC 1786(d)(2)(B)"
    unit: ratio
    value: 1.85  # 185% of FPL

# ==============================================================================
# Age Thresholds
# 42 USC 1786(b)(4): "child... 1 through 4 years of age"
# 42 USC 1786(b)(6): "infant... up to the infant's first birthday"
# ==============================================================================

age:
  description: "Age thresholds for WIC categorical eligibility per 42 USC 1786(b)"

  infant_max_years:
    description: "Maximum age for infant category (exclusive) per 42 USC 1786(b)(6)"
    unit: year
    value: 1  # Under 1 year old

  child_max_years:
    description: "Maximum age for child category (exclusive) per 42 USC 1786(b)(4)"
    unit: year
    value: 5  # 1-4 years old (up to 5th birthday)

# ==============================================================================
# Postpartum and Breastfeeding Duration
# 42 USC 1786(b)(3): breastfeeding women up to 1 year
# 42 USC 1786(b)(14): postpartum women up to 6 months (or 1 year if breastfeeding)
# ==============================================================================

postpartum:
  description: "Postpartum eligibility duration limits per 42 USC 1786(b)"

  max_months_non_breastfeeding:
    description: "Maximum months postpartum for non-breastfeeding women per 42 USC 1786(b)(14)"
    unit: month
    value: 6

  max_months_breastfeeding:
    description: "Maximum months postpartum for breastfeeding women per 42 USC 1786(b)(3)"
    unit: month
    value: 12

# ==============================================================================
# Federal Poverty Level Guidelines
# Used for WIC income eligibility determination
# Values updated annually by HHS
# ==============================================================================

fpl:
  description: "Federal Poverty Level guidelines for 48 contiguous states per HHS annual update"
  unit: USD
  period: year

  # 2024 HHS Poverty Guidelines (48 contiguous states + DC)
  2024:
    by_household_size:
      1: 15060
      2: 20440
      3: 25820
      4: 31200
      5: 36580
      6: 41960
      7: 47340
      8: 52720
    additional_per_person: 5380

  # 2025 HHS Poverty Guidelines (48 contiguous states + DC)
  2025:
    by_household_size:
      1: 15650
      2: 21150
      3: 26650
      4: 32150
      5: 37650
      6: 43150
      7: 48650
      8: 54150
    additional_per_person: 5500

# ==============================================================================
# Monthly FPL (derived for monthly income comparisons)
# ==============================================================================

fpl_monthly:
  description: "Monthly Federal Poverty Level (annual FPL / 12)"
  unit: USD
  period: month

  2024:
