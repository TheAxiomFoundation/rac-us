# ==============================================================================
# Categorical Eligibility Programs
# 42 USC 1758(b)(2)(C)(ii) and 42 USC 1758(b)(5), (b)(12)
# ==============================================================================

categorical_eligibility:
  description: "Programs that provide categorical eligibility for free school meals"

  programs:
    description: "List of programs that confer automatic free meal eligibility"
    values:
      2009-09-01:
        - snap
        - tanf
        - fdpir
        - foster_care
        - homeless
        - runaway
        - migrant
        - head_start
    reference:
      - title: "42 USC 1758(b)(2)(C)(ii) - Categorical eligibility"
        href: "https://www.law.cornell.edu/uscode/text/42/1758#b_2"
      - title: "7 CFR 245.2 - Definitions"
        href: "https://www.law.cornell.edu/cfr/text/7/245.2"
