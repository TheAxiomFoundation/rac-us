# National School Lunch Act (42 USC 1751-1773) Parameters
# NSLP: National School Lunch Program
# SBP: School Breakfast Program (established via 42 USC 1773)
#
# Key statute sections:
# - 42 USC 1751: Congressional findings and declaration of policy
# - 42 USC 1758: Program requirements (income eligibility, free/reduced meals)
# - 42 USC 1773: School Breakfast Program
#
# References:
# - USDA FNS Income Eligibility Guidelines: https://www.fns.usda.gov/cn/income-eligibility-guidelines
# - 42 USC 1758: https://www.law.cornell.edu/uscode/text/42/1758
# - 7 CFR 245: Child nutrition programs - income eligibility guidelines

# ==============================================================================
# K-12 School Age Range
# Used to determine eligibility for school meal programs
# ==============================================================================

school_age:
  description: "Age range for K-12 school enrollment eligibility"

  min:
    description: "Minimum age for K-12 school enrollment (kindergarten entry)"
    unit: year
    values:
      1946-01-01: 5

  max:
    description: "Maximum age for K-12 school enrollment (12th grade)"
    unit: year
    values:
      1946-01-01: 18

# ==============================================================================
# Federal Poverty Level Lookup Table Structure
# Used for income eligibility determination
# ==============================================================================

fpl_lookup:
  description: "Federal Poverty Level lookup table structure parameters"

  max_household_size:
    description: "Maximum household size with explicit FPL value in lookup table. Larger households use base + per-person additional amount."
    unit: persons
    values:
      1965-01-01: 8  # FPL tables provide values for sizes 1-8
    reference:
      - title: "HHS Poverty Guidelines"
        href: "https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines"

# ==============================================================================
# Income Eligibility Thresholds
# 42 USC 1758(b)(1): Income eligibility guidelines
# ==============================================================================

income:
  description: "Income eligibility thresholds for school meal programs per 42 USC 1758(b)(1)"

  free_meal_limit_pct_fpl:
    description: "Maximum income as percentage of Federal Poverty Level for free meals per 42 USC 1758(b)(1)(A)(i)"
    unit: ratio
    values:
      1981-07-01: 1.30  # 130% FPL - established in 1981 amendments
    reference:
      - title: "42 USC 1758(b)(1)(A)(i) - Free meal eligibility"
        href: "https://www.law.cornell.edu/uscode/text/42/1758#b_1_A"

  reduced_price_limit_pct_fpl:
    description: "Maximum income as percentage of Federal Poverty Level for reduced-price meals per 42 USC 1758(b)(1)(A)(ii)"
    unit: ratio
    values:
      1981-07-01: 1.85  # 185% FPL - established in 1981 amendments
    reference:
      - title: "42 USC 1758(b)(1)(A)(ii) - Reduced price meal eligibility"
        href: "https://www.law.cornell.edu/uscode/text/42/1758#b_1_A"

# ==============================================================================
# Maximum Meal Prices
# 42 USC 1758(b)(3): Maximum prices for reduced-price meals
# ==============================================================================

meal_prices:
  description: "Maximum meal charges for reduced-price meals per 42 USC 1758(b)(3)"

  reduced_price_lunch_max:
    description: "Maximum charge for reduced-price lunch per 42 USC 1758(b)(3)"
    unit: USD
    values:
      1981-07-01: 0.40  # Statutory maximum
    reference:
      - title: "42 USC 1758(b)(3) - Reduced price lunch maximum"
        href: "https://www.law.cornell.edu/uscode/text/42/1758#b_3"

  reduced_price_breakfast_max:
    description: "Maximum charge for reduced-price breakfast per 42 USC 1758(b)(9)(A)"
    unit: USD
    values:
      1989-07-01: 0.30  # Statutory maximum
    reference:
      - title: "42 USC 1758(b)(9)(A) - Reduced price breakfast maximum"
        href: "https://www.law.cornell.edu/uscode/text/42/1758#b_9"

# ==============================================================================
# Community Eligibility Provision (CEP)
# 42 USC 1758(b)(1)(A): Schools may provide free meals to all students
# ==============================================================================

community_eligibility:
  description: "Community Eligibility Provision parameters per 42 USC 1758(b)(1)(A)"

  identified_student_percentage_threshold:
    description: "Minimum Identified Student Percentage (ISP) for CEP eligibility"
    unit: ratio
    values:
      2014-07-01: 0.25  # 25% threshold established when CEP went nationwide
    reference:
      - title: "42 USC 1758(b)(1)(A) - Community eligibility"
        href: "https://www.law.cornell.edu/uscode/text/42/1758#b_1_A"

  claiming_percentage_multiplier:
    description: "Multiplier applied to ISP to determine free meal claiming percentage"
    unit: ratio
    values:
      2014-07-01: 1.60  # ISP * 1.6 = claiming percentage for free meal reimbursement
    reference:
      - title: "7 CFR 245.9(f)(3) - Claiming percentage"
        href: "https://www.law.cornell.edu/cfr/text/7/245.9"

  max_claiming_percentage:
    description: "Maximum claiming percentage for free meal reimbursement under CEP"
    unit: ratio
    values:
      2014-07-01: 1.00  # 100% cap
    reference:
      - title: "7 CFR 245.9(f)(3) - Maximum claiming percentage"
        href: "https://www.law.cornell.edu/cfr/text/7/245.9"

# ==============================================================================
# School Days per Year
# Used for annualizing meal subsidy value
# ==============================================================================

school_days:
  description: "Average number of school days per year"
  unit: days
  values:
    2020-01-01: 180
  reference:
    - title: "NCES Table 5.14 - Number of instructional days"
      href: "https://nces.ed.gov/programs/statereform/tab5_14.asp"

