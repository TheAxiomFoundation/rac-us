# 7 USC § 2017(a) - Maximum Allotments (Thrifty Food Plan)
#
# "the cost of the thrifty food plan... for a household"
# Values published in annual FNS COLA memos by household size.
# SNAP uses federal fiscal year (Oct 1 - Sep 30).
#
# Source: https://www.fns.usda.gov/snap/allotment/main

max_allotment:
