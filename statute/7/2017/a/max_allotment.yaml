# Alaska and Hawaii have separate, higher allotments
# (separate YAML files for those if needed)

expected_contribution_rate:
  description: "Percentage of net income counted against benefits"
  unit: rate
  values:
    1977-01-01: 0.30
  citations:
    - "7 USC § 2017(a): 30 percent of household's net income"

minimum_benefit:
  description: "Minimum monthly benefit for 1-2 person households"
  unit: currency-USD
  values:
    2024-10-01: 23
    2023-10-01: 23
    2022-10-01: 23
