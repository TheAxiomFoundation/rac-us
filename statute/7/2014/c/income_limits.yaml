# 7 USC § 2014(c) - Income Eligibility Limits
#
# Gross income limit: 130% of Federal Poverty Level
# Net income limit: 100% of Federal Poverty Level
#
# FPL is updated annually by HHS. SNAP uses monthly amounts.
# For 48 contiguous states + DC. Alaska and Hawaii have higher values.

gross_income_limit_pct:
  description: "Gross income limit as percentage of FPL"
  unit: rate
  values:
    1977-01-01: 1.30
  citations:
    - "7 USC § 2014(c)(2): 130 percent of poverty line"

net_income_limit_pct:
  description: "Net income limit as percentage of FPL"
  unit: rate
  values:
    1977-01-01: 1.00
  citations:
    - "7 USC § 2014(c)(1): 100 percent of poverty line"

# Federal Poverty Level (monthly, 48 states + DC)
# Source: HHS Poverty Guidelines, published annually
fpl_by_household_size:
  description: "Monthly Federal Poverty Level by household size (48 states + DC)"
  unit: currency-USD
  values:
    by_household_size:
      1:
        2025-01-01: 1295  # Annual: $15,540
        2024-01-01: 1255  # Annual: $15,060
        2023-01-01: 1215  # Annual: $14,580
        2022-01-01: 1133  # Annual: $13,590
      additional_per_person:
        2025-01-01: 455   # Annual: $5,460
        2024-01-01: 440   # Annual: $5,280
        2023-01-01: 426   # Annual: $5,110
        2022-01-01: 393   # Annual: $4,720
  citations:
    - "HHS Poverty Guidelines"
    - "https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines"

