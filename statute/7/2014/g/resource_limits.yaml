# 7 USC § 2014(g) - Allowable Financial Resources
#
# "(1) The Secretary shall prescribe the types and allowable amounts of financial
#  resources (liquid and nonliquid assets) an eligible household may own..."
#
# Resource limits are indexed for inflation starting October 2008.
# These values are from FNS FY2024 COLA adjustments.

resource_limit:
  description: "Maximum countable resources for SNAP eligibility"
  unit: currency-USD
  values:
    2023-10-01: 2750
    2022-10-01: 2750
    2021-10-01: 2500
    2020-10-01: 2500
    2019-10-01: 2250
    2018-10-01: 2250
    2008-10-01: 2000
    1977-01-01: 1500
  citations:
    - "7 USC § 2014(g)(1): resource limit"
    - "FNS FY2024 COLA memo"

resource_limit_elderly_disabled:
  description: "Maximum countable resources for households with elderly or disabled member"
  unit: currency-USD
  values:
    2023-10-01: 4250
    2022-10-01: 4250
    2021-10-01: 3750
    2020-10-01: 3750
    2019-10-01: 3500
    2018-10-01: 3500
    2008-10-01: 3000
    1977-01-01: 3000
  citations:
    - "7 USC § 2014(g)(1)(B): higher limit for elderly/disabled"
    - "FNS FY2024 COLA memo"

# Vehicle exclusion threshold (§ 2014(g)(2))
vehicle_fair_market_value_exclusion:
  description: "Fair market value of one vehicle excluded from resources"
  unit: currency-USD
  values:
    2023-10-01: 4650
    2022-10-01: 4650
    2008-10-01: 4500
    1996-01-01: 4500
  citations:
    - "7 USC § 2014(g)(2)(B): vehicle exclusion"
    - "FNS FY2024 COLA memo"
