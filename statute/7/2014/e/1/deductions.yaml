# 7 USC § 2014(e)(1) - Standard and Earned Income Deductions
#
# Two fixed deductions from gross income:
# 1. Standard deduction - varies by household size
# 2. Earned income deduction - 20% of earned income
#
# SNAP uses federal fiscal year (Oct 1 - Sep 30).

standard_deduction:
  description: "Standard deduction by household size (48 states + DC)"
  unit: currency-USD
  values:
    by_household_size:
      1-3:
        2024-10-01: 200   # FY2025
        2023-10-01: 198   # FY2024
        2022-10-01: 193   # FY2023
      4:
        2024-10-01: 211
        2023-10-01: 208
        2022-10-01: 197
      5:
        2024-10-01: 247
        2023-10-01: 244
        2022-10-01: 230
      6+:
        2024-10-01: 283
        2023-10-01: 279
        2022-10-01: 263
  citations:
    - "7 USC § 2014(e)(1): standard deduction"
    - "FNS SNAP COLA Adjustments"

earned_income_deduction_rate:
  description: "Percentage of earned income deducted"
  unit: rate
  values:
    1977-01-01: 0.20
  citations:
    - "7 USC § 2014(e)(1): 20 percent of earned income"
