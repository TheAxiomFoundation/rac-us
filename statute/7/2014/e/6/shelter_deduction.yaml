# 7 USC § 2014(e)(6) - Excess Shelter Expense Deduction
#
# Households may deduct shelter costs that exceed 50% of their
# income after other deductions.
#
# "(B) cap on excess shelter expense deduction" - for non-elderly/disabled
# "(C) no cap for elderly/disabled households"
#
# The cap is indexed and published annually by FNS.
# SNAP uses federal fiscal year (Oct 1 - Sep 30).

shelter_deduction_cap:
  description: "Maximum excess shelter deduction for non-elderly/disabled households"
  unit: currency-USD
  values:
    2024-10-01: 700   # FY2025
    2023-10-01: 672   # FY2024
    2022-10-01: 624   # FY2023
    2021-10-01: 597   # FY2022
    2020-10-01: 586   # FY2021
    2019-10-01: 569   # FY2020
    2018-10-01: 552   # FY2019
  citations:
    - "7 USC § 2014(e)(6)(B): excess shelter expense cap"
    - "FNS SNAP COLA Adjustments"

# Note: Elderly/disabled households have NO cap per § 2014(e)(6)(C)
