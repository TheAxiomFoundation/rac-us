# SNAP Program Parameters
#
# All time-varying policy values for SNAP (Title 7, USC 2011-2036a).
# SNAP uses Federal Fiscal Year (FFY) which runs October 1 - September 30.
# Values are updated annually in FNS COLA memos.
#
# Sources:
# - FNS SNAP COLA Adjustments: https://www.fns.usda.gov/snap/allotment/main
# - HHS Poverty Guidelines: https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines
# - 7 USC 2014: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title7-section2014
# - 7 USC 2017: https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title7-section2017

gov.usda.fns.snap:
  # ===========================================================================
  # INCOME LIMITS (Section 2014(c))
  # ===========================================================================
  income:
    # Gross income limit as percentage of FPL
    gross_income_limit_pct:
      description: "USDA sets the gross income limit for SNAP eligibility at this percentage of FPL."
      unit: rate
      period: month
      label: "Gross Income Limit Percentage"
      reference: "7 USC 2014(c)(2)"
      values:
        1977-01-01: 1.30

    # Net income limit as percentage of FPL
    net_income_limit_pct:
      description: "USDA sets the net income limit for SNAP eligibility at this percentage of FPL."
      unit: rate
      period: month
      label: "Net Income Limit Percentage"
      reference: "7 USC 2014(c)(1)"
      values:
        1977-01-01: 1.00

  # ===========================================================================
  # RESOURCE LIMITS (Section 2014(g))
  # ===========================================================================
  resources:
    # General resource limit
    limit:
      description: "USDA sets the maximum countable resources for SNAP eligibility at this amount."
      unit: currency-USD
      period: month
      label: "Resource Limit"
      reference: "7 USC 2014(g)(1)"
      values:
        2023-10-01: 2750
        2022-10-01: 2750
        2021-10-01: 2500
        2020-10-01: 2500
        2019-10-01: 2250
        2018-10-01: 2250
        2008-10-01: 2000
        1977-01-01: 1500

    # Elderly/disabled resource limit
    elderly_disabled_limit:
      description: "USDA sets a higher resource limit for SNAP households with elderly or disabled members."
      unit: currency-USD
      period: month
      label: "Elderly/Disabled Resource Limit"
      reference: "7 USC 2014(g)(1)(B)"
      values:
        2023-10-01: 4250
        2022-10-01: 4250
        2021-10-01: 3750
        2020-10-01: 3750
        2019-10-01: 3500
        2018-10-01: 3500
        2008-10-01: 3000
        1977-01-01: 3000

    # Vehicle fair market value exclusion
    vehicle_exclusion:
      description: "USDA excludes one vehicle up to this fair market value from SNAP countable resources."
      unit: currency-USD
      period: month
      label: "Vehicle FMV Exclusion"
      reference: "7 USC 2014(g)(2)(B)"
      values:
        2023-10-01: 4650
        2022-10-01: 4650
        2008-10-01: 4500
        1996-01-01: 4500

  # ===========================================================================
  # DEDUCTIONS (Section 2014(e))
  # ===========================================================================
  deductions:
    # Earned income deduction rate (20%)
    earned_income_rate:
      description: "USDA allows households to deduct this percentage of earned income from SNAP gross income."
      unit: rate
      period: month
      label: "Earned Income Deduction Rate"
      reference: "7 USC 2014(e)(1)"
      values:
        1977-01-01: 0.20

    # Standard deduction by household size (48 states + DC)
    # Schedule format for use with cut(household_size, schedule)
    standard_deduction_schedule:
      description: "SNAP standard deduction by household size, for use with cut()"
      unit: currency-USD
      period: month
      label: "Standard Deduction Schedule"
      reference: "7 USC 2014(e)(1)"
      # Thresholds: [0, 4, 5, 6] means: <4 gets idx 0, <5 gets idx 1, <6 gets idx 2, >=6 gets idx 3
      thresholds: [0, 4, 5, 6]
      amounts:
        2024-10-01: [200, 211, 247, 283]  # 1-3, 4, 5, 6+
        2023-10-01: [198, 208, 244, 279]
        2022-10-01: [193, 197, 230, 263]
        2021-10-01: [177, 184, 215, 246]

    # Legacy individual parameters (for backward compatibility)
    standard:
      size_1_3:
        description: "USDA sets the SNAP standard deduction for 1-3 person households at this amount."
        unit: currency-USD
        period: month
        label: "Standard Deduction (1-3 persons)"
        reference: "7 USC 2014(e)(1)"
        values:
          2024-10-01: 200
          2023-10-01: 198
          2022-10-01: 193
          2021-10-01: 177

      size_4:
        description: "USDA sets the SNAP standard deduction for 4-person households at this amount."
        unit: currency-USD
        period: month
        label: "Standard Deduction (4 persons)"
        reference: "7 USC 2014(e)(1)"
        values:
          2024-10-01: 211
          2023-10-01: 208
          2022-10-01: 197
          2021-10-01: 184

      size_5:
        description: "USDA sets the SNAP standard deduction for 5-person households at this amount."
        unit: currency-USD
        period: month
        label: "Standard Deduction (5 persons)"
        reference: "7 USC 2014(e)(1)"
        values:
          2024-10-01: 247
          2023-10-01: 244
          2022-10-01: 230
          2021-10-01: 215

      size_6_plus:
        description: "USDA sets the SNAP standard deduction for 6+ person households at this amount."
        unit: currency-USD
        period: month
        label: "Standard Deduction (6+ persons)"
        reference: "7 USC 2014(e)(1)"
        values:
          2024-10-01: 283
          2023-10-01: 279
          2022-10-01: 263
          2021-10-01: 246

    # Excess shelter rate - shelter costs exceeding this fraction of adjusted income
    excess_shelter_rate:
      description: "USDA defines excess shelter as costs exceeding this fraction of adjusted income."
      unit: rate
      period: month
      label: "Excess Shelter Rate"
      reference: "7 USC 2014(e)(6)(A)"
      values:
        1977-01-01: 0.50

    # Shelter deduction cap (non-elderly/disabled)
    shelter:
      cap:
        description: "USDA caps the excess shelter deduction for non-elderly/disabled SNAP households at this amount."
        unit: currency-USD
        period: month
        label: "Shelter Deduction Cap"
        reference: "7 USC 2014(e)(6)(B)"
        values:
          2024-10-01: 700
          2023-10-01: 672
          2022-10-01: 624
          2021-10-01: 597
          2020-10-01: 586
          2019-10-01: 569
          2018-10-01: 552

    # Medical expense threshold (elderly/disabled only)
    medical:
      threshold:
        description: "USDA allows elderly/disabled SNAP households to deduct medical expenses exceeding this threshold."
        unit: currency-USD
        period: month
        label: "Medical Expense Threshold"
        reference: "7 USC 2014(e)(5)"
        values:
          2014-11-01: 35
          1977-01-01: 25

  # ===========================================================================
  # MAXIMUM ALLOTMENTS (Section 2017(a))
  # ===========================================================================
  allotment:
    # Schedule format for use with cut(household_size, schedule)
    max_allotment_schedule:
      description: "SNAP maximum allotment by household size, for use with cut()"
      unit: currency-USD
      period: month
      label: "Max Allotment Schedule"
      reference: "7 USC 2017(a)"
      # Thresholds: [1, 2, 3, 4, 5, 6, 7, 8] - exact size matches
      thresholds: [1, 2, 3, 4, 5, 6, 7, 8]
      amounts:
        2024-10-01: [292, 536, 768, 975, 1158, 1390, 1536, 1756]
        2023-10-01: [291, 535, 766, 973, 1155, 1386, 1532, 1751]
        2022-10-01: [281, 516, 740, 939, 1116, 1339, 1480, 1691]

    # Maximum household size with specific allotment (beyond this, use additional_per_person)
    max_schedule_size:
      description: "Maximum household size with specific allotment in schedule"
      unit: persons
      period: month
      label: "Max Schedule Size"
      reference: "7 USC 2017(a)"
      values:
        1977-01-01: 8

    # Minimum benefit applies to households of this size or smaller
    minimum_benefit_max_size:
      description: "Maximum household size eligible for minimum benefit"
      unit: persons
      period: month
      label: "Minimum Benefit Max Size"
      reference: "7 USC 2017(a)"
      values:
        1977-01-01: 2

    # Thrifty Food Plan amounts by household size (48 states + DC)
    max:
      size_1:
        description: "USDA sets the maximum SNAP monthly allotment for 1-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (1 person)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 292
          2023-10-01: 291
          2022-10-01: 281

      size_2:
        description: "USDA sets the maximum SNAP monthly allotment for 2-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (2 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 536
          2023-10-01: 535
          2022-10-01: 516

      size_3:
        description: "USDA sets the maximum SNAP monthly allotment for 3-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (3 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 768
          2023-10-01: 766
          2022-10-01: 740

      size_4:
        description: "USDA sets the maximum SNAP monthly allotment for 4-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (4 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 975
          2023-10-01: 973
          2022-10-01: 939

      size_5:
        description: "USDA sets the maximum SNAP monthly allotment for 5-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (5 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 1158
          2023-10-01: 1155
          2022-10-01: 1116

      size_6:
        description: "USDA sets the maximum SNAP monthly allotment for 6-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (6 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 1390
          2023-10-01: 1386
          2022-10-01: 1339

      size_7:
        description: "USDA sets the maximum SNAP monthly allotment for 7-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (7 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 1536
          2023-10-01: 1532
          2022-10-01: 1480

      size_8:
        description: "USDA sets the maximum SNAP monthly allotment for 8-person households at this amount."
        unit: currency-USD
        period: month
        label: "Maximum Allotment (8 persons)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 1756
          2023-10-01: 1751
          2022-10-01: 1691

      additional_per_person:
        description: "USDA adds this amount for each person beyond 8 in the SNAP household."
        unit: currency-USD
        period: month
        label: "Additional Per Person (9+)"
        reference: "7 USC 2017(a)"
        values:
          2024-10-01: 220
          2023-10-01: 219
          2022-10-01: 211

    # Expected contribution rate (30% of net income)
    contribution_rate:
      description: "USDA expects SNAP households to contribute this percentage of net income toward food."
      unit: rate
      period: month
      label: "Expected Contribution Rate"
      reference: "7 USC 2017(a)"
      values:
        1977-01-01: 0.30

    # Minimum benefit for small households
    minimum:
      description: "USDA guarantees this minimum monthly benefit for 1-2 person SNAP households."
      unit: currency-USD
      period: month
      label: "Minimum Benefit"
      reference: "7 USC 2017(a)"
      values:
        2024-10-01: 23
        2023-10-01: 23
        2022-10-01: 23
        2014-10-01: 16

  # ===========================================================================
  # ABAWD WORK REQUIREMENTS (Section 2015(o))
  # ===========================================================================
  abawd:
    min_age:
      description: "USDA sets the minimum age for ABAWD work requirements."
      unit: years
      period: month
      label: "ABAWD Minimum Age"
      reference: "7 USC 2015(o)(2)"
      values:
        2024-10-01: 18
        1996-01-01: 18

    max_age:
      description: "USDA sets the maximum age for ABAWD work requirements (phased in per Fiscal Responsibility Act)."
      unit: years
      period: month
      label: "ABAWD Maximum Age"
      reference: "7 USC 2015(o)(2)"
      values:
        2025-10-01: 54
        2024-10-01: 52
        2023-10-01: 50
        1996-01-01: 49

    work_hours:
      description: "USDA requires ABAWDs to work this many hours per month to maintain SNAP eligibility."
      unit: hours
      period: month
      label: "ABAWD Work Hours Requirement"
      reference: "7 USC 2015(o)(2)"
      values:
        1996-01-01: 80

# ===========================================================================
# FEDERAL POVERTY LEVEL (from HHS, used by SNAP)
# ===========================================================================
gov.hhs.fpl:
  # 48 contiguous states + DC
  base:
    description: "HHS sets the monthly Federal Poverty Level base for one person at this amount."
    unit: currency-USD
    period: month
    label: "Monthly FPL Base (1 person)"
    reference: "https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines"
    values:
      2025-01-01: 1295
      2024-01-01: 1255
      2023-01-01: 1215
      2022-01-01: 1133

  additional_per_person:
    description: "HHS adds this amount to the monthly FPL for each additional person in the household."
    unit: currency-USD
    period: month
    label: "Monthly FPL Additional Per Person"
    reference: "https://aspe.hhs.gov/topics/poverty-economic-mobility/poverty-guidelines"
    values:
      2025-01-01: 455
      2024-01-01: 440
      2023-01-01: 426
      2022-01-01: 393

  # Alaska FPL (higher)
  alaska:
    base:
      description: "HHS sets a higher monthly FPL base for Alaska."
      unit: currency-USD
      period: month
      label: "Alaska Monthly FPL Base"
      reference: "HHS Poverty Guidelines (Alaska)"
      values:
        2024-01-01: 1568
        2023-01-01: 1519

    additional_per_person:
      description: "HHS adds this amount to the Alaska monthly FPL for each additional person."
      unit: currency-USD
      period: month
      label: "Alaska Monthly FPL Additional"
      reference: "HHS Poverty Guidelines (Alaska)"
      values:
        2024-01-01: 550
        2023-01-01: 533

  # Hawaii FPL (higher)
  hawaii:
    base:
      description: "HHS sets a higher monthly FPL base for Hawaii."
      unit: currency-USD
      period: month
      label: "Hawaii Monthly FPL Base"
      reference: "HHS Poverty Guidelines (Hawaii)"
      values:
        2024-01-01: 1443
        2023-01-01: 1398

    additional_per_person:
      description: "HHS adds this amount to the Hawaii monthly FPL for each additional person."
      unit: currency-USD
      period: month
      label: "Hawaii Monthly FPL Additional"
      reference: "HHS Poverty Guidelines (Hawaii)"
      values:
        2024-01-01: 506
        2023-01-01: 490
