# 7 USC § 2015(d) & (o) - Work Requirements
#
# General work requirements and ABAWD (Able-Bodied Adults Without Dependents)
# time limits are defined here. Note that time-tracking requirements
# cannot be fully simulated in a static microsimulation model.

# Work registration requirements (§ 2015(d))
work_hours_requirement:
  description: "Weekly work hours required for work-registered individuals"
  unit: hours
  values:
    1977-01-01: 30
  citations:
    - "7 USC § 2015(d)(1): 30 hours per week"

# ABAWD requirements (§ 2015(o))
abawd_min_age:
  description: "Minimum age for ABAWD requirements"
  unit: years
  values:
    2024-10-01: 18  # Stays at 18
    1996-01-01: 18
  citations:
    - "7 USC § 2015(o)(2): ages 18 through 49"
    - "Note: 2023 Fiscal Responsibility Act phased increase to 54 by 2025"

abawd_max_age:
  description: "Maximum age for ABAWD requirements"
  unit: years
  values:
    2025-10-01: 54  # Final phase-in
    2024-10-01: 52  # Phase 2
    2023-10-01: 50  # Phase 1
    1996-01-01: 49
  citations:
    - "7 USC § 2015(o)(2): able-bodied adults without dependents"
    - "2023 Fiscal Responsibility Act: phased increase 50->52->54"

abawd_work_hours:
  description: "Monthly work hours required for ABAWDs to maintain eligibility"
  unit: hours
  values:
    1996-01-01: 80
  citations:
    - "7 USC § 2015(o)(2): 80 hours per month"

# NOTE: ABAWD time limit (3 months in 36-month period) cannot be tracked
# in static microsimulation. See work_requirements.rac for details.
