# 20 USC 1070a - Federal Pell Grant Parameters
#
# Higher Education Act of 1965 (as amended), Title IV Part A Subpart 1
# Primary reference: 20 USC 1070a
#
# Key changes:
# - Pre-2024: Expected Family Contribution (EFC) methodology
# - 2024+: Student Aid Index (SAI) under FAFSA Simplification Act
#
# References:
# - https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title20-section1070a
# - https://fsapartners.ed.gov/knowledge-center/library/dear-colleague-letters

program:
  name: "Federal Pell Grant"
  agency: "Department of Education"
  effective_date: "1972-07-01"
  citations:
    - "Higher Education Act of 1965, Title IV, Part A, Subpart 1"
    - "20 USC 1070a"
    - "FAFSA Simplification Act (2020)"

# =============================================================================
# AWARD AMOUNTS (20 USC 1070a(b)(2))
# =============================================================================

amount:
  max:
    description: "The Department of Education sets the maximum Pell Grant award for the academic year."
    unit: currency-USD
    period: year
    label: "Maximum Pell Grant Award"
    reference:
      - title: "2023-2024 Federal Pell Grant Payment and Disbursement Schedules"
        href: "https://fsapartners.ed.gov/knowledge-center/library/dear-colleague-letters/2023-01-26/2023-2024-federal-pell-grant-payment-and-disbursement-schedules"
      - title: "2024-2025 Federal Pell Grant Maximum and Minimum Award Amounts"
        href: "https://fsapartners.ed.gov/knowledge-center/library/dear-colleague-letters/2024-01-31/2024-2025-federal-pell-grant-maximum-and-minimum-award-amounts-updated-april-5-2024"
    values:
      2020-07-01: 6345
      2021-07-01: 6495
      2022-07-01: 6895
      2023-07-01: 7395
      2024-07-01: 7395  # Same for 2024-25

  min:
    description: "The Department of Education does not disburse Pell Grants below this minimum threshold."
    unit: currency-USD
    period: year
    label: "Minimum Pell Grant Award"
    reference:
      - title: "2023-2024 Federal Pell Grant Payment and Disbursement Schedules"
        href: "https://fsapartners.ed.gov/knowledge-center/library/dear-colleague-letters/2023-01-26/2023-2024-federal-pell-grant-payment-and-disbursement-schedules"
      - title: "2024-2025 Federal Pell Grant Maximum and Minimum Award Amounts"
        href: "https://fsapartners.ed.gov/knowledge-center/library/dear-colleague-letters/2024-01-31/2024-2025-federal-pell-grant-maximum-and-minimum-award-amounts-updated-april-5-2024"
    values:
      2023-07-01: 750
      2024-07-01: 740

# =============================================================================
# ENROLLMENT INTENSITY (20 USC 1070a(b)(2)(A))
# =============================================================================

enrollment:
  months_in_school_year:
    description: "The academic year is defined as this many months for proration purposes."
    unit: months
    period: year
    label: "Months in Academic Year"
    reference: "20 USC 1070a(b)(2)(A)"
    values:
      2000-07-01: 9

  # Enrollment status affects award (full-time, 3/4-time, half-time, less-than-half-time)
  full_time_credits:
    description: "Minimum credit hours per term for full-time enrollment status."
    unit: credits
    period: term
    label: "Full-Time Credit Hours"
    reference: "34 CFR 668.2"
    values:
      2000-07-01: 12

  three_quarter_time_credits:
    description: "Minimum credit hours per term for three-quarter-time enrollment status."
    unit: credits
    period: term
    label: "Three-Quarter-Time Credit Hours"
    reference: "34 CFR 668.2"
    values:
      2000-07-01: 9

  half_time_credits:
    description: "Minimum credit hours per term for half-time enrollment status."
    unit: credits
    period: term
    label: "Half-Time Credit Hours"
    reference: "34 CFR 668.2"
    values:
      2000-07-01: 6

# =============================================================================
# EXPECTED FAMILY CONTRIBUTION (EFC) - Pre-2024 Methodology
# =============================================================================

efc:
  automatic_zero:
    description: "Families with income at or below this threshold qualify for automatic zero EFC."
    unit: currency-USD
    period: year
    label: "Automatic Zero EFC Income Threshold"
    reference:
      - title: "THE EFC FORMULA, 2023-2024"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=5"
    values:
      2019-08-01: 26000
      2021-08-01: 27000
      2023-08-01: 29000

  simplified:
    applies:
      description: "Whether the simplified EFC formula is available for eligible families."
      unit: boolean
      label: "Simplified EFC Formula Available"
      values:
        2023-08-01: true
        2024-07-01: false  # Replaced by SAI

    income_limit:
      description: "Maximum income for simplified EFC formula eligibility."
      unit: currency-USD
      period: year
      label: "Simplified Formula Income Limit"
      reference:
        - title: "THE EFC FORMULA, 2023-2024"
          href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=5"
      values:
        2023-08-01: 50000

    benefits:
      description: "Means-tested benefit programs that qualify family for simplified formula."
      label: "Qualifying Benefits for Simplified Formula"
      values:
        2023-08-01:
          - ssi
          - snap
          - tanf
          - free_school_meals
          - medicaid

# Head (parent/independent student) contribution rates
head:
  income_assessment_rate:
    description: "The Department of Education adjusts parental/independent student income by this rate based on formula type."
    unit: rate
    label: "Income Assessment Rate by Formula"
    reference:
      - title: "THE EFC FORMULA, 2023-2024, line 16"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=17"
    values:
      2023-08-01:
        A: 1.00  # Dependent students
        B: 0.50  # Independent without dependents
        C: 1.00  # Independent with dependents

  asset_assessment_rate:
    description: "The Department of Education counts this percentage of parental/independent student assets toward EFC."
    unit: rate
    label: "Asset Assessment Rate by Formula"
    reference:
      - title: "THE EFC FORMULA, 2023-2024, pages 9/17/21"
        href: "https://fsapartners.ed.gov/sites/default/files/2021-08/2223EFCFormulaGuide.pdf"
    values:
      2023-08-01:
        A: 0.12  # Dependent students (parent assets)
        B: 0.20  # Independent without dependents
        C: 0.07  # Independent with dependents

  # Marginal rate brackets for available income contribution
  marginal_rate:
    description: "The Department of Education calculates contribution from available income using these progressive rates."
    type: marginal_rate
    unit: rate
    threshold_unit: currency-USD
    threshold_period: year
    label: "EFC Marginal Rate Brackets"
    reference:
      - title: "THE EFC FORMULA, 2023-2024, Table A5"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=29"
    brackets:
      - threshold: { 2023-08-01: 0 }
        rate: { 2023-08-01: 0.22 }
      - threshold: { 2023-08-01: 18900 }
        rate: { 2023-08-01: 0.25 }
      - threshold: { 2023-08-01: 23800 }
        rate: { 2023-08-01: 0.29 }
      - threshold: { 2023-08-01: 28600 }
        rate: { 2023-08-01: 0.34 }
      - threshold: { 2023-08-01: 33500 }
        rate: { 2023-08-01: 0.40 }
      - threshold: { 2023-08-01: 38300 }
        rate: { 2023-08-01: 0.47 }

  negative_rate:
    description: "Rate applied to negative available income for contribution calculation."
    unit: rate
    label: "Negative Income Rate"
    reference:
      - title: "THE EFC FORMULA, 2023-2024"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf"
    values:
      2023-08-01: 0.22

  min_contribution:
    description: "Minimum parent/independent student contribution when available income is negative."
    unit: currency-USD
    period: year
    label: "Minimum Head Contribution"
    reference:
      - title: "THE EFC FORMULA, 2023-2024"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf"
    values:
      2023-08-01: -750

# Dependent student contribution rates
dependent:
  income_assessment_rate:
    description: "The Department of Education counts this percentage of dependent student income toward EFC."
    unit: rate
    label: "Dependent Income Assessment Rate"
    reference:
      - title: "THE EFC FORMULA, 2023-2024, line 43"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=10"
    values:
      2023-08-01: 0.50

  asset_assessment_rate:
    description: "The Department of Education counts this percentage of dependent student assets toward EFC."
    unit: rate
    label: "Dependent Asset Assessment Rate"
    reference:
      - title: "THE EFC FORMULA, 2023-2024, line 49"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=10"
    values:
      2023-08-01: 0.20

  ipa:
    description: "Income protection allowance excluded from dependent student income."
    unit: currency-USD
    period: year
    label: "Dependent Income Protection Allowance"
    reference:
      - title: "THE EFC FORMULA, 2023-2024, line 39"
        href: "https://fsapartners.ed.gov/sites/default/files/2022-08/2324EFCFormulaGuide.pdf#page=10"
    values:
      2023-08-01: 7040

# =============================================================================
# STUDENT AID INDEX (SAI) - 2024+ Methodology (FAFSA Simplification)
# =============================================================================

sai:
  limits:
    min_sai:
      description: "The Department of Education floors the Student Aid Index at this negative amount."
      unit: currency-USD
      period: year
      label: "Minimum SAI"
      reference:
        - title: "FAFSA Pell Eligibility and SAI Guide 2024-25"
          href: "https://fsapartners.ed.gov/sites/default/files/2024-01/20242025FAFSAPellEligibilityandSAIGuide.pdf#page=11"
      values:
        2024-07-01: -1500

    max_sai:
      description: "The Department of Education caps the Student Aid Index at this amount."
      unit: currency-USD
      period: year
      label: "Maximum SAI"
      reference:
        - title: "FAFSA Pell Eligibility and SAI Guide 2024-25"
          href: "https://fsapartners.ed.gov/sites/default/files/2024-01/20242025FAFSAPellEligibilityandSAIGuide.pdf#page=11"
      values:
        2024-07-01: 999999

  # FPG fraction thresholds for maximum/minimum Pell eligibility
  fpg_fraction:
    max_pell_limits:
      description: "AGI as fraction of FPG below which student receives maximum Pell Grant."
      unit: rate
      period: year
      label: "Maximum Pell Grant FPG Threshold"
      reference:
        - title: "FAFSA Pell Eligibility and SAI Guide 2024-25, Step 1"
          href: "https://fsapartners.ed.gov/sites/default/files/2024-01/20242025FAFSAPellEligibilityandSAIGuide.pdf#page=9"
      values:
        2024-07-01:
          DEPENDENT_SINGLE: 2.25
          DEPENDENT_NOT_SINGLE: 1.75
          INDEPENDENT_SINGLE: 2.25
          INDEPENDENT_NOT_SINGLE: 1.75

    min_pell_limits:
      description: "AGI as fraction of FPG above which student receives minimum or no Pell Grant."
      unit: rate
      period: year
      label: "Minimum Pell Grant FPG Threshold"
      reference:
        - title: "FAFSA Pell Eligibility and SAI Guide 2024-25, Step 3"
          href: "https://fsapartners.ed.gov/sites/default/files/2024-01/20242025FAFSAPellEligibilityandSAIGuide.pdf#page=30"
      values:
        2024-07-01:
          DEPENDENT_SINGLE: 3.25
          DEPENDENT_NOT_SINGLE: 2.75
          INDEPENDENT_SINGLE: 4.00
          INDEPENDENT_NOT_SINGLE: 3.50
          INDEPENDENT_NOT_PARENT: 2.75

# =============================================================================
# ELIGIBILITY REQUIREMENTS (20 USC 1091)
# =============================================================================

eligibility:
  # Satisfactory Academic Progress (SAP)
  sap:
    gpa_minimum:
      description: "Minimum GPA required to maintain Pell Grant eligibility."
      unit: gpa
      label: "Minimum GPA for SAP"
      reference: "34 CFR 668.34"
      values:
        2000-07-01: 2.0

    completion_rate:
      description: "Minimum percentage of attempted credits that must be completed."
      unit: rate
      label: "Credit Completion Rate for SAP"
      reference: "34 CFR 668.34"
      values:
        2000-07-01: 0.67

  # Lifetime eligibility (LEU)
  lifetime_eligibility_used:
    max_semesters:
      description: "Maximum semesters (or equivalent) of Pell Grant eligibility over student's lifetime."
      unit: semesters
      label: "Maximum Lifetime Pell Semesters"
      reference:
        - title: "20 USC 1070a(c)(5)"
          href: "https://uscode.house.gov/view.xhtml?req=granuleid:USC-prelim-title20-section1070a"
      values:
        2012-07-01: 12  # Changed from 18 semesters

    max_years:
      description: "Maximum years equivalent of Pell Grant eligibility (12 semesters = 6 years)."
      unit: years
      label: "Maximum Lifetime Pell Years"
      reference: "20 USC 1070a(c)(5)"
      values:
        2012-07-01: 6

  # Drug conviction ineligibility (reduced under FAFSA Simplification)
  drug_conviction:
    applies:
      description: "Whether drug conviction affects Pell Grant eligibility."
      unit: boolean
      label: "Drug Conviction Affects Eligibility"
      reference: "FAFSA Simplification Act (2020)"
      values:
        2000-07-01: true
        2024-07-01: false  # Eliminated under FAFSA Simplification

  # Age limits
  age_limit:
    description: "No explicit age limit for Pell Grant eligibility."
    unit: year
    label: "Maximum Age"
    reference: "20 USC 1091"
    values:
      2000-07-01: null  # No age limit

  # Selective service registration (males 18-25)
  selective_service:
    applies:
      description: "Whether Selective Service registration is required for eligibility."
      unit: boolean
      label: "Selective Service Required"
      reference: "20 USC 1091(a)(1)"
      values:
        2000-07-01: true

    age_min:
      description: "Minimum age for Selective Service registration requirement."
      unit: year
      label: "Selective Service Minimum Age"
      values:
        2000-07-01: 18

    age_max:
      description: "Maximum age for Selective Service registration requirement."
      unit: year
      label: "Selective Service Maximum Age"
      values:
        2000-07-01: 25

# =============================================================================
# INSTITUTIONAL REQUIREMENTS
# =============================================================================

institution:
  # Cost of attendance caps
  coa:
    description: "Pell Grant cannot exceed cost of attendance at the institution."
    label: "Cost of Attendance Limit"
    reference: "20 USC 1070a(b)(2)(A)"
    note: "COA includes tuition, fees, room, board, books, supplies, transportation, personal expenses"
