# Tests for 26 USC 21 - Child and Dependent Care Credit
#
# IRC Section 21 provides a credit for employment-related expenses for the care
# of qualifying individuals (children under 13, disabled dependents/spouses).
#
# Key rules tested:
#   - 21(b): Credit rate 35% to 20% based on AGI ($15,000 threshold, $2,000 increments)
#   - 21(c): Expense limits $3,000 for 1 QI, $6,000 for 2+ QIs
#   - 21(d): Expenses limited to earned income (lesser of spouses for MFJ)
#   - 21(e): Qualifying individual definitions
#   - ARPA 2021: 50% rate, $8,000/$16,000 limits, refundable

reference: "26 USC 21"
tax_year: 2024

tests:
  # ============================================================================
  # Basic Credit Calculation - 2024 Parameters
  # Max rate: 35% for AGI <= $15,000, floor 20% at AGI >= $43,000
  # Expense limits: $3,000 for 1 QI, $6,000 for 2+ QIs
  # ============================================================================

  - name: "Maximum rate - 1 child, low AGI"
    description: "AGI at or below $15,000 gets 35% rate"
    inputs:
      filing_status: single
      adjusted_gross_income: 15000
      earned_income: 15000
      tax_liability_before_credits: 500
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_applicable_percentage: 0.35
      cdcc_maximum_expense_limit: 3000
      cdcc_creditable_expenses: 3000
      cdcc_tentative_credit: 1050  # 3000 * 0.35 = 1050
      child_dependent_care_credit: 500  # Limited by tax liability
    citations:
      - "26 USC 21(b): 35% for AGI <= $15,000"
      - "26 USC 21(c)(1): $3,000 for 1 qualifying individual"

  - name: "Maximum rate - 2 children, low AGI, sufficient tax liability"
    description: "AGI at or below $15,000 with 2 children"
    inputs:
      filing_status: single
      adjusted_gross_income: 15000
      earned_income: 15000
      tax_liability_before_credits: 3000
      cdcc_expenses_paid: 6000
      num_cdcc_qualifying_individuals: 2
    expected:
      cdcc_applicable_percentage: 0.35
      cdcc_maximum_expense_limit: 6000
      cdcc_creditable_expenses: 6000
      cdcc_tentative_credit: 2100  # 6000 * 0.35 = 2100
      child_dependent_care_credit: 2100  # Full credit (liability sufficient)
    citations:
      - "26 USC 21(c)(2): $6,000 for 2+ qualifying individuals"

  # ============================================================================
  # Credit Rate Phase-Down
  # Rate decreases 1% per $2,000 (or fraction) above $15,000
  # ============================================================================

  - name: "First phase-down increment - AGI $16,000"
    description: "AGI $1,000 over threshold = 1 increment = 34% rate"
    inputs:
      filing_status: single
      adjusted_gross_income: 16000
      earned_income: 16000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      # ceil((16000 - 15000) / 2000) = ceil(0.5) = 1 increment
      cdcc_applicable_percentage: 0.34
      cdcc_tentative_credit: 1020  # 3000 * 0.34 = 1020
      child_dependent_care_credit: 1020
    citations:
      - "26 USC 21(b): 1% reduction per $2,000 or fraction thereof"

  - name: "Phase-down at $17,000 - still 1 increment"
    description: "AGI $2,000 over threshold = 1 increment = 34% rate"
    inputs:
      filing_status: single
      adjusted_gross_income: 17000
      earned_income: 17000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      # ceil((17000 - 15000) / 2000) = ceil(1.0) = 1 increment
      cdcc_applicable_percentage: 0.34
      cdcc_tentative_credit: 1020  # 3000 * 0.34 = 1020
    citations:
      - "26 USC 21(b): $2,000 or fraction thereof"

  - name: "Phase-down at $17,001 - 2 increments"
    description: "AGI slightly over $2,000 increment = 2 increments = 33% rate"
    inputs:
      filing_status: single
      adjusted_gross_income: 17001
      earned_income: 17001
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      # ceil((17001 - 15000) / 2000) = ceil(1.0005) = 2 increments
      cdcc_applicable_percentage: 0.33
      cdcc_tentative_credit: 990  # 3000 * 0.33 = 990
    citations:
      - "26 USC 21(b): fraction thereof triggers next increment"

  - name: "Mid-range AGI $25,000 - 5 increments"
    description: "AGI $10,000 over threshold = 5 increments = 30% rate"
    inputs:
      filing_status: single
      adjusted_gross_income: 25000
      earned_income: 25000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      # ceil((25000 - 15000) / 2000) = ceil(5) = 5 increments
      cdcc_applicable_percentage: 0.30
      cdcc_tentative_credit: 900  # 3000 * 0.30 = 900
    citations:
      - "26 USC 21(b): 35% - 5% = 30%"

  - name: "Minimum rate - AGI $43,000"
    description: "AGI at 20% floor threshold"
    inputs:
      filing_status: single
      adjusted_gross_income: 43000
      earned_income: 43000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      # ceil((43000 - 15000) / 2000) = ceil(14) = 14 increments
      # 35% - 14% = 21%, but floor is 20%
      cdcc_applicable_percentage: 0.20
      cdcc_tentative_credit: 600  # 3000 * 0.20 = 600
    citations:
      - "26 USC 21(b): not below 20%"

  - name: "High AGI - remains at floor"
    description: "AGI $100,000 still gets 20% rate (floor)"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      earned_income: 100000
      tax_liability_before_credits: 15000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_applicable_percentage: 0.20
      cdcc_tentative_credit: 600  # 3000 * 0.20 = 600
    citations:
      - "26 USC 21(b): 20% floor applies regardless of higher AGI"

  # ============================================================================
  # Expense Limitations
  # ============================================================================

  - name: "Expenses exceed statutory limit"
    description: "Paid $5,000 but limit is $3,000 for 1 child"
    inputs:
      filing_status: single
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 5000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_maximum_expense_limit: 3000
      cdcc_creditable_expenses: 3000  # Limited to $3,000
      cdcc_applicable_percentage: 0.20
      cdcc_tentative_credit: 600  # 3000 * 0.20 = 600
    citations:
      - "26 USC 21(c)(1): expenses capped at $3,000"

  - name: "Actual expenses less than limit"
    description: "Paid $2,000 when limit is $3,000"
    inputs:
      filing_status: single
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 2000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_maximum_expense_limit: 3000
      cdcc_creditable_expenses: 2000  # Actual expenses
      cdcc_tentative_credit: 400  # 2000 * 0.20 = 400
    citations:
      - "26 USC 21(a): credit on expenses actually paid"

  # ============================================================================
  # Earned Income Limitation - Single Filers
  # ============================================================================

  - name: "Single filer - expenses exceed earned income"
    description: "Earned income limits creditable expenses"
    inputs:
      filing_status: single
      adjusted_gross_income: 2500
      earned_income: 2500
      tax_liability_before_credits: 0
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_earned_income_limit: 2500
      cdcc_creditable_expenses: 2500  # Limited by earned income
      cdcc_applicable_percentage: 0.35
      cdcc_tentative_credit: 875  # 2500 * 0.35 = 875
    citations:
      - "26 USC 21(d)(1)(A): limited to earned income for single filer"

  # ============================================================================
  # Earned Income Limitation - Married Filers
  # ============================================================================

  - name: "Married - lower-earning spouse limits expenses"
    description: "Lesser of spouses' earned income applies"
    inputs:
      filing_status: joint
      adjusted_gross_income: 60000
      persons:
        head:
          earned_income: 50000
          is_tax_unit_head: true
        spouse:
          earned_income: 10000
          is_tax_unit_spouse: true
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 6000
      num_cdcc_qualifying_individuals: 2
    expected:
      cdcc_earned_income_limit: 10000  # Lesser of $50,000 and $10,000
      cdcc_creditable_expenses: 6000  # Limited by statutory limit, not earned income
      cdcc_applicable_percentage: 0.20
      cdcc_tentative_credit: 1200  # 6000 * 0.20 = 1200
    citations:
      - "26 USC 21(d)(1)(B): lesser of spouses' earned incomes"

  - name: "Married - lower earner limits below statutory max"
    description: "Lower earner's $4,000 income limits 2-child expenses"
    inputs:
      filing_status: joint
      adjusted_gross_income: 80000
      persons:
        head:
          earned_income: 76000
          is_tax_unit_head: true
        spouse:
          earned_income: 4000
          is_tax_unit_spouse: true
      tax_liability_before_credits: 10000
      cdcc_expenses_paid: 8000
      num_cdcc_qualifying_individuals: 2
    expected:
      cdcc_maximum_expense_limit: 6000
      cdcc_earned_income_limit: 4000
      cdcc_creditable_expenses: 4000  # Limited by lower spouse's earnings
      cdcc_applicable_percentage: 0.20
      cdcc_tentative_credit: 800  # 4000 * 0.20 = 800
    citations:
      - "26 USC 21(d)(1)(B): expenses cannot exceed lower spouse's earnings"

  # ============================================================================
  # Qualifying Individual Tests
  # ============================================================================

  - name: "Child age 12 - qualifies"
    description: "Dependent under 13 is a qualifying individual"
    inputs:
      filing_status: single
      adjusted_gross_income: 30000
      earned_income: 30000
      tax_liability_before_credits: 2000
      cdcc_expenses_paid: 3000
      persons:
        parent:
          is_tax_unit_head: true
        child:
          age: 12
          is_dependent: true
    expected:
      is_cdcc_qualifying_individual:
        parent: false
        child: true
      num_cdcc_qualifying_individuals: 1
    citations:
      - "26 USC 21(b)(1)(A): dependent under age 13"

  - name: "Child age 13 - does not qualify"
    description: "Dependent aged 13 or older does not qualify (unless disabled)"
    inputs:
      filing_status: single
      adjusted_gross_income: 30000
      earned_income: 30000
      tax_liability_before_credits: 2000
      cdcc_expenses_paid: 3000
      persons:
        parent:
          is_tax_unit_head: true
        child:
          age: 13
          is_dependent: true
          is_disabled: false
    expected:
      is_cdcc_qualifying_individual:
        parent: false
        child: false
      num_cdcc_qualifying_individuals: 0
      child_dependent_care_credit: 0  # No qualifying individual
    citations:
      - "26 USC 21(b)(1)(A): has not attained age 13"

  - name: "Disabled dependent age 15 - qualifies"
    description: "Disabled dependent qualifies regardless of age"
    inputs:
      filing_status: single
      adjusted_gross_income: 30000
      earned_income: 30000
      tax_liability_before_credits: 2000
      cdcc_expenses_paid: 3000
      persons:
        parent:
          is_tax_unit_head: true
        child:
          age: 15
          is_dependent: true
          is_disabled: true
    expected:
      is_cdcc_qualifying_individual:
        parent: false
        child: true
      num_cdcc_qualifying_individuals: 1
    citations:
      - "26 USC 21(b)(1)(B): disabled dependent qualifies"

  - name: "Disabled spouse - qualifies"
    description: "Disabled spouse is a qualifying individual"
    inputs:
      filing_status: joint
      adjusted_gross_income: 40000
      earned_income: 40000
      tax_liability_before_credits: 3000
      cdcc_expenses_paid: 3000
      persons:
        head:
          is_tax_unit_head: true
          is_disabled: false
        spouse:
          is_tax_unit_spouse: true
          is_disabled: true
    expected:
      is_cdcc_qualifying_individual:
        head: false
        spouse: true
      num_cdcc_qualifying_individuals: 1
    citations:
      - "26 USC 21(b)(1)(C): disabled spouse qualifies"

  - name: "Multiple qualifying individuals"
    description: "Two children under 13 plus disabled spouse = 3 QIs"
    inputs:
      filing_status: joint
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 10000
      persons:
        head:
          is_tax_unit_head: true
        spouse:
          is_tax_unit_spouse: true
          is_disabled: true
        child1:
          age: 5
          is_dependent: true
        child2:
          age: 8
          is_dependent: true
    expected:
      is_cdcc_qualifying_individual:
        head: false
        spouse: true
        child1: true
        child2: true
      num_cdcc_qualifying_individuals: 3
      cdcc_maximum_expense_limit: 6000  # 2+ QIs = $6,000 limit
    citations:
      - "26 USC 21(c)(2): 2 or more qualifying individuals"

  # ============================================================================
  # Tax Liability Limitation (Nonrefundable Credit)
  # ============================================================================

  - name: "Credit limited by tax liability"
    description: "Nonrefundable credit cannot exceed tax liability"
    inputs:
      filing_status: single
      adjusted_gross_income: 15000
      earned_income: 15000
      tax_liability_before_credits: 300
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_applicable_percentage: 0.35
      cdcc_tentative_credit: 1050  # 3000 * 0.35 = 1050
      child_dependent_care_credit: 300  # Limited to tax liability
    citations:
      - "26 USC 21: credit against tax (nonrefundable under subpart A)"

  - name: "Zero tax liability - no credit"
    description: "With $0 tax liability, nonrefundable credit is $0"
    inputs:
      filing_status: single
      adjusted_gross_income: 15000
      earned_income: 15000
      tax_liability_before_credits: 0
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_tentative_credit: 1050
      child_dependent_care_credit: 0  # No tax liability to offset
    citations:
      - "26 USC 21: nonrefundable credit"

  # ============================================================================
  # No Qualifying Individuals
  # ============================================================================

  - name: "No qualifying individuals - no credit"
    description: "Credit is zero with no qualifying individuals"
    inputs:
      filing_status: single
      adjusted_gross_income: 30000
      earned_income: 30000
      tax_liability_before_credits: 3000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 0
    expected:
      cdcc_maximum_expense_limit: 0
      cdcc_creditable_expenses: 0
      cdcc_tentative_credit: 0
      child_dependent_care_credit: 0
    citations:
      - "26 USC 21(a): requires qualifying individuals"

  # ============================================================================
  # ARPA 2021 Temporary Provisions
  # - Rate: 50% for AGI <= $125,000
  # - Expense limits: $8,000 for 1 QI, $16,000 for 2+ QIs
  # - Refundable credit
  # ============================================================================

  - name: "ARPA 2021 - Maximum rate 50%"
    description: "2021 temporary 50% rate for low AGI"
    tax_year: 2021
    inputs:
      filing_status: single
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 3000
      cdcc_expenses_paid: 8000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_applicable_percentage: 0.50
      cdcc_maximum_expense_limit: 8000
      cdcc_creditable_expenses: 8000
      cdcc_tentative_credit: 4000  # 8000 * 0.50 = 4000
      child_dependent_care_credit: 4000  # Refundable!
    citations:
      - "P.L. 117-2 Sec. 9631: $8,000 limit for 2021"
      - "P.L. 117-2 Sec. 9632(a): 50% rate for 2021"
      - "P.L. 117-2 Sec. 9631(c): refundable for 2021"

  - name: "ARPA 2021 - Refundable with zero liability"
    description: "2021 credit is refundable (exceeds tax liability)"
    tax_year: 2021
    inputs:
      filing_status: single
      adjusted_gross_income: 30000
      earned_income: 30000
      tax_liability_before_credits: 0
      cdcc_expenses_paid: 8000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_applicable_percentage: 0.50
      cdcc_tentative_credit: 4000
      child_dependent_care_credit: 4000  # Full amount (refundable)
    citations:
      - "P.L. 117-2 Sec. 9631(c): treated as refundable credit"

  - name: "ARPA 2021 - 2 children maximum"
    description: "2021 $16,000 limit for 2+ children"
    tax_year: 2021
    inputs:
      filing_status: joint
      adjusted_gross_income: 100000
      earned_income: 100000
      tax_liability_before_credits: 10000
      cdcc_expenses_paid: 16000
      num_cdcc_qualifying_individuals: 2
    expected:
      cdcc_applicable_percentage: 0.50
      cdcc_maximum_expense_limit: 16000
      cdcc_creditable_expenses: 16000
      cdcc_tentative_credit: 8000  # 16000 * 0.50 = 8000
      child_dependent_care_credit: 8000
    citations:
      - "P.L. 117-2 Sec. 9631(a): $16,000 for 2+ children in 2021"

  - name: "ARPA 2021 - Phase-down begins at $125,000"
    description: "2021 rate phases from 50% starting at $125,000 AGI"
    tax_year: 2021
    inputs:
      filing_status: single
      adjusted_gross_income: 127000
      earned_income: 127000
      tax_liability_before_credits: 20000
      cdcc_expenses_paid: 8000
      num_cdcc_qualifying_individuals: 1
    expected:
      # ceil((127000 - 125000) / 2000) = ceil(1) = 1 increment
      cdcc_applicable_percentage: 0.49
      cdcc_tentative_credit: 3920  # 8000 * 0.49 = 3920
    citations:
      - "P.L. 117-2 Sec. 9632(a)(2): phase-down starts at $125,000"

  - name: "ARPA 2021 - Complete phaseout above $438,000"
    description: "2021 credit phases out completely for very high AGI"
    tax_year: 2021
    inputs:
      filing_status: joint
      adjusted_gross_income: 440000
      earned_income: 440000
      tax_liability_before_credits: 100000
      cdcc_expenses_paid: 8000
      num_cdcc_qualifying_individuals: 1
    expected:
      # Rate is 0% - fully phased out
      cdcc_applicable_percentage: 0.00
      child_dependent_care_credit: 0
    citations:
      - "P.L. 117-2 Sec. 9632(b)(2): complete phaseout above $400,000"

  # ============================================================================
  # Edge Cases
  # ============================================================================

  - name: "Zero expenses paid"
    description: "No credit if no expenses were paid"
    inputs:
      filing_status: single
      adjusted_gross_income: 30000
      earned_income: 30000
      tax_liability_before_credits: 2000
      cdcc_expenses_paid: 0
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_creditable_expenses: 0
      cdcc_tentative_credit: 0
      child_dependent_care_credit: 0
    citations:
      - "26 USC 21(a): credit on expenses paid"

  - name: "Zero earned income"
    description: "No credit if no earned income (expenses limited to $0)"
    inputs:
      filing_status: single
      adjusted_gross_income: 10000  # Unearned income only
      earned_income: 0
      tax_liability_before_credits: 500
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_earned_income_limit: 0
      cdcc_creditable_expenses: 0  # Limited by earned income
      child_dependent_care_credit: 0
    citations:
      - "26 USC 21(d): expenses limited to earned income"

  - name: "All limitations binding"
    description: "Statutory limit, earned income, and actual expenses interact"
    inputs:
      filing_status: single
      adjusted_gross_income: 8000
      earned_income: 8000
      tax_liability_before_credits: 200
      cdcc_expenses_paid: 2500
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_maximum_expense_limit: 3000
      cdcc_earned_income_limit: 8000
      cdcc_creditable_expenses: 2500  # Actual expenses (lowest)
      cdcc_applicable_percentage: 0.35
      cdcc_tentative_credit: 875  # 2500 * 0.35 = 875
      child_dependent_care_credit: 200  # Limited by tax liability
    citations:
      - "26 USC 21: multiple limitations apply"

  - name: "Married filing separately"
    description: "MFS filers can still claim CDCC (unlike EITC)"
    inputs:
      filing_status: separate
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 5000
      cdcc_expenses_paid: 3000
      num_cdcc_qualifying_individuals: 1
    expected:
      cdcc_applicable_percentage: 0.20
      cdcc_tentative_credit: 600
      child_dependent_care_credit: 600
    citations:
      - "26 USC 21: no MFS exclusion (unlike EITC)"
