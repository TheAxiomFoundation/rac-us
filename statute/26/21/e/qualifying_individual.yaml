# 26 USC 21(e) - Special Rules
#
# "(b) QUALIFYING INDIVIDUAL. -- The term 'qualifying individual' means --
#   (1) a dependent of the taxpayer... who has not attained age 13,
#   (2) a dependent of the taxpayer... who is physically or mentally incapable of caring
#       for himself or herself and who has the same principal place of abode as the
#       taxpayer for more than one-half of such taxable year, or
#   (3) the spouse of the taxpayer, if the spouse is physically or mentally incapable
#       of caring for himself or herself and who has the same principal place of abode
#       as the taxpayer for more than one-half of such taxable year."
#
# Note: This section defines qualifying individual by characteristics, not parameters.
# The age limit is the only parametric value.

# Age limit for child to be qualifying individual
child_age_limit:
  description: "Maximum age (exclusive) for dependent child to be a qualifying individual"
  unit: year
  values:
    1976-01-01: 13
  citations:
    - "26 USC 21(b)(1)(A): who has not attained age 13"
