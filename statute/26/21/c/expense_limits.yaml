# 26 USC 21(c) - Maximum Employment-Related Expenses
#
# "(c) DOLLAR LIMIT ON AMOUNT CREDITABLE. -- The amount of the employment-related
# expenses incurred during any taxable year which may be taken into account under
# subsection (a) shall not exceed --
#   (1) $3,000 if there is 1 qualifying individual with respect to the taxpayer
#       for such taxable year, or
#   (2) $6,000 if there are 2 or more qualifying individuals with respect to the
#       taxpayer for such taxable year."
#
# ARPA 2021 (P.L. 117-2, Sec. 9631):
# - Increased to $8,000 for 1 qualifying individual
# - Increased to $16,000 for 2 or more qualifying individuals

# Maximum expenses for 1 qualifying individual
one_qualifying_individual:
  description: "Maximum creditable employment-related expenses for 1 qualifying individual"
  unit: currency-USD
  values:
    1976-01-01: 2000   # Original amount
    1982-01-01: 2400   # ERTA 1981
    2003-01-01: 3000   # JGTRRA 2003
    2021-01-01: 8000   # ARPA 2021 temporary
    2022-01-01: 3000   # Reverted to permanent law
  citations:
    - "26 USC 21(c)(1): $3,000 if there is 1 qualifying individual"
    - "P.L. 117-2 Sec. 9631(a): $8,000 for 2021"

# Maximum expenses for 2 or more qualifying individuals
two_or_more_qualifying_individuals:
  description: "Maximum creditable employment-related expenses for 2+ qualifying individuals"
  unit: currency-USD
  values:
    1976-01-01: 4000   # Original amount
    1982-01-01: 4800   # ERTA 1981
    2003-01-01: 6000   # JGTRRA 2003
    2021-01-01: 16000  # ARPA 2021 temporary
    2022-01-01: 6000   # Reverted to permanent law
  citations:
    - "26 USC 21(c)(2): $6,000 if there are 2 or more qualifying individuals"
    - "P.L. 117-2 Sec. 9631(a): $16,000 for 2021"
