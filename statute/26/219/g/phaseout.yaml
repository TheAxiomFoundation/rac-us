# 26 USC Section 219(g) - Limitation on Deduction for Active Participants
#                          in Certain Pension Plans
#
# Phase-out ranges apply when taxpayer (or spouse for MFJ) is an active
# participant in an employer-sponsored retirement plan.
#
# 219(g)(2)(A)(ii): Phase-out range for single filers who are active participants
# 219(g)(3)(B)(i): Phase-out range for MFJ when contributor is active participant
# 219(g)(7): Phase-out for MFJ when only spouse is active participant

# Single filer (or HoH) who is an active participant
phaseout_single_start:
  description: "AGI where IRA deduction phase-out begins for single active participants"
  unit: currency-USD
  indexing:
    method: cpi-u
    round_to: 1000
  values:
    2019-01-01: 64000
    2020-01-01: 65000
    2021-01-01: 66000
    2022-01-01: 68000
    2023-01-01: 73000
    2024-01-01: 77000
    2025-01-01: 79000
  citations:
    - "26 USC 219(g)(2)(A)(ii): phase-out for single active participants"
    - "Rev. Proc. 2023-34 Section 3.16: $77,000-$87,000 for 2024"

phaseout_single_end:
  description: "AGI where IRA deduction is fully phased out for single active participants"
  unit: currency-USD
  indexing:
    method: cpi-u
    round_to: 1000
  values:
    2019-01-01: 74000
    2020-01-01: 75000
    2021-01-01: 76000
