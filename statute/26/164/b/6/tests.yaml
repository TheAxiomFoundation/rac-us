# Tests for 26 USC § 164(b)(6) - State and Local Tax (SALT) Deduction
#
# This tests the SALT deduction with the $10,000 cap from TCJA (2018-2025):
#   - § 164(a): Deductible taxes (income/sales, property taxes)
#   - § 164(b)(5): Election between income tax and sales tax
#   - § 164(b)(6)(A): $10,000 cap ($5,000 for MFS)
#   - § 164(b)(6)(B): Foreign real property exempt from cap
#   - § 164(b)(6)(C): Cap only applies 2018-2025

variable: salt_deduction
tax_year: 2024

test_cases:
  # ============================================================================
  # § 164(b)(6)(A) - Below Cap (Full Deduction)
  # "the aggregate amount... shall not exceed $10,000"
  # ============================================================================

  - name: "Below cap - full deduction allowed"
    description: "Total SALT of $8,000 is below the $10,000 cap"
    inputs:
      filing_status: SINGLE
      state_income_tax: 3000
      real_property_tax: 4000
      personal_property_tax: 1000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 8000
      salt_cap_amount: 10000
      salt_deduction: 8000
      salt_cap_reduction: 0
    citations:
      - "§ 164(a): deductible taxes include income, property"
      - "§ 164(b)(6)(A): $10,000 cap not reached"

  - name: "At cap - exactly $10,000"
    description: "Total SALT of exactly $10,000 equals the cap"
    inputs:
      filing_status: JOINT
      state_income_tax: 5000
      real_property_tax: 4000
      personal_property_tax: 1000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 10000
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(6)(A): at cap, full amount deductible"

  - name: "Joint filers - below cap"
    description: "Married filing jointly with $6,000 SALT"
    inputs:
      filing_status: JOINT
      state_income_tax: 2000
      real_property_tax: 3000
      personal_property_tax: 1000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 6000
      salt_cap_amount: 10000
      salt_deduction: 6000
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(6)(A): MFJ gets full $10,000 cap"

  # ============================================================================
  # § 164(b)(6)(A) - Above Cap (Capped at $10,000)
  # ============================================================================

  - name: "Above cap - capped at $10,000"
    description: "Total SALT of $25,000 is capped at $10,000"
    inputs:
      filing_status: SINGLE
      state_income_tax: 12000
      real_property_tax: 10000
      personal_property_tax: 3000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 25000
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 15000
    citations:
      - "§ 164(b)(6)(A): cap limits deduction to $10,000"

  - name: "High property tax state - capped"
    description: "New Jersey taxpayer with high property taxes"
    inputs:
      filing_status: JOINT
      state_income_tax: 8000
      real_property_tax: 15000
      personal_property_tax: 2000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 25000
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 15000
    citations:
      - "§ 164(b)(6)(A): TCJA cap most impactful in high-tax states"

  - name: "High income tax state - capped"
    description: "California taxpayer with high state income tax"
    inputs:
      filing_status: SINGLE
      state_income_tax: 20000
      real_property_tax: 5000
      personal_property_tax: 500
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 25500
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 15500
    citations:
      - "§ 164(b)(6)(A): high state income tax capped"

  # ============================================================================
  # § 164(b)(6)(A) - Married Filing Separately (MFS) - $5,000 Cap
  # "($5,000 in the case of a married individual filing a separate return)"
  # ============================================================================

  - name: "MFS below $5,000 cap"
    description: "MFS filer with $3,000 SALT gets full deduction"
    inputs:
      filing_status: MARRIED_SEPARATE
      state_income_tax: 2000
      real_property_tax: 1000
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 3000
      salt_cap_amount: 5000
      salt_deduction: 3000
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(6)(A): MFS cap is $5,000"

  - name: "MFS at $5,000 cap"
    description: "MFS filer with exactly $5,000 SALT"
    inputs:
      filing_status: MARRIED_SEPARATE
      state_income_tax: 3000
      real_property_tax: 2000
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 5000
      salt_cap_amount: 5000
      salt_deduction: 5000
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(6)(A): MFS at $5,000 cap"

  - name: "MFS capped at $5,000"
    description: "MFS filer with $15,000 SALT capped at $5,000"
    inputs:
      filing_status: MARRIED_SEPARATE
      state_income_tax: 8000
      real_property_tax: 6000
      personal_property_tax: 1000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 15000
      salt_cap_amount: 5000
      salt_deduction: 5000
      salt_cap_reduction: 10000
    citations:
      - "§ 164(b)(6)(A): MFS limited to $5,000"

  # ============================================================================
  # § 164(b)(5) - Sales Tax Election
  # Taxpayer may elect to deduct state/local sales tax instead of income tax
  # ============================================================================

  - name: "Sales tax election - below cap"
    description: "Taxpayer elects sales tax in state with no income tax"
    inputs:
      filing_status: SINGLE
      state_income_tax: 0
      real_property_tax: 4000
      personal_property_tax: 500
      sales_tax: 3000
      elects_sales_tax: true
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 7500
      salt_cap_amount: 10000
      salt_deduction: 7500
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(5)(A): taxpayer may elect sales tax"
      - "§ 164(b)(6)(A): sales tax also subject to cap"

  - name: "Sales tax election - capped"
    description: "Taxpayer elects sales tax, total exceeds cap"
    inputs:
      filing_status: JOINT
      state_income_tax: 0
      real_property_tax: 8000
      personal_property_tax: 1000
      sales_tax: 5000
      elects_sales_tax: true
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 14000
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 4000
    citations:
      - "§ 164(b)(5)(A): sales tax election"
      - "§ 164(b)(6)(A): cap still applies"

  - name: "No election - income tax used even if sales tax higher"
    description: "Without election, income tax is used not sales tax"
    inputs:
      filing_status: SINGLE
      state_income_tax: 2000
      real_property_tax: 3000
      personal_property_tax: 0
      sales_tax: 5000  # Higher but not elected
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 5000  # Uses income tax, ignores sales tax
      salt_cap_amount: 10000
      salt_deduction: 5000
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(5)(A): must elect to use sales tax"

  # ============================================================================
  # § 164(b)(6)(B) - Foreign Real Property Tax Exception
  # "Subparagraph (A) shall not apply to any foreign real property taxes"
  # ============================================================================

  - name: "Foreign real property tax - exempt from cap"
    description: "Foreign property tax is added after cap calculation"
    inputs:
      filing_status: SINGLE
      state_income_tax: 8000
      real_property_tax: 5000
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 3000
    expected:
      salt_before_cap: 13000
      salt_cap_amount: 10000
      salt_deduction: 13000  # 10000 capped + 3000 foreign
      salt_cap_reduction: 3000
    citations:
      - "§ 164(b)(6)(B): foreign real property exempt from cap"

  - name: "Foreign property with domestic at cap"
    description: "Domestic SALT at cap, plus foreign real property"
    inputs:
      filing_status: JOINT
      state_income_tax: 6000
      real_property_tax: 6000
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 5000
    expected:
      salt_before_cap: 12000
      salt_cap_amount: 10000
      salt_deduction: 15000  # 10000 capped + 5000 foreign
      salt_cap_reduction: 2000
    citations:
      - "§ 164(b)(6)(B): foreign property not subject to cap"

  - name: "Foreign property only"
    description: "Only foreign real property tax - fully deductible"
    inputs:
      filing_status: SINGLE
      state_income_tax: 0
      real_property_tax: 0
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 25000
    expected:
      salt_before_cap: 0
      salt_cap_amount: 10000
      salt_deduction: 25000  # All foreign, no cap
      salt_cap_reduction: 0
    citations:
      - "§ 164(b)(6)(B): foreign property fully deductible"

  # ============================================================================
  # § 164(b)(6)(C) - Pre-2018 (No Cap - Historical)
  # "This paragraph shall not apply to taxable years beginning after December 31, 2025"
  # Conversely, the cap did not apply before 2018
  # ============================================================================

  - name: "Pre-TCJA 2017 - no cap"
    description: "Before TCJA, no SALT cap existed"
    tax_year: 2017
    inputs:
      filing_status: SINGLE
      state_income_tax: 20000
      real_property_tax: 15000
      personal_property_tax: 2000
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 37000
      salt_cap_amount: .inf  # Unlimited
      salt_deduction: 37000
      salt_cap_reduction: 0
    citations:
      - "Pre-TCJA: no limitation on SALT deduction"

  # ============================================================================
  # Edge Cases
  # ============================================================================

  - name: "Zero SALT"
    description: "No state/local taxes paid"
    inputs:
      filing_status: SINGLE
      state_income_tax: 0
      real_property_tax: 0
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 0
      salt_cap_amount: 10000
      salt_deduction: 0
      salt_cap_reduction: 0
    citations:
      - "§ 164(a): no taxes, no deduction"

  - name: "Head of household - regular cap"
    description: "Head of household gets $10,000 cap"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      state_income_tax: 8000
      real_property_tax: 7000
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 15000
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 5000
    citations:
      - "§ 164(b)(6)(A): HOH gets $10,000 cap (not MFS)"

  - name: "Qualifying widow(er) - regular cap"
    description: "Surviving spouse gets $10,000 cap"
    inputs:
      filing_status: QUALIFYING_WIDOW
      state_income_tax: 6000
      real_property_tax: 6000
      personal_property_tax: 0
      sales_tax: 0
      elects_sales_tax: false
      foreign_real_property_tax: 0
    expected:
      salt_before_cap: 12000
      salt_cap_amount: 10000
      salt_deduction: 10000
      salt_cap_reduction: 2000
    citations:
      - "§ 164(b)(6)(A): surviving spouse treated like MFJ"
