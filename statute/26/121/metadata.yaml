    - Joint filer with only one spouse meeting requirements
    - Partial exclusion due to unforeseen circumstances
    - Ineligible due to recent prior exclusion
    - Depreciation recapture situations

# =============================================================================
# Architecture Notes
# =============================================================================

architecture:
  description: |
    The Section 121 exclusion follows a straightforward calculation:

    1. **Eligibility Check** (principal_residence_exclusion.rac)
       - Ownership test: Owned 2+ years in last 5
       - Use test: Used as principal residence 2+ years in last 5
       - Frequency test: No exclusion claimed in prior 2 years

    2. **Limit Determination** (principal_residence_exclusion.rac)
       - Single/HoH/MFS: $250,000
       - MFJ with both spouses meeting tests: $500,000
       - MFJ with only one spouse meeting tests: $250,000

    3. **Reduced Exclusion** (when not fully meeting requirements)
       - Prorated based on actual time / required time
       - Applies for unforeseen circumstances (health, employment, etc.)

    4. **Final Exclusion**
       - Exclusion = min(realized_gain, applicable_limit)
       - Gain in excess of limit is taxable as capital gain

  entity_model: |
    - TaxUnit: Primary calculation level
    - Person: For spouse-specific ownership/use tests
    - Asset: Principal residence with basis and holding info

  cross_references:
    - Section 1001 capital gains calculation for realized gain
    - Section 1(h) preferential rates for non-excluded gain
    - Prior Section 1034 (repealed) for rollover history
