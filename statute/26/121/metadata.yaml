# Validation
# =============================================================================

validation:
  external_calculators:
    - name: "IRS Publication 523 Worksheets"
      note: "Manual worksheet comparison"

    - name: "TurboTax"
      note: "Commercial tax software comparison"

    - name: "H&R Block"
      note: "Commercial tax software comparison"

  tolerance_dollars: 1
