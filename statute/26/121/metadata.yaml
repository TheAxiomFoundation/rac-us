# Encoding Metadata for 26 USC Section 121 - Exclusion of Gain from Sale of Principal Residence
#
# This encoding implements the home sale exclusion rules that allow taxpayers
# to exclude up to $250,000 ($500,000 for married filing jointly) of gain from
# the sale of a principal residence.

encoding:
  created: 2024-12-26
  updated: 2024-12-26
  status: implemented
  encoded_by: claude-opus-4.5
  version: "1.0"

scope:
  title: 26
  subchapter: B
  part: III
  sections: [121]
  related_sections: [1001, 1011, 1012, 1014, 1015, 1016, 1034]

# =============================================================================
# File Structure
# =============================================================================

files:
  - path: principal_residence_exclusion.rac
    description: |
      Main exclusion calculation per Section 121(a).
      Implements: Exclusion = min(realized_gain, exclusion_limit)
    sections_covered:
      - "121(a): General exclusion rule"
      - "121(b)(1)-(2): $250,000/$500,000 limits"
      - "121(b)(3): Ownership and use requirements (2 out of 5 years)"
      - "121(b)(4): One sale every 2 years"
      - "121(c): Reduced exclusion for unforeseen circumstances"
      - "121(d): Special rules for joint returns"
    key_variables:
      - principal_residence_gain_exclusion
      - principal_residence_exclusion_limit
      - meets_ownership_test
      - meets_use_test
      - qualifies_for_exclusion
      - reduced_exclusion_percentage

  - path: parameters.yaml
    description: |
      Statutory limits and thresholds for home sale exclusion.
      Fixed amounts from Section 121(b).
    parameters:
      - single_exclusion_limit: $250,000
      - joint_exclusion_limit: $500,000
      - ownership_period_years: 2
      - use_period_years: 2
      - lookback_period_years: 5
      - waiting_period_years: 2

  - path: tests.yaml
    description: |
      Comprehensive test cases covering exclusion scenarios.
      Includes single/joint filers, partial exclusions, ineligible cases.

# =============================================================================
# Coverage Details
# =============================================================================

coverage:
  tax_years: [1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007,
              2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018,
              2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    Section 121 was added by the Taxpayer Relief Act of 1997, replacing the
    old Section 1034 rollover rules and Section 121 one-time $125,000 exclusion
    for taxpayers over 55.

    Key coverage:
    - Basic exclusion ($250,000 single, $500,000 MFJ)
    - Ownership and use tests (2 out of 5 years)
    - Frequency limitation (once every 2 years)
    - Reduced exclusion for unforeseen circumstances
    - Special rules for joint returns (both spouses' requirements)
    - Surviving spouse rules

# =============================================================================
# Not Implemented (Non-Simulatable Rules)
# =============================================================================

not_implemented:
  - provision: "Section 121(b)(3) - Full 2/5 year tracking"
    description: "Precise ownership and use period tracking"
    reason: |
      PolicyEngine operates on point-in-time basis. Cannot track historical
      ownership/use periods. Implementation assumes eligibility inputs are
      provided or defaults to eligible.

  - provision: "Section 121(b)(4) - Prior sale tracking"
    description: "Whether taxpayer used exclusion in prior 2 years"
    reason: |
      Requires historical data on prior home sales. Implementation accepts
      input flag for prior exclusion use.

  - provision: "Section 121(d)(5) - Military/Foreign Service special periods"
    description: "Suspended 5-year period for certain government service"
    reason: |
      Complex temporal tracking of service periods. Can be added as input.

  - provision: "Section 121(d)(6) - Expatriates"
    description: "Exclusion denied to certain expatriates"
    reason: |
      Rare provision requiring Section 877 analysis.

  - provision: "Section 121(d)(10) - Business/Rental use allocation"
    description: "Depreciation recapture and non-qualified use"
    reason: |
      Requires detailed property use history. Implemented as simplified input.

