# 26 USC Section 408 - Individual Retirement Accounts
#
# Parameters for IRA contribution limits, distribution rules, and penalties
# Reference: 26 USC 408, 408A, 219, 72(t)
# Annual updates from IRS Rev. Proc. and Notices

# ============================================================================
# IRA Contribution Limits - 219(b)
# ============================================================================

ira_contribution_limit:
  description: "Maximum annual IRA contribution (traditional or Roth)"
  unit: currency-USD
  values:
    2019-01-01: 6000
    2020-01-01: 6000
    2021-01-01: 6000
    2022-01-01: 6000
    2023-01-01: 6500
    2024-01-01: 7000
    2025-01-01: 7000
  citations:
    - "26 USC 219(b)(1)(A): deductible amount"
    - "IRS Notice 2023-75: 2024 limit $7,000"
    - "IRS Notice 2024-80: 2025 limit $7,000"

ira_catchup_contribution:
  description: "Additional catch-up contribution for individuals age 50+"
  unit: currency-USD
  values:
    2019-01-01: 1000
    2020-01-01: 1000
    2021-01-01: 1000
    2022-01-01: 1000
    2023-01-01: 1000
    2024-01-01: 1000
    2025-01-01: 1000
  citations:
    - "26 USC 219(b)(5)(B): additional amount for individuals 50 or older"
    - "Note: catch-up amount is NOT indexed for inflation"

ira_catchup_age:
  description: "Age at which catch-up contributions are permitted"
  unit: year
  values:
    2002-01-01: 50
  citations:
    - "26 USC 219(b)(5)(B)(i): individual who has attained age 50"

roth_ira_minimum_contribution:
  description: "Minimum Roth IRA contribution after income phase-out"
  unit: currency-USD
  values:
    1998-01-01: 200
  citations:
    - "26 USC 408A(c)(3)(A)(ii): reduced limit shall not be reduced below $200"
    - "Note: This minimum applies before contribution rounds to zero"

roth_ira_rounding_increment:
  description: "Rounding increment for Roth IRA contribution phase-out calculation"
  unit: currency-USD
  values:
    1998-01-01: 10
  citations:
    - "26 USC 408A(c)(3)(A): contribution limit rounded to next lowest multiple of $10"

