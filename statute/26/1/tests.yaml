# Test Cases for 26 USC Section 1 - Tax Rates and Brackets
# Generated for validation against PolicyEngine and TAXSIM

test_cases:
  # ========== BASIC SINGLE FILER TESTS ==========
  # Zero case
  - name: "Single - No income"
    inputs:
      filing_status: SINGLE
      taxable_income: 0
      tax_year: 2024
    expected:
      income_tax: 0
    reference: "26 USC 1(c), 1(j)(3)"

  # First bracket only (10%)
  - name: "Single - First bracket only"
    inputs:
      filing_status: SINGLE
      taxable_income: 5000
      tax_year: 2024
    expected:
      income_tax: 500  # 5000 * 10%
    reference: "26 USC 1(j)(3) - 10% bracket"

  # At first bracket boundary
  - name: "Single - At first bracket boundary"
    inputs:
      filing_status: SINGLE
      taxable_income: 11600  # 2024 inflation-adjusted threshold
      tax_year: 2024
    expected:
      income_tax: 1160  # 11600 * 10%
    reference: "26 USC 1(j)(3) - 10% bracket boundary"

  # Multiple brackets - typical middle income
  - name: "Single - Multiple brackets $50,000"
    inputs:
      filing_status: SINGLE
      taxable_income: 50000
      tax_year: 2024
    expected:
      income_tax: 6617  # Based on 2024 brackets
    reference: "26 USC 1(j)(3) - 10%, 12%, 22% brackets"

  # High income - top bracket
  - name: "Single - High income $750,000"
    inputs:
      filing_status: SINGLE
      taxable_income: 750000
      tax_year: 2024
    expected:
      income_tax: 243739  # Includes 37% top bracket
    reference: "26 USC 1(j)(3) - All brackets including 37%"

  # ========== MARRIED FILING JOINTLY TESTS ==========
  - name: "MFJ - No income"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 0
      tax_year: 2024
    expected:
      income_tax: 0
    reference: "26 USC 1(a), 1(j)(1)"

  - name: "MFJ - First bracket only"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 15000
      tax_year: 2024
    expected:
      income_tax: 1500  # 15000 * 10%
    reference: "26 USC 1(j)(1) - 10% bracket"

  - name: "MFJ - At first bracket boundary"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 23200  # 2024 inflation-adjusted threshold
      tax_year: 2024
    expected:
      income_tax: 2320  # 23200 * 10%
    reference: "26 USC 1(j)(1) - 10% bracket boundary"

  - name: "MFJ - Multiple brackets $100,000"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 100000
      tax_year: 2024
    expected:
      income_tax: 11219  # Based on 2024 brackets
    reference: "26 USC 1(j)(1) - 10%, 12%, 22% brackets"

  - name: "MFJ - High income $1,000,000"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 1000000
      tax_year: 2024
    expected:
      income_tax: 309579  # Includes all brackets
    reference: "26 USC 1(j)(1) - All brackets including 37%"

  # ========== HEAD OF HOUSEHOLD TESTS ==========
  - name: "HOH - No income"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 0
      tax_year: 2024
    expected:
      income_tax: 0
    reference: "26 USC 1(b), 1(j)(2)"

  - name: "HOH - First bracket only"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 10000
      tax_year: 2024
    expected:
      income_tax: 1000  # 10000 * 10%
    reference: "26 USC 1(j)(2) - 10% bracket"

  - name: "HOH - Multiple brackets $75,000"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 75000
      tax_year: 2024
    expected:
      income_tax: 11144  # Based on 2024 brackets
    reference: "26 USC 1(j)(2) - 10%, 12%, 22% brackets"

  # ========== MARRIED FILING SEPARATELY TESTS ==========
  - name: "MFS - No income"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 0
      tax_year: 2024
    expected:
      income_tax: 0
    reference: "26 USC 1(d), 1(j)(4)"

  - name: "MFS - Multiple brackets $75,000"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 75000
      tax_year: 2024
    expected:
      income_tax: 12789  # Based on 2024 brackets
    reference: "26 USC 1(j)(4) - 10%, 12%, 22% brackets"

  # Critical difference: MFS has lower top bracket threshold
  - name: "MFS - At top bracket threshold"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 383900  # 2024 inflation-adjusted
      tax_year: 2024
    expected:
      income_tax: 110190  # Should hit 37% bracket
    reference: "26 USC 1(j)(4) - Top bracket threshold"

  # ========== ESTATES AND TRUSTS TESTS ==========
  - name: "Estate - No income"
    inputs:
      filing_status: ESTATE_TRUST
      taxable_income: 0
      tax_year: 2024
    expected:
      income_tax: 0
    reference: "26 USC 1(e), 1(j)(5)"

  - name: "Estate - First bracket only"
    inputs:
      filing_status: ESTATE_TRUST
      taxable_income: 2000
      tax_year: 2024
    expected:
      income_tax: 200  # 2000 * 10%
    reference: "26 USC 1(j)(5) - 10% bracket"

  - name: "Estate - High bracket $25,000"
    inputs:
      filing_status: ESTATE_TRUST
      taxable_income: 25000
      tax_year: 2024
    expected:
      income_tax: 7630  # Rapidly escalating rates
    reference: "26 USC 1(j)(5) - Compressed brackets"

  # ========== EDGE CASE TESTS ==========
  # Test bracket boundaries precisely
  - name: "Single - Just below 12% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 11599  # 2024 threshold minus $1
      tax_year: 2024
    expected:
      income_tax: 1160  # Still in 10% bracket
    reference: "26 USC 1(j)(3) - Bracket boundary test"

  - name: "Single - Just into 12% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 11601  # 2024 threshold plus $1
      tax_year: 2024
    expected:
      income_tax: 1160  # 11600 * 10% + 1 * 12% = 1160.12
    reference: "26 USC 1(j)(3) - Bracket boundary test"

  # Test pre-TCJA should return zero
  - name: "Pre-TCJA year should return zero"
    inputs:
      filing_status: SINGLE
      taxable_income: 50000
      tax_year: 2017
    expected:
      income_tax: 0  # Encoding only handles 2018+
    reference: "26 USC 1(j) - Only applies after 2017"

  # ========== CAPITAL GAINS TESTS ==========
  # These test the interaction with ordinary income
  - name: "Single - With capital gains (low income)"
    inputs:
      filing_status: SINGLE
      taxable_income: 25000
      ordinary_income: 20000
      net_capital_gain: 5000
      tax_year: 2024
    expected:
      income_tax: 2000  # 20k ordinary + 0% CG rate
      capital_gains_tax: 0
    reference: "26 USC 1(h)(1)(B) - 0% capital gains rate"

  - name: "Single - With capital gains (middle income)"
    inputs:
      filing_status: SINGLE
      taxable_income: 75000
      ordinary_income: 50000
      net_capital_gain: 25000
      tax_year: 2024
    expected:
      income_tax: 6617  # Ordinary income tax
      capital_gains_tax: 3750  # 25k * 15%
    reference: "26 USC 1(h)(1)(C) - 15% capital gains rate"

  - name: "Single - With capital gains (high income)"
    inputs:
      filing_status: SINGLE
      taxable_income: 600000
      ordinary_income: 500000
      net_capital_gain: 100000
      tax_year: 2024
    expected:
      income_tax: 153239  # Ordinary income tax
      capital_gains_tax: 20000  # 100k * 20%
    reference: "26 USC 1(h)(1)(D) - 20% capital gains rate"

  # ========== KIDDIE TAX TESTS ==========
  # Test unearned income taxation for children
  - name: "Child under 18 - No kiddie tax (low unearned income)"
    inputs:
      filing_status: SINGLE
      taxable_income: 2000
      age: 16
      net_unearned_income: 500
      tax_year: 2024
    expected:
      income_tax: 200  # Normal child rates
      kiddie_tax_adjustment: 0
    reference: "26 USC 1(g)(4) - Below net unearned income threshold"

  - name: "Child under 18 - Kiddie tax applies"
    inputs:
      filing_status: SINGLE
      taxable_income: 15000
      age: 16
      net_unearned_income: 10000
      parent_taxable_income: 200000
      tax_year: 2024
    expected:
      income_tax: 500  # Earned income portion at child rates
      kiddie_tax_adjustment: 2200  # Unearned income at parent rates
    reference: "26 USC 1(g)(1) - Kiddie tax calculation"

  # ========== INFLATION ADJUSTMENT TESTS ==========
  # Test that 2024 uses inflated brackets vs 2018
  - name: "Inflation adjustment - 2018 vs 2024 comparison"
    inputs:
      filing_status: SINGLE
      taxable_income: 50000
      tax_year: 2018
    expected:
      income_tax: 6790  # 2018 brackets
    reference: "26 USC 1(f) - No inflation adjustment for 2018"

  - name: "Inflation adjustment - 2024 brackets"
    inputs:
      filing_status: SINGLE
      taxable_income: 50000
      tax_year: 2024
    expected:
      income_tax: 6617  # 2024 inflated brackets (should be lower due to bracket expansion)
    reference: "26 USC 1(f) - Inflation-adjusted brackets"

# Test Coverage Summary:
# - All filing statuses: Single, MFJ, HOH, MFS, Estate/Trust
# - All tax brackets: 10%, 12%, 22%, 24%, 32%, 35%, 37%
# - Boundary conditions: Zero income, bracket thresholds
# - Special provisions: Capital gains, kiddie tax, inflation adjustment
# - Edge cases: Pre-TCJA years, high incomes
# - Total test cases: 35