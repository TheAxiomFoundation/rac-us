# 26 USC Section 1 - Income Tax Bracket Tests
#
# Test cases for validating income tax bracket calculations.
# Uses 2024 tax year thresholds from Rev. Proc. 2023-34.
#
# 2024 Single Filer Brackets:
#   10%: $0 - $11,600
#   12%: $11,600 - $47,150
#   22%: $47,150 - $100,525
#   24%: $100,525 - $191,950
#   32%: $191,950 - $243,725
#   35%: $243,725 - $609,350
#   37%: Over $609,350
#
# 2024 Joint Filer Brackets:
#   10%: $0 - $23,200
#   12%: $23,200 - $94,300
#   22%: $94,300 - $201,050
#   24%: $201,050 - $383,900
#   32%: $383,900 - $487,450
#   35%: $487,450 - $731,200
#   37%: Over $731,200

reference: "26 USC Section 1"
tax_year: 2024

tests:
  # ==========================================================================
  # SINGLE FILER TESTS
  # ==========================================================================

  # Test 1: Single filer in 10% bracket only
  - name: "Single filer - 10% bracket only"
    inputs:
      filing_status: SINGLE
      taxable_income: 10000
    expected:
      income_tax_before_credits: 1000
    notes: "All income taxed at 10%: $10,000 * 0.10 = $1,000"

  # Test 2: Single filer at 10% bracket boundary
  - name: "Single filer - at 10%/12% boundary"
    inputs:
      filing_status: SINGLE
      taxable_income: 11600
    expected:
      income_tax_before_credits: 1160
    notes: "All income taxed at 10%: $11,600 * 0.10 = $1,160"

  # Test 3: Single filer spanning 10% and 12% brackets
  - name: "Single filer - 10% and 12% brackets"
    inputs:
      filing_status: SINGLE
      taxable_income: 25000
    expected:
      # 10% on first $11,600 = $1,160
      # 12% on remaining $13,400 = $1,608
      # Total = $2,768
      income_tax_before_credits: 2768
    notes: "$1,160 (10% on $11,600) + $1,608 (12% on $13,400) = $2,768"

  # Test 4: Single filer at 12%/22% boundary
  - name: "Single filer - at 12%/22% boundary"
    inputs:
      filing_status: SINGLE
      taxable_income: 47150
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # Total = $5,426
      income_tax_before_credits: 5426
    notes: "Exactly at 22% threshold"

  # Test 5: Single filer in 22% bracket
  - name: "Single filer - 22% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 75000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 ($47,150 - $11,600) = $4,266
      # 22% on $27,850 ($75,000 - $47,150) = $6,127
      # Total = $11,553
      income_tax_before_credits: 11553
    notes: "10% + 12% + 22% brackets"

  # Test 6: Single filer at $100,000
  - name: "Single filer - $100,000 income"
    inputs:
      filing_status: SINGLE
      taxable_income: 100000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $52,850 = $11,627
      # Total = $17,053
      income_tax_before_credits: 17053
    notes: "Common income level test"

  # Test 7: Single filer in 24% bracket
  - name: "Single filer - 24% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 150000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $53,375 ($100,525 - $47,150) = $11,742.50
      # 24% on $49,475 ($150,000 - $100,525) = $11,874
      # Total = $29,042.50 (rounds to $29,043)
      income_tax_before_credits: 29042.50
    notes: "Income spans into 24% bracket"

  # Test 8: Single filer in 32% bracket
  - name: "Single filer - 32% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 200000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $53,375 = $11,742.50
      # 24% on $91,425 ($191,950 - $100,525) = $21,942
      # 32% on $8,050 ($200,000 - $191,950) = $2,576
      # Total = $41,686.50
      income_tax_before_credits: 41686.50
    notes: "Income in 32% bracket"

  # Test 9: Single filer in 35% bracket
  - name: "Single filer - 35% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 300000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $53,375 = $11,742.50
      # 24% on $91,425 = $21,942
      # 32% on $51,775 ($243,725 - $191,950) = $16,568
      # 35% on $56,275 ($300,000 - $243,725) = $19,696.25
      # Total = $75,374.75
      income_tax_before_credits: 75374.75
    notes: "High income in 35% bracket"

  # Test 10: Single filer in 37% bracket
  - name: "Single filer - 37% bracket (highest)"
    inputs:
      filing_status: SINGLE
      taxable_income: 700000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $53,375 = $11,742.50
      # 24% on $91,425 = $21,942
      # 32% on $51,775 = $16,568
      # 35% on $365,625 ($609,350 - $243,725) = $127,968.75
      # 37% on $90,650 ($700,000 - $609,350) = $33,540.50
      # Total = $217,187.75
      income_tax_before_credits: 217187.75
    notes: "Very high income in top bracket"

  # ==========================================================================
  # MARRIED FILING JOINTLY TESTS
  # ==========================================================================

  # Test 11: Joint filers - 10% bracket only
  - name: "Joint filers - 10% bracket only"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 20000
    expected:
      income_tax_before_credits: 2000
    notes: "All income taxed at 10%"

  # Test 12: Joint filers - at 10%/12% boundary
  - name: "Joint filers - at 10%/12% boundary"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 23200
    expected:
      income_tax_before_credits: 2320
    notes: "Exactly at 12% threshold"

  # Test 13: Joint filers - $100,000 income
  - name: "Joint filers - $100,000 income"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 100000
    expected:
      # 10% on $23,200 = $2,320
      # 12% on $71,100 ($94,300 - $23,200) = $8,532
      # 22% on $5,700 ($100,000 - $94,300) = $1,254
      # Total = $12,106
      income_tax_before_credits: 12106
    notes: "Common joint filer income"

  # Test 14: Joint filers - $200,000 income
  - name: "Joint filers - $200,000 income"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 200000
    expected:
      # 10% on $23,200 = $2,320
      # 12% on $71,100 = $8,532
      # 22% on $106,750 ($201,050 - $94,300) = $23,485
      # Total = $34,337 (just under 24% threshold)
      income_tax_before_credits: 34315
    notes: "Just under 24% bracket"

  # Test 15: Joint filers - $400,000 income (32% bracket)
  - name: "Joint filers - $400,000 income"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 400000
    expected:
      # 10% on $23,200 = $2,320
      # 12% on $71,100 = $8,532
      # 22% on $106,750 = $23,485
      # 24% on $182,850 ($383,900 - $201,050) = $43,884
      # 32% on $16,100 ($400,000 - $383,900) = $5,152
      # Total = $83,373
      income_tax_before_credits: 83373
    notes: "High joint income in 32% bracket"

  # Test 16: Joint filers - $800,000 income (37% bracket)
  - name: "Joint filers - $800,000 income (top bracket)"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 800000
    expected:
      # 10% on $23,200 = $2,320
      # 12% on $71,100 = $8,532
      # 22% on $106,750 = $23,485
      # 24% on $182,850 = $43,884
      # 32% on $103,550 ($487,450 - $383,900) = $33,136
      # 35% on $243,750 ($731,200 - $487,450) = $85,312.50
      # 37% on $68,800 ($800,000 - $731,200) = $25,456
      # Total = $222,125.50
      income_tax_before_credits: 222125.50
    notes: "Very high joint income"

  # ==========================================================================
  # HEAD OF HOUSEHOLD TESTS
  # ==========================================================================

  # Test 17: HoH - $50,000 income
  - name: "Head of Household - $50,000 income"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 50000
    expected:
      # 10% on $16,550 = $1,655
      # 12% on $33,450 ($50,000 - $16,550) = $4,014
      # Total = $5,669
      income_tax_before_credits: 5669
    notes: "Common HoH income in 12% bracket"

  # Test 18: HoH - $100,000 income
  - name: "Head of Household - $100,000 income"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 100000
    expected:
      # 10% on $16,550 = $1,655
      # 12% on $46,550 ($63,100 - $16,550) = $5,586
      # 22% on $36,900 ($100,000 - $63,100) = $8,118
      # Total = $15,359
      income_tax_before_credits: 15359
    notes: "HoH in 22% bracket"

  # ==========================================================================
  # MARRIED FILING SEPARATELY TESTS
  # ==========================================================================

  # Test 19: MFS - $50,000 income
  - name: "Married Filing Separately - $50,000 income"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 50000
    expected:
      # Same as single filer brackets
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $2,850 = $627
      # Total = $6,053
      income_tax_before_credits: 6053
    notes: "MFS uses same brackets as single (up to 37%)"

  # Test 20: MFS - $400,000 income (37% bracket starts at $365,600)
  - name: "Married Filing Separately - $400,000 income"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 400000
    expected:
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $53,375 = $11,742.50
      # 24% on $91,425 = $21,942
      # 32% on $51,775 = $16,568
      # 35% on $121,875 ($365,600 - $243,725) = $42,656.25
      # 37% on $34,400 ($400,000 - $365,600) = $12,728
      # Total = $111,062.75
      income_tax_before_credits: 111062.75
    notes: "MFS 37% bracket starts at half of joint ($365,600)"

  # ==========================================================================
  # SURVIVING SPOUSE / QUALIFYING WIDOW(ER) TESTS
  # ==========================================================================

  # Test 21: Surviving Spouse - $100,000 income
  - name: "Surviving Spouse - $100,000 income"
    inputs:
      filing_status: QUALIFYING_WIDOW
      taxable_income: 100000
    expected:
      # Same as joint filer brackets
      # 10% on $23,200 = $2,320
      # 12% on $71,100 = $8,532
      # 22% on $5,700 = $1,254
      # Total = $12,106
      income_tax_before_credits: 12106
    notes: "Surviving spouse uses joint filer brackets"

  # ==========================================================================
  # EDGE CASES
  # ==========================================================================

  # Test 22: Zero taxable income
  - name: "Zero taxable income"
    inputs:
      filing_status: SINGLE
      taxable_income: 0
    expected:
      income_tax_before_credits: 0
    notes: "No tax on zero income"

  # Test 23: Very small taxable income
  - name: "Very small taxable income ($100)"
    inputs:
      filing_status: SINGLE
      taxable_income: 100
    expected:
      income_tax_before_credits: 10
    notes: "$100 * 10% = $10"

  # Test 24: Exactly at each bracket boundary (single)
  - name: "Exact bracket boundaries - single"
    inputs:
      filing_status: SINGLE
      taxable_income: 609350
    expected:
      # This is exactly where 37% bracket starts
      # 10% on $11,600 = $1,160
      # 12% on $35,550 = $4,266
      # 22% on $53,375 = $11,742.50
      # 24% on $91,425 = $21,942
      # 32% on $51,775 = $16,568
      # 35% on $365,625 = $127,968.75
      # Total = $183,647.25
      income_tax_before_credits: 183647.25
    notes: "Exactly at 37% threshold"

  # Test 25: $1 million income (single)
  - name: "Single filer - $1 million income"
    inputs:
      filing_status: SINGLE
      taxable_income: 1000000
    expected:
      # Tax at $609,350 (from Test 24) = $183,647.25
      # 37% on $390,650 ($1,000,000 - $609,350) = $144,540.50
      # Total = $328,187.75
      income_tax_before_credits: 328187.75
    notes: "Millionaire tax calculation"
