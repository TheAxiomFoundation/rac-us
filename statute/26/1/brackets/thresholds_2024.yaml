# 26 USC Section 1(a)-(d), (j) - Income Tax Rate Brackets for Tax Year 2024
#
# These thresholds are adjusted for inflation per Section 1(f) using C-CPI-U.
# Published in Rev. Proc. 2023-34 (IRS, November 9, 2023).
#
# Brackets apply to ordinary income (not capital gains/qualified dividends).

reference: "26 USC Section 1(a)-(d), (j); Rev. Proc. 2023-34"
description: Income tax bracket thresholds for tax year 2024

tax_year: 2024

# Section 1(j)(2)(A) - Single (unmarried individuals other than heads of household and surviving spouses)
# Also used for Married Filing Separately (half of joint thresholds)
single:
  0.10: 0        # 10% bracket starts at $0
  0.12: 11600    # 12% bracket starts at $11,600
  0.22: 47150    # 22% bracket starts at $47,150
  0.24: 100525   # 24% bracket starts at $100,525
  0.32: 191950   # 32% bracket starts at $191,950
  0.35: 243725   # 35% bracket starts at $243,725
  0.37: 609350   # 37% bracket starts at $609,350

# Section 1(j)(2)(B) - Married Filing Jointly (and Surviving Spouses)
# Thresholds are generally 2x single, except for 35% and 37% brackets
married_filing_jointly:
  0.10: 0        # 10% bracket starts at $0
  0.12: 23200    # 12% bracket starts at $23,200
  0.22: 94300    # 22% bracket starts at $94,300
  0.24: 201050   # 24% bracket starts at $201,050
  0.32: 383900   # 32% bracket starts at $383,900
  0.35: 487450   # 35% bracket starts at $487,450
  0.37: 731200   # 37% bracket starts at $731,200

# Section 1(j)(2)(C) - Head of Household
head_of_household:
  0.10: 0        # 10% bracket starts at $0
  0.12: 16550    # 12% bracket starts at $16,550
  0.22: 63100    # 22% bracket starts at $63,100
  0.24: 100500   # 24% bracket starts at $100,500
  0.32: 191950   # 32% bracket starts at $191,950
  0.35: 243700   # 35% bracket starts at $243,700
  0.37: 609350   # 37% bracket starts at $609,350

# Section 1(j)(2)(D) - Married Filing Separately
# Generally half of joint filer thresholds
married_filing_separately:
  0.10: 0        # 10% bracket starts at $0
  0.12: 11600    # 12% bracket starts at $11,600
  0.22: 47150    # 22% bracket starts at $47,150
  0.24: 100525   # 24% bracket starts at $100,525
  0.32: 191950   # 32% bracket starts at $191,950
  0.35: 243725   # 35% bracket starts at $243,725
  0.37: 365600   # 37% bracket starts at $365,600 (half of joint)

# Surviving Spouse (Qualifying Widow(er)) - uses same brackets as Married Filing Jointly
# Per Section 1(a), surviving spouses use the same rate schedule as joint filers
surviving_spouse:
  0.10: 0
  0.12: 23200
  0.22: 94300
  0.24: 201050
  0.32: 383900
  0.35: 487450
  0.37: 731200

# Source reference
source:
  publication: "Rev. Proc. 2023-34"
  date: "2023-11-09"
  url: "https://www.irs.gov/pub/irs-drop/rp-23-34.pdf"
  section: "Section 3.01"
