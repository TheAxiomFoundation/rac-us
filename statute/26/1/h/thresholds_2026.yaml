# 26 USC Section 1(h) - Capital Gains Tax Rate Thresholds for Tax Year 2026
#
# These thresholds determine the applicable capital gains tax rate (0%, 15%, or 20%).
# The rate depends on taxable income, not just capital gains amount.
# Thresholds are adjusted for inflation per Section 1(h)(1)(B)-(D).
# Values from IRS IR-2025-XX reflecting OBBBA adjustments.
#
# Note: These thresholds apply to "adjusted net capital gain" and "qualified dividend income."
#
# NOTE: TCJA sunsets after 2025. These values assume continuation of current rate structure.

reference: "26 USC Section 1(h)(1)(B)-(D); IRS IR-2025-XX (OBBBA)"
description: Capital gains tax rate thresholds for tax year 2026

tax_year: 2026

# 0% rate applies up to these thresholds (Section 1(h)(1)(B))
# The 0% rate applies to the extent taxable income is below the threshold
zero_percent_max:
  single: 49800
  married_filing_jointly: 99550
  head_of_household: 66700
  married_filing_separately: 49800
  surviving_spouse: 99550

# 15% rate applies from the 0% threshold up to these thresholds (Section 1(h)(1)(C))
# Above these thresholds, the 20% rate applies (Section 1(h)(1)(D))
fifteen_percent_max:
  single: 549150
  married_filing_jointly: 617900
  head_of_household: 583450
  married_filing_separately: 308950
  surviving_spouse: 617900

# Source reference
source:
  publication: "IRS IR-2025-XX (OBBBA adjustments)"
  date: "2025-TBD"
  url: "https://www.irs.gov/"
  section: "Section 3.10"
  notes: |
    Values assume TCJA extension continues current capital gains rate structure.
    Projected based on inflation adjustment from 2025 values.
