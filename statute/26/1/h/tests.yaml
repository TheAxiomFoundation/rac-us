# 26 USC Section 1(h) - Capital Gains Tax Rate Tests
#
# Test cases for validating capital gains tax calculations.
# Uses 2024 tax year thresholds from Rev. Proc. 2023-34.
#
# 2024 Capital Gains Rate Thresholds:
#
# Single Filer:
#   0% rate: $0 - $47,025 (taxable income)
#   15% rate: $47,025 - $518,900
#   20% rate: Over $518,900
#
# Married Filing Jointly:
#   0% rate: $0 - $94,050 (taxable income)
#   15% rate: $94,050 - $583,750
#   20% rate: Over $583,750
#
# Head of Household:
#   0% rate: $0 - $63,000 (taxable income)
#   15% rate: $63,000 - $551,350
#   20% rate: Over $551,350
#
# Married Filing Separately:
#   0% rate: $0 - $47,025 (taxable income)
#   15% rate: $47,025 - $291,850
#   20% rate: Over $291,850

reference: "26 USC Section 1(h)"
tax_year: 2024

tests:
  # ==========================================================================
  # SINGLE FILER - 0% RATE TESTS
  # ==========================================================================

  # Test 1: Single filer, all capital gains in 0% bracket (no ordinary income)
  - name: "Single - All gains at 0% (no ordinary income)"
    inputs:
      filing_status: SINGLE
      taxable_income: 30000
      net_capital_gain: 30000
    expected:
      capital_gains_taxed_at_zero_pct: 30000
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: |
      Taxable income $30,000 is entirely capital gains.
      All gains fit within 0% bracket (threshold: $47,025).
      Tax = $0.

  # Test 2: Single filer with ordinary income, gains still in 0% bracket
  - name: "Single - Gains at 0% with some ordinary income"
    inputs:
      filing_status: SINGLE
      taxable_income: 40000
      net_capital_gain: 10000
    expected:
      capital_gains_taxed_at_zero_pct: 10000
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: |
      Ordinary income = $40,000 - $10,000 = $30,000.
      Space in 0% bracket = $47,025 - $30,000 = $17,025.
      All $10,000 capital gains fit in 0% bracket.
      Tax = $0.

  # Test 3: Single filer exactly at 0% threshold
  - name: "Single - Gains exactly fill 0% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 47025
      net_capital_gain: 47025
    expected:
      capital_gains_taxed_at_zero_pct: 47025
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: |
      All income is capital gains, exactly filling 0% bracket.
      Tax = $0.

  # ==========================================================================
  # SINGLE FILER - 15% RATE TESTS
  # ==========================================================================

  # Test 4: Single filer with gains spanning 0% and 15% brackets
  - name: "Single - Gains split between 0% and 15%"
    inputs:
      filing_status: SINGLE
      taxable_income: 60000
      net_capital_gain: 60000
    expected:
      capital_gains_taxed_at_zero_pct: 47025
      capital_gains_taxed_at_fifteen_pct: 12975
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $47,025 * 0% + $12,975 * 15% = $1,946.25
      capital_gains_tax: 1946.25
    notes: |
      All income is capital gains.
      $47,025 at 0% = $0
      $12,975 at 15% = $1,946.25
      Total tax = $1,946.25

  # Test 5: Single filer with ordinary income pushing gains into 15%
  - name: "Single - Ordinary income uses 0% space"
    inputs:
      filing_status: SINGLE
      taxable_income: 80000
      net_capital_gain: 40000
    expected:
      capital_gains_taxed_at_zero_pct: 7025
      capital_gains_taxed_at_fifteen_pct: 32975
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $7,025 * 0% + $32,975 * 15% = $4,946.25
      capital_gains_tax: 4946.25
    notes: |
      Ordinary income = $80,000 - $40,000 = $40,000.
      Space in 0% bracket = $47,025 - $40,000 = $7,025.
      $7,025 at 0% = $0
      $32,975 at 15% = $4,946.25
      Total tax = $4,946.25

  # Test 6: Single filer with gains entirely in 15% bracket
  - name: "Single - All gains in 15% bracket"
    inputs:
      filing_status: SINGLE
      taxable_income: 150000
      net_capital_gain: 50000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 50000
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $50,000 * 15% = $7,500
      capital_gains_tax: 7500
    notes: |
      Ordinary income = $150,000 - $50,000 = $100,000.
      Ordinary income exceeds 0% threshold ($47,025).
      All capital gains in 15% bracket.
      Tax = $50,000 * 15% = $7,500

  # ==========================================================================
  # SINGLE FILER - 20% RATE TESTS
  # ==========================================================================

  # Test 7: Single filer with gains spanning 15% and 20% brackets
  - name: "Single - Gains split between 15% and 20%"
    inputs:
      filing_status: SINGLE
      taxable_income: 600000
      net_capital_gain: 200000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 118900
      capital_gains_taxed_at_twenty_pct: 81100
      # Tax = $118,900 * 15% + $81,100 * 20% = $17,835 + $16,220 = $34,055
      capital_gains_tax: 34055
    notes: |
      Ordinary income = $600,000 - $200,000 = $400,000.
      Ordinary income exceeds 0% threshold.
      Space in 15% bracket = $518,900 - $400,000 = $118,900.
      $118,900 at 15% = $17,835
      $81,100 at 20% = $16,220
      Total tax = $34,055

  # Test 8: Single filer with all gains at 20%
  - name: "Single - All gains at 20%"
    inputs:
      filing_status: SINGLE
      taxable_income: 700000
      net_capital_gain: 100000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 100000
      # Tax = $100,000 * 20% = $20,000
      capital_gains_tax: 20000
    notes: |
      Ordinary income = $700,000 - $100,000 = $600,000.
      Ordinary income exceeds 15% threshold ($518,900).
      All capital gains at 20%.
      Tax = $100,000 * 20% = $20,000

  # ==========================================================================
  # MARRIED FILING JOINTLY TESTS
  # ==========================================================================

  # Test 9: Joint filers - all gains at 0%
  - name: "Joint - All gains at 0%"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 80000
      net_capital_gain: 80000
    expected:
      capital_gains_taxed_at_zero_pct: 80000
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: |
      All income is capital gains.
      All gains fit in 0% bracket (threshold: $94,050).
      Tax = $0.

  # Test 10: Joint filers - gains split 0% and 15%
  - name: "Joint - Gains split between 0% and 15%"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 150000
      net_capital_gain: 100000
    expected:
      capital_gains_taxed_at_zero_pct: 44050
      capital_gains_taxed_at_fifteen_pct: 55950
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $44,050 * 0% + $55,950 * 15% = $8,392.50
      capital_gains_tax: 8392.50
    notes: |
      Ordinary income = $150,000 - $100,000 = $50,000.
      Space in 0% bracket = $94,050 - $50,000 = $44,050.
      $44,050 at 0% = $0
      $55,950 at 15% = $8,392.50
      Total tax = $8,392.50

  # Test 11: Joint filers - high income with gains at 20%
  - name: "Joint - Gains split between 15% and 20%"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 700000
      net_capital_gain: 200000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 83750
      capital_gains_taxed_at_twenty_pct: 116250
      # Tax = $83,750 * 15% + $116,250 * 20% = $12,562.50 + $23,250 = $35,812.50
      capital_gains_tax: 35812.50
    notes: |
      Ordinary income = $700,000 - $200,000 = $500,000.
      Ordinary income exceeds 0% threshold ($94,050).
      Space in 15% bracket = $583,750 - $500,000 = $83,750.
      $83,750 at 15% = $12,562.50
      $116,250 at 20% = $23,250
      Total tax = $35,812.50

  # ==========================================================================
  # HEAD OF HOUSEHOLD TESTS
  # ==========================================================================

  # Test 12: Head of Household - gains at 0%
  - name: "HoH - All gains at 0%"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 50000
      net_capital_gain: 30000
    expected:
      capital_gains_taxed_at_zero_pct: 30000
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: |
      Ordinary income = $50,000 - $30,000 = $20,000.
      Space in 0% bracket = $63,000 - $20,000 = $43,000.
      All $30,000 gains in 0% bracket.
      Tax = $0.

  # Test 13: Head of Household - gains split 0%/15%
  - name: "HoH - Gains split between 0% and 15%"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      taxable_income: 100000
      net_capital_gain: 60000
    expected:
      capital_gains_taxed_at_zero_pct: 23000
      capital_gains_taxed_at_fifteen_pct: 37000
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $23,000 * 0% + $37,000 * 15% = $5,550
      capital_gains_tax: 5550
    notes: |
      Ordinary income = $100,000 - $60,000 = $40,000.
      Space in 0% bracket = $63,000 - $40,000 = $23,000.
      $23,000 at 0% = $0
      $37,000 at 15% = $5,550
      Total tax = $5,550

  # ==========================================================================
  # MARRIED FILING SEPARATELY TESTS
  # ==========================================================================

  # Test 14: MFS - gains at 0%
  - name: "MFS - All gains at 0%"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 40000
      net_capital_gain: 40000
    expected:
      capital_gains_taxed_at_zero_pct: 40000
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: |
      All income is capital gains.
      All gains fit in 0% bracket (threshold: $47,025).
      Tax = $0.

  # Test 15: MFS - gains at 20% (lower threshold)
  - name: "MFS - Gains at 20% (lower threshold)"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 350000
      net_capital_gain: 100000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 41850
      capital_gains_taxed_at_twenty_pct: 58150
      # Tax = $41,850 * 15% + $58,150 * 20% = $6,277.50 + $11,630 = $17,907.50
      capital_gains_tax: 17907.50
    notes: |
      Ordinary income = $350,000 - $100,000 = $250,000.
      Ordinary income exceeds 0% threshold ($47,025).
      Space in 15% bracket = $291,850 - $250,000 = $41,850.
      MFS has lower 20% threshold ($291,850 vs $518,900 for single).
      $41,850 at 15% = $6,277.50
      $58,150 at 20% = $11,630
      Total tax = $17,907.50

  # ==========================================================================
  # SURVIVING SPOUSE TESTS
  # ==========================================================================

  # Test 16: Surviving spouse uses joint thresholds
  - name: "Surviving Spouse - Uses joint thresholds"
    inputs:
      filing_status: QUALIFYING_WIDOW
      taxable_income: 100000
      net_capital_gain: 100000
    expected:
      capital_gains_taxed_at_zero_pct: 94050
      capital_gains_taxed_at_fifteen_pct: 5950
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $94,050 * 0% + $5,950 * 15% = $892.50
      capital_gains_tax: 892.50
    notes: |
      All income is capital gains.
      Surviving spouse uses joint thresholds ($94,050 for 0%).
      $94,050 at 0% = $0
      $5,950 at 15% = $892.50
      Total tax = $892.50

  # ==========================================================================
  # EDGE CASES
  # ==========================================================================

  # Test 17: Zero capital gains
  - name: "No capital gains"
    inputs:
      filing_status: SINGLE
      taxable_income: 100000
      net_capital_gain: 0
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: "No capital gains means no capital gains tax."

  # Test 18: Very small capital gains
  - name: "Very small capital gains ($100)"
    inputs:
      filing_status: SINGLE
      taxable_income: 100
      net_capital_gain: 100
    expected:
      capital_gains_taxed_at_zero_pct: 100
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0
    notes: "Small gains entirely in 0% bracket."

  # Test 19: All income is capital gains at exact 15% threshold
  - name: "Single - Exactly at 15%/20% boundary"
    inputs:
      filing_status: SINGLE
      taxable_income: 518900
      net_capital_gain: 518900
    expected:
      capital_gains_taxed_at_zero_pct: 47025
      capital_gains_taxed_at_fifteen_pct: 471875
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $47,025 * 0% + $471,875 * 15% = $70,781.25
      capital_gains_tax: 70781.25
    notes: |
      Exactly at 15%/20% boundary.
      All income is capital gains.
      $47,025 at 0% = $0
      $471,875 at 15% = $70,781.25
      Total tax = $70,781.25

  # Test 20: Single filer, $1 million in capital gains
  - name: "Single - $1 million capital gains"
    inputs:
      filing_status: SINGLE
      taxable_income: 1000000
      net_capital_gain: 1000000
    expected:
      capital_gains_taxed_at_zero_pct: 47025
      capital_gains_taxed_at_fifteen_pct: 471875
      capital_gains_taxed_at_twenty_pct: 481100
      # Tax = $0 + $70,781.25 + $96,220 = $167,001.25
      capital_gains_tax: 167001.25
    notes: |
      All income is capital gains.
      $47,025 at 0% = $0
      $471,875 at 15% = $70,781.25
      $481,100 at 20% = $96,220
      Total tax = $167,001.25

  # Test 21: Joint filers with moderate income and gains
  - name: "Joint - Typical middle-income scenario"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 120000
      net_capital_gain: 20000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 20000
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $20,000 * 15% = $3,000
      capital_gains_tax: 3000
    notes: |
      Ordinary income = $120,000 - $20,000 = $100,000.
      Ordinary income exceeds 0% threshold ($94,050).
      All capital gains in 15% bracket.
      Tax = $20,000 * 15% = $3,000

  # Test 22: Ordinary income leaves partial 0% space
  - name: "Single - Partial 0% space remaining"
    inputs:
      filing_status: SINGLE
      taxable_income: 57025
      net_capital_gain: 25000
    expected:
      capital_gains_taxed_at_zero_pct: 15000
      capital_gains_taxed_at_fifteen_pct: 10000
      capital_gains_taxed_at_twenty_pct: 0
      # Tax = $15,000 * 0% + $10,000 * 15% = $1,500
      capital_gains_tax: 1500
    notes: |
      Ordinary income = $57,025 - $25,000 = $32,025.
      Space in 0% bracket = $47,025 - $32,025 = $15,000.
      $15,000 at 0% = $0
      $10,000 at 15% = $1,500
      Total tax = $1,500

  # Test 23: Very high income, all three brackets
  - name: "Joint - All three rate brackets"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      taxable_income: 800000
      net_capital_gain: 800000
    expected:
      capital_gains_taxed_at_zero_pct: 94050
      capital_gains_taxed_at_fifteen_pct: 489700
      capital_gains_taxed_at_twenty_pct: 216250
      # Tax = $0 + $73,455 + $43,250 = $116,705
      capital_gains_tax: 116705
    notes: |
      All income is capital gains.
      $94,050 at 0% = $0
      $489,700 at 15% = $73,455
      $216,250 at 20% = $43,250
      Total tax = $116,705

  # Test 24: Compare single vs MFS at 20% threshold difference
  - name: "MFS vs Single - Different 20% thresholds"
    description: |
      MFS has a lower 20% threshold ($291,850) than Single ($518,900).
      This test shows how MFS pays more tax on the same capital gains.
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      taxable_income: 400000
      net_capital_gain: 150000
    expected:
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 41850
      capital_gains_taxed_at_twenty_pct: 108150
      # Tax = $41,850 * 15% + $108,150 * 20% = $6,277.50 + $21,630 = $27,907.50
      capital_gains_tax: 27907.50
    notes: |
      Ordinary income = $400,000 - $150,000 = $250,000.
      For Single: 15% bracket goes to $518,900, so all gains at 15%.
      For MFS: 15% bracket ends at $291,850.
      Space in 15% bracket = $291,850 - $250,000 = $41,850.
      $41,850 at 15% = $6,277.50
      $108,150 at 20% = $21,630
      Total tax = $27,907.50
