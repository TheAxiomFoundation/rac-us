# Encoding Metadata for 26 USC Section 1(h) - Maximum Capital Gains Rate

encoding:
  created: 2024-12-24
  updated: 2024-12-24
  status: implemented
  encoded_by: claude-opus-4.5

variable:
  name: capital_gains_tax
  entity: TaxUnit
  period: Year
  dtype: Money

coverage:
  tax_years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    Section 1(h) provides preferential tax rates for net capital gain:
    - 0% rate for gains within lower income bracket
    - 15% rate for gains in middle income bracket
    - 20% rate for gains in highest income bracket

    Rate thresholds are indexed for inflation per Section 1(h)(1).
    The 0% bracket generally aligns with the 10%/12% ordinary income brackets.
    The 20% bracket begins where the 37% ordinary income bracket starts.

sources:
  statute:
    - citation: "26 USC Section 1(h)"
      title: "Maximum capital gains rate"
      path: statute/26/1/h/
      files:
        - capital_gains_tax.cosilico    # Main rate calculation
        - thresholds_2024.yaml          # 2024 indexed thresholds

  guidance:
    - citation: "Rev. Proc. 2023-34"
      title: "Inflation adjustments for TY 2024"
      source: https://www.irs.gov/pub/irs-drop/rp-23-34.pdf
      section: "Section 3.10"
      provides:
        - 2024 capital gains rate thresholds by filing status

    - citation: "Rev. Proc. 2024-40"
      title: "Inflation adjustments for TY 2025"
      source: https://www.irs.gov/pub/irs-drop/rp-24-40.pdf

architecture:
  description: |
    Section 1(h) implements preferential rates for "net capital gain" which
    includes adjusted net capital gain and qualified dividend income.

    Key components:

    1. Section 1(h)(1)(B) - 0% Rate
       - Applies to capital gains within the portion of taxable income
         that would be taxed at 0% or 10% if it were ordinary income
       - For 2024: up to $47,025 (single), $94,050 (joint)

    2. Section 1(h)(1)(C) - 15% Rate
       - Applies to capital gains above the 0% threshold
         but below the 20% threshold
       - For 2024: up to $518,900 (single), $583,750 (joint)

    3. Section 1(h)(1)(D) - 20% Rate
       - Applies to capital gains above the 15% threshold
       - Generally aligns with the 37% ordinary income bracket

    The calculation requires determining how much "space" remains in each
    bracket after accounting for ordinary income.

  key_provisions:
    - provision: "Section 1(h)(1)(B)"
      description: "0% rate for gains in lower bracket"
      variable: capital_gains_taxed_at_zero_pct
      parameters:
        - h/thresholds_2024#zero_percent_max

    - provision: "Section 1(h)(1)(C)"
      description: "15% rate for gains in middle bracket"
      variable: capital_gains_taxed_at_fifteen_pct
      parameters:
        - h/thresholds_2024#fifteen_percent_max

    - provision: "Section 1(h)(1)(D)"
      description: "20% rate for gains above 15% threshold"
      variable: capital_gains_taxed_at_twenty_pct

  dependencies:
    - path: statute/26/1
      description: "Filing status (for threshold selection)"
    - path: statute/26/63/c
      description: "Taxable income (determines bracket space)"
    - path: statute/26/1222/11
      description: "Net capital gain (input)"

  not_implemented:
    - provision: "Section 1(h)(1)(E)"
      description: "25% rate for unrecaptured Section 1250 gain"
      reason: "Requires depreciation recapture tracking"

    - provision: "Section 1(h)(1)(F)"
      description: "28% rate for collectibles gain"
      reason: "Requires collectibles asset classification"

    - provision: "Section 1(h)(4)"
      description: "Net capital gain definition adjustments"
      reason: "Complex carryover calculations"

    - provision: "Section 1(h)(11)"
      description: "Qualified dividend income treatment"
      reason: "Requires separate dividend classification"

validation:
  pe_variable: capital_gains_tax
  taxsim_variable: N/A
  tolerance_dollars: 1
  notes: |
    Validation compares against expected calculations for various
    income levels and filing statuses. Key validation points:
    - 0% rate boundary accuracy
    - 15%/20% rate boundary accuracy
    - Filing status threshold differences
    - Interaction between ordinary income and capital gains brackets

test_files:
  - tests.yaml  # Comprehensive capital gains tax tests
