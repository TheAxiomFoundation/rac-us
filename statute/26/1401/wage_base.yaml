# Social Security Wage Base (Contribution and Benefit Base)
#
# The wage base is the maximum amount of earnings subject to Social Security tax.
# This is set annually per Rev. Proc. and 42 USC 430.
# Self-employment income is subject to SS tax only up to this base, reduced by
# any W-2 wages already subject to payroll tax.

social_security_wage_base:
  description: "Maximum earnings subject to Social Security tax (OASDI)"
  unit: currency-USD
  values:
    # Historical values (subset)
    2020-01-01: 137700
    2021-01-01: 142800
    2022-01-01: 147000
    2023-01-01: 160200
    2024-01-01: 168600
    2025-01-01: 176100
  citations:
    - "Rev. Proc. 2023-34: 2024 wage base is $168,600"
    - "Rev. Proc. 2024-40: 2025 wage base is $176,100"
    - "42 USC 430: Contribution and benefit base formula"
