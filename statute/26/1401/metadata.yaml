# Encoding Metadata for 26 USC 1401 (Self-Employment Tax)

encoding:
  created: 2024-12-24
  updated: 2024-12-24
  status: implemented
  encoded_by: claude-opus-4.5

variable:
  name: self_employment_tax
  entity: Person
  period: Year
  dtype: Money

coverage:
  tax_years: [2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    Self-employment tax consists of two components:
    - OASDI (Social Security): 12.4% on net earnings up to wage base
    - HI (Medicare): 2.9% on all net earnings (no cap)
    - Total combined rate: 15.3%

    Net earnings = 92.35% of gross self-employment income per 1402(a).
    The 92.35% factor accounts for the employer-equivalent portion.

    W-2 wages already subject to payroll tax reduce the Social Security
    wage base available for self-employment income per 1402(b).

    Half of SE tax is deductible per 164(f).

sources:
  statute:
    - citation: "26 USC 1401"
      title: "Tax on Self-Employment Income"
      path: statute/26/1401/
      files:
        - self_employment_tax.cosilico        # Main calculation

    - citation: "26 USC 1402"
      title: "Definitions (Net Earnings)"
      path: statute/26/1402/
      files:
        - a/net_earnings_self_employment.cosilico  # 92.35% adjustment

    - citation: "26 USC 164(f)"
      title: "Deduction for One-Half of SE Taxes"
      path: statute/26/164/f/
      files:
        - se_tax_deduction.cosilico           # 50% deduction

  guidance:
    - citation: "Rev. Proc. 2023-34"
      title: "Inflation adjustments for TY 2024"
      source: https://www.irs.gov/pub/irs-drop/rp-23-34.pdf
      provides:
        - social_security_wage_base: 168600

    - citation: "Rev. Proc. 2024-40"
      title: "Inflation adjustments for TY 2025"
      source: https://www.irs.gov/pub/irs-drop/rp-24-40.pdf
      provides:
        - social_security_wage_base: 176100

architecture:
  description: |
    The Self-Employment Tax encoding follows the statute structure:

    1. 1401(a) - OASDI (Social Security) Tax
       - 12.4% rate on net SE earnings
       - Capped at Social Security wage base
       - a/oasdi_rate.yaml

    2. 1401(b) - HI (Medicare) Tax
       - 2.9% rate on net SE earnings
       - No wage base cap
       - b/hi_rate.yaml

    3. 1402(a) - Net Earnings Definition
       - 92.35% of gross self-employment income
       - PolicyEngine's taxable_self_employment_income includes this adjustment

    4. 1402(b) - Coordination with W-2 Wages
       - W-2 wages subject to SS reduce available wage base
       - social_security_cap_remaining variable

    5. 164(f) - SE Tax Deduction
       - One-half of SE tax is deductible above-the-line
       - Reduces AGI

  key_provisions:
    - provision: "1401(a)"
      description: "OASDI tax rate"
      variable: self_employment_social_security_tax
      parameters:
        - a/oasdi_rate#oasdi_rate

    - provision: "1401(b)"
      description: "HI tax rate"
      variable: self_employment_medicare_tax
      parameters:
        - b/hi_rate#hi_rate

    - provision: "1401 combined"
      description: "Total self-employment tax"
      variable: self_employment_tax
      parameters:
        - wage_base#social_security_wage_base

    - provision: "164(f)"
      description: "SE tax deduction"
      variable: se_tax_deduction
      parameters: []

  dependencies:
    - path: statute/26/1402/a
      description: "Net earnings from self-employment"
    - path: statute/26/164/f
      description: "SE tax deduction (50%)"

test_files:
  - tests.yaml  # Comprehensive test cases
