# Tests for 26 USC Section 63(d) - Itemized Deductions

variable: itemized_taxable_income_deductions
tax_year: 2024

test_cases:
  # ==========================================================================
  # Individual Components
  # ==========================================================================

  - name: "Medical expenses only"
    description: "Itemizing with only medical expenses"
    inputs:
      filing_status: single
      adjusted_gross_income: 50000
      medical_expenses: 10000
    expected:
      # Medical: $10,000 - (7.5% * $50,000) = $10,000 - $3,750 = $6,250
      medical_expense_deduction: 6250
      itemized_taxable_income_deductions: 6250
    citations:
      - "26 USC 63(d): itemized deductions defined"
      - "26 USC 213(a): 7.5% floor"

  - name: "Mortgage interest only"
    description: "Itemizing with only mortgage interest"
    inputs:
      filing_status: joint
      adjusted_gross_income: 100000
      mortgage_interest: 15000
      acquisition_debt_amount: 500000
    expected:
      interest_deduction: 15000
      itemized_taxable_income_deductions: 15000
    citations:
      - "26 USC 163(h): qualified residence interest"

  - name: "Charitable contributions only"
    description: "Itemizing with only charitable donations"
    inputs:
      filing_status: single
      adjusted_gross_income: 80000
      charitable_cash_donations: 12000
    expected:
      charitable_deduction: 12000
      itemized_taxable_income_deductions: 12000
    citations:
      - "26 USC 170(a): charitable deduction"

  # ==========================================================================
  # Combined Itemized Deductions
  # ==========================================================================

  - name: "All major itemized deductions"
    description: "Taxpayer with medical, mortgage, SALT, and charitable"
    inputs:
      filing_status: joint
      adjusted_gross_income: 150000
      medical_expenses: 20000      # -> $20K - 7.5%*$150K = $8,750
      mortgage_interest: 18000     # -> $18,000 (under limit)
      salt_taxes_paid: 15000       # -> $10,000 (SALT cap)
      charitable_cash_donations: 10000  # -> $10,000
    expected:
      medical_expense_deduction: 8750   # $20K - $11,250
      interest_deduction: 18000
      salt_deduction: 10000             # Capped at $10K
      charitable_deduction: 10000
      itemized_taxable_income_deductions: 46750
    citations:
      - "26 USC 63(d)"
      - "Schedule A components"

  - name: "High-income itemizer"
    description: "High earner with significant deductions"
    inputs:
      filing_status: joint
      adjusted_gross_income: 500000
      medical_expenses: 50000      # -> $50K - 7.5%*$500K = $12,500
      mortgage_interest: 35000     # -> $35K (large mortgage but under limit)
      acquisition_debt_amount: 700000
      salt_taxes_paid: 50000       # -> $10,000 (capped)
      charitable_cash_donations: 150000  # -> $150K (under 60% = $300K)
    expected:
      medical_expense_deduction: 12500
      interest_deduction: 35000
      salt_deduction: 10000
      charitable_deduction: 150000
      itemized_taxable_income_deductions: 207500
    citations:
      - "26 USC 63(d)"

  - name: "Modest itemizer"
    description: "Moderate income with modest itemized deductions"
    inputs:
      filing_status: single
      adjusted_gross_income: 75000
      mortgage_interest: 8000
      acquisition_debt_amount: 300000
      salt_taxes_paid: 6000
      charitable_cash_donations: 2000
    expected:
      interest_deduction: 8000
      salt_deduction: 6000
      charitable_deduction: 2000
      itemized_taxable_income_deductions: 16000
    citations:
      - "26 USC 63(d)"

  # ==========================================================================
  # Standard vs Itemized Decision
  # ==========================================================================

  - name: "Itemized exceeds standard (single)"
    description: "Itemizing is beneficial"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      mortgage_interest: 12000
      salt_taxes_paid: 8000
      charitable_cash_donations: 3000
    expected:
      itemized_taxable_income_deductions: 23000  # $12K + $8K + $3K
      standard_deduction: 14600
      uses_standard_deduction: false
      taxable_income_deductions: 23000  # Itemized wins
    citations:
      - "26 USC 63(e): election to itemize"

  - name: "Standard exceeds itemized (single)"
    description: "Standard deduction is beneficial"
    inputs:
      filing_status: single
      adjusted_gross_income: 60000
      mortgage_interest: 5000
      salt_taxes_paid: 3000
      charitable_cash_donations: 1000
    expected:
      itemized_taxable_income_deductions: 9000   # $5K + $3K + $1K
      standard_deduction: 14600
      uses_standard_deduction: true
      taxable_income_deductions: 14600  # Standard wins
    citations:
      - "26 USC 63(b): individuals who do not itemize"

  - name: "Itemized exceeds standard (joint)"
    description: "Married couple benefits from itemizing"
    inputs:
      filing_status: joint
      adjusted_gross_income: 200000
      mortgage_interest: 20000
      salt_taxes_paid: 10000
      charitable_cash_donations: 8000
    expected:
      itemized_taxable_income_deductions: 38000  # $20K + $10K + $8K
      standard_deduction: 29200
      uses_standard_deduction: false
      taxable_income_deductions: 38000
    citations:
      - "26 USC 63(e)"

  # ==========================================================================
  # Edge Cases
  # ==========================================================================

  - name: "Zero itemized deductions"
    description: "No qualifying itemized deductions"
    inputs:
      filing_status: single
      adjusted_gross_income: 50000
      mortgage_interest: 0
      salt_taxes_paid: 0
      charitable_cash_donations: 0
      medical_expenses: 0
    expected:
      itemized_taxable_income_deductions: 0
      uses_standard_deduction: true
      taxable_income_deductions: 14600

  - name: "MFS spouse itemizes (must itemize)"
    description: "Must itemize if MFS spouse itemizes"
    inputs:
      filing_status: married_separate
      adjusted_gross_income: 80000
      mortgage_interest: 5000
      salt_taxes_paid: 3000
      spouse_itemizes: true
    expected:
      # Standard deduction = 0 (ineligible)
      standard_deduction: 0
      itemized_taxable_income_deductions: 8000
      uses_standard_deduction: false
      taxable_income_deductions: 8000  # Must use itemized
    citations:
      - "26 USC 63(c)(6)(A): MFS must itemize if spouse does"
