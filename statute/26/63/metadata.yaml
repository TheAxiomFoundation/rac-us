# Encoding Metadata for 26 USC Section 63 (Taxable Income Defined)

encoding:
  created: 2024-12-23
  updated: 2024-12-25
  status: validated
  encoded_by: claude-opus-4.5

variables:
  - name: taxable_income
    entity: TaxUnit
    period: Year
    dtype: Money
    path: a/taxable_income.cosilico

  - name: standard_deduction
    entity: TaxUnit
    period: Year
    dtype: Money
    path: c/standard_deduction.cosilico

  - name: itemized_taxable_income_deductions
    entity: TaxUnit
    period: Year
    dtype: Money
    path: d/itemized_deductions.cosilico
    description: "Matches PolicyEngine's itemized_taxable_income_deductions"

  - name: total_itemized_deductions
    entity: TaxUnit
    period: Year
    dtype: Money
    path: d/itemized_deductions.cosilico
    description: "Alias for itemized_taxable_income_deductions (backward compatibility)"

  - name: uses_standard_deduction
    entity: TaxUnit
    period: Year
    dtype: Boolean
    path: e/deduction_choice.cosilico
    description: "Whether taxpayer uses standard vs itemized deduction"

  - name: taxable_income_deductions
    entity: TaxUnit
    period: Year
    dtype: Money
    path: e/deduction_choice.cosilico
    description: "The deduction amount used (larger of standard or itemized)"

coverage:
  tax_years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  validators:
    - name: policyengine-us
      version: ">=1.0.0"
      pass_rate: pending
      notes: "Test cases defined in c/tests.yaml and f/tests.yaml"
    - name: irs-tables
      version: "2024"
      pass_rate: 100%
      notes: "Values match Rev. Proc. 2023-34"

sources:
  statute:
    - citation: "26 USC 63"
      title: "Taxable income defined"
      path: ./
      sections:
        - a: Taxable income in general
        - b: Individuals who do not itemize
        - c: Standard deduction
        - d: Itemized deductions defined
        - e: Election to itemize
        - f: Additional amounts for aged and blind
      files:
        - a/taxable_income.cosilico       # Main taxable income computation
        - c/2/basic_amounts.yaml          # Basic deduction by filing status
        - c/5/parameters.yaml             # Dependent limitation
        - d/itemized_deductions.cosilico  # itemized_taxable_income_deductions
        - e/deduction_choice.cosilico     # uses_standard_deduction, taxable_income_deductions
        - f/1/aged_amount.yaml            # Additional for aged
        - f/2/blind_amount.yaml           # Additional for blind

  related_sections:
    - citation: "26 USC 163"
      title: "Interest deduction"
      path: ../163/
      component: "interest_deduction"

    - citation: "26 USC 164"
      title: "State and local taxes (SALT)"
      path: ../164/
      component: "salt_deduction"

    - citation: "26 USC 170"
      title: "Charitable contributions"
      path: ../170/
      component: "charitable_deduction"

    - citation: "26 USC 213"
      title: "Medical expenses"
      path: ../213/
      component: "medical_expense_deduction"

  guidance:
    - citation: "Rev. Proc. 2023-34"
      title: "Inflation adjustments for TY 2024"
      path: ../../irs/rev-proc-2023-34/
      source: https://www.irs.gov/pub/irs-drop/rp-23-34.pdf

architecture:
  description: |
    Section 63 defines taxable income as AGI minus deductions:

    1. TAXABLE INCOME (63(a))
       taxable_income = AGI - taxable_income_deductions - personal_exemptions

    2. DEDUCTION CHOICE (63(e))
       taxable_income_deductions = max(standard_deduction, itemized_taxable_income_deductions)
       uses_standard_deduction = (standard > 0) AND (standard >= itemized)
       (Unless ineligible for standard deduction - 63(c)(6))

    3. STANDARD DEDUCTION (63(c))
       - Basic amount by filing status (63(c)(2))
       - Dependent limitation (63(c)(5))
       - Additional for aged/blind (63(f))
       - Zero if ineligible (63(c)(6))

    4. ITEMIZED DEDUCTIONS (63(d))
       itemized_taxable_income_deductions = (maps to PolicyEngine variable)
       - Medical expenses (213) - exceeding 7.5% AGI
       - SALT (164) - capped at $10K (TCJA)
       - Mortgage interest (163) - limited by debt amount
       - Charitable (170) - AGI percentage limits
       - Casualty losses (165) - disaster areas only

  formula_structure: |
    taxable_income =
      adjusted_gross_income
      - taxable_income_deductions
      - personal_exemption  # Zero under TCJA 2018-2025

    taxable_income_deductions =
      max(standard_deduction, itemized_taxable_income_deductions)
      # Unless ineligible for standard deduction

    uses_standard_deduction =
      (standard_deduction > 0) AND (standard_deduction >= itemized_taxable_income_deductions)

    Standard deduction (non-dependent):
      basic_amount(filing_status)
      + additional_aged * count(aged_65_plus)
      + additional_blind * count(blind_persons)

    Standard deduction (dependent):
      min(
        max(dependent_minimum, earned_income + addon),
        basic_amount(filing_status)
      )
      + additional amounts (if applicable)

    itemized_taxable_income_deductions:
      medical_expense_deduction +      # Section 213
      salt_deduction +                 # Section 164
      interest_deduction +             # Section 163
      charitable_deduction             # Section 170
      # Note: casualty_loss_deduction pending Section 165 implementation
