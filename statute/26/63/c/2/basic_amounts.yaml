# 26 USC § 63(c)(2) - Basic Standard Deduction Amounts
#
# "(A) 200 percent of the dollar amount in effect under subparagraph (C)
#      for the taxable year in the case of—
#      (i) a joint return, or
#      (ii) a surviving spouse...
#  (B) $4,400 in the case of a head of household...
#  (C) $3,000 in any other case."
# (Amounts indexed for inflation and modified by TCJA § 11021)

basic_joint:
  description: "Standard deduction for joint filers"
  unit: currency-USD
  indexing:
    method: cpi-u
    base_year: 2017
    round_to: 50
