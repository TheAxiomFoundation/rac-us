# 26 USC § 25A - Education Credits Tests
#
# Test cases for validating education credit implementation against known values.
# Uses 2024 tax year parameters.
#
# Key 2024 parameters:
# - AOC: $2,500 max per student (100% of first $2k + 25% of next $2k)
# - AOC: 40% refundable ($1,000 max), 60% nonrefundable ($1,500 max)
# - LLC: $2,000 max per return (20% of up to $10,000 expenses)
# - LLC: 100% nonrefundable
# - AOC phase-out: $80,000-$90,000 single, $160,000-$180,000 joint
# - LLC phase-out: $80,000-$90,000 single, $160,000-$180,000 joint

reference: "26 USC § 25A"
tax_year: 2024

tests:
  # ==========================================================================
  # AMERICAN OPPORTUNITY CREDIT (AOC) TESTS
  # ==========================================================================

  # Test 1: AOC full credit, no phaseout, sufficient tax liability
  - name: "AOC - Full credit, below phaseout threshold"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 50000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 5000
    expected:
      # 100% of first $2,000 = $2,000
      # 25% of next $2,000 = $500
      # Total = $2,500
      american_opportunity_credit: 2500
      aoc_refundable_amount: 1000   # 40% of $2,500
      aoc_nonrefundable_amount: 1500  # 60% of $2,500
      education_credit: 2500
    notes: "Full AOC of $2,500 with $4,000+ expenses"

  # Test 2: AOC partial expenses (only first tier)
  - name: "AOC - Partial expenses, first tier only"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 40000
      num_aoc_students: 1
      aoc_qualified_expenses: 1500
      tax_liability_before_credits: 3000
    expected:
      # 100% of $1,500 = $1,500 (no second tier)
      american_opportunity_credit: 1500
      aoc_refundable_amount: 600    # 40% of $1,500
      aoc_nonrefundable_amount: 900  # 60% of $1,500
      education_credit: 1500
    notes: "Only first tier expenses"

  # Test 3: AOC partial expenses (both tiers)
  - name: "AOC - Partial expenses, both tiers"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 40000
      num_aoc_students: 1
      aoc_qualified_expenses: 3000
      tax_liability_before_credits: 3000
    expected:
      # 100% of $2,000 = $2,000
      # 25% of $1,000 = $250
      # Total = $2,250
      american_opportunity_credit: 2250
      aoc_refundable_amount: 900    # 40% of $2,250
      aoc_nonrefundable_amount: 1350  # 60% of $2,250
      education_credit: 2250
    notes: "Expenses span both tiers"

  # Test 4: AOC at phaseout threshold (single)
  - name: "AOC - At phaseout threshold (single)"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 80000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 10000
    expected:
      # At threshold, no reduction yet
      american_opportunity_credit: 2500
      aoc_refundable_amount: 1000
      aoc_nonrefundable_amount: 1500
      education_credit: 2500
    notes: "At $80,000 threshold, full credit still available"

  # Test 5: AOC mid-phaseout (single)
  - name: "AOC - Mid-phaseout (single)"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 85000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 10000
    expected:
      # $5,000 over $80,000 threshold = 50% reduction
      # $2,500 * (1 - 0.50) = $1,250
      american_opportunity_credit: 1250
      aoc_refundable_amount: 500   # 40% of $1,250
      aoc_nonrefundable_amount: 750  # 60% of $1,250
      education_credit: 1250
    notes: "50% phaseout: $85k is halfway through $80k-$90k range"

  # Test 6: AOC fully phased out (single)
  - name: "AOC - Fully phased out (single)"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 95000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 15000
    expected:
      american_opportunity_credit: 0
      aoc_refundable_amount: 0
      aoc_nonrefundable_amount: 0
      education_credit: 0
    notes: "Above $90,000, credit fully phased out"

  # Test 7: AOC joint filers, below phaseout
  - name: "AOC - Joint filers, full credit"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 100000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 10000
    expected:
      american_opportunity_credit: 2500
      aoc_refundable_amount: 1000
      aoc_nonrefundable_amount: 1500
      education_credit: 2500
    notes: "Joint threshold is $160,000"

  # Test 8: AOC joint filers, mid-phaseout
  - name: "AOC - Joint filers, mid-phaseout"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 170000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 20000
    expected:
      # $10,000 over $160,000 threshold = 50% reduction
      # $2,500 * (1 - 0.50) = $1,250
      american_opportunity_credit: 1250
      aoc_refundable_amount: 500
      aoc_nonrefundable_amount: 750
      education_credit: 1250
    notes: "Joint filers at 50% phaseout"

  # Test 9: AOC multiple students
  - name: "AOC - Multiple students"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 100000
      num_aoc_students: 2
      students:
        - aoc_qualified_expenses: 4000
        - aoc_qualified_expenses: 4000
      tax_liability_before_credits: 10000
    expected:
      # $2,500 per student * 2 = $5,000
      american_opportunity_credit: 5000
      aoc_refundable_amount: 2000   # 40% of $5,000
      aoc_nonrefundable_amount: 3000  # 60% of $5,000
      education_credit: 5000
    notes: "AOC applies per student"

  # Test 10: AOC with low tax liability - refundable portion
  - name: "AOC - Low tax liability, refundable credit"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 25000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 500
    expected:
      # Total credit: $2,500
      # Refundable (40%): $1,000
      # Nonrefundable (60%): $1,500, but limited to $500 tax liability
      american_opportunity_credit: 2500
      aoc_refundable_amount: 1000
      aoc_nonrefundable_amount: 500  # Limited by tax liability
      education_credit: 1500  # $500 nonref + $1,000 ref
    notes: "Low liability limits nonrefundable portion"

  # Test 11: AOC with zero tax liability
  - name: "AOC - Zero tax liability, only refundable portion"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 15000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 0
    expected:
      # Total credit: $2,500
      # Refundable (40%): $1,000
      # Nonrefundable: $0 (no tax liability)
      american_opportunity_credit: 2500
      aoc_refundable_amount: 1000
      aoc_nonrefundable_amount: 0
      education_credit: 1000
    notes: "Only refundable portion received with zero liability"

  # ==========================================================================
  # LIFETIME LEARNING CREDIT (LLC) TESTS
  # ==========================================================================

  # Test 12: LLC full credit, no phaseout
  - name: "LLC - Full credit, maximum expenses"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 50000
      llc_qualified_expenses: 10000
      tax_liability_before_credits: 5000
    expected:
      # 20% of $10,000 = $2,000
      lifetime_learning_credit: 2000
      education_credit: 2000
    notes: "Full LLC of $2,000"

  # Test 13: LLC partial expenses
  - name: "LLC - Partial expenses"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 50000
      llc_qualified_expenses: 5000
      tax_liability_before_credits: 3000
    expected:
      # 20% of $5,000 = $1,000
      lifetime_learning_credit: 1000
      education_credit: 1000
    notes: "LLC with $5,000 expenses"

  # Test 14: LLC expenses above limit
  - name: "LLC - Expenses exceed limit"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 50000
      llc_qualified_expenses: 15000
      tax_liability_before_credits: 5000
    expected:
      # 20% of $10,000 (capped) = $2,000
      lifetime_learning_credit: 2000
      education_credit: 2000
    notes: "Expenses capped at $10,000"

  # Test 15: LLC mid-phaseout (single)
  - name: "LLC - Mid-phaseout (single)"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 85000
      llc_qualified_expenses: 10000
      tax_liability_before_credits: 10000
    expected:
      # $5,000 over $80,000 threshold = 50% reduction
      # $2,000 * (1 - 0.50) = $1,000
      lifetime_learning_credit: 1000
      education_credit: 1000
    notes: "LLC at 50% phaseout"

  # Test 16: LLC fully phased out
  - name: "LLC - Fully phased out (single)"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 95000
      llc_qualified_expenses: 10000
      tax_liability_before_credits: 15000
    expected:
      lifetime_learning_credit: 0
      education_credit: 0
    notes: "Above $90,000, LLC fully phased out"

  # Test 17: LLC limited by tax liability
  - name: "LLC - Limited by tax liability"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 50000
      llc_qualified_expenses: 10000
      tax_liability_before_credits: 1000
    expected:
      # Credit is $2,000, but nonrefundable limited to $1,000 liability
      lifetime_learning_credit: 2000
      education_credit_nonrefundable: 1000
      education_credit: 1000
    notes: "LLC is entirely nonrefundable"

  # Test 18: LLC joint filers
  - name: "LLC - Joint filers, full credit"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 120000
      llc_qualified_expenses: 10000
      tax_liability_before_credits: 10000
    expected:
      # Below $160,000 threshold
      lifetime_learning_credit: 2000
      education_credit: 2000
    notes: "Joint threshold is $160,000"

  # ==========================================================================
  # COMBINED CREDITS / COORDINATION TESTS
  # ==========================================================================

  # Test 19: Both AOC and LLC (different students)
  - name: "Combined - AOC and LLC for different students"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 100000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000  # For AOC student
      llc_qualified_expenses: 5000  # For non-AOC student (grad school, etc.)
      tax_liability_before_credits: 10000
    expected:
      american_opportunity_credit: 2500
      lifetime_learning_credit: 1000  # 20% of $5,000
      education_credits_total: 3500
      education_credit: 3500
    notes: "Can claim both if for different students"

  # Test 20: Head of Household filing status
  - name: "AOC - Head of Household"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      modified_adjusted_gross_income: 50000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 5000
    expected:
      # HoH uses single thresholds
      american_opportunity_credit: 2500
      education_credit: 2500
    notes: "HoH uses same thresholds as single"

  # Test 21: Married Filing Separately
  - name: "AOC - Married Filing Separately"
    inputs:
      filing_status: SEPARATE
      modified_adjusted_gross_income: 50000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      tax_liability_before_credits: 5000
    expected:
      # MFS uses single thresholds
      american_opportunity_credit: 2500
      education_credit: 2500
    notes: "MFS uses single thresholds (though some restrictions may apply)"

  # Test 22: Multiple students with varying expenses
  - name: "AOC - Multiple students, different expense amounts"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 100000
      num_aoc_students: 3
      students:
        - aoc_qualified_expenses: 5000  # Max credit: $2,500
        - aoc_qualified_expenses: 2000  # Credit: $2,000
        - aoc_qualified_expenses: 3000  # Credit: $2,250
      tax_liability_before_credits: 15000
    expected:
      # Student 1: 100%*2000 + 25%*2000 = $2,500
      # Student 2: 100%*2000 = $2,000
      # Student 3: 100%*2000 + 25%*1000 = $2,250
      # Total: $6,750
      american_opportunity_credit: 6750
      aoc_refundable_amount: 2700   # 40% of $6,750
      aoc_nonrefundable_amount: 4050  # 60% of $6,750
      education_credit: 6750
    notes: "Per-student credit calculation"

  # Test 23: AOC with phaseout, multiple students
  - name: "AOC - Phaseout with multiple students"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 170000  # 50% phaseout
      num_aoc_students: 2
      students:
        - aoc_qualified_expenses: 4000
        - aoc_qualified_expenses: 4000
      tax_liability_before_credits: 30000
    expected:
      # Before phaseout: $2,500 * 2 = $5,000
      # After 50% phaseout: $2,500
      american_opportunity_credit: 2500
      aoc_refundable_amount: 1000
      aoc_nonrefundable_amount: 1500
      education_credit: 2500
    notes: "Phaseout applies to total credit"

  # Test 24: Zero expenses
  - name: "No credit - Zero qualified expenses"
    inputs:
      filing_status: SINGLE
      modified_adjusted_gross_income: 50000
      aoc_qualified_expenses: 0
      llc_qualified_expenses: 0
      tax_liability_before_credits: 5000
    expected:
      american_opportunity_credit: 0
      lifetime_learning_credit: 0
      education_credit: 0
    notes: "No credit without qualified expenses"

  # Test 25: Very high income, both credits phased out
  - name: "Very high income - All credits phased out"
    inputs:
      filing_status: JOINT
      modified_adjusted_gross_income: 200000
      num_aoc_students: 1
      aoc_qualified_expenses: 4000
      llc_qualified_expenses: 10000
      tax_liability_before_credits: 40000
    expected:
      american_opportunity_credit: 0
      lifetime_learning_credit: 0
      education_credit: 0
    notes: "Above $180,000 joint, both fully phased out"
