# 26 USC § 25A(c) - Lifetime Learning Credit Parameters
#
# "(1) Per taxpayer credit - ... equal to 20 percent of so much of the
#      qualified tuition and related expenses... as does not exceed $10,000."
#
# Note: The credit is per return, not per student (unlike AOC)

# Maximum qualified expenses considered
llc_expense_limit:
  description: "Maximum qualified expenses eligible for credit per return"
  unit: currency-USD
  values:
    1998-01-01: 10000
  citations:
    - "§ 25A(c)(1): expenses not exceeding $10,000"

# Credit rate
llc_rate:
  description: "Credit rate applied to qualified expenses"
  unit: rate
  values:
    1998-01-01: 0.20
  citations:
    - "§ 25A(c)(1): 20 percent"

# Maximum credit amount (20% of $10,000 = $2,000)
llc_maximum_credit:
  description: "Maximum Lifetime Learning Credit per return"
  unit: currency-USD
  values:
    1998-01-01: 2000
  citations:
    - "§ 25A(c)(1): 20 percent of $10,000 = $2,000 maximum"
