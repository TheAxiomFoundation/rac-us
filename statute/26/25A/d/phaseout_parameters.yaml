# 26 USC § 25A(d) - Education Credit Phaseout Parameters
#
# "(2) Modified adjusted gross income -
#  (A) In general - The term 'modified adjusted gross income' means the
#      adjusted gross income of the taxpayer for the taxable year increased by...
#  (B) Limitation on credit - The credit otherwise allowable... shall be
#      reduced (but not below zero) by the amount which bears the same ratio
#      to such credit as—
#      (i) the excess of the taxpayer's modified adjusted gross income over
#          $80,000 ($160,000 in the case of a joint return), bears to
#      (ii) $10,000 ($20,000 in the case of a joint return)."
#
# Note: Thresholds are adjusted annually for inflation per § 25A(h)(2)

# --- American Opportunity Credit Phaseout (2024 values per Rev. Proc. 2023-34) ---

aoc_phaseout_start_single:
  description: "MAGI threshold where AOC phaseout begins (single/HoH)"
  unit: currency-USD
  values:
    2009-01-01: 80000
    2024-01-01: 80000
  citations:
    - "§ 25A(d)(2)(B)(i): $80,000"
    - "Rev. Proc. 2023-34: 2024 amount (not indexed)"

aoc_phaseout_start_joint:
  description: "MAGI threshold where AOC phaseout begins (joint)"
  unit: currency-USD
  values:
    2009-01-01: 160000
    2024-01-01: 160000
  citations:
    - "§ 25A(d)(2)(B)(i): $160,000 for joint returns"
    - "Rev. Proc. 2023-34: 2024 amount (not indexed)"

aoc_phaseout_range_single:
  description: "MAGI range over which AOC phases out (single/HoH)"
  unit: currency-USD
  values:
    2009-01-01: 10000
    2024-01-01: 10000
  citations:
    - "§ 25A(d)(2)(B)(ii): $10,000"

aoc_phaseout_range_joint:
  description: "MAGI range over which AOC phases out (joint)"
  unit: currency-USD
  values:
    2009-01-01: 20000
    2024-01-01: 20000
  citations:
    - "§ 25A(d)(2)(B)(ii): $20,000 for joint returns"

