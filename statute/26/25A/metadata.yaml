# Encoding Metadata for 26 USC Section 25A (Education Credits)

encoding:
  created: 2024-12-24
  updated: 2024-12-24
  status: implemented
  encoded_by: claude-opus-4.5

variable:
  name: education_credit
  entity: TaxUnit
  period: Year
  dtype: Money

coverage:
  tax_years: [2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    American Opportunity Credit (AOC) provisions from ARRA 2009, made permanent by PATH Act 2015:
    - Up to $2,500 per eligible student (100% of first $2,000 + 25% of next $2,000)
    - 40% refundable (up to $1,000 per student)
    - Available for first 4 taxable years of post-secondary education
    - Phase-out: $80,000-$90,000 single, $160,000-$180,000 joint (not indexed)

    Lifetime Learning Credit (LLC):
    - Up to $2,000 per tax return (20% of up to $10,000 expenses)
    - Not refundable
    - No limit on years claimed
    - Phase-out thresholds indexed for inflation

sources:
  statute:
    - citation: "26 USC Section 25A"
      title: "American Opportunity and Lifetime Learning Credits"
      path: statute/26/25A/
      files:
        - a/education_credits.cosilico    # Combined credits per § 25A(a)
        - b/aoc.cosilico                  # American Opportunity Credit
        - b/aoc_parameters.yaml           # AOC parameters
        - c/llc.cosilico                  # Lifetime Learning Credit
        - c/llc_parameters.yaml           # LLC parameters
        - d/phaseout_parameters.yaml      # Phaseout thresholds
        - i/refundable_parameters.yaml    # AOC refundable portion

  guidance:
    - citation: "Rev. Proc. 2023-34"
      title: "Inflation adjustments for TY 2024"
      source: https://www.irs.gov/pub/irs-drop/rp-23-34.pdf
      provides:
        - LLC phase-out thresholds (indexed)
        - Confirms AOC thresholds not indexed

    - citation: "IRS Publication 970"
      title: "Tax Benefits for Education"
      source: https://www.irs.gov/pub/irs-pdf/p970.pdf
      provides:
        - Detailed eligibility requirements
        - Coordination rules between credits
        - Examples and worksheets

    - citation: "Pub. L. 111-5 (ARRA)"
      title: "American Recovery and Reinvestment Act of 2009"
      section: "Section 1004"
      provides:
        - Created American Opportunity Credit (replacing Hope Credit expansion)

    - citation: "Pub. L. 114-113 (PATH Act)"
      title: "Protecting Americans from Tax Hikes Act of 2015"
      section: "Section 102"
      provides:
        - Made AOC permanent

architecture:
  description: |
    The education credits encoding implements 26 USC Section 25A, which provides
    two mutually exclusive (per student) education tax credits:

    1. Section 25A(b) - American Opportunity Credit (AOC)
       - Per student credit up to $2,500
       - Two-tier calculation: 100% of first $2,000 + 25% of next $2,000
       - Partially refundable: 40% refundable per § 25A(i)
       - Limited to first 4 years of post-secondary education
       - Cannot claim for same student if convicted of drug felony

    2. Section 25A(c) - Lifetime Learning Credit (LLC)
       - Per return credit up to $2,000
       - 20% of qualified expenses up to $10,000
       - Entirely nonrefundable
       - No limit on years claimed
       - Available for any level of post-secondary education

    3. Section 25A(d) - Phaseout
       - Both credits phase out over a $10,000/$20,000 range
       - AOC: $80k-$90k single, $160k-$180k joint (not indexed)
       - LLC: Thresholds indexed annually for inflation

    4. Section 25A(i) - Refundable Portion
       - 40% of AOC is refundable
       - Maximum $1,000 refundable per student
       - Not available if claimed as dependent (certain restrictions)

  key_provisions:
    - provision: "Section 25A(a)"
      description: "Allowance of credit (sum of AOC and LLC)"
      variable: education_credit
      files:
        - a/education_credits.cosilico

    - provision: "Section 25A(b)"
      description: "American Opportunity Credit calculation"
      variable: american_opportunity_credit
      parameters:
        - b/aoc_parameters#aoc_first_tier_limit
        - b/aoc_parameters#aoc_second_tier_limit
        - b/aoc_parameters#aoc_maximum_credit

    - provision: "Section 25A(c)"
      description: "Lifetime Learning Credit calculation"
      variable: lifetime_learning_credit
      parameters:
        - c/llc_parameters#llc_expense_limit
        - c/llc_parameters#llc_rate

    - provision: "Section 25A(d)"
      description: "Phaseout based on MAGI"
      parameters:
        - d/phaseout_parameters#aoc_phaseout_start_single
        - d/phaseout_parameters#aoc_phaseout_start_joint
        - d/phaseout_parameters#llc_phaseout_start_single
        - d/phaseout_parameters#llc_phaseout_start_joint

    - provision: "Section 25A(i)"
      description: "Refundable portion of AOC"
      variable: aoc_refundable_amount
      parameters:
        - i/refundable_parameters#aoc_refundable_rate

  dependencies:
    - path: statute/26/1
      description: "Filing status (for threshold selection)"
    - path: statute/26/62/a
      description: "Adjusted gross income (for MAGI calculation)"

validation:
  pe_variables:
    - american_opportunity_credit
    - lifetime_learning_credit
    - education_credit_refundable
    - education_credit_nonrefundable
  tolerance_dollars: 1
  notes: |
    Validation compares against PolicyEngine's education credit variables.
    Key inputs required:
    - qualified_tuition_expenses (per student for AOC, per return for LLC)
    - is_eligible_student markers
    - filing_status
    - modified_adjusted_gross_income

    Note: Student eligibility rules (enrollment status, course load, etc.)
    are typically inputs rather than calculated variables.

test_files:
  - tests.yaml  # Comprehensive education credit tests
