# 26 USC § 25A(i) - Refundable Portion of American Opportunity Credit
#
# "(1) In general - 40 percent of so much of the credit allowed under
#      subsection (a) as is attributable to the American opportunity
#      tax credit (determined after application of subsection (d) and
#      without regard to this paragraph) shall be treated as a credit
#      allowable under subpart C (and not allowable under this subpart)."
#
# Note: This makes 40% of the AOC refundable (can be received even with
# zero tax liability). The remaining 60% is nonrefundable.

aoc_refundable_rate:
  description: "Portion of American Opportunity Credit that is refundable"
  unit: rate
  values:
    2009-01-01: 0.40
  citations:
    - "§ 25A(i)(1): 40 percent"

# Calculated maximum refundable amount: 40% of $2,500 = $1,000
aoc_maximum_refundable:
  description: "Maximum refundable amount of AOC per student"
  unit: currency-USD
  values:
    2009-01-01: 1000
  citations:
    - "§ 25A(i)(1): 40 percent of $2,500 maximum = $1,000"
