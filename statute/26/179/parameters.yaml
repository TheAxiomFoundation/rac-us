# 26 USC Section 179 - Expensing Election Parameters
#
# Inflation-adjusted amounts per Rev. Proc. announcements.
#
# Sources:
# - 26 USC 179(b) - Limitations
# - Rev. Proc. 2022-38 (2023 adjustments)
# - Rev. Proc. 2023-34 (2024 adjustments)
# - Rev. Proc. 2024-40 (2025 adjustments)

# Maximum deduction amount (Section 179(b)(1))
maximum_deduction:
  description: "Maximum Section 179 deduction allowed"
  unit: currency-USD
  indexing:
    method: cpi-u
    round_to: 10000
  values:
    # TCJA increased limit significantly
    2018-01-01: 1000000
    2019-01-01: 1020000
    2020-01-01: 1040000
    2021-01-01: 1050000
    2022-01-01: 1080000
    2023-01-01: 1160000
    2024-01-01: 1220000
    2025-01-01: 1250000
  citations:
    - "26 USC 179(b)(1): Dollar limitation"
    - "TCJA Section 13101: Increased to $1,000,000 base"
    - "Rev. Proc. 2023-34: $1,220,000 for 2024"
    - "Rev. Proc. 2024-40: $1,250,000 for 2025"

# Investment threshold where phaseout begins (Section 179(b)(2))
phaseout_threshold:
  description: "Investment threshold where phaseout begins"
  unit: currency-USD
  indexing:
    method: cpi-u
    round_to: 10000
  values:
    2018-01-01: 2500000
    2019-01-01: 2550000
    2020-01-01: 2590000
    2021-01-01: 2620000
    2022-01-01: 2700000
    2023-01-01: 2890000
    2024-01-01: 3050000
    2025-01-01: 3130000
  citations:
    - "26 USC 179(b)(2): Investment limitation threshold"
    - "TCJA Section 13101: Increased to $2,500,000 base"
    - "Rev. Proc. 2023-34: $3,050,000 for 2024"
    - "Rev. Proc. 2024-40: $3,130,000 for 2025"

# Phaseout rate (dollar-for-dollar reduction)
phaseout_rate:
  description: "Rate at which deduction is reduced above threshold"
  unit: rate
  values:
    1981-01-01: 1.0  # Dollar-for-dollar reduction
  citations:
    - "26 USC 179(b)(2): Dollar-for-dollar reduction"

# SUV limitation (Section 179(b)(5))
suv_limitation:
  description: "Maximum Section 179 deduction for sport utility vehicles"
  unit: currency-USD
  indexing:
    method: cpi-u
    round_to: 100
  values:
    2018-01-01: 25000
    2019-01-01: 25500
    2020-01-01: 25900
    2021-01-01: 26200
    2022-01-01: 27000
    2023-01-01: 28900
    2024-01-01: 30500
    2025-01-01: 31300
  citations:
    - "26 USC 179(b)(5): SUV limitation"
    - "Rev. Proc. 2023-34: $30,500 for 2024"
    - "Rev. Proc. 2024-40: $31,300 for 2025"

# SUV weight threshold
suv_weight_threshold:
  description: "Gross vehicle weight threshold for SUV classification"
  unit: lbs
  values:
    2004-01-01: 6000  # Over 6,000 lbs GVW subject to SUV limit
  citations:
    - "26 USC 179(b)(5)(A): Vehicles over 6,000 lbs gross weight"
