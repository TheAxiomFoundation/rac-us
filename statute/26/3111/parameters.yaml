# 26 USC 3111 - Employer FICA Tax Parameters
#
# Employer share of FICA taxes (Social Security + Medicare).
# Employee share is under 26 USC 3101.
#
# Key statutes:
# - 26 USC 3111(a): Employer Social Security (OASDI) tax rate
# - 26 USC 3111(b): Employer Medicare (HI) tax rate
# - 26 USC 3121(a): Definition of wages subject to tax
#
# Note: Employer does NOT pay Additional Medicare Tax (that's employee-only).

variable: employer_fica_tax
entity: Person
period: Year
dtype: Money

# =============================================================================
# EMPLOYER MEDICARE TAX RATE - 26 USC 3111(b)
# =============================================================================

employer_medicare_rate:
  description: "Employer Medicare (HI) tax rate per 26 USC 3111(b)"
  unit: rate
  period: year
  label: "Employer Medicare tax rate"
  values:
    # Matches employee rate - 1.45% each, 2.9% combined
    1986-01-01: 0.0145
    1985-01-01: 0.0135
    1984-01-01: 0.013
    1983-01-01: 0.013
    1982-01-01: 0.0105
    1981-01-01: 0.0105
    1979-01-01: 0.0105
    1978-01-01: 0.01
    1974-01-01: 0.009
    1973-01-01: 0.01
    1968-01-01: 0.006
    1966-01-01: 0.0035
  citations:
    - "26 USC 3111(b): rate of 1.45 percent of wages"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3111"

# =============================================================================
# EMPLOYER SOCIAL SECURITY TAX RATE - 26 USC 3111(a)
# =============================================================================

employer_social_security_rate:
  description: "Employer Social Security (OASDI) tax rate per 26 USC 3111(a)"
  unit: rate
  period: year
  label: "Employer Social Security tax rate"
  values:
    # Current rate since 1990
    1990-01-01: 0.062
    1988-01-01: 0.0755
    1985-01-01: 0.0705
    1984-01-01: 0.067
  citations:
    - "26 USC 3111(a): rate of 6.2 percent of wages up to wage base"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3111"

# =============================================================================
# COMBINED EMPLOYER FICA RATE
# =============================================================================

employer_fica_rate:
  description: "Combined employer FICA rate (Social Security + Medicare) per 26 USC 3111"
  unit: rate
  period: year
  label: "Total employer FICA rate"
  values:
    1990-01-01: 0.0765  # 6.2% + 1.45%
  citations:
    - "26 USC 3111: combined rate of 7.65%"
  notes:
    - "Social Security portion applies only up to wage base"
    - "Medicare portion applies to all wages (no cap)"
