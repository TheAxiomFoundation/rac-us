# 26 USC Section 62 - Adjusted Gross Income Tests
#
# Tests for AGI calculation: gross income minus above-the-line deductions.
#
# IRC Section 62 defines AGI as gross income (Section 61) minus specific
# deductions enumerated in Section 62(a). These are "above-the-line" deductions
# that reduce AGI, as opposed to itemized/standard deductions which reduce
# taxable income after AGI is computed.
#
# Key above-the-line deductions tested:
#   - 62(a)(1): Trade and business deductions (self-employed)
#   - 62(a)(2)(D): Educator expenses (up to $300 for 2024)
#   - 62(a)(4): Self-employment tax deduction (50% of SE tax)
#   - 62(a)(7): IRA contributions
#   - 62(a)(12): HSA contributions
#   - 62(a)(17): Student loan interest (up to $2,500)
#   - 62(a)(19): Self-employed health insurance deduction

reference: "26 USC Section 62"
tax_year: 2024

tests:
  # ==========================================================================
  # BASIC GROSS INCOME TESTS (No deductions)
  # ==========================================================================

  - name: "Wage income only - no deductions"
    inputs:
      wages: 75000
      interest_income: 0
      dividend_income: 0
      self_employment_income: 0
      capital_gains: 0
      other_income: 0
      # No above-the-line deductions
      educator_expenses: 0
      traditional_ira_contributions: 0
      hsa_contributions: 0
      student_loan_interest_paid: 0
      self_employed_health_insurance: 0
    expected:
      gross_income: 75000
      total_above_the_line_deductions: 0
      adjusted_gross_income: 75000
    notes: "Pure wage income with no deductions"
    citations:
      - "26 USC 61(a)(1): wages included in gross income"
      - "26 USC 62(a): AGI = gross income - enumerated deductions"

  - name: "Multiple income types - no deductions"
    inputs:
      wages: 80000
      interest_income: 1500
      dividend_income: 2000
      self_employment_income: 0
      capital_gains: 5000
      other_income: 500
    expected:
      gross_income: 89000
      adjusted_gross_income: 89000
    notes: "Sum of all income types"

  - name: "Investment income only"
    inputs:
      wages: 0
      interest_income: 10000
      dividend_income: 15000
      capital_gains: 25000
    expected:
      gross_income: 50000
      adjusted_gross_income: 50000
    notes: "Retired person living on investments"

  # ==========================================================================
  # EDUCATOR EXPENSES - 62(a)(2)(D)
  # ==========================================================================

  - name: "Educator expenses - within limit"
    inputs:
      wages: 50000
      is_educator: true
      educator_expenses: 200
    expected:
      gross_income: 50000
      educator_expense_deduction: 200
      total_above_the_line_deductions: 200
      adjusted_gross_income: 49800
    notes: "Teacher deducting classroom supplies under $300 limit"
    citations:
      - "26 USC 62(a)(2)(D): up to $300 for 2024"

  - name: "Educator expenses - at maximum"
    inputs:
      wages: 55000
      is_educator: true
      educator_expenses: 300
    expected:
      educator_expense_deduction: 300
      adjusted_gross_income: 54700
    notes: "Exactly at $300 limit for 2024"

  - name: "Educator expenses - exceeds limit"
    inputs:
      wages: 55000
      is_educator: true
      educator_expenses: 500
    expected:
      educator_expense_deduction: 300  # Capped at $300
      adjusted_gross_income: 54700
    notes: "Expenses exceed limit, deduction capped"

  - name: "Educator expenses - both spouses are educators (joint filing)"
    inputs:
      filing_status: joint
      wages: 100000
      is_educator: true
      spouse_is_educator: true
      educator_expenses: 400
      spouse_educator_expenses: 350
    expected:
      # Each spouse can deduct up to $300
      educator_expense_deduction: 600  # 300 + 300 (both capped)
      adjusted_gross_income: 99400
    notes: "Both spouses can claim up to $300 each = $600 total"

  # ==========================================================================
  # SELF-EMPLOYMENT TAX DEDUCTION - 62(a)(4), 164(f)
  # ==========================================================================

  - name: "Self-employment tax deduction"
    inputs:
      self_employment_income: 50000
      # SE tax = 50000 * 0.9235 * 0.153 = $7,067.17 (approx)
    expected:
      # Deduction = 50% of SE tax
      se_tax_deduction: 3533.59  # Approximately half of SE tax
      adjusted_gross_income: 46466.41  # 50000 - 3533.59
    notes: "Self-employed person deducts half of SE tax"
    citations:
      - "26 USC 62(a)(4): deduction for portion of SE tax"
      - "26 USC 164(f): one-half of SE tax is deductible"

  - name: "Self-employment plus wages"
    inputs:
      wages: 60000
      self_employment_income: 20000
    expected:
      gross_income: 80000
      # SE tax on $20,000 self-employment income
      # Net SE income = 20000 * 0.9235 = $18,470
      # SE tax = 18470 * 0.153 = $2,825.91
      # Deduction = 2825.91 / 2 = $1,412.96
      se_tax_deduction: 1412.96
    notes: "Mixed employment - wages plus self-employment"

  # ==========================================================================
  # TRADITIONAL IRA CONTRIBUTIONS - 62(a)(7)
  # ==========================================================================

  - name: "Traditional IRA contribution - single, no retirement plan at work"
    inputs:
      wages: 60000
      age: 35
      filing_status: single
      has_retirement_plan_at_work: false
      traditional_ira_contributions: 7000  # 2024 limit
    expected:
      ira_deduction: 7000
      adjusted_gross_income: 53000
    notes: "Full deduction - not covered by employer plan"
    citations:
      - "26 USC 62(a)(7): moving expenses and IRA deductions"
      - "26 USC 219: deduction for retirement savings"

  - name: "Traditional IRA contribution - age 50+ catch-up"
    inputs:
      wages: 80000
      age: 55
      filing_status: single
      has_retirement_plan_at_work: false
      traditional_ira_contributions: 8000  # 7000 + 1000 catch-up
    expected:
      ira_deduction: 8000
      adjusted_gross_income: 72000
    notes: "Age 50+ can contribute additional $1,000 for 2024"

  - name: "IRA contribution exceeds limit"
    inputs:
      wages: 100000
      age: 40
      filing_status: single
      traditional_ira_contributions: 10000  # Exceeds $7,000 limit
    expected:
      ira_deduction: 7000  # Capped at limit
      adjusted_gross_income: 93000
    notes: "Contribution exceeds limit, deduction capped"

  # ==========================================================================
  # HSA CONTRIBUTIONS - 62(a)(12)
  # ==========================================================================

  - name: "HSA contribution - self-only coverage"
    inputs:
      wages: 75000
      has_hdhp: true
      hsa_coverage_type: self_only
      hsa_contributions: 4150  # 2024 self-only limit
    expected:
      hsa_deduction: 4150
      adjusted_gross_income: 70850
    notes: "Maximum HSA contribution for self-only coverage"
    citations:
      - "26 USC 62(a)(12): health savings account deduction"
      - "26 USC 223: health savings accounts"

  - name: "HSA contribution - family coverage"
    inputs:
      wages: 100000
      age: 40
      has_hdhp: true
      hsa_coverage_type: family
      hsa_contributions: 8300  # 2024 family limit
    expected:
      hsa_deduction: 8300
      adjusted_gross_income: 91700
    notes: "Maximum HSA contribution for family coverage"

  - name: "HSA contribution - age 55+ catch-up"
    inputs:
      wages: 80000
      age: 58
      has_hdhp: true
      hsa_coverage_type: self_only
      hsa_contributions: 5150  # 4150 + 1000 catch-up
    expected:
      hsa_deduction: 5150
      adjusted_gross_income: 74850
    notes: "Age 55+ can contribute additional $1,000"

  # ==========================================================================
  # STUDENT LOAN INTEREST - 62(a)(17)
  # ==========================================================================

  - name: "Student loan interest - within limit"
    inputs:
      wages: 55000
      filing_status: single
      student_loan_interest_paid: 1500
    expected:
      student_loan_interest_deduction: 1500
      adjusted_gross_income: 53500
    notes: "Full deduction for interest under $2,500 limit"
    citations:
      - "26 USC 62(a)(17): interest on education loans"
      - "26 USC 221: interest on education loans"

  - name: "Student loan interest - at maximum"
    inputs:
      wages: 60000
      filing_status: single
      student_loan_interest_paid: 2500
    expected:
      student_loan_interest_deduction: 2500
      adjusted_gross_income: 57500
    notes: "Maximum $2,500 deduction"

  - name: "Student loan interest - exceeds limit"
    inputs:
      wages: 65000
      filing_status: single
      student_loan_interest_paid: 4000
    expected:
      student_loan_interest_deduction: 2500  # Capped
      adjusted_gross_income: 62500
    notes: "Interest paid exceeds limit, deduction capped"

  - name: "Student loan interest - phase-out (single, high income)"
    inputs:
      wages: 90000  # Above phase-out start ($75,000 for 2024)
      filing_status: single
      student_loan_interest_paid: 2500
    expected:
      # Phase-out: ($90,000 - $75,000) / $15,000 = 100%
      # At $90,000, phase-out is complete
      student_loan_interest_deduction: 0
      adjusted_gross_income: 90000
    notes: "Income exceeds phase-out threshold, no deduction"

  # ==========================================================================
  # SELF-EMPLOYED HEALTH INSURANCE - 62(a)(1)
  # ==========================================================================

  - name: "Self-employed health insurance deduction"
    inputs:
      self_employment_income: 75000
      self_employed_health_insurance: 12000
    expected:
      self_employed_health_insurance_deduction: 12000
      # Also has SE tax deduction
    notes: "Self-employed person deducts health insurance premiums"
    citations:
      - "26 USC 162(l): health insurance costs of self-employed individuals"

  - name: "Self-employed health insurance - capped at SE income"
    inputs:
      self_employment_income: 8000
      self_employed_health_insurance: 15000
    expected:
      # Cannot exceed net self-employment income
      self_employed_health_insurance_deduction: 8000
    notes: "Deduction limited to self-employment income"

  # ==========================================================================
  # COMBINED DEDUCTIONS
  # ==========================================================================

  - name: "Multiple above-the-line deductions"
    inputs:
      wages: 60000
      self_employment_income: 30000
      is_educator: true
      educator_expenses: 300
      traditional_ira_contributions: 7000
      hsa_contributions: 4150
      hsa_coverage_type: self_only
      has_hdhp: true
      student_loan_interest_paid: 2500
    expected:
      gross_income: 90000
      educator_expense_deduction: 300
      ira_deduction: 7000
      hsa_deduction: 4150
      student_loan_interest_deduction: 2500
      # SE tax deduction: ~$2,066
      total_above_the_line_deductions: 16016  # Sum of all deductions
      adjusted_gross_income: 73984
    notes: "Multiple deductions reduce AGI significantly"

  - name: "High earner - self-employed consultant"
    inputs:
      self_employment_income: 250000
      self_employed_health_insurance: 18000
      traditional_ira_contributions: 7000
      hsa_contributions: 8300
      hsa_coverage_type: family
      has_hdhp: true
    expected:
      gross_income: 250000
      # SE tax on $250,000 = ~$28,700 (simplified), deduction = ~$14,350
      self_employed_health_insurance_deduction: 18000
      ira_deduction: 7000
      hsa_deduction: 8300
      # Total deductions: ~$47,650
    notes: "High-earning self-employed with multiple deductions"

  # ==========================================================================
  # EDGE CASES
  # ==========================================================================

  - name: "Zero income"
    inputs:
      wages: 0
      interest_income: 0
      dividend_income: 0
      self_employment_income: 0
      capital_gains: 0
    expected:
      gross_income: 0
      adjusted_gross_income: 0
    notes: "No income, no AGI"

  - name: "Negative capital gains (losses)"
    inputs:
      wages: 100000
      capital_gains: -10000  # Net capital loss
    expected:
      # Capital loss deduction limited to $3,000 per year
      # Remaining $7,000 carried forward
      gross_income: 97000  # 100000 + max(-10000, -3000) = 100000 - 3000
      adjusted_gross_income: 97000
    notes: "Capital losses limited to $3,000 deduction"
    citations:
      - "26 USC 1211(b): capital loss limitation"

  - name: "Net operating loss carryforward effect"
    inputs:
      wages: 50000
      self_employment_income: -20000  # Business loss
    expected:
      # Self-employment loss reduces gross income
      gross_income: 30000
      adjusted_gross_income: 30000
    notes: "Business losses offset other income"

  - name: "Minimum income, maximum deductions"
    inputs:
      wages: 20000
      is_educator: true
      educator_expenses: 500  # Will be capped at 300
      traditional_ira_contributions: 7000
      student_loan_interest_paid: 2500
    expected:
      gross_income: 20000
      educator_expense_deduction: 300
      ira_deduction: 7000
      student_loan_interest_deduction: 2500
      total_above_the_line_deductions: 9800
      adjusted_gross_income: 10200
    notes: "Low earner with multiple deductions"
