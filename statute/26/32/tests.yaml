# Tests for 26 USC § 32 - Earned Income Credit Eligibility
#
# This file tests all eligibility requirements from IRC 32(c), 32(d), and 32(i):
#   - Investment income limit: IRC 32(i)(1)
#   - Age requirements for childless workers: IRC 32(c)(1)(A)(ii)
#   - Filing status restrictions (no MFS): IRC 32(d)
#   - Citizenship/residency: IRC 32(c)(1)(D)
#   - Not be qualifying child of another: IRC 32(c)(1)(B)
#   - Valid SSN requirements: IRC 32(c)(1)(E) and 32(m)
#   - Foreign earned income exclusion: IRC 32(c)(1)(C)

variable: is_eligible_individual
tax_year: 2024

test_cases:
  # ============================================================================
  # IRC 32(i)(1) - Investment Income Disqualification
  # "No credit shall be allowed... if the aggregate amount of disqualified
  # income of the taxpayer for the taxable year exceeds $10,000" (indexed)
  # 2024 limit: $11,600
  # ============================================================================

  - name: "Investment income under limit - eligible"
    description: "Disqualified income of $10,000 is under the $11,600 limit"
    inputs:
      filing_status: single
      num_qualifying_children: 1
      earned_income: 20000
      age: 35
      interest_income: 5000
      dividend_income: 3000
      capital_gain_net_income: 2000
      net_rent_royalty_income: 0
      net_passive_income: 0
      tax_exempt_interest: 0
      is_qualifying_child_of_other: false
      has_foreign_earned_income: false
      is_nonresident_alien: false
      missing_taxpayer_tin: false
      missing_spouse_tin: false
      has_us_principal_abode: true
    expected:
      disqualified_income: 10000
      has_excessive_investment_income: false
      is_eligible_individual: true
    citations:
      - "26 USC 32(i)(1): $10,000 base limit, indexed"
      - "Rev. Proc. 2023-34: 2024 limit = $11,600"

  - name: "Investment income at limit - eligible"
    description: "Disqualified income of $11,600 equals the limit (not disqualified)"
    inputs:
      filing_status: single
      num_qualifying_children: 1
      earned_income: 20000
      age: 35
      interest_income: 6000
      dividend_income: 3000
      capital_gain_net_income: 2600
      net_rent_royalty_income: 0
      net_passive_income: 0
      tax_exempt_interest: 0
      is_qualifying_child_of_other: false
      has_foreign_earned_income: false
      is_nonresident_alien: false
      missing_taxpayer_tin: false
      missing_spouse_tin: false
      has_us_principal_abode: true
    expected:
      disqualified_income: 11600
      has_excessive_investment_income: false
      is_eligible_individual: true
    citations:
      - "26 USC 32(i)(1): 'exceeds' means strictly greater than"

  - name: "Investment income exceeds limit - ineligible"
    description: "Disqualified income of $12,000 exceeds the $11,600 limit"
    inputs:
      filing_status: single
      num_qualifying_children: 1
      earned_income: 20000
      age: 35
      interest_income: 7000
      dividend_income: 3000
      capital_gain_net_income: 2000
      net_rent_royalty_income: 0
      net_passive_income: 0
      tax_exempt_interest: 0
      is_qualifying_child_of_other: false
      has_foreign_earned_income: false
      is_nonresident_alien: false
      missing_taxpayer_tin: false
      missing_spouse_tin: false
      has_us_principal_abode: true
    expected:
      disqualified_income: 12000
      has_excessive_investment_income: true
      is_eligible_individual: false
    citations:
      - "26 USC 32(i)(1): credit disallowed if disqualified income > $11,600 (2024)"

  - name: "Tax-exempt interest included in disqualified income"
    description: "Tax-exempt interest counts toward investment income limit"
    inputs:
      filing_status: single
      num_qualifying_children: 1
      earned_income: 20000
      age: 35
      interest_income: 0
      dividend_income: 0
      capital_gain_net_income: 0
      net_rent_royalty_income: 0
      net_passive_income: 0
      tax_exempt_interest: 12000
      is_qualifying_child_of_other: false
      has_foreign_earned_income: false
      is_nonresident_alien: false
      missing_taxpayer_tin: false
      missing_spouse_tin: false
      has_us_principal_abode: true
    expected:
      disqualified_income: 12000
      has_excessive_investment_income: true
      is_eligible_individual: false
    citations:
      - "26 USC 32(i)(2)(B): tax-exempt interest is disqualified income"

