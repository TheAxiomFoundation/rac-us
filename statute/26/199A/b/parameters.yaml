# 26 USC § 199A(b) - W-2 Wage and Property Limitations
#
# "(2) W-2 WAGES.—For purposes of this section—
#  (A) IN GENERAL.—The term 'W-2 wages' means, with respect to any person for
#      any taxable year of such person, the amounts described in paragraphs (3)
#      and (8) of section 6051(a) paid by such person with respect to employment
#      of employees by such person during the calendar year ending during such
#      taxable year..."
#
# "(6) APPLICABLE PERCENTAGE.—For purposes of paragraph (2)(B)—
#  (A) IN GENERAL.—The term 'applicable percentage' means, with respect to any
#      taxable year, 100 percent reduced (not below zero) by the percentage equal
#      to the ratio (expressed as a percentage) of—
#   (i) the taxable income of the taxpayer for the taxable year in excess of the
#       threshold amount, bears to
#   (ii) $50,000 ($100,000 in the case of a joint return)."

# Deduction rate - statutory 20%
qbi_deduction_rate:
  description: "Qualified business income deduction rate"
  unit: rate
  values:
    2018-01-01: 0.20
  citations:
    - "§ 199A(a): 20% of qualified business income"

# W-2 wage limitation percentages
w2_wage_limit_rate:
  description: "W-2 wage limitation rate (50% of W-2 wages)"
  unit: rate
  values:
    2018-01-01: 0.50
  citations:
    - "§ 199A(b)(2)(B)(i): 50% of W-2 wages"

w2_wage_property_rate:
  description: "W-2 wage portion of combined limitation"
  unit: rate
  values:
    2018-01-01: 0.25
  citations:
    - "§ 199A(b)(2)(B)(ii)(I): 25% of W-2 wages"

ubia_rate:
  description: "UBIA (unadjusted basis immediately after acquisition) property rate"
  unit: rate
  values:
    2018-01-01: 0.025
  citations:
    - "§ 199A(b)(2)(B)(ii)(II): 2.5% of UBIA of qualified property"
