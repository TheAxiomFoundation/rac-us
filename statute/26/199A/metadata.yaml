# 26 USC § 199A - Qualified Business Income Deduction
#
# Added by Tax Cuts and Jobs Act of 2017 (P.L. 115-97, § 11011)
# Effective for taxable years beginning after December 31, 2017
# Expires for taxable years beginning after December 31, 2025

section: 199A
title: "Qualified Business Income"
chapter: 1
subchapter: B
part: VI

enacted: 2017-12-22
effective: 2018-01-01
sunset: 2025-12-31  # Per TCJA § 11011(e)

description: |
  Provides a deduction for qualified business income from pass-through entities
  and sole proprietorships. The deduction equals up to 20% of qualified business
  income, subject to limitations based on W-2 wages paid, capital investment,
  and taxable income. Specified service trades or businesses (SSTB) are subject
  to additional phase-out rules for higher-income taxpayers.

subsections:
