# 26 USC § 199A(e) - Threshold Amounts and Phaseout Ranges
#
# "(2) THRESHOLD AMOUNT.—
#  (A) IN GENERAL.—The term 'threshold amount' means—
#   (i) except as provided in subparagraph (B), $157,500 (200 percent of such
#       amount in the case of a joint return), and
#   (ii) the threshold amount (as so adjusted) for the taxable year in which
#        the specified service trade or business becomes a qualified trade or
#        business of the taxpayer.
#
#  (B) INFLATION ADJUSTMENT.—In the case of any taxable year beginning after
#      2018, the dollar amount in subparagraph (A)(i) shall be increased by an
#      amount equal to—such dollar amount, multiplied by the cost-of-living
#      adjustment determined under section 1(f)(3)..."

