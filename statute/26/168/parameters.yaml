# Mid-month convention parameters (for real property)
mid_month_proration_factor:
  description: "Mid-month convention assumes property placed at middle of month"
  unit: fraction
  values:
    1986-01-01: 0.5  # Property assumed placed at mid-point of month
  citations:
    - "26 USC 168(d)(2)(B): Mid-month convention"

months_per_year:
  description: "Number of months in a tax year for proration calculations"
  unit: months
  values:
    1986-01-01: 12
  citations:
    - "26 USC 168(d)(4): Conventions for computing depreciation"

# ADS recovery periods (Section 168(g))
ads_recovery_periods:
  description: "Recovery periods under Alternative Depreciation System"
  unit: years
  values:
    3_year: 4     # Class life or 12 years
    5_year: 5     # Class life
    7_year: 10    # Class life
    10_year: 15   # Class life
    15_year: 20   # Class life
    20_year: 25   # Class life
    27_5_year: 30 # 30 years
    39_year: 40   # 40 years
  citations:
    - "26 USC 168(g)(2): ADS class lives"
    - "26 USC 168(g)(3): Real property - 40 years"

