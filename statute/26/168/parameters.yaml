# 26 USC Section 168 - MACRS Depreciation Parameters
#
# Sources:
# - 26 USC 168 - Accelerated cost recovery system
# - IRS Publication 946 - How to Depreciate Property
# - IRS Revenue Procedures for depreciation tables

# Bonus depreciation rates (Section 168(k))
bonus_depreciation_rate:
  description: "Bonus depreciation percentage for qualified property"
  unit: rate
  values:
    # Pre-TCJA
    2008-01-01: 0.50
    2011-01-01: 1.00  # Brief 100%
    2012-01-01: 0.50
    # TCJA - 100% bonus
    2017-09-28: 1.00  # Retroactive to 9/27/2017
    # Phasedown begins 2023
    2023-01-01: 0.80
    2024-01-01: 0.60
    2025-01-01: 0.40
    2026-01-01: 0.20
    2027-01-01: 0.00  # Expires
  citations:
    - "26 USC 168(k)(6): Phasedown percentages"
    - "TCJA Section 13201: 100% through 2022"

# Property class recovery periods (Section 168(c))
recovery_periods:
  description: "Recovery periods for property classes under GDS"
  unit: years
  values:
    3_year: 3
    5_year: 5
    7_year: 7
    10_year: 10
    15_year: 15
    20_year: 20
    25_year: 25
    27_5_year: 27.5
    39_year: 39
  citations:
    - "26 USC 168(c): Applicable recovery period"
    - "26 USC 168(e): Classification of property"

# Depreciation methods (Section 168(b))
depreciation_methods:
  description: "Depreciation methods for property classes"
  unit: method
  values:
    3_year: "200_db"
    5_year: "200_db"
    7_year: "200_db"
    10_year: "200_db"
    15_year: "150_db"
    20_year: "150_db"
    25_year: "straight_line"
    27_5_year: "straight_line"
    39_year: "straight_line"
  citations:
    - "26 USC 168(b)(1): 200% DB for 3,5,7,10-year"
    - "26 USC 168(b)(2): 150% DB for 15,20-year"
    - "26 USC 168(b)(3): SL for 25,27.5,39-year"

