# Tests for 26 USC Section 168 - Accelerated Cost Recovery System (MACRS)
#
# MACRS provides depreciation deductions for tangible property.
# Key elements:
# - Recovery periods based on property class (3, 5, 7, 10, 15, 20, 25, 27.5, 39 years)
# - Depreciation methods (200% DB, 150% DB, straight-line)
# - Conventions (half-year, mid-quarter, mid-month)
# - Bonus depreciation (Section 168(k)) - 100% for 2017-2022, phasing down
#
# Sources:
# - 26 USC 168 - Accelerated cost recovery system
# - IRS Publication 946 - How to Depreciate Property
# - TCJA Section 13201 - 100% bonus depreciation
# - IRS Tables A-1 through A-20 (MACRS percentage tables)

variable: macrs_depreciation
tax_year: 2024

test_cases:
  # Basic MACRS calculations (no bonus)
  - name: "5-year property, first year (half-year convention)"
    description: "Computer equipment using 200% DB with half-year"
    inputs:
      property_class: 5_year
      depreciation_method: double_declining_balance
      convention: half_year
      cost_basis: 10000
      year_placed_in_service: 2024
      current_year: 2024  # Year 1
      bonus_depreciation_rate: 0  # No bonus elected
    expected:
      # Per IRS Table A-1: Year 1 = 20.00%
      macrs_depreciation: 2000
    citations:
      - "26 USC 168(b)(1): 200% DB method for 3,5,7,10-year property"
      - "26 USC 168(d)(1): Half-year convention"
      - "IRS Publication 946, Table A-1"

  - name: "5-year property, second year"
    inputs:
      property_class: 5_year
      depreciation_method: double_declining_balance
      convention: half_year
      cost_basis: 10000
      year_placed_in_service: 2023
      current_year: 2024  # Year 2
      bonus_depreciation_rate: 0
    expected:
      # Per IRS Table A-1: Year 2 = 32.00%
      macrs_depreciation: 3200
    citations:
      - "IRS Publication 946, Table A-1: Year 2 rate"

  - name: "7-year property, first year"
    description: "Office furniture"
    inputs:
      property_class: 7_year
      depreciation_method: double_declining_balance
      convention: half_year
      cost_basis: 50000
      year_placed_in_service: 2024
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # Per IRS Table A-1: 7-year Year 1 = 14.29%
      macrs_depreciation: 7145  # 50000 * 0.1429
    citations:
      - "26 USC 168(c): 7-year recovery period for furniture"
      - "IRS Table A-1: 14.29%"

  - name: "15-year property (land improvement), first year"
    description: "Parking lot using 150% DB"
    inputs:
      property_class: 15_year
      depreciation_method: declining_balance_150
      convention: half_year
      cost_basis: 100000
      year_placed_in_service: 2024
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # Per IRS Table A-3: 15-year Year 1 = 5.00%
      macrs_depreciation: 5000
    citations:
      - "26 USC 168(b)(2): 150% DB for 15,20-year property"
      - "IRS Table A-3: 5.00%"

  - name: "39-year property (nonresidential), first year"
    description: "Commercial building using straight-line"
    inputs:
      property_class: 39_year
      depreciation_method: straight_line
      convention: mid_month
      cost_basis: 1000000
      year_placed_in_service: 2024
      month_placed_in_service: 1  # January
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # 1/39 = 2.564% * (11.5/12 months) = 2.461%
      macrs_depreciation: 24610  # Approximately
    citations:
      - "26 USC 168(c): 39-year for nonresidential real property"
      - "26 USC 168(b)(3): Straight-line method"
      - "26 USC 168(d)(2): Mid-month convention"

  - name: "27.5-year property (residential rental), first year"
    description: "Rental apartment building"
    inputs:
      property_class: 27_5_year
      depreciation_method: straight_line
      convention: mid_month
      cost_basis: 500000
      year_placed_in_service: 2024
      month_placed_in_service: 7  # July
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # 1/27.5 * (5.5/12 months for July placement)
      macrs_depreciation: 8333  # Approximately
    citations:
      - "26 USC 168(c): 27.5-year for residential rental"
      - "IRS Table A-6: Mid-month convention rates"

  # Bonus depreciation tests (Section 168(k))
  - name: "100% bonus depreciation (2022)"
    description: "Full immediate expensing under TCJA"
    tax_year: 2022
    inputs:
      property_class: 5_year
      cost_basis: 100000
      year_placed_in_service: 2022
      current_year: 2022
      qualifies_for_bonus: true
    expected:
      bonus_depreciation: 100000
      regular_macrs: 0
      macrs_depreciation: 100000  # All in first year
    citations:
      - "26 USC 168(k)(1): 100% bonus for property placed in service 2017-2022"
      - "TCJA Section 13201"

  - name: "80% bonus depreciation (2023)"
    description: "Bonus phasedown begins"
    tax_year: 2023
    inputs:
      property_class: 5_year
      cost_basis: 100000
      year_placed_in_service: 2023
      current_year: 2023
      qualifies_for_bonus: true
    expected:
      bonus_depreciation: 80000  # 80% bonus
      # Regular MACRS on remaining $20,000: 20% = $4,000
      regular_macrs: 4000
      macrs_depreciation: 84000
    citations:
      - "26 USC 168(k)(6): 80% for property placed in service in 2023"

  - name: "60% bonus depreciation (2024)"
    tax_year: 2024
    inputs:
      property_class: 5_year
      cost_basis: 100000
      year_placed_in_service: 2024
      current_year: 2024
      qualifies_for_bonus: true
    expected:
      bonus_depreciation: 60000  # 60% bonus
      # Regular MACRS on remaining $40,000: 20% = $8,000
      regular_macrs: 8000
      macrs_depreciation: 68000
    citations:
      - "26 USC 168(k)(6): 60% for property placed in service in 2024"

  - name: "40% bonus depreciation (2025)"
    tax_year: 2025
    inputs:
      property_class: 5_year
      cost_basis: 100000
      year_placed_in_service: 2025
      current_year: 2025
      qualifies_for_bonus: true
    expected:
      bonus_depreciation: 40000  # 40% bonus
      regular_macrs: 12000  # 20% of $60,000
      macrs_depreciation: 52000
    citations:
      - "26 USC 168(k)(6): 40% for property placed in service in 2025"

  - name: "20% bonus depreciation (2026)"
    tax_year: 2026
    inputs:
      property_class: 5_year
      cost_basis: 100000
      year_placed_in_service: 2026
      current_year: 2026
      qualifies_for_bonus: true
    expected:
      bonus_depreciation: 20000  # 20% bonus
      regular_macrs: 16000  # 20% of $80,000
      macrs_depreciation: 36000
    citations:
      - "26 USC 168(k)(6): 20% for property placed in service in 2026"

  - name: "No bonus depreciation (2027+)"
    tax_year: 2027
    inputs:
      property_class: 5_year
      cost_basis: 100000
      year_placed_in_service: 2027
      current_year: 2027
      qualifies_for_bonus: true
    expected:
      bonus_depreciation: 0
      regular_macrs: 20000  # 20% of $100,000
      macrs_depreciation: 20000
    citations:
      - "26 USC 168(k)(6): 0% for property placed in service after 2026"

  # Mid-quarter convention tests
  - name: "Mid-quarter convention, Q4 placement (anti-abuse)"
    description: "Mid-quarter applies when >40% placed in Q4"
    inputs:
      property_class: 5_year
      depreciation_method: double_declining_balance
      convention: mid_quarter
      cost_basis: 10000
      year_placed_in_service: 2024
      quarter_placed_in_service: 4  # Q4
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # Mid-quarter Q4: Year 1 = 5.00% (much lower than half-year)
      macrs_depreciation: 500
    citations:
      - "26 USC 168(d)(3): Mid-quarter convention if >40% in Q4"
      - "IRS Table A-2"

  - name: "Mid-quarter convention, Q1 placement"
    inputs:
      property_class: 5_year
      depreciation_method: double_declining_balance
      convention: mid_quarter
      cost_basis: 10000
      year_placed_in_service: 2024
      quarter_placed_in_service: 1  # Q1
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # Mid-quarter Q1: Year 1 = 35.00% (higher than half-year)
      macrs_depreciation: 3500
    citations:
      - "IRS Table A-2: Q1 mid-quarter rates"

  # ADS (Alternative Depreciation System) tests
  - name: "ADS election - straight line over class life"
    description: "Required for tax-exempt use property, etc."
    inputs:
      property_class: 5_year
      depreciation_system: ads
      depreciation_method: straight_line
      convention: half_year
      cost_basis: 10000
      year_placed_in_service: 2024
      current_year: 2024
      bonus_depreciation_rate: 0
    expected:
      # ADS 5-year: 10% first year (half of 20%)
      macrs_depreciation: 1000
    citations:
      - "26 USC 168(g): Alternative depreciation system"
      - "26 USC 168(g)(2): Straight-line method required"

  # Listed property tests
  - name: "Listed property below 50% business use"
    description: "Must use ADS if business use <= 50%"
    inputs:
      property_class: 5_year
      property_type: listed
      business_use_percentage: 40  # Below 50%
      cost_basis: 20000
      year_placed_in_service: 2024
      current_year: 2024
    expected:
      # Must use ADS: SL over 5 years
      # First year: 10% of ($20,000 * 40%) = $800
      macrs_depreciation: 800
    citations:
      - "26 USC 280F(b)(1): Listed property business use test"
      - "26 USC 280F(b)(2): Must use ADS if <= 50%"

  # Edge cases
  - name: "Zero cost basis"
    inputs:
      property_class: 5_year
      cost_basis: 0
      year_placed_in_service: 2024
      current_year: 2024
    expected:
      macrs_depreciation: 0
    citations:
      - "No depreciation on zero basis"

  - name: "Property fully depreciated"
    inputs:
      property_class: 5_year
      cost_basis: 10000
      year_placed_in_service: 2018
      current_year: 2024  # Year 7 - beyond 6-year recovery
    expected:
      macrs_depreciation: 0
    citations:
      - "5-year property fully recovered after 6 years"

  - name: "Depreciation before placed in service"
    inputs:
      property_class: 5_year
      cost_basis: 10000
      year_placed_in_service: 2025
      current_year: 2024  # Before placement
    expected:
      macrs_depreciation: 0
    citations:
      - "No depreciation until placed in service"
