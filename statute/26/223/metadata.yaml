# 26 USC Section 223 - Health Savings Accounts
#
# Enacted by the Medicare Prescription Drug, Improvement,
# and Modernization Act of 2003 (P.L. 108-173)

title: "Health Savings Accounts"
section: "26 USC 223"
enacted: 2003-12-08
effective: 2004-01-01

description: |
  Section 223 establishes Health Savings Accounts (HSAs), which are
  tax-advantaged accounts for individuals covered by High Deductible
  Health Plans (HDHPs). HSAs provide a triple tax benefit:

  1. Contributions are deductible above-the-line (223(a))
  2. Earnings grow tax-free (223(e))
  3. Distributions for qualified medical expenses are tax-free (223(f))

  Key eligibility requirements:
  - Must be covered by a qualifying HDHP (223(c)(1))
  - Cannot be enrolled in Medicare (223(b)(7))
  - Cannot be claimed as a dependent (223(b)(6))
  - Cannot have disqualifying non-HDHP coverage (223(c)(1)(A)(ii))

