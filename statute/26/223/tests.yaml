# Tests for 26 USC Section 223 - Health Savings Accounts
#
# This file tests all HSA rules from IRC Section 223:
#   - HDHP requirements: IRC 223(c)(2)
#   - Eligibility requirements: IRC 223(c)(1), 223(b)(6), 223(b)(7)
#   - Contribution limits: IRC 223(b)(2), 223(b)(3)
#   - Deduction calculation: IRC 223(a)
#   - Distribution rules: IRC 223(f)

variable: hsa_deduction
tax_year: 2024

test_cases:
  # ============================================================================
  # IRC 223(c)(2) - HDHP Requirements
  # "High deductible health plan" must meet minimum deductible and maximum OOP
  # 2024 limits: Min deductible $1,600/$3,200; Max OOP $8,050/$16,100
  # ============================================================================

  - name: "Self-only HDHP meets requirements"
    description: "Plan with $2,000 deductible and $6,000 OOP qualifies as HDHP"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_qualifying_hdhp: true
      meets_hdhp_deductible_requirement: true
      meets_hdhp_oop_requirement: true
      hsa_contribution_limit: 4150
      hsa_deduction: 4150
    citations:
      - "26 USC 223(c)(2)(A)(i): min deductible $1,600 for self-only (2024)"
      - "26 USC 223(c)(2)(A)(ii): max OOP $8,050 for self-only (2024)"
      - "Rev. Proc. 2023-22: 2024 contribution limit $4,150 self-only"

  - name: "Self-only deductible too low - not HDHP"
    description: "Plan with $1,500 deductible does not qualify as HDHP"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 1500
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      meets_hdhp_deductible_requirement: false
      is_qualifying_hdhp: false
      is_hsa_eligible: false
      hsa_deduction: 0
    citations:
      - "26 USC 223(c)(2)(A)(i): $1,500 < $1,600 minimum"

  - name: "Self-only OOP too high - not HDHP"
    description: "Plan with $9,000 OOP does not qualify as HDHP"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 9000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      meets_hdhp_oop_requirement: false
      is_qualifying_hdhp: false
      is_hsa_eligible: false
      hsa_deduction: 0
    citations:
      - "26 USC 223(c)(2)(A)(ii): $9,000 > $8,050 maximum"

  - name: "Family HDHP meets requirements"
    description: "Family plan with $3,500 deductible and $12,000 OOP qualifies"
    inputs:
      hdhp_coverage_type: family
      hdhp_annual_deductible: 3500
      hdhp_out_of_pocket_maximum: 12000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 40
      hsa_contributions_self: 8300
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_qualifying_hdhp: true
      hsa_contribution_limit: 8300
      hsa_deduction: 8300
    citations:
      - "26 USC 223(c)(2)(A)(i): min deductible $3,200 for family (2024)"
      - "26 USC 223(c)(2)(A)(ii): max OOP $16,100 for family (2024)"
      - "Rev. Proc. 2023-22: 2024 contribution limit $8,300 family"

  - name: "Family deductible too low - not HDHP"
    description: "Family plan with $3,000 deductible does not qualify"
    inputs:
      hdhp_coverage_type: family
      hdhp_annual_deductible: 3000
      hdhp_out_of_pocket_maximum: 12000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 40
      hsa_contributions_self: 8300
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      meets_hdhp_deductible_requirement: false
      is_qualifying_hdhp: false
      hsa_deduction: 0
    citations:
      - "26 USC 223(c)(2)(A)(i): $3,000 < $3,200 minimum for family"

  # ============================================================================
  # IRC 223(b)(6) - Denial of Deduction to Dependents
  # "No deduction shall be allowed... to any individual with respect to
  # whom a deduction under section 151 is allowable to another taxpayer"
  # ============================================================================

  - name: "Dependent cannot claim HSA deduction"
    description: "Individual who can be claimed as dependent gets no deduction"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: true
      age: 22
      hsa_contributions_self: 2000
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_qualifying_hdhp: true
      is_hsa_eligible: false
      hsa_deduction: 0
    citations:
      - "26 USC 223(b)(6): No deduction for dependents"

  # ============================================================================
  # IRC 223(b)(7) - Medicare Eligible Individuals
  # "The limitation... shall be zero for the first month such individual
  # is entitled to benefits under title XVIII of the Social Security Act"
  # ============================================================================

  - name: "Medicare enrollee cannot contribute to HSA"
    description: "Individual enrolled in Medicare is not eligible for HSA"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: true
      can_be_claimed_as_dependent: false
      age: 67
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_qualifying_hdhp: true
      is_hsa_eligible: false
      hsa_deduction: 0
    citations:
      - "26 USC 223(b)(7): No contribution limit for Medicare enrollees"

  # ============================================================================
  # IRC 223(c)(1)(A)(ii) - Disqualifying Health Coverage
  # Cannot have coverage that provides HDHP benefits
  # ============================================================================

  - name: "Disqualifying coverage prevents HSA eligibility"
    description: "Non-HDHP coverage that provides HDHP benefits disqualifies"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: true
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_qualifying_hdhp: true
      is_hsa_eligible: false
      hsa_deduction: 0
    citations:
      - "26 USC 223(c)(1)(A)(ii): No coverage providing HDHP benefits"

  # ============================================================================
  # IRC 223(b)(2) - Contribution Limits
  # 2024: $4,150 self-only, $8,300 family
  # ============================================================================

  - name: "Contributions capped at limit"
    description: "Contributions exceeding limit are deductible only up to limit"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 6000
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      hsa_contribution_limit: 4150
      hsa_deduction: 4150
      hsa_excess_contributions: 1850
    citations:
      - "26 USC 223(b)(1): Deduction limited to contribution limit"
      - "26 USC 4973(g): Excess contributions subject to 6% excise tax"

  - name: "Partial contributions below limit"
    description: "Contributions below limit are fully deductible"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 2000
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      hsa_contribution_limit: 4150
      hsa_deduction: 2000
      hsa_excess_contributions: 0
    citations:
      - "26 USC 223(a): Deduction for amount paid to HSA"

  # ============================================================================
  # IRC 223(b)(3) - Catch-up Contributions for Age 55+
  # Additional $1,000 for individuals who have attained age 55
  # ============================================================================

  - name: "Age 55+ catch-up contribution self-only"
    description: "Catch-up adds $1,000 to self-only limit for age 55+"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 58
      hsa_contributions_self: 5150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_hsa_catch_up_eligible: true
      hsa_base_contribution_limit: 4150
      hsa_contribution_limit: 5150
      hsa_deduction: 5150
    citations:
      - "26 USC 223(b)(3)(A): Increased limit for age 55+"
      - "26 USC 223(b)(3)(B): Additional $1,000"

  - name: "Age 55+ catch-up contribution family"
    description: "Catch-up adds $1,000 to family limit for age 55+"
    inputs:
      hdhp_coverage_type: family
      hdhp_annual_deductible: 3500
      hdhp_out_of_pocket_maximum: 12000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 60
      hsa_contributions_self: 9300
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_hsa_catch_up_eligible: true
      hsa_base_contribution_limit: 8300
      hsa_contribution_limit: 9300
      hsa_deduction: 9300
    citations:
      - "26 USC 223(b)(3): $8,300 + $1,000 = $9,300"

  - name: "Age 54 no catch-up"
    description: "Individual under 55 does not get catch-up contribution"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 54
      hsa_contributions_self: 5150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_hsa_catch_up_eligible: false
      hsa_contribution_limit: 4150
      hsa_deduction: 4150
      hsa_excess_contributions: 1000
    citations:
      - "26 USC 223(b)(3): Must attain age 55"

  # ============================================================================
  # IRC 223(b)(4) - Employer Contributions
  # Employer contributions count toward limit but are excluded from income
  # ============================================================================

  - name: "Employer contributions reduce deductible amount"
    description: "Self contribution deductible is reduced by employer contribution"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 3000
      hsa_contributions_employer: 1500
      months_hdhp_coverage: 12
    expected:
      hsa_contributions_total: 4500
      hsa_contribution_limit: 4150
      hsa_deduction: 2650
      hsa_excess_contributions: 350
    citations:
      - "26 USC 223(b)(4): Employer contributions count toward limit"
      - "Deduction = min($3,000, $4,150 - $1,500) = $2,650"

  - name: "Employer contributions fill entire limit"
    description: "If employer contributes full limit, no deduction available"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 1000
      hsa_contributions_employer: 4150
      months_hdhp_coverage: 12
    expected:
      hsa_contributions_total: 5150
      hsa_deduction: 0
      hsa_excess_contributions: 1000
    citations:
      - "26 USC 223(b)(4): Employer filled limit, no room for deduction"

  # ============================================================================
  # IRC 223(b)(1) - Prorated Limits for Partial Year Coverage
  # ============================================================================

  - name: "Partial year coverage prorates limit"
    description: "6 months of coverage gives 6/12 of annual limit"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 6
    expected:
      hsa_prorated_limit: 2075
      hsa_contribution_limit: 2075
      hsa_deduction: 2075
      hsa_excess_contributions: 2075
    citations:
      - "26 USC 223(b)(1): Sum of monthly limitations"
      - "26 USC 223(b)(2): Monthly limit is 1/12 of annual"
      - "$4,150 * 6/12 = $2,075"

  # ============================================================================
  # IRC 223(f) - Distributions
  # Qualified medical expenses are tax-free; non-qualified subject to tax + 20% penalty
  # ============================================================================

  - name: "Qualified distributions tax-free"
    description: "Distributions for qualified medical expenses have no penalty"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 40
      hsa_contributions_self: 2000
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
      hsa_distributions: 3000
      hsa_qualified_medical_expenses: 3000
      is_disabled: false
    expected:
      hsa_nonqualified_distributions: 0
      is_subject_to_hsa_penalty: false
      hsa_additional_tax: 0
    citations:
      - "26 USC 223(f)(1): Qualified distributions not taxable"

  - name: "Non-qualified distributions incur 20% penalty"
    description: "Distributions not for qualified expenses subject to penalty"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 40
      hsa_contributions_self: 2000
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
      hsa_distributions: 5000
      hsa_qualified_medical_expenses: 3000
      is_disabled: false
    expected:
      hsa_nonqualified_distributions: 2000
      is_subject_to_hsa_penalty: true
      hsa_additional_tax: 400
    citations:
      - "26 USC 223(f)(2): Non-qualified distributions included in income"
      - "26 USC 223(f)(4)(A): 20% additional tax"

  - name: "Age 65+ no penalty on non-qualified distributions"
    description: "Medicare age exempts from 20% penalty (still taxable income)"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 67
      hsa_contributions_self: 0
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
      hsa_distributions: 5000
      hsa_qualified_medical_expenses: 2000
      is_disabled: false
    expected:
      hsa_nonqualified_distributions: 3000
      is_subject_to_hsa_penalty: false
      hsa_additional_tax: 0
    citations:
      - "26 USC 223(f)(4)(C): No penalty after age 65"

  - name: "Disabled individual no penalty"
    description: "Disabled individuals exempt from 20% penalty"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 2000
      hdhp_out_of_pocket_maximum: 6000
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 45
      hsa_contributions_self: 0
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
      hsa_distributions: 4000
      hsa_qualified_medical_expenses: 1000
      is_disabled: true
    expected:
      hsa_nonqualified_distributions: 3000
      is_subject_to_hsa_penalty: false
      hsa_additional_tax: 0
    citations:
      - "26 USC 223(f)(4)(B): No penalty if disabled"

  # ============================================================================
  # Edge Cases and Combined Scenarios
  # ============================================================================

  - name: "No HDHP coverage - no eligibility"
    description: "Without any HDHP coverage, no HSA eligibility"
    inputs:
      hdhp_coverage_type: none
      hdhp_annual_deductible: 0
      hdhp_out_of_pocket_maximum: 0
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 1000
      hsa_contributions_employer: 0
      months_hdhp_coverage: 0
    expected:
      is_qualifying_hdhp: false
      is_hsa_eligible: false
      hsa_contribution_limit: 0
      hsa_deduction: 0
    citations:
      - "26 USC 223(c)(1)(A)(i): Must be covered under HDHP"

  - name: "Maximum self-only at boundary"
    description: "Plan exactly at minimum deductible and maximum OOP"
    inputs:
      hdhp_coverage_type: self_only
      hdhp_annual_deductible: 1600
      hdhp_out_of_pocket_maximum: 8050
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 35
      hsa_contributions_self: 4150
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      meets_hdhp_deductible_requirement: true
      meets_hdhp_oop_requirement: true
      is_qualifying_hdhp: true
      hsa_deduction: 4150
    citations:
      - "26 USC 223(c)(2): Boundary values qualify"

  - name: "Maximum family at boundary"
    description: "Family plan exactly at limits"
    inputs:
      hdhp_coverage_type: family
      hdhp_annual_deductible: 3200
      hdhp_out_of_pocket_maximum: 16100
      has_disqualifying_health_coverage: false
      is_enrolled_in_medicare: false
      can_be_claimed_as_dependent: false
      age: 55
      hsa_contributions_self: 9300
      hsa_contributions_employer: 0
      months_hdhp_coverage: 12
    expected:
      is_qualifying_hdhp: true
      is_hsa_catch_up_eligible: true
      hsa_contribution_limit: 9300
      hsa_deduction: 9300
    citations:
      - "26 USC 223(c)(2) and (b)(3): Max family + catch-up"
