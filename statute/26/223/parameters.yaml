# =============================================================================
# Section 223(f)(4) - Additional Tax Rate
# =============================================================================
additional_tax:
  description: "Additional tax on non-qualified distributions"

  rate:
    description: "Penalty rate on non-qualified HSA distributions"
    unit: percent
    values:
      - date: 2004-01-01
        value: 10
        reference: "Medicare Modernization Act of 2003"
      - date: 2011-01-01
        value: 20
        reference: "Affordable Care Act Section 9004"

# =============================================================================
# Section 223(f)(4)(B) - Medicare Age Threshold (penalty exception age)
# =============================================================================
medicare_age:
  description: "Age at which additional tax on non-qualified distributions no longer applies"
  unit: years
  values:
    - date: 2004-01-01
      value: 65
      reference: "26 USC 223(f)(4)(B): attainment of age 65"

# =============================================================================
# Section 223(b)(2) - Monthly Proration
# =============================================================================
months_per_year:
  description: "Number of months in a year for monthly contribution limit proration"
  unit: months
  values:
    - date: 2004-01-01
      value: 12
      reference: "26 USC 223(b)(2): 1/12 of annual limit"
