# 26 USC Section 223 - Health Savings Account Parameters
#
# Annual limits indexed for inflation under IRC 223(g).
# Values published annually by IRS in Revenue Procedures.

description: "Parameters for Health Savings Accounts under IRC Section 223"
reference: "26 USC 223, Rev. Proc. 2023-22, Rev. Proc. 2024-25"

# =============================================================================
# Section 223(b)(2) - Contribution Limits
# =============================================================================
contribution_limits:
  description: "Maximum annual HSA contributions"

  self_only:
    description: "Maximum contribution for self-only HDHP coverage"
    unit: USD
    period: year
    values:
      - date: 2019-01-01
        value: 3500
        reference: "Rev. Proc. 2018-30"
      - date: 2020-01-01
        value: 3550
        reference: "Rev. Proc. 2019-25"
      - date: 2021-01-01
        value: 3600
        reference: "Rev. Proc. 2020-32"
      - date: 2022-01-01
        value: 3650
        reference: "Rev. Proc. 2021-25"
      - date: 2023-01-01
        value: 3850
        reference: "Rev. Proc. 2022-24"
      - date: 2024-01-01
        value: 4150
        reference: "Rev. Proc. 2023-22"
      - date: 2025-01-01
        value: 4300
        reference: "Rev. Proc. 2024-25"
      - date: 2026-01-01
        value: 4400
        reference: "IRS IR-2025-XX (projected)"

  family:
    description: "Maximum contribution for family HDHP coverage"
    unit: USD
    period: year
    values:
      - date: 2019-01-01
        value: 7000
        reference: "Rev. Proc. 2018-30"
      - date: 2020-01-01
        value: 7100
        reference: "Rev. Proc. 2019-25"
      - date: 2021-01-01
        value: 7200
        reference: "Rev. Proc. 2020-32"
      - date: 2022-01-01
        value: 7300
        reference: "Rev. Proc. 2021-25"
      - date: 2023-01-01
        value: 7750
        reference: "Rev. Proc. 2022-24"
      - date: 2024-01-01
        value: 8300
        reference: "Rev. Proc. 2023-22"
      - date: 2025-01-01
        value: 8550
        reference: "Rev. Proc. 2024-25"
      - date: 2026-01-01
        value: 8800
        reference: "IRS IR-2025-XX (projected)"

# =============================================================================
# Section 223(b)(3) - Catch-up Contributions
# =============================================================================
catch_up:
  description: "Additional contribution amount for age 55+"

  amount:
    description: "Additional catch-up contribution allowed"
    unit: USD
    period: year
    values:
      - date: 2004-01-01
        value: 500
        reference: "Medicare Modernization Act of 2003"
      - date: 2005-01-01
        value: 600
        reference: "26 USC 223(b)(3)(B)"
      - date: 2006-01-01
        value: 700
        reference: "26 USC 223(b)(3)(B)"
      - date: 2007-01-01
        value: 800
        reference: "26 USC 223(b)(3)(B)"
      - date: 2008-01-01
        value: 900
        reference: "26 USC 223(b)(3)(B)"
      - date: 2009-01-01
        value: 1000
        reference: "26 USC 223(b)(3)(B)"
      # Remains at $1,000 - not indexed

  age_threshold:
    description: "Age at which catch-up contributions are allowed"
    unit: years
    values:
      - date: 2004-01-01
        value: 55

