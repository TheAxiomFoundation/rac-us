# Encoding Metadata for 26 USC Sections 1001-1016 - Capital Gains and Losses
#
# This encoding implements the core capital gains tax rules from Subchapter O
# of the Internal Revenue Code (Part I - Determination of Amount of and
# Recognition of Gain or Loss, and Part II - Basis Rules).

encoding:
  created: 2024-12-25
  updated: 2024-12-25
  status: implemented
  encoded_by: claude-opus-4.5
  version: "1.0"

scope:
  title: 26
  subchapter: O
  parts: [I, II]
  sections: [1001, 1011, 1012, 1014, 1015, 1016]
  related_sections: [1, 1211, 1212, 1222, 1223, 1411]

# =============================================================================
# File Structure
# =============================================================================

files:
  - path: capital_gains.rac
    description: |
      Core gain/loss determination per Section 1001(a).
      Implements: Amount Realized - Adjusted Basis = Gain/Loss
    sections_covered:
      - "1001(a): Computation of gain or loss"
      - "1001(b): Amount realized"
      - "1001(c): Recognition of gain or loss"
      - "1011: Adjusted basis for determining gain or loss"
      - "1012: Basis of property - cost"
      - "1014: Basis of property acquired from decedent"
      - "1015: Basis of property acquired by gift"
      - "1016: Adjustments to basis"
    key_variables:
      - realized_gain_loss
      - amount_realized
      - adjusted_basis
      - recognized_gain_loss
      - short_term_capital_gain
      - short_term_capital_loss
      - long_term_capital_gain
      - long_term_capital_loss

  - path: holding_period.rac
    description: |
      Holding period classification for short-term vs long-term treatment.
      Implements tacking rules for substituted basis property.
    sections_covered:
      - "1222(1)-(4): Short-term/Long-term definitions"
      - "1223(1): Substituted basis tacking"
      - "1223(2): Gift property tacking"
      - "1223(9): Inherited property (always long-term)"
    key_variables:
      - is_long_term_asset
      - is_short_term_asset
      - holding_period_days
      - effective_holding_period_days

  - path: netting.rac
    description: |
      Capital gain/loss netting rules and loss limitation.
      Implements Schedule D ordering and $3,000 loss limit.
    sections_covered:
      - "1222(5)-(6): Net short-term capital gain/loss"
      - "1222(7)-(8): Net long-term capital gain/loss"
      - "1222(9)-(11): Capital gain net income, net capital loss, net capital gain"
      - "1211(b): Capital loss limitation ($3,000/$1,500)"
      - "1212(b): Capital loss carryover"
    key_variables:
      - net_short_term_capital_gain
      - net_short_term_capital_loss
      - net_long_term_capital_gain
      - net_long_term_capital_loss
      - net_capital_gain
      - capital_loss_deduction
      - capital_loss_carryover_generated

  - path: preferential_rates.rac
    description: |
      Integration with Section 1(h) preferential rates and NIIT.
      Connects capital gains to 0%/15%/20%/25%/28% rate structure.
    sections_covered:
      - "1(h): Maximum capital gains rate"
      - "1(h)(4): Collectibles (28%)"
      - "1(h)(6): Unrecaptured Section 1250 gain (25%)"
      - "1(h)(11): Qualified dividend income"
      - "1411: Net Investment Income Tax (3.8%)"
    key_variables:
      - adjusted_net_capital_gain
      - total_capital_gains_tax
      - collectibles_gain_tax
      - section_1250_gain_tax
      - niit_on_capital_gains

  - path: parameters.yaml
    description: |
      Statutory rates and limits for capital gains taxation.
      Includes fixed rates (not inflation-adjusted) and thresholds.
    parameters:
      - preferential_rate_zero: 0%
      - preferential_rate_fifteen: 15%
      - preferential_rate_twenty: 20%
      - collectibles_rate: 28%
      - section_1250_rate: 25%
      - capital_loss_limit: $3,000
      - capital_loss_limit_mfs: $1,500
      - niit_rate: 3.8%
      - qsbs_exclusion_rate: 50%/75%/100%

  - path: tests.yaml
    description: |
      Comprehensive test cases covering all capital gains scenarios.
      Includes IRS Publication 544/550 examples and Schedule D scenarios.

# =============================================================================
# Coverage Details
# =============================================================================

coverage:
  tax_years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    This encoding covers the core capital gains rules that apply to most
    individual taxpayers. The implementation follows the Schedule D
    calculation flow.

    Key coverage:
    - Basic gain/loss determination (amount realized - adjusted basis)
    - Cost basis, inherited basis (stepped-up), gift basis (carryover)
    - Holding period classification (>1 year = long-term)
    - Netting rules (ST vs LT, then combine)
    - Loss limitation ($3,000/$1,500 per year)
    - Loss carryforward (indefinite, character preserved)
    - Preferential rates (0%/15%/20% based on income)
    - Special rates (28% collectibles, 25% Section 1250)
    - NIIT integration (3.8% above threshold)

