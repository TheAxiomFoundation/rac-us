# =============================================================================
# Architecture Notes
# =============================================================================

architecture:
  description: |
    The capital gains encoding follows the Schedule D calculation flow:

    1. **Per-Asset Calculation** (capital_gains.rac)
       - Each asset: gain/loss = amount realized - adjusted basis
       - Classify by holding period (ST vs LT)

    2. **Aggregation** (capital_gains.rac)
       - Sum all ST gains, ST losses, LT gains, LT losses

    3. **Netting** (netting.rac)
       - Net ST gains vs ST losses -> Net STCG or Net STCL
       - Net LT gains vs LT losses -> Net LTCG or Net LTCL
       - Combine: Net capital gain or Net capital loss

    4. **Loss Limitation** (netting.rac)
       - If net loss: limited to $3,000 ($1,500 MFS)
       - Excess carries forward

    5. **Rate Application** (preferential_rates.rac)
       - Net capital gain (LTCG portion): 0%/15%/20% rates
       - Collectibles: 28% rate
       - Section 1250: 25% rate
       - All gains: +3.8% NIIT if above threshold

  entity_model: |
    - Asset: Individual capital asset with basis, holding period
    - TaxUnit: Aggregation level for tax calculation
    - Filing status affects: loss limit, rate thresholds, NIIT threshold

  cross_references:
    - Section 1(h) already implemented in statute/26/1/h/
    - Section 1222(11) net_capital_gain definition exists in statute/26/1222/11/
    - NIIT (Section 1411) referenced but full implementation separate
