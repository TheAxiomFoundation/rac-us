# 26 USC Sections 1001-1016 Capital Gains and Losses - Test Cases
#
# Comprehensive tests for:
# - Gain/loss determination (Section 1001)
# - Holding period classification (Section 1222-1223)
# - Netting rules (Section 1222)
# - Capital loss limitation (Section 1211)
# - Capital loss carryover (Section 1212)
# - Preferential rates integration (Section 1(h))
# - NIIT on capital gains (Section 1411)
#
# Sources:
# - IRS Publication 544: Sales and Other Dispositions of Assets
# - IRS Publication 550: Investment Income and Expenses
# - Schedule D (Form 1040) instructions
# - IRS examples and worksheets

metadata:
  module: statute.26.1001
  description: Capital gains and losses test cases
  maintainer: cosilico-team
  tags: [capital-gains, investments, schedule-d]

# =============================================================================
# Section 1001 - Basic Gain/Loss Determination
# =============================================================================

tests:
  - name: "Basic capital gain - stock sale"
    description: "Simple stock sale with gain"
    reference: "26 USC Section 1001(a)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "AAPL stock"
            amount_realized: 15000
            original_basis: 10000
            acquisition_date: 2022-03-15
            disposition_date: 2024-06-20
            asset_type: stock
    expected:
      realized_gain_loss: 5000
      holding_period_days: 828
      is_long_term_asset: true
      long_term_capital_gain: 5000
      short_term_capital_gain: 0

  - name: "Basic capital loss - stock sale"
    description: "Stock sale with loss"
    reference: "26 USC Section 1001(a)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "TSLA stock"
            amount_realized: 8000
            original_basis: 12000
            acquisition_date: 2023-01-10
            disposition_date: 2024-06-15
            asset_type: stock
    expected:
      realized_gain_loss: -4000
      is_long_term_asset: true
      long_term_capital_loss: 4000
      long_term_capital_gain: 0

  - name: "Short-term capital gain"
    description: "Stock held less than 1 year"
    reference: "26 USC Section 1222(1)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "MSFT stock"
            amount_realized: 6000
            original_basis: 5000
            acquisition_date: 2024-02-01
            disposition_date: 2024-08-15
            asset_type: stock
    expected:
      realized_gain_loss: 1000
      holding_period_days: 196
      is_long_term_asset: false
      short_term_capital_gain: 1000
      long_term_capital_gain: 0

  - name: "Boundary case - exactly 1 year"
    description: "Asset held exactly 365 days is short-term"
    reference: "26 USC Section 1222(3)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "Stock"
            amount_realized: 11000
            original_basis: 10000
            acquisition_date: 2023-06-01
            disposition_date: 2024-06-01  # Exactly 366 days (leap year)
            asset_type: stock
    expected:
      holding_period_days: 366
      is_long_term_asset: true  # > 365 days = long-term
      long_term_capital_gain: 1000

  - name: "Boundary case - 1 day short of 1 year"
    description: "Asset held 365 days is short-term"
    reference: "26 USC Section 1222(1)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "Stock"
            amount_realized: 11000
            original_basis: 10000
            acquisition_date: 2023-06-02
            disposition_date: 2024-06-01  # 365 days
            asset_type: stock
    expected:
      holding_period_days: 365
      is_long_term_asset: false  # Must be > 365
      short_term_capital_gain: 1000

# =============================================================================
# Section 1011-1016 - Basis Adjustments
# =============================================================================

  - name: "Adjusted basis with improvements"
    description: "Basis increased by capital improvements"
    reference: "26 USC Section 1016(a)(1)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "Rental property"
            amount_realized: 350000
            original_basis: 200000
            capital_improvements: 50000
            depreciation_claimed: 30000
            acquisition_date: 2015-01-01
            disposition_date: 2024-06-01
            asset_type: real_property
    expected:
      adjusted_basis: 220000  # 200000 + 50000 - 30000
      realized_gain_loss: 130000
      is_long_term_asset: true

  - name: "Inherited property - stepped-up basis"
    description: "Property acquired from decedent gets FMV basis"
    reference: "26 USC Section 1014(a)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "Inherited stock"
            amount_realized: 120000
            is_inherited_property: true
            fmv_at_date_of_death: 100000  # Decedent's basis was only $20,000
            acquisition_date: 2024-01-15  # Date of death
            disposition_date: 2024-06-01
            asset_type: stock
    expected:
      inherited_property_basis: 100000  # Stepped up
      realized_gain_loss: 20000  # Not $100,000!
      is_long_term_asset: true  # Always LT per Section 1223(9)

  - name: "Gifted property - carryover basis (gain scenario)"
    description: "Gift with carryover basis - sold at gain"
    reference: "26 USC Section 1015(a)"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "Gifted stock"
            amount_realized: 25000
            is_gifted_property: true
            donor_basis: 10000
            fmv_at_gift_date: 15000
            donor_holding_period_days: 400
            acquisition_date: 2024-03-01
            disposition_date: 2024-09-01
            asset_type: stock
    expected:
      gifted_property_basis: 10000  # Carryover from donor
      realized_gain_loss: 15000
      # Holding period tacks: 400 + 184 = 584 days
      effective_holding_period_days: 584
      is_long_term_asset: true  # Due to tacking

# =============================================================================
# Section 1222 - Netting Rules
# =============================================================================

  - name: "Netting - STCG exceeds STCL"
    description: "Net short-term capital gain"
    reference: "26 USC Section 1222(5)"
    period: 2024
    input:
      tax_unit:
        short_term_capital_gain: 10000
        short_term_capital_loss: 3000
        long_term_capital_gain: 0
        long_term_capital_loss: 0
    expected:
      net_short_term_capital_gain: 7000
      net_short_term_capital_loss: 0
      capital_gain_net_income: 7000
      net_capital_gain: 0  # No LTCG

  - name: "Netting - LTCG exceeds LTCL"
    description: "Net long-term capital gain"
    reference: "26 USC Section 1222(7)"
    period: 2024
    input:
      tax_unit:
        short_term_capital_gain: 0
        short_term_capital_loss: 0
        long_term_capital_gain: 20000
        long_term_capital_loss: 5000
    expected:
      net_long_term_capital_gain: 15000
      net_long_term_capital_loss: 0
      capital_gain_net_income: 15000
      net_capital_gain: 15000  # LTCG for preferential rates

  - name: "Netting - Net LTCG offsets net STCL"
    description: "Net capital gain calculation"
    reference: "26 USC Section 1222(11)"
    period: 2024
    input:
      tax_unit:
        short_term_capital_gain: 5000
        short_term_capital_loss: 12000
        long_term_capital_gain: 25000
        long_term_capital_loss: 3000
    expected:
      net_short_term_capital_loss: 7000   # 12000 - 5000
      net_long_term_capital_gain: 22000   # 25000 - 3000
      capital_gain_net_income: 15000      # 22000 - 7000
      net_capital_gain: 15000             # Net LTCG - net STCL

  - name: "Netting - Net STCG offsets net LTCL"
    description: "Net short-term gain offsets long-term loss"
    reference: "26 USC Section 1222(9)"
    period: 2024
    input:
      tax_unit:
        short_term_capital_gain: 15000
        short_term_capital_loss: 3000
        long_term_capital_gain: 5000
        long_term_capital_loss: 10000
    expected:
      net_short_term_capital_gain: 12000  # 15000 - 3000
      net_long_term_capital_loss: 5000    # 10000 - 5000
      capital_gain_net_income: 7000       # 12000 - 5000
      net_capital_gain: 0                 # No net LTCG for preferential rates

# =============================================================================
# Section 1211(b) - Capital Loss Limitation
# =============================================================================

  - name: "Capital loss limitation - under limit"
    description: "Net loss under $3,000 limit fully deductible"
    reference: "26 USC Section 1211(b)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        short_term_capital_gain: 1000
        short_term_capital_loss: 2500
        long_term_capital_gain: 500
        long_term_capital_loss: 1000
    expected:
      net_capital_loss: 2000             # Total losses exceed gains by $2,000
      capital_loss_deduction_limit: 3000
      capital_loss_deduction: 2000       # Full loss allowed
      capital_loss_carryover_generated: 0

  - name: "Capital loss limitation - over limit"
    description: "Net loss exceeds $3,000 limit"
    reference: "26 USC Section 1211(b)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        short_term_capital_gain: 2000
        short_term_capital_loss: 8000
        long_term_capital_gain: 1000
        long_term_capital_loss: 5000
    expected:
      net_capital_loss: 10000            # $13,000 losses - $3,000 gains
      capital_loss_deduction_limit: 3000
      capital_loss_deduction: 3000       # Limited
      capital_loss_carryover_generated: 7000

  - name: "Capital loss limitation - MFS half limit"
    description: "Married filing separately gets $1,500 limit"
    reference: "26 USC Section 1211(b)(1)"
    period: 2024
    input:
      tax_unit:
        filing_status: married_filing_separately
        short_term_capital_gain: 0
        short_term_capital_loss: 5000
        long_term_capital_gain: 0
        long_term_capital_loss: 3000
    expected:
      net_capital_loss: 8000
      capital_loss_deduction_limit: 1500  # Half of $3,000
      capital_loss_deduction: 1500
      capital_loss_carryover_generated: 6500

# =============================================================================
# Section 1212(b) - Capital Loss Carryover
# =============================================================================

  - name: "Loss carryover - ST and LT character preserved"
    description: "Carryover maintains character"
    reference: "26 USC Section 1212(b)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        short_term_capital_gain: 0
        short_term_capital_loss: 6000
        long_term_capital_gain: 0
        long_term_capital_loss: 4000
    expected:
      net_capital_loss: 10000
      capital_loss_deduction: 3000
      # ST loss used first for deduction
      short_term_loss_carryover_generated: 3000   # 6000 - 3000 deduction
      long_term_loss_carryover_generated: 4000    # Full LT loss carries

  - name: "Loss carryover used in current year"
    description: "Prior year carryover reduces current gains"
    reference: "26 USC Section 1212(b)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        short_term_capital_gain: 8000
        short_term_capital_loss: 0
        short_term_capital_loss_carryover: 5000  # From prior year
        long_term_capital_gain: 12000
        long_term_capital_loss: 2000
        long_term_capital_loss_carryover: 3000   # From prior year
    expected:
      # ST: 8000 gain - 5000 carryover = 3000 net STCG
      net_short_term_capital_gain: 3000
      # LT: 12000 gain - 2000 loss - 3000 carryover = 7000 net LTCG
      net_long_term_capital_gain: 7000
      capital_gain_net_income: 10000
      net_capital_gain: 7000

# =============================================================================
# Section 1(h) Integration - Preferential Rates
# =============================================================================

  - name: "Preferential rates - 0% bracket"
    description: "LTCG fully within 0% bracket"
    reference: "26 USC Section 1(h)(1)(B)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        taxable_income: 40000
        long_term_capital_gain: 7000
        long_term_capital_loss: 0
        short_term_capital_gain: 0
        short_term_capital_loss: 0
    expected:
      net_capital_gain: 7000
      # Ordinary income: 40000 - 7000 = 33000
      # 0% threshold: 47025
      # Space in 0%: 47025 - 33000 = 14025
      capital_gains_taxed_at_zero_pct: 7000   # All at 0%
      capital_gains_taxed_at_fifteen_pct: 0
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 0

  - name: "Preferential rates - split 0%/15%"
    description: "LTCG spans 0% and 15% brackets"
    reference: "26 USC Section 1(h)(1)(B)-(C)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        taxable_income: 60000
        long_term_capital_gain: 20000
        long_term_capital_loss: 0
        short_term_capital_gain: 0
        short_term_capital_loss: 0
    expected:
      net_capital_gain: 20000
      # Ordinary income: 60000 - 20000 = 40000
      # 0% threshold: 47025
      # Space in 0%: 47025 - 40000 = 7025
      capital_gains_taxed_at_zero_pct: 7025
      capital_gains_taxed_at_fifteen_pct: 12975  # 20000 - 7025
      capital_gains_taxed_at_twenty_pct: 0
      capital_gains_tax: 1946.25  # 0 + (12975 * 0.15)
    tolerance_dollars: 1

  - name: "Preferential rates - 20% bracket"
    description: "High income taxpayer in 20% bracket"
    reference: "26 USC Section 1(h)(1)(D)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        taxable_income: 600000
        long_term_capital_gain: 100000
        long_term_capital_loss: 0
        short_term_capital_gain: 0
        short_term_capital_loss: 0
    expected:
      net_capital_gain: 100000
      # Ordinary income: 600000 - 100000 = 500000
      # This is above 15% threshold (518900) already
      capital_gains_taxed_at_zero_pct: 0
      capital_gains_taxed_at_fifteen_pct: 18900  # 518900 - 500000
      capital_gains_taxed_at_twenty_pct: 81100  # 100000 - 18900
      capital_gains_tax: 19055  # (18900 * 0.15) + (81100 * 0.20)
    tolerance_dollars: 1

# =============================================================================
# Section 1411 - Net Investment Income Tax (NIIT)
# =============================================================================

  - name: "NIIT on capital gains - above threshold"
    description: "NIIT applies to capital gains above MAGI threshold"
    reference: "26 USC Section 1411"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        modified_agi: 250000
        capital_gain_net_income: 50000
    expected:
      niit_threshold: 200000
      # MAGI over threshold: 250000 - 200000 = 50000
      # Capital gains = 50000, all subject to NIIT
      capital_gains_subject_to_niit: 50000
      niit_on_capital_gains: 1900  # 50000 * 0.038
    tolerance_dollars: 1

  - name: "NIIT on capital gains - below threshold"
    description: "No NIIT when MAGI below threshold"
    reference: "26 USC Section 1411"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        modified_agi: 180000
        capital_gain_net_income: 30000
    expected:
      niit_threshold: 200000
      niit_on_capital_gains: 0  # MAGI below threshold

  - name: "NIIT - MFJ higher threshold"
    description: "MFJ threshold is $250,000"
    reference: "26 USC Section 1411(b)(1)"
    period: 2024
    input:
      tax_unit:
        filing_status: married_filing_jointly
        modified_agi: 280000
        capital_gain_net_income: 40000
    expected:
      niit_threshold: 250000
      # MAGI over threshold: 280000 - 250000 = 30000
      # Lesser of NII (40000) or excess MAGI (30000) = 30000
      niit_on_capital_gains: 1140  # 30000 * 0.038
    tolerance_dollars: 1

# =============================================================================
# Special Asset Types
# =============================================================================

  - name: "Collectibles - 28% rate"
    description: "Gain from collectibles taxed at 28%"
    reference: "26 USC Section 1(h)(4)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        taxable_income: 100000
        collectibles_gain: 20000
    expected:
      collectibles_rate: 0.28
      collectibles_gain_tax: 5600

  - name: "Section 1250 - 25% rate"
    description: "Unrecaptured depreciation taxed at 25%"
    reference: "26 USC Section 1(h)(6)"
    period: 2024
    input:
      tax_unit:
        filing_status: single
        taxable_income: 150000
        section_1250_unrecaptured_gain: 30000
    expected:
      section_1250_rate: 0.25
      section_1250_gain_tax: 7500

  - name: "QSBS - 100% exclusion (post-2010)"
    description: "Qualified small business stock 100% excludable"
    reference: "26 USC Section 1202"
    period: 2024
    input:
      tax_unit:
        assets:
          - name: "Startup stock"
            amount_realized: 2000000
            original_basis: 100000
            is_qsbs_gain: true
            qsbs_acquisition_date: 2015-01-01  # After 9/27/2010
            acquisition_date: 2015-01-01
            disposition_date: 2024-06-01
    expected:
      realized_gain_loss: 1900000
      qsbs_exclusion_pct: 1.00
      # Exclusion: min(1900000, 10000000) = 1900000
      recognized_gain_loss: 0  # Fully excluded
      long_term_capital_gain: 0

# =============================================================================
# Complex Scenarios
# =============================================================================

  - name: "Complex scenario - multiple asset types"
    description: "Mixed ST/LT gains and losses with netting"
    reference: "Schedule D (Form 1040)"
    period: 2024
    input:
      tax_unit:
        filing_status: married_filing_jointly
        taxable_income: 180000
        assets:
          - name: "Tech stock 1"
            amount_realized: 50000
            original_basis: 30000
            acquisition_date: 2022-01-15
            disposition_date: 2024-06-20
            asset_type: stock
          - name: "Tech stock 2"
            amount_realized: 15000
            original_basis: 25000
            acquisition_date: 2023-08-01
            disposition_date: 2024-05-15
            asset_type: stock
          - name: "Day trade"
            amount_realized: 8000
            original_basis: 6000
            acquisition_date: 2024-03-01
            disposition_date: 2024-03-15
            asset_type: stock
    expected:
      # Stock 1: $20,000 LTCG
      # Stock 2: $10,000 LTCL
      # Day trade: $2,000 STCG
      short_term_capital_gain: 2000
      short_term_capital_loss: 0
      long_term_capital_gain: 20000
      long_term_capital_loss: 10000
      net_short_term_capital_gain: 2000
      net_long_term_capital_gain: 10000
      capital_gain_net_income: 12000
      net_capital_gain: 10000  # For preferential rates

  - name: "Loss year with carryover generation"
    description: "Net loss year generates carryforward"
    reference: "26 USC Section 1212(b)"
    period: 2024
    input:
      tax_unit:
        filing_status: head_of_household
        short_term_capital_gain: 5000
        short_term_capital_loss: 15000
        long_term_capital_gain: 8000
        long_term_capital_loss: 20000
    expected:
      net_short_term_capital_loss: 10000  # 15000 - 5000
      net_long_term_capital_loss: 12000   # 20000 - 8000
      net_capital_loss: 22000             # Total net loss
      capital_loss_deduction_limit: 3000
      capital_loss_deduction: 3000
      capital_loss_carryover_generated: 19000
      capital_gain_or_loss_for_agi: -3000

# =============================================================================
# Property-Based Tests
# =============================================================================

properties:
  - name: "Net capital gain is non-negative"
    description: "Net capital gain per 1222(11) cannot be negative"
    for_all:
      variables: [net_capital_gain]
      constraint: net_capital_gain >= 0

  - name: "Capital loss deduction bounded by limit"
    description: "Loss deduction cannot exceed statutory limit"
    for_all:
      variables: [capital_loss_deduction, capital_loss_deduction_limit]
      constraint: capital_loss_deduction <= capital_loss_deduction_limit

  - name: "Total gains equal sum of ST and LT"
    description: "Conservation of gains"
    for_all:
      variables: [capital_gain_net_income, net_short_term_capital_gain, net_long_term_capital_gain]
      where:
        net_capital_loss: 0  # Only when net gain
      constraint: |
        capital_gain_net_income <= net_short_term_capital_gain + net_long_term_capital_gain

  - name: "Carryover only when excess loss"
    description: "Carryover only generated when loss exceeds deduction"
    for_all:
      variables: [capital_loss_carryover_generated, net_capital_loss, capital_loss_deduction]
      constraint: |
        capital_loss_carryover_generated == max(0, net_capital_loss - capital_loss_deduction)

  - name: "Preferential rate tax is non-negative"
    description: "Capital gains tax cannot be negative"
    for_all:
      variables: [capital_gains_tax, total_capital_gains_tax]
      constraint: |
        capital_gains_tax >= 0 and total_capital_gains_tax >= 0
