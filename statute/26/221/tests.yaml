# 26 USC Section 221 - Student Loan Interest Deduction Tests
#
# Comprehensive test suite for the student loan interest deduction.
#
# Key rules:
#   - Maximum deduction: $2,500
#   - Phase-out thresholds (2024):
#     - Single/HoH: $75,000 - $90,000 MAGI
#     - MFJ: $155,000 - $185,000 MAGI
#   - MFS: Not allowed (disqualified)
#   - Dependents: Not allowed
#   - Interest must be on qualified education loan
#   - Taxpayer must be legally obligated to pay

reference: "26 USC Section 221"
tax_year: 2024

tests:
  # ==========================================================================
  # BASIC DEDUCTION TESTS (No Phase-out)
  # ==========================================================================

  - name: "Single filer - full deduction (low income)"
    description: "Single filer with income below phase-out threshold"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 50000
      student_loan_interest_paid: 1500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_eligible: true
      student_loan_interest_phaseout_ratio: 0
      student_loan_interest_deduction_before_phaseout: 1500
      student_loan_interest_deduction: 1500
    notes: "Full deduction - income below $75,000 threshold"
    citations:
      - "26 USC 221(a): allows deduction for interest paid"
      - "26 USC 221(b)(2)(B): phase-out thresholds"

  - name: "Single filer - maximum deduction"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 60000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction: 2500
    notes: "Maximum $2,500 deduction"
    citations:
      - "26 USC 221(b)(1): maximum deduction is $2,500"

  - name: "Single filer - interest exceeds maximum"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 55000
      student_loan_interest_paid: 4000
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_before_phaseout: 2500
      student_loan_interest_deduction: 2500
    notes: "Interest paid exceeds limit, deduction capped at $2,500"

  - name: "Joint filers - full deduction"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 120000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_eligible: true
      student_loan_interest_phaseout_ratio: 0
      student_loan_interest_deduction: 2500
    notes: "MFJ below $155,000 threshold, full deduction"

  - name: "Head of Household - full deduction"
    inputs:
      filing_status: HEAD_OF_HOUSEHOLD
      adjusted_gross_income: 70000
      student_loan_interest_paid: 2000
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction: 2000
    notes: "HoH uses single filer thresholds"

  # ==========================================================================
  # PHASE-OUT TESTS - SINGLE/HOH
  # ==========================================================================

  - name: "Single filer - phase-out begins (at threshold)"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 75000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_start: 75000
      student_loan_interest_phaseout_end: 90000
      student_loan_interest_phaseout_ratio: 0
      student_loan_interest_deduction: 2500
    notes: "Exactly at phase-out start, no reduction yet"

  - name: "Single filer - partial phase-out (midpoint)"
    description: "MAGI at midpoint of phase-out range"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 82500  # Midpoint of 75000-90000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      # Phase-out: (82500 - 75000) / (90000 - 75000) = 7500 / 15000 = 0.5
      student_loan_interest_phaseout_ratio: 0.5
      # Deduction: 2500 * (1 - 0.5) = 1250
      student_loan_interest_deduction: 1250
    notes: "50% phase-out at midpoint of range"

  - name: "Single filer - phase-out 25%"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 78750  # 25% into phase-out range
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      # Phase-out: (78750 - 75000) / 15000 = 0.25
      student_loan_interest_phaseout_ratio: 0.25
      # Deduction: 2500 * 0.75 = 1875
      student_loan_interest_deduction: 1875
    notes: "25% phase-out"

  - name: "Single filer - phase-out 75%"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 86250  # 75% into phase-out range
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      # Phase-out: (86250 - 75000) / 15000 = 0.75
      student_loan_interest_phaseout_ratio: 0.75
      # Deduction: 2500 * 0.25 = 625
      student_loan_interest_deduction: 625
    notes: "75% phase-out"

  - name: "Single filer - fully phased out (at threshold)"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 90000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_ratio: 1
      student_loan_interest_deduction: 0
    notes: "Exactly at phase-out end, fully phased out"

  - name: "Single filer - above phase-out range"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 100000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_ratio: 1
      student_loan_interest_deduction: 0
    notes: "Income above phase-out range, no deduction"

  # ==========================================================================
  # PHASE-OUT TESTS - MARRIED FILING JOINTLY
  # ==========================================================================

  - name: "MFJ - phase-out begins (at threshold)"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 155000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_start: 155000
      student_loan_interest_phaseout_end: 185000
      student_loan_interest_phaseout_ratio: 0
      student_loan_interest_deduction: 2500
    notes: "MFJ at phase-out start threshold"

  - name: "MFJ - partial phase-out (midpoint)"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 170000  # Midpoint of 155000-185000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      # Phase-out: (170000 - 155000) / (185000 - 155000) = 15000 / 30000 = 0.5
      student_loan_interest_phaseout_ratio: 0.5
      student_loan_interest_deduction: 1250
    notes: "MFJ 50% phase-out at midpoint"

  - name: "MFJ - fully phased out"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 185000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_ratio: 1
      student_loan_interest_deduction: 0
    notes: "MFJ at phase-out end, no deduction"

  - name: "MFJ - above phase-out range"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 200000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction: 0
    notes: "MFJ income above phase-out, no deduction"

  # ==========================================================================
  # DISQUALIFICATION TESTS
  # ==========================================================================

  - name: "Married Filing Separately - not allowed"
    description: "MFS filers cannot claim this deduction"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      adjusted_gross_income: 50000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_eligible: false
      student_loan_interest_deduction: 0
    notes: "MFS disqualifies from deduction per 26 USC 221(d)(2)"
    citations:
      - "26 USC 221(d)(2): married couples must file joint return"

  - name: "Claimed as dependent - not allowed"
    description: "Person claimed as dependent cannot take deduction"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 30000
      student_loan_interest_paid: 1500
      is_claimed_as_dependent: true
    expected:
      student_loan_interest_deduction_eligible: false
      student_loan_interest_deduction: 0
    notes: "Dependents cannot claim deduction per 26 USC 221(d)(3)"
    citations:
      - "26 USC 221(d)(3): no deduction for dependents"

  - name: "MFS with low income - still not allowed"
    inputs:
      filing_status: MARRIED_FILING_SEPARATELY
      adjusted_gross_income: 25000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction: 0
    notes: "MFS disqualification applies regardless of income level"

  # ==========================================================================
  # EDGE CASES
  # ==========================================================================

  - name: "Zero interest paid"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 50000
      student_loan_interest_paid: 0
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_before_phaseout: 0
      student_loan_interest_deduction: 0
    notes: "No interest paid, no deduction"

  - name: "Small interest amount"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 45000
      student_loan_interest_paid: 250
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction: 250
    notes: "Small amount fully deductible"

  - name: "Phase-out with interest below maximum"
    description: "Phase-out applies to actual interest, not maximum"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 82500  # 50% phase-out
      student_loan_interest_paid: 1000
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_before_phaseout: 1000
      student_loan_interest_phaseout_ratio: 0.5
      # Deduction: 1000 * (1 - 0.5) = 500
      student_loan_interest_deduction: 500
    notes: "Phase-out applies to actual interest paid"

  - name: "Just below phase-out start"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 74999
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_ratio: 0
      student_loan_interest_deduction: 2500
    notes: "$1 below threshold, full deduction"

  - name: "Just above phase-out end"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 90001
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_phaseout_ratio: 1
      student_loan_interest_deduction: 0
    notes: "$1 above threshold, no deduction"

  # ==========================================================================
  # COMBINED SCENARIOS
  # ==========================================================================

  - name: "Young professional - typical case"
    description: "Recent graduate with moderate income and student loans"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 65000
      student_loan_interest_paid: 3200
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_before_phaseout: 2500  # Capped
      student_loan_interest_deduction: 2500
    notes: "Typical recent graduate scenario"

  - name: "Married couple - one spouse with loans"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 140000
      student_loan_interest_paid: 1800
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction: 1800
    notes: "MFJ below phase-out, full deduction"

  - name: "High earner - partial deduction"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 80000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      # Phase-out: (80000 - 75000) / 15000 = 1/3
      student_loan_interest_phaseout_ratio: 0.3333333333333333
      # Deduction: 2500 * (1 - 1/3) = 1666.67
      student_loan_interest_deduction: 1666.67
    notes: "One-third phase-out"

  - name: "MFJ - both spouses have loans"
    description: "Combined interest from both spouses"
    inputs:
      filing_status: MARRIED_FILING_JOINTLY
      adjusted_gross_income: 145000
      # Assuming spouse1 paid $1500, spouse2 paid $1200
      student_loan_interest_paid: 2700  # Total
      is_claimed_as_dependent: false
    expected:
      student_loan_interest_deduction_before_phaseout: 2500  # Capped at max
      student_loan_interest_deduction: 2500
    notes: "Combined interest capped at $2,500"

  - name: "Graduate student - dependent status"
    description: "Graduate student claimed as dependent"
    inputs:
      filing_status: SINGLE
      adjusted_gross_income: 20000
      student_loan_interest_paid: 800
      is_claimed_as_dependent: true
    expected:
      student_loan_interest_deduction: 0
    notes: "Cannot claim if dependent, even with low income"

  # ==========================================================================
  # QUALIFYING WIDOW(ER) STATUS
  # ==========================================================================

  - name: "Qualifying widow - uses single thresholds"
    inputs:
      filing_status: QUALIFYING_WIDOW
      adjusted_gross_income: 70000
      student_loan_interest_paid: 2500
      is_claimed_as_dependent: false
    expected:
      # QW uses single filer thresholds for this deduction
      student_loan_interest_phaseout_start: 75000
      student_loan_interest_phaseout_ratio: 0
      student_loan_interest_deduction: 2500
    notes: "Qualifying widow uses single thresholds"
