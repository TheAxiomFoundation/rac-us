# 26 USC 3101 - Employee FICA Tax Parameters
#
# Employee share of FICA taxes:
# - 26 USC 3101(a): Social Security (OASDI) tax - 6.2% up to wage base
# - 26 USC 3101(b): Medicare (HI) tax - 1.45% on all wages (no cap)
# - 26 USC 3101(b)(2): Additional Medicare Tax on high earners (0.9%)
#
# Employer share is under 26 USC 3111.
#
# Key statutes:
# - 26 USC 3101(a): Employee Social Security tax rate
# - 26 USC 3101(b)(1): Base Medicare tax rate
# - 26 USC 3101(b)(2): Additional Medicare Tax on high earners
# - 26 USC 3121(a): Definition of wages subject to tax
# - Rev. Proc. 2023-34: 2024 Social Security wage base ($168,600)
#
# Note: Social Security tax has a wage base cap; Medicare has no cap.

variable: employee_fica_tax
entity: Person
period: Year
dtype: Money

