# 26 USC 3101 - Medicare Tax Parameters
#
# Employee share of Hospital Insurance (HI) tax under FICA.
# Employer share is under 26 USC 3111.
#
# Key statutes:
# - 26 USC 3101(b)(1): Base Medicare tax rate
# - 26 USC 3101(b)(2): Additional Medicare Tax on high earners
# - 26 USC 3121(a): Definition of wages subject to tax
#
# Note: Unlike Social Security tax, there is NO wage base limit for Medicare tax.
# All covered wages are subject to the tax.

variable: medicare_tax
entity: Person
period: Year
dtype: Money

# =============================================================================
# BASE MEDICARE TAX RATE - 26 USC 3101(b)(1)
# =============================================================================

employee_rate:
  description: "Employee Medicare (HI) tax rate per 26 USC 3101(b)(1)"
  unit: rate
  period: year
  label: "Employee Medicare tax rate"
  values:
    # Current rate since 1986 (Medicare Catastrophic Coverage Act)
    1986-01-01: 0.0145
    # Historical rates
    1985-01-01: 0.0135
    1984-01-01: 0.013
    1983-01-01: 0.013
    1982-01-01: 0.0105
    1981-01-01: 0.0105
    1979-01-01: 0.0105
    1978-01-01: 0.01
    1974-01-01: 0.009
    1973-01-01: 0.01
    1968-01-01: 0.006
    1966-01-01: 0.0035
  citations:
    - "26 USC 3101(b)(1): rate of 1.45 percent of wages"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3101"

# =============================================================================
# ADDITIONAL MEDICARE TAX - 26 USC 3101(b)(2)
# Enacted by Affordable Care Act (2010), effective 2013
# =============================================================================

additional_rate:
  description: "Additional Medicare Tax rate on high earners per 26 USC 3101(b)(2)"
  unit: rate
  period: year
  label: "Additional Medicare Tax rate"
  values:
    2013-01-01: 0.009  # 0.9% additional tax
    # Prior to 2013: no additional Medicare tax
  citations:
    - "26 USC 3101(b)(2): additional tax equal to 0.9 percent"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3101"

# Thresholds vary by filing status per 26 USC 3101(b)(2)(A)-(C)
# These amounts are NOT indexed for inflation

additional_threshold_joint:
  description: "Additional Medicare Tax threshold for joint filers per 26 USC 3101(b)(2)(A)"
  unit: USD
  period: year
  label: "Additional Medicare Tax threshold (joint)"
  values:
    2013-01-01: 250000
  citations:
    - "26 USC 3101(b)(2)(A): $250,000 for joint returns"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3101"

additional_threshold_separate:
  description: "Additional Medicare Tax threshold for married filing separately per 26 USC 3101(b)(2)(B)"
  unit: USD
  period: year
  label: "Additional Medicare Tax threshold (MFS)"
  values:
    2013-01-01: 125000
  citations:
    - "26 USC 3101(b)(2)(B): $125,000 for married filing separately"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3101"

additional_threshold_single:
  description: "Additional Medicare Tax threshold for single filers and others per 26 USC 3101(b)(2)(C)"
  unit: USD
  period: year
  label: "Additional Medicare Tax threshold (single/HoH)"
  values:
    2013-01-01: 200000
  citations:
    - "26 USC 3101(b)(2)(C): $200,000 for any other case"
  notes:
    - "Applies to single, head of household, and surviving spouse filers"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+3101"

# =============================================================================
# SELF-EMPLOYMENT TAX - 26 USC 1401(b)
# Self-employed pay both employee and employer shares
# =============================================================================

self_employment_rate:
  description: "Self-employment Medicare tax rate per 26 USC 1401(b)(1)"
  unit: rate
  period: year
  label: "Self-employment Medicare tax rate"
  values:
    # SE rate = employee rate + employer rate = 1.45% + 1.45% = 2.9%
    1986-01-01: 0.029
    1985-01-01: 0.027
    1984-01-01: 0.026
  citations:
    - "26 USC 1401(b)(1): 2.9 percent of self-employment income"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+1401"

self_employment_additional_rate:
  description: "Additional Medicare Tax rate on self-employment income per 26 USC 1401(b)(2)"
  unit: rate
  period: year
  label: "Self-employment Additional Medicare Tax rate"
  values:
    2013-01-01: 0.009  # Same 0.9% additional rate applies
  citations:
    - "26 USC 1401(b)(2): additional 0.9 percent on SE income above threshold"
  reference: "https://uscode.house.gov/view.xhtml?req=26+USC+1401"
