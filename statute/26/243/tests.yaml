# Tests for 26 USC Section 243 - Dividends Received Deduction (DRD)
#
# The DRD allows corporations to deduct a portion of dividends received
# from other domestic corporations to avoid triple taxation.
#
# Deduction percentages:
# - Less than 20% ownership: 50% deduction
# - 20% to <80% ownership: 65% deduction
# - 80%+ ownership (affiliated): 100% deduction
#
# Note: Pre-TCJA (before 2018), rates were 70%, 80%, 100%
#
# Sources:
# - 26 USC 243 - Dividends received by corporations
# - 26 USC 246 - Rules applying to deductions
# - 26 USC 246A - Dividends received deduction reduced if portfolio stock debt-financed
# - IRS Publication 542 - Corporations
# - TCJA Section 13002 - Reduced DRD percentages

variable: dividends_received_deduction
tax_year: 2024

test_cases:
  # Basic DRD calculations (post-TCJA)
  - name: "Less than 20% ownership - 50% DRD"
    description: "Portfolio investment dividends get 50% deduction"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10  # Less than 20%
    expected:
      dividends_received_deduction: 50000  # 50% of $100k
    citations:
      - "26 USC 243(a)(1): 50% deduction for less than 20% ownership"
      - "TCJA Section 13002: Reduced from 70%"

  - name: "Exactly 20% ownership - 65% DRD"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 20
    expected:
      dividends_received_deduction: 65000  # 65% of $100k
    citations:
      - "26 USC 243(c)(1): 65% deduction for 20%+ ownership"
      - "TCJA Section 13002: Reduced from 80%"

  - name: "50% ownership - 65% DRD"
    inputs:
      entity_type: c_corporation
      dividends_received: 200000
      ownership_percentage: 50
    expected:
      dividends_received_deduction: 130000  # 65% of $200k
    citations:
      - "26 USC 243(c)(1): 65% for 20-80% ownership"

  - name: "79% ownership - 65% DRD"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 79
    expected:
      dividends_received_deduction: 65000  # 65% of $100k
    citations:
      - "26 USC 243(c)(1): 65% for < 80% ownership"

  - name: "80%+ ownership (affiliated) - 100% DRD"
    description: "Dividends from affiliated corporations fully deductible"
    inputs:
      entity_type: c_corporation
      dividends_received: 500000
      ownership_percentage: 80
    expected:
      dividends_received_deduction: 500000  # 100% of $500k
    citations:
      - "26 USC 243(a)(3): 100% deduction for 80%+ ownership"
      - "26 USC 243(b)(1): Definition of affiliated group"

  - name: "100% subsidiary - 100% DRD"
    inputs:
      entity_type: c_corporation
      dividends_received: 1000000
      ownership_percentage: 100
    expected:
      dividends_received_deduction: 1000000
    citations:
      - "26 USC 243(a)(3): Fully deductible for affiliates"

  # Pre-TCJA tests (higher rates)
  - name: "Pre-TCJA: Less than 20% ownership - 70% DRD"
    tax_year: 2017
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
    expected:
      dividends_received_deduction: 70000  # 70% of $100k
    citations:
      - "26 USC 243(a)(1) (pre-TCJA): 70% deduction"

  - name: "Pre-TCJA: 20-80% ownership - 80% DRD"
    tax_year: 2017
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 50
    expected:
      dividends_received_deduction: 80000  # 80% of $100k
    citations:
      - "26 USC 243(c) (pre-TCJA): 80% deduction"

  # Taxable income limitation (Section 246(b))
  - name: "Taxable income limitation applies"
    description: "DRD limited by taxable income when it would create a loss"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
      taxable_income_before_drd: 40000  # Less than 50% of dividends
    expected:
      # 50% of $100k = $50k tentative DRD
      # But $50k > $40k taxable income
      # Limited to 50% of $40k = $20k
      dividends_received_deduction: 20000
    citations:
      - "26 USC 246(b): Taxable income limitation"

  - name: "Taxable income limitation - not triggered"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
      taxable_income_before_drd: 60000  # More than 50% of dividends
    expected:
      # 50% of $100k = $50k
      # $60k taxable income > $50k, so full deduction allowed
      dividends_received_deduction: 50000
    citations:
      - "26 USC 246(b): Limitation not triggered"

  - name: "Taxable income limitation creates/increases NOL"
    description: "DRD allowed to create NOL in certain cases"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
      taxable_income_before_drd: -20000  # Already has NOL
    expected:
      # When there's already an NOL, limitation doesn't apply
      # Full 50% DRD allowed
      dividends_received_deduction: 50000
    citations:
      - "26 USC 246(b)(1): Exception for NOL"

  # Mixed dividend sources
  - name: "Dividends from multiple ownership levels"
    inputs:
      entity_type: c_corporation
      dividends_from_less_than_20_pct: 50000
      dividends_from_20_to_80_pct: 100000
      dividends_from_affiliates: 200000
    expected:
      # 50% of $50k + 65% of $100k + 100% of $200k
      # = $25k + $65k + $200k = $290k
      dividends_received_deduction: 290000
    citations:
      - "26 USC 243: Different rates by ownership tier"

  # Holding period requirement (Section 246(c))
  - name: "Holding period not met - no DRD"
    description: "Must hold stock for 46+ days during 91-day period"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
      holding_period_days: 30  # Less than 46 days
    expected:
      dividends_received_deduction: 0
    citations:
      - "26 USC 246(c)(1): 46-day holding requirement"

  - name: "Holding period met"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
      holding_period_days: 50
    expected:
      dividends_received_deduction: 50000
    citations:
      - "26 USC 246(c)(1): Holding period satisfied"

  # Debt-financed portfolio stock (Section 246A)
  - name: "Debt-financed portfolio stock reduction"
    description: "DRD reduced for debt-financed stock"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      ownership_percentage: 10
      debt_financed_percentage: 50  # 50% of stock is debt-financed
    expected:
      # Base DRD = 50% * $100k = $50k
      # Reduction = $50k * 50% = $25k
      # Final DRD = $50k - $25k = $25k
      dividends_received_deduction: 25000
    citations:
      - "26 USC 246A: Reduction for debt-financed stock"

  # Extraordinary dividends (Section 1059)
  - name: "Extraordinary dividend - basis reduction"
    description: "Note: Extraordinary dividends reduce stock basis, not DRD"
    inputs:
      entity_type: c_corporation
      dividends_received: 500000
      ownership_percentage: 10
      stock_basis: 100000
      is_extraordinary_dividend: true
    expected:
      # DRD still computed normally
      dividends_received_deduction: 250000
      # But stock basis reduced by untaxed portion
      stock_basis_reduction: 250000
    citations:
      - "26 USC 1059: Extraordinary dividends"

  # Special dividend types
  - name: "Dividend from tax-exempt corporation - no DRD"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      payor_is_tax_exempt: true
    expected:
      dividends_received_deduction: 0
    citations:
      - "26 USC 246(a)(1): No DRD for tax-exempt dividends"

  - name: "Dividend from foreign corporation - no DRD"
    description: "Section 243 applies to domestic corporations only"
    inputs:
      entity_type: c_corporation
      dividends_received: 100000
      payor_is_foreign: true
    expected:
      dividends_received_deduction: 0
    citations:
      - "26 USC 243(a): Only domestic corporations eligible"
      - "26 USC 245: Foreign dividends have separate rules"

  # Edge cases
  - name: "Zero dividends"
    inputs:
      entity_type: c_corporation
      dividends_received: 0
      ownership_percentage: 50
    expected:
      dividends_received_deduction: 0
    citations:
      - "No dividends, no deduction"

  - name: "S-Corporation - no DRD"
    inputs:
      entity_type: s_corporation
      dividends_received: 100000
      ownership_percentage: 50
    expected:
      dividends_received_deduction: 0
    citations:
      - "Section 243 only applies to C corporations"

  - name: "Individual - no DRD"
    inputs:
      entity_type: individual
      dividends_received: 100000
    expected:
      dividends_received_deduction: 0
    citations:
      - "Section 243 is for corporations only"
