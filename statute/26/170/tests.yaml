# Tests for 26 USC Section 170 - Charitable Contributions

variable: charitable_deduction
tax_year: 2024

test_cases:
  # ==========================================================================
  # Cash Contributions to Public Charities - 60% Limit (TCJA)
  # ==========================================================================

  - name: "Cash donation under 60% limit"
    description: "Full deduction for cash to public charity under limit"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_cash_public_charity: 40000
    expected:
      charitable_deduction: 40000
    citations:
      - "26 USC 170(b)(1)(A)"
      - "TCJA Section 11023: 60% limit"

  - name: "Cash donation at 60% limit"
    description: "Cash contribution exactly at 60% AGI limit"
    inputs:
      filing_status: joint
      adjusted_gross_income: 150000
      charitable_cash_public_charity: 90000
    expected:
      charitable_deduction: 90000
    citations:
      - "26 USC 170(b)(1)(A): 60% limit under TCJA"

  - name: "Cash donation exceeds 60% limit - partial deduction"
    description: "Excess carries forward when exceeding 60% limit"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_cash_public_charity: 80000
    expected:
      charitable_deduction_before_carryforward: 60000  # 60% of $100K
      charitable_carryforward: 20000  # Excess
      charitable_deduction: 60000
    citations:
      - "26 USC 170(b)(1)(A): 60% limit"
      - "26 USC 170(d)(1): 5-year carryforward"

  # ==========================================================================
  # Capital Gain Property to Public Charities - 30% Limit
  # ==========================================================================

  - name: "Appreciated stock donation under 30% limit"
    description: "Capital gain property to public charity"
    inputs:
      filing_status: single
      adjusted_gross_income: 200000
      charitable_property_public_charity: 50000
    expected:
      charitable_deduction: 50000
    citations:
      - "26 USC 170(b)(1)(C): 30% limit for property"

  - name: "Appreciated stock over 30% limit"
    description: "Property donation exceeds 30% AGI limit"
    inputs:
      filing_status: joint
      adjusted_gross_income: 100000
      charitable_property_public_charity: 40000
    expected:
      charitable_deduction_before_carryforward: 30000  # 30% of $100K
      charitable_carryforward: 10000
      charitable_deduction: 30000
    citations:
      - "26 USC 170(b)(1)(C)(i): 30% limit"
      - "26 USC 170(d)(1): carryforward"

  # ==========================================================================
  # Private Foundation Contributions - 30%/20% Limits
  # ==========================================================================

  - name: "Cash to private foundation under 30% limit"
    description: "Cash to private non-operating foundation"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_cash_private_foundation: 20000
    expected:
      charitable_deduction: 20000
    citations:
      - "26 USC 170(b)(1)(B): 30% for private foundations"

  - name: "Property to private foundation under 20% limit"
    description: "Capital gain property to private foundation"
    inputs:
      filing_status: joint
      adjusted_gross_income: 500000
      charitable_property_private_foundation: 80000
    expected:
      charitable_deduction: 80000
    citations:
      - "26 USC 170(b)(1)(D): 20% limit"

  - name: "Property to private foundation over 20% limit"
    description: "Excess carries forward"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_property_private_foundation: 30000
    expected:
      charitable_deduction_before_carryforward: 20000  # 20% of $100K
      charitable_carryforward: 10000
      charitable_deduction: 20000
    citations:
      - "26 USC 170(b)(1)(D): 20% limit"

  # ==========================================================================
  # Combined Contributions - Ordering Rules
  # ==========================================================================

  - name: "Combined cash and property donations"
    description: "Multiple contribution types with different limits"
    inputs:
      filing_status: joint
      adjusted_gross_income: 200000
      charitable_cash_public_charity: 80000  # Up to 60% = $120K
      charitable_property_public_charity: 50000  # Up to 30% = $60K
    expected:
      # Cash: min(80000, 120000) = 80000
      # Property: min(50000, 60000) = 50000
      # Total: 130000, under overall 60% = $120K? No, property at 30% separate
      charitable_deduction: 110000  # 80K cash + 30K property (30% limit)
    citations:
      - "26 USC 170(b)(1)(A): 60% for cash"
      - "26 USC 170(b)(1)(C): 30% for property"

  # ==========================================================================
  # Carryforward Usage
  # ==========================================================================

  - name: "Use prior year carryforward"
    description: "Carryforward from prior year applied"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_cash_public_charity: 40000
      charitable_carryforward_prior: 15000
    expected:
      charitable_deduction_before_carryforward: 40000
      # Remaining capacity: 60% - 40% = 20% = $20K
      charitable_carryforward_used: 15000  # All of prior carryforward
      charitable_deduction: 55000  # 40K + 15K
    citations:
      - "26 USC 170(d)(1): carryforward usage"

  - name: "Carryforward partially used due to limit"
    description: "Only part of carryforward fits within limit"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_cash_public_charity: 55000
      charitable_carryforward_prior: 20000
    expected:
      charitable_deduction_before_carryforward: 55000
      # Remaining capacity: 60K - 55K = $5K
      charitable_carryforward_used: 5000  # Limited to remaining capacity
      charitable_deduction: 60000  # Capped at 60%
    citations:
      - "26 USC 170(d)(1): carryforward limited by AGI limit"

  # ==========================================================================
  # Edge Cases
  # ==========================================================================

  - name: "No charitable contributions"
    description: "Zero deduction when no contributions"
    inputs:
      filing_status: single
      adjusted_gross_income: 75000
      charitable_cash_public_charity: 0
      charitable_property_public_charity: 0
    expected:
      charitable_deduction: 0

  - name: "Zero AGI limits deduction"
    description: "No deduction when AGI is zero"
    inputs:
      filing_status: single
      adjusted_gross_income: 0
      charitable_cash_public_charity: 5000
    expected:
      charitable_deduction: 0
      charitable_carryforward: 5000
    citations:
      - "26 USC 170(b)(1): percentage of AGI"

  - name: "Very high income, large donation"
    description: "High earner with significant charitable giving"
    inputs:
      filing_status: joint
      adjusted_gross_income: 1000000
      charitable_cash_public_charity: 500000
      charitable_property_public_charity: 200000
    expected:
      # Cash: 60% = $600K, contributes $500K (under limit)
      # Property: 30% = $300K, contributes $200K (under limit)
      charitable_deduction: 700000
    citations:
      - "26 USC 170(b)(1): all under applicable limits"

  # ==========================================================================
  # Historical Test Cases - CARES Act Period (2020-2021)
  # ==========================================================================

  - name: "CARES Act 100% AGI limit (2020)"
    tax_year: 2020
    description: "100% AGI limit for cash to public charities under CARES Act"
    inputs:
      filing_status: single
      adjusted_gross_income: 100000
      charitable_cash_public_charity: 100000
    expected:
      charitable_deduction: 100000
    citations:
      - "CARES Act Section 2205: 100% AGI limit"

  - name: "CARES Act 100% limit with excess (2021)"
    tax_year: 2021
    description: "Even 100% limit can have carryforward if exceeding AGI"
    inputs:
      filing_status: joint
      adjusted_gross_income: 150000
      charitable_cash_public_charity: 180000
    expected:
      charitable_deduction: 150000  # 100% of AGI
      charitable_carryforward: 30000
    citations:
      - "CARES Act Section 2205: 100% limit"
      - "26 USC 170(d)(1): excess carries forward"
