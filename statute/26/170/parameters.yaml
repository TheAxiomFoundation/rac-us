# 26 USC Section 170 - Charitable Contributions Parameters
#
# Time-varying parameters for charitable contribution limits,
# including TCJA and CARES Act modifications.

description: "Parameters for charitable contribution deductions under IRC Section 170"
reference: "26 USC 170"

# =============================================================================
# Section 170(b)(1) - Percentage Limitations
# =============================================================================
percentage_limits:
  description: "AGI-based percentage limits for charitable deductions"
  reference: "26 USC 170(b)(1)"

  # Cash to 50% organizations (public charities)
  cash_to_public_charity:
    description: "AGI limit for cash contributions to public charities"
    unit: fraction
    values:
      # Pre-TCJA: 50% limit
      - date: 1970-01-01
        value: 0.50
        reference: "26 USC 170(b)(1)(A)"
      # TCJA: 60% limit (2018-2025)
      - date: 2018-01-01
        value: 0.60
        reference: "TCJA Section 11023, P.L. 115-97"
      # CARES Act: 100% limit (2020-2021 only)
      - date: 2020-01-01
        value: 1.00
        reference: "CARES Act Section 2205, P.L. 116-136"
      - date: 2022-01-01
        value: 0.60
        reference: "CARES Act expiration"
      # After TCJA sunset
      - date: 2026-01-01
        value: 0.50
        reference: "TCJA sunset"

  # Capital gain property to 50% organizations
  property_to_public_charity:
    description: "AGI limit for capital gain property to public charities"
    unit: fraction
    values:
      - date: 1970-01-01
        value: 0.30
        reference: "26 USC 170(b)(1)(C)(i)"

  # Cash to 30% organizations (private foundations)
  cash_to_private_foundation:
    description: "AGI limit for cash to private non-operating foundations"
    unit: fraction
    values:
      - date: 1970-01-01
        value: 0.30
        reference: "26 USC 170(b)(1)(B)"

  # Capital gain property to 30% organizations
  property_to_private_foundation:
    description: "AGI limit for capital gain property to private foundations"
    unit: fraction
    values:
      - date: 1970-01-01
        value: 0.20
        reference: "26 USC 170(b)(1)(D)"

  # Overall limit
  overall_limit:
    description: "Overall AGI limit for charitable contributions"
    unit: fraction
    values:
      - date: 1970-01-01
        value: 0.50
        reference: "26 USC 170(b)(1)(A)"
      - date: 2018-01-01
        value: 0.60
        reference: "TCJA Section 11023"
      - date: 2020-01-01
        value: 1.00
        reference: "CARES Act Section 2205"
      - date: 2022-01-01
        value: 0.60
        reference: "CARES Act expiration"
      - date: 2026-01-01
        value: 0.50
        reference: "TCJA sunset"

# =============================================================================
# Section 170(d) - Carryforward
# =============================================================================
carryforward:
  description: "Carryforward rules for excess contributions"
  reference: "26 USC 170(d)(1)"

  years:
    description: "Number of years excess contributions can be carried forward"
    unit: years
    values:
      - date: 1970-01-01
        value: 5
        reference: "26 USC 170(d)(1): 5-year carryforward"

# =============================================================================
# CARES Act Above-the-Line Deduction (2020-2021)
# =============================================================================
above_the_line:
  description: "Above-the-line charitable deduction for non-itemizers (CARES Act)"
  reference: "CARES Act Section 2204, Consolidated Appropriations Act 2021"

  max_single:
    description: "Maximum above-the-line deduction for single/other filers"
    unit: USD
    values:
      # Not available before 2020
      - date: 2019-01-01
        value: 0
      # CARES Act: $300 for 2020
      - date: 2020-01-01
        value: 300
        reference: "CARES Act Section 2204(a)"
      # Extended and increased for 2021
      - date: 2021-01-01
        value: 300
        reference: "CAA 2021 Section 212"
      # Expired after 2021
      - date: 2022-01-01
        value: 0
        reference: "Provision expired"

  max_joint:
    description: "Maximum above-the-line deduction for MFJ"
    unit: USD
    values:
      - date: 2019-01-01
        value: 0
      - date: 2020-01-01
        value: 300  # Single amount for 2020 (not doubled)
        reference: "CARES Act Section 2204(a)"
      - date: 2021-01-01
        value: 600  # Doubled for 2021
        reference: "CAA 2021 Section 212(a)"
      - date: 2022-01-01
        value: 0
        reference: "Provision expired"
