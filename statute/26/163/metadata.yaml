# Encoding Metadata for 26 USC Section 163 (Interest Deduction)

encoding:
  created: 2024-12-25
  updated: 2024-12-25
  status: initial
  encoded_by: claude-opus-4.5

variable:
  name: interest_deduction
  entity: TaxUnit
  period: Year
  dtype: Money

coverage:
  tax_years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    TCJA changes (2018-2025):
    - Acquisition debt limit reduced from $1M to $750K
    - Home equity interest NOT deductible (unless used for home improvement)
    Pre-TCJA loans grandfathered

sources:
  statute:
    - citation: "26 USC 163"
      title: "Interest"
      sections:
        - a: General rule - all interest
        - d: Investment interest limitation
        - h: Qualified residence interest (home mortgage)
    - citation: "TCJA Section 11043"
      title: "Modification of deduction for home mortgage interest"

  guidance:
    - citation: "IRS Publication 936"
      title: "Home Mortgage Interest Deduction"
      source: https://www.irs.gov/publications/p936

architecture:
  description: |
    Interest deduction has three main components:

    1. QUALIFIED RESIDENCE INTEREST (163(h))
       - Acquisition indebtedness up to $750K (TCJA) or $1M (pre-TCJA/grandfathered)
       - Home equity interest: NOT deductible under TCJA unless used for improvements
       - Points: deductible if meeting requirements

    2. INVESTMENT INTEREST (163(d))
       - Limited to net investment income
       - Excess carries forward to future years

    3. BUSINESS INTEREST (163(j))
       - Complex limitation based on 30% of adjusted taxable income
       - Not modeled in this simplified version

  formula_structure: |
    interest_deduction =
      qualified_residence_interest +      # 163(h)
      deductible_investment_interest +    # 163(d)
      deductible_points                   # 163(h)(3)(B)
