# 26 USC Section 225 - Qualified Overtime Compensation
#
# Added by Pub. L. 119-21 (One Big Beautiful Bill Act), § 70202(a), July 4, 2025.
# Effective for taxable years beginning after December 31, 2024.
# Terminates after taxable years beginning after December 31, 2028.
#
# Above-the-line deduction for qualified overtime compensation received by
# W-2 employees that is required under FLSA Section 7 (29 USC 207).

description: "Parameters for qualified overtime compensation deduction under IRC Section 225"
reference: "26 USC 225, added by Pub. L. 119-21 § 70202(a)"

# =============================================================================
# Section 225(b)(1) - Maximum Deduction Amount
# =============================================================================
max_deduction:
  description: "Maximum deduction for qualified overtime compensation"

  single:
    description: "Maximum deduction for single filers and head of household"
    unit: USD
    values:
      - date: 2025-01-01
        value: 12500
        reference: "26 USC 225(b)(1)"
      # Terminates after 2028
      - date: 2029-01-01
        value: 0
        reference: "26 USC 225(g) - Termination"

  joint:
    description: "Maximum deduction for married filing jointly"
    unit: USD
    values:
      - date: 2025-01-01
        value: 25000
        reference: "26 USC 225(b)(1)"
      # Terminates after 2028
      - date: 2029-01-01
        value: 0
        reference: "26 USC 225(g) - Termination"

# =============================================================================
# Section 225(b)(2)(A) - Income-Based Phase-Out
# =============================================================================
phaseout:
  description: "Income-based reduction of deduction"

  # Phase-out reduction: $100 for each $1,000 by which MAGI exceeds threshold
  reduction_per_increment:
    description: "Deduction reduction amount per income increment"
    unit: USD
    values:
      - date: 2025-01-01
        value: 100
        reference: "26 USC 225(b)(2)(A)"
      - date: 2029-01-01
        value: 0
        reference: "26 USC 225(g) - Termination"

  income_increment:
    description: "Income increment that triggers reduction"
    unit: USD
    values:
      - date: 2025-01-01
        value: 1000
        reference: "26 USC 225(b)(2)(A)"

  threshold:
    single:
      description: "MAGI threshold above which phase-out begins (single/HoH)"
      unit: USD
      values:
        - date: 2025-01-01
          value: 150000
          reference: "26 USC 225(b)(2)(A)"

    joint:
      description: "MAGI threshold above which phase-out begins (MFJ)"
      unit: USD
      values:
        - date: 2025-01-01
          value: 300000
          reference: "26 USC 225(b)(2)(A)"
