# 26 USC 30D - New Clean Vehicle Credit Parameters
# As amended by the Inflation Reduction Act of 2022
#
# References:
#   - 26 USC 30D: https://www.law.cornell.edu/uscode/text/26/30D
#   - IRA 2022: https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=373

variable: new_clean_vehicle_credit_parameters
entity: TaxUnit
period: Year

# --- Eligibility Parameters ---

eligibility:
  # Minimum battery capacity (kWh) - Section 30D(d)(1)(F)
  min_battery_capacity_kwh:
    description: "Minimum battery capacity in kilowatt-hours to qualify for new clean vehicle credit."
    values:
      2021-01-01: 4
    metadata:
      unit: kilowatt-hour
      label: "Minimum battery capacity for new clean vehicle credit"
      reference:
        - title: "26 USC 30D(d)(1)(F)"
          href: "https://www.law.cornell.edu/uscode/text/26/30D#d_1_F"

  # MAGI limits by filing status - Section 30D(f)(10)
  income_limit:
    description: "Maximum modified AGI to qualify for new clean vehicle credit."
    breakdown:
      - filing_status
    values:
      JOINT:
        0000-01-01: .inf
        2023-01-01: 300_000
      SURVIVING_SPOUSE:
        0000-01-01: .inf
        2023-01-01: 300_000
      HEAD_OF_HOUSEHOLD:
        0000-01-01: .inf
        2023-01-01: 225_000
      SINGLE:
        0000-01-01: .inf
        2023-01-01: 150_000
      SEPARATE:
        0000-01-01: .inf
        2023-01-01: 150_000
    metadata:
      unit: currency-USD
      period: year
      label: "Income limit for new clean vehicle credit"
      reference:
        - title: "Inflation Reduction Act 13401(f)(10)"
          href: "https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=382"

  # MSRP limits by vehicle classification - Section 30D(f)(11)
  msrp_limit:
    description: "Maximum MSRP for vehicle to qualify for new clean vehicle credit."
    breakdown:
      - vehicle_classification
    values:
      VAN:
        0000-01-01: .inf
        2022-01-01: 80_000
      SUV:
        0000-01-01: .inf
        2022-01-01: 80_000
      PICKUP:
        0000-01-01: .inf
        2022-01-01: 80_000
      OTHER:
        0000-01-01: .inf
        2022-01-01: 55_000
    metadata:
      unit: currency-USD
      label: "MSRP limit for new clean vehicle credit"
      reference:
        - title: "Inflation Reduction Act 13401(f)(11)"
          href: "https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=384"

# --- Credit Amount Parameters ---

amount:
  # Pre-IRA base amount - Section 30D(b)(2) (prior law)
  base:
    description: "Base credit amount for new clean vehicles (pre-IRA)."
    values:
      2021-01-01: 2_500
      # Eliminated by IRA - replaced with component-based credits
      2022-01-01: 0
    metadata:
      unit: currency-USD
      label: "New clean vehicle credit base amount"
      reference:
        - title: "26 USC 30D(b)(2)"
          href: "https://www.law.cornell.edu/uscode/text/26/30D#b_2"

  # Pre-IRA capacity bonus - Section 30D(b)(3) (prior law)
  capacity_bonus:
    per_kwh:
      description: "Credit per kWh of battery capacity above threshold (pre-IRA)."
      values:
        2021-01-01: 417
        2022-01-01: 0
      metadata:
        unit: currency-USD
        label: "Credit per excess kWh"
        reference:
          - title: "26 USC 30D(b)(3)"
            href: "https://www.law.cornell.edu/uscode/text/26/30D#b_3"

    threshold_kwh:
      description: "Battery capacity threshold for capacity bonus."
      values:
        2021-01-01: 5
      metadata:
        unit: kilowatt-hour
        label: "Battery capacity threshold for bonus"
        reference:
          - title: "26 USC 30D(b)(3)"
            href: "https://www.law.cornell.edu/uscode/text/26/30D#b_3"

    max:
      description: "Maximum capacity bonus amount (pre-IRA)."
      values:
        2021-01-01: 5_000
        2022-01-01: 0
      metadata:
        unit: currency-USD
        label: "Maximum capacity bonus"
        reference:
          - title: "26 USC 30D(b)(3)"
            href: "https://www.law.cornell.edu/uscode/text/26/30D#b_3"

  # IRA: Critical Minerals Component - Section 30D(e)(1)(A)
  critical_minerals:
    credit_amount:
      description: "Credit amount for meeting critical minerals requirement."
      values:
        0000-01-01: 0
        2022-01-01: 3_750
      metadata:
        unit: currency-USD
        period: year
        label: "Critical minerals credit component"
        reference:
          - title: "Inflation Reduction Act 13401(e)(1)(A)"
            href: "https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=366"

    # Threshold percentage (by value) extracted/processed in FTA country
    threshold:
      description: "Minimum share of critical minerals from FTA countries or recycled in North America."
      values:
        0000-01-01: 0
        2022-01-01: 0.40
        2024-01-01: 0.50
        2025-01-01: 0.60
        2026-01-01: 0.70
        2027-01-01: 0.80
      metadata:
        unit: /1
        label: "Critical minerals threshold"
        reference:
          - title: "Inflation Reduction Act 13401(e)(1)(A)"
            href: "https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=371"

  # IRA: Battery Components - Section 30D(e)(2)
  battery_components:
    credit_amount:
      description: "Credit amount for meeting battery components requirement."
      values:
        0000-01-01: 0
        2022-01-01: 3_750
      metadata:
        unit: currency-USD
        period: year
        label: "Battery components credit component"
        reference:
          - title: "Inflation Reduction Act 13401(e)(2)"
            href: "https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=366"

    # Threshold percentage (by value) manufactured in North America
    threshold:
      description: "Minimum share of battery components manufactured/assembled in North America."
      values:
        0000-01-01: 0
        2022-01-01: 0.50
        2024-01-01: 0.60
        2026-01-01: 0.70
        2027-01-01: 0.80
        2028-01-01: 0.90
        2029-01-01: 1.00
      metadata:
        unit: /1
        label: "Battery components threshold"
        reference:
          - title: "Inflation Reduction Act 13401(e)(2)"
            href: "https://www.democrats.senate.gov/imo/media/doc/inflation_reduction_act_of_2022.pdf#page=373"

# --- Maximum Credit ---
max_credit:
  description: "Maximum total credit for new clean vehicles."
  values:
    2021-01-01: 7_500
  metadata:
    unit: currency-USD
    period: year
    label: "Maximum new clean vehicle credit"
    reference:
      - title: "26 USC 30D(b)"
        href: "https://www.law.cornell.edu/uscode/text/26/30D#b"
