# 26 USC Section 86(a)(2)(A)(ii) - Tier 2 Bracket Amount Rate
#
# "(2) Additional amount...
#  (A) ...plus
#   (ii) the lesser of-
#    (I) the amount determined under paragraph (1), or
#    (II) one-half of the difference between the adjusted base amount and
#         the base amount."

description: "The IRC applies this fraction (50%) to calculate the bracket amount for tier 2 taxation - the carryover from tier 1."

values:
  1993-01-01: 0.5

