# 26 USC Section 86(a)(2)(A)(i) - Tier 2 Excess Rate
#
# "(2) Additional amount - In the case of a taxpayer with respect to whom the
#      amount determined under paragraph (1) exceeds zero...
#  (A) 85 percent of the excess of the taxpayer's combined income
#      over the adjusted base amount, plus..."

description: "The IRS taxes Social Security at this rate (85%) applied to the excess of combined income over the adjusted base threshold for taxpayers in tier 2."

values:
  1993-01-01: 0.85

