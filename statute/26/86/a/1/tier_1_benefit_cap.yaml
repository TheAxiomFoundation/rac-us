# 26 USC Section 86(a)(1)(A) - Tier 1 Benefit Cap
#
# "(a) Gross income to include social security benefits
#  (1) In general - ...the gross income of the taxpayer for the taxable year shall
#      include social security benefits in an amount equal to the lesser of-
#   (A) one-half of the social security benefits received during the taxable year..."

description: "Social Security benefits are taxable at this maximum rate for taxpayers in tier 1 (combined income between base and adjusted base thresholds)."

values:
  1984-01-01: 0.5

