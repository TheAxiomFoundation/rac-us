# 26 USC Section 86(a)(1)(B) - Tier 1 Excess Rate
#
# "(a) Gross income to include social security benefits
#  (1) In general - ...the gross income of the taxpayer for the taxable year shall
#      include social security benefits in an amount equal to the lesser of-
#   ...
#   (B) one-half of the excess of the taxpayer's combined income over the
#       base amount."

description: "The IRS taxes Social Security at this rate applied to the excess of combined income over the base threshold for taxpayers in tier 1."

values:
  1984-01-01: 0.5

metadata:
  unit: /1
  period: year
  label: "Tier 1 excess rate (50%)"
