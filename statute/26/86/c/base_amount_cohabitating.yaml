# 26 USC Section 86(c)(1)(C) - Base Amount for Cohabitating Married Filing Separately
#
# Special rule: married couples filing separately who lived together at any point
# during the year have a base amount of $0 (maximum taxability).

description: "Married filing separately taxpayers who lived with their spouse receive a base amount of zero."

