# 26 USC Section 86(c)(1) - Base Amount
#
# "(c) Base amount and adjusted base amount defined
#  For purposes of this section-
#  (1) Base amount - The term "base amount" means-
#   (A) except as otherwise provided in this paragraph, $25,000,
#   (B) $32,000, in the case of a joint return, and
#   (C) zero, in the case of a taxpayer who-
#    (i) is married as of the close of the taxable year...
#    (ii) does not file a joint return for such year, and
#    (iii) does not live apart from his spouse at all times during the taxable year."

description: "The IRS taxes Social Security benefits for filers with combined income above this threshold."

# Base thresholds by filing status
SINGLE:
  1984-01-01: 25000
JOINT:
  1984-01-01: 32000
SEPARATE:
  # Normal case - same as single
  1984-01-01: 25000
HEAD_OF_HOUSEHOLD:
  1984-01-01: 25000
SURVIVING_SPOUSE:
  1984-01-01: 25000

