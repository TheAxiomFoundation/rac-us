# 26 USC Section 86(c)(2) - Adjusted Base Amount
#
# "(2) Adjusted base amount - The term "adjusted base amount" means-
#  (A) except as otherwise provided in this paragraph, $34,000,
#  (B) $44,000, in the case of a joint return, and
#  (C) zero, in the case of a taxpayer described in paragraph (1)(C)."

description: "The IRS taxes Social Security benefits at the higher 85% rate for filers with combined income above this threshold."

# Adjusted base thresholds by filing status (second tier)
SINGLE:
  1984-01-01: 34000
JOINT:
  1984-01-01: 44000
SEPARATE:
  1984-01-01: 34000
HEAD_OF_HOUSEHOLD:
  1984-01-01: 34000
SURVIVING_SPOUSE:
  1984-01-01: 34000

