# 26 USC Section 86(b)(1) - Combined Income SS Fraction
#
# "...the sum of-
#  (A) the modified adjusted gross income of the taxpayer for such taxable year, plus
#  (B) one-half of the social security benefits received during the taxable year."

description: "The IRC includes this fraction of Social Security benefits when calculating combined income for taxability determination."
values:
  1984-01-01: 0.5

