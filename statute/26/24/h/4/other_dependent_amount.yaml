# 26 USC 24(h)(4) - Other Dependent Credit Amount (TCJA)
#
# "A credit determined under this subsection with respect to any
# qualifying child shall be reduced by $500 if such qualifying child
# would not be a qualifying child but for paragraph (4)(C)."
#
# This provides a $500 credit for dependents who are not qualifying children
# for CTC purposes (e.g., older children, non-child dependents with SSN).

other_dependent_amount:
  description: "Credit amount per other dependent"
  unit: currency-USD
  values:
    2018-01-01: 500
    # Post-TCJA sunset
    2026-01-01: 0
  citations:
    - "26 USC 24(h)(4): $500 credit for other dependents"
