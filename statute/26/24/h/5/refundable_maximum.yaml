# 26 USC § 24(h)(5) - Refundable Credit Maximum (TCJA)
#
# "the increase... shall not exceed $1,400 per qualifying child"
# (indexed for inflation after 2018)
#
# Note: TCJA sunsets after 2025, reverting to pre-TCJA rules

refundable_maximum:
  description: "Maximum refundable amount per child (ACTC)"
  unit: currency-USD
  indexing:
    method: cpi-u
    base_year: 2018
    round_to: 100
  values:
    2018-01-01: 1400
    2019-01-01: 1400
    2020-01-01: 1400
    2021-01-01: 1400
    2022-01-01: 1500
    2023-01-01: 1600
    2024-01-01: 1700
    2025-01-01: 1700
    # Post-TCJA: reverts to pre-TCJA rules (15% of earned income - $3k)
    # The $1,400 cap from 24(h)(5) no longer applies after 2025
    2026-01-01: 1000  # Full $1,000 credit is refundable under pre-TCJA rules
  citations:
    - "§ 24(h)(5): $1,400 indexed for inflation (TCJA 2018-2025)"
    - "Rev. Proc. 2023-34: $1,700 for 2024"
    - "Rev. Proc. 2024-40: $1,700 for 2025"
    - "Post-TCJA sunset: Reverts to pre-TCJA refundability rules"
