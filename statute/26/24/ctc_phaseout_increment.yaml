# 26 USC 24(b)(2) - Phaseout Increment
#
# "$50 for each $1,000 (or fraction thereof) by which the taxpayer's
# modified adjusted gross income exceeds the threshold amount"
#
# The increment is $1,000 - excess income is divided by this amount
# to determine the number of $50 reductions.

phaseout_increment:
  description: "Income increment for phaseout calculation"
  unit: currency-USD
  values:
    1998-01-01: 1000
  citations:
    - "26 USC 24(b)(2): $50 for each $1,000"
