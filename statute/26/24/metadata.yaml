# Encoding Metadata for 26 USC § 24 (Child Tax Credit)

encoding:
  created: 2024-12-11
  updated: 2024-12-24
  status: implemented
  encoded_by: claude-opus-4.5

variable:
  name: child_tax_credit
  entity: TaxUnit
  period: Year
  dtype: Money

coverage:
  tax_years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    TCJA provisions (2018-2025):
    - $2,000 credit per child (§ 24(h)(2))
    - $1,700 max refundable per child for 2024 (§ 24(h)(5), indexed)
    - $400,000 joint / $200,000 other phase-out thresholds (§ 24(h)(3))
    - Age limit: under 17 (§ 24(c)(1))

sources:
  statute:
    - citation: "26 USC § 24"
      title: "Child tax credit"
      path: statute/26/24/
      files:
        - a/credit.cosilico              # Main credit calculation
        - b/2/phaseout.cosilico          # Phase-out reduction
        - c/1/qualifying_child.cosilico  # Qualifying child definition
        - d/1/B/refundable_credit.cosilico  # ACTC (refundable portion)
        - ctc_validation.cosilico        # Standalone validation version

  guidance:
    - citation: "Rev. Proc. 2023-34"
      title: "Inflation adjustments for TY 2024"
      source: https://www.irs.gov/pub/irs-drop/rp-23-34.pdf
      provides:
        - refundable_maximum: 1700

    - citation: "Rev. Proc. 2024-40"
      title: "Inflation adjustments for TY 2025"
      source: https://www.irs.gov/pub/irs-drop/rp-24-40.pdf

architecture:
  description: |
    The Child Tax Credit encoding follows the statute structure:

    1. § 24(a) - Allowance of Credit
       - $2,000 per qualifying child (TCJA 2018-2025, § 24(h)(2))
       - a/credit.cosilico

    2. § 24(b) - Limitation Based on AGI (Phase-Out)
       - $50 reduction per $1,000 over threshold
       - Thresholds: $400k joint, $200k other (TCJA § 24(h)(3))
       - b/1/threshold.yaml, b/2/phaseout.cosilico

    3. § 24(c) - Qualifying Child Definition
       - Must be qualifying child per § 152(c)
       - Must be under 17 at year end
       - c/1/qualifying_child.cosilico

    4. § 24(d) - Additional Child Tax Credit (Refundable)
       - 15% of earned income over $2,500
       - OR social security taxes minus EITC (3+ children)
       - Capped at $1,700 per child (2024, § 24(h)(5))
       - d/1/B/refundable_credit.cosilico

    5. § 24(h) - TCJA Special Rules (2018-2025)
       - Increased credit from $1,000 to $2,000
       - Increased phase-out thresholds
       - h/2/credit_amount.yaml, h/5/refundable_maximum.yaml

  key_provisions:
    - provision: "§ 24(a)"
      description: "Credit amount per child"
      variable: child_tax_credit
      parameters:
        - h/2/credit_amount#credit_amount

    - provision: "§ 24(b)"
      description: "Phase-out based on income"
      variable: phaseout_reduction
      parameters:
        - b/1/threshold#phaseout_threshold_joint
        - b/1/threshold#phaseout_threshold_single
        - b/2/phaseout_rate#phaseout_rate

    - provision: "§ 24(c)"
      description: "Qualifying child requirements"
      variable: is_ctc_qualifying_child
      parameters:
        - c/1/qualifying_age_limit#qualifying_age_limit

    - provision: "§ 24(d)"
      description: "Refundable portion (ACTC)"
      variable: additional_child_tax_credit
      parameters:
        - h/5/refundable_maximum#refundable_maximum
        - d/1/B/parameters#earned_income_threshold
        - d/1/B/parameters#refundable_rate

  dependencies:
    - path: statute/26/152/c
      description: "Qualifying child definition"
    - path: statute/26/62/a
      description: "Adjusted gross income"
    - path: statute/26/32/c/2/A
      description: "Earned income (for ACTC)"
    - path: statute/26/32/a/1
      description: "EITC (for 3+ children ACTC alternative)"
    - path: statute/26/1
      description: "Filing status"

test_files:
  - a/tests.yaml    # Basic credit tests
  - b/tests.yaml    # Phase-out tests
  - c/tests.yaml    # Age eligibility tests
  - d/tests.yaml    # ACTC refundable tests
  - tests.yaml      # Comprehensive validation tests
