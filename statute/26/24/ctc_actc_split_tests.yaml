# 26 USC Section 24 - CTC/ACTC Split Tests
#
# Tests the correct allocation of the Child Tax Credit between:
# 1. Nonrefundable CTC - limited to tax liability per Section 26(a)
# 2. Refundable ACTC - per Section 24(d), limited by earned income formula
#
# Key 2024 parameters:
# - Credit per child: $2,000 (Section 24(h)(2))
# - ACTC per-child cap: $1,700 (Section 24(h)(5))
# - Earned income threshold: $2,500 (Section 24(d)(1)(B)(i))
# - Earned income percentage: 15% (Section 24(d)(1)(B)(i))
# - Phase-out: $200,000 single, $400,000 joint (Section 24(b)(1))
# - Phase-out rate: $50 per $1,000 (Section 24(b)(2))

reference: "26 USC Section 24"
tax_year: 2024

test_cases:
  # =============================================================================
  # HIGH TAX LIABILITY SCENARIOS - No ACTC needed
  # =============================================================================

  - name: "High liability - full credit as CTC"
    description: |
      When tax liability exceeds tentative credit, entire credit is nonrefundable.
      Tentative: $2,000, Liability: $5,000 -> CTC: $2,000, ACTC: $0
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 5000
    expected:
      tentative_ctc: 2000
      child_tax_credit: 2000
      additional_child_tax_credit: 0
      total_child_tax_credit: 2000
    citations:
      - "Section 24(a): $2,000 per child"
      - "Section 26(a): nonrefundable credit limited to tax liability"

  - name: "High liability - multiple children"
    description: |
      Joint filers, 3 children, liability covers full credit.
      Tentative: $6,000, Liability: $10,000 -> CTC: $6,000, ACTC: $0
    inputs:
      filing_status: joint
      num_qualifying_children: 3
      adjusted_gross_income: 150000
      earned_income: 150000
      tax_liability_before_credits: 10000
    expected:
      tentative_ctc: 6000
      child_tax_credit: 6000
      additional_child_tax_credit: 0
      total_child_tax_credit: 6000
    citations:
      - "Section 24(a): $2,000 x 3 = $6,000"

  # =============================================================================
  # LOW TAX LIABILITY SCENARIOS - ACTC applies
  # =============================================================================

  - name: "Low liability - partial ACTC"
    description: |
      Tax liability lower than tentative credit, ACTC fills the gap.
      Tentative: $2,000, Liability: $500
      CTC: $500 (limited by liability)
      Unused: $1,500
      EI formula: 15% x (25,000 - 2,500) = $3,375
      Per-child cap: $1,700
      ACTC: min($1,500, $3,375, $1,700) = $1,500
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 25000
      earned_income: 25000
      tax_liability_before_credits: 500
    expected:
      tentative_ctc: 2000
      child_tax_credit: 500
      additional_child_tax_credit: 1500
      total_child_tax_credit: 2000
    citations:
      - "Section 24(d)(1)(A): unused credit"
      - "Section 24(d)(1)(B)(i): 15% of earned income over $2,500"

  - name: "Zero liability - all ACTC"
    description: |
      No tax liability, entire credit must come from ACTC.
      Tentative: $2,000, Liability: $0
      CTC: $0
      Unused: $2,000
      EI formula: 15% x (20,000 - 2,500) = $2,625
      Per-child cap: $1,700
      ACTC: min($2,000, $2,625, $1,700) = $1,700 (capped)
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 20000
      earned_income: 20000
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 2000
      child_tax_credit: 0
      additional_child_tax_credit: 1700
      total_child_tax_credit: 1700
    citations:
      - "Section 24(h)(5): $1,700 per-child maximum for 2024"

  # =============================================================================
  # EARNED INCOME FORMULA LIMITS
  # =============================================================================

  - name: "Very low income - EI formula limits ACTC"
    description: |
      Earned income formula produces less than unused credit.
      Tentative: $2,000, Liability: $0
      CTC: $0
      Unused: $2,000
      EI formula: 15% x (5,000 - 2,500) = $375
      Per-child cap: $1,700
      ACTC: min($2,000, $375, $1,700) = $375
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 5000
      earned_income: 5000
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 2000
      child_tax_credit: 0
      additional_child_tax_credit: 375
      total_child_tax_credit: 375
    citations:
      - "Section 24(d)(1)(B)(i): 15% x ($5,000 - $2,500) = $375"

  - name: "Below EI threshold - no ACTC"
    description: |
      Earned income below $2,500 threshold produces $0 ACTC.
      Tentative: $2,000, Liability: $0
      CTC: $0
      Unused: $2,000
      EI formula: 15% x max(0, 2,000 - 2,500) = $0
      ACTC: $0
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 2000
      earned_income: 2000
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 2000
      child_tax_credit: 0
      additional_child_tax_credit: 0
      total_child_tax_credit: 0
    citations:
      - "Section 24(d)(1)(B)(i): must exceed $2,500 threshold"

  - name: "At EI threshold - no ACTC"
    description: |
      Earned income exactly at $2,500 produces $0 ACTC.
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 2500
      earned_income: 2500
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 2000
      child_tax_credit: 0
      additional_child_tax_credit: 0
      total_child_tax_credit: 0
    citations:
      - "Section 24(d)(1)(B)(i): 15% x ($2,500 - $2,500) = $0"

  - name: "Just above EI threshold"
    description: |
      Earned income $3,000: 15% x ($3,000 - $2,500) = $75
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 3000
      earned_income: 3000
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 2000
      child_tax_credit: 0
      additional_child_tax_credit: 75
      total_child_tax_credit: 75
    citations:
      - "Section 24(d)(1)(B)(i): 15% x $500 = $75"

  # =============================================================================
  # MULTIPLE CHILDREN - ACTC SCALING
  # =============================================================================

  - name: "Multiple children - EI formula limits"
    description: |
      3 children, low income - EI formula is binding.
      Tentative: $6,000, Liability: $0
      CTC: $0
      Unused: $6,000
      EI formula: 15% x (20,000 - 2,500) = $2,625
      Per-child cap: 3 x $1,700 = $5,100
      ACTC: min($6,000, $2,625, $5,100) = $2,625
    inputs:
      filing_status: single
      num_qualifying_children: 3
      adjusted_gross_income: 20000
      earned_income: 20000
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 6000
      child_tax_credit: 0
      additional_child_tax_credit: 2625
      total_child_tax_credit: 2625
    citations:
      - "Section 24(d)(1)(B): EI formula limits ACTC"

  - name: "Multiple children - per-child cap limits"
    description: |
      3 children, moderate income - per-child cap is binding.
      Tentative: $6,000, Liability: $0
      CTC: $0
      Unused: $6,000
      EI formula: 15% x (50,000 - 2,500) = $7,125
      Per-child cap: 3 x $1,700 = $5,100
      ACTC: min($6,000, $7,125, $5,100) = $5,100
    inputs:
      filing_status: single
      num_qualifying_children: 3
      adjusted_gross_income: 50000
      earned_income: 50000
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 6000
      child_tax_credit: 0
      additional_child_tax_credit: 5100
      total_child_tax_credit: 5100
    citations:
      - "Section 24(h)(5): $1,700 x 3 = $5,100 cap"

  - name: "Multiple children - unused credit limits"
    description: |
      3 children, high EI, but some liability used.
      Tentative: $6,000, Liability: $1,000
      CTC: $1,000
      Unused: $5,000
      EI formula: 15% x (60,000 - 2,500) = $8,625
      Per-child cap: 3 x $1,700 = $5,100
      ACTC: min($5,000, $8,625, $5,100) = $5,000 (unused limits)
    inputs:
      filing_status: single
      num_qualifying_children: 3
      adjusted_gross_income: 60000
      earned_income: 60000
      tax_liability_before_credits: 1000
    expected:
      tentative_ctc: 6000
      child_tax_credit: 1000
      additional_child_tax_credit: 5000
      total_child_tax_credit: 6000
    citations:
      - "Section 24(d)(1)(A): unused = tentative - nonrefundable"

  # =============================================================================
  # PHASE-OUT INTERACTION
  # =============================================================================

  - name: "Phase-out reduces tentative, affects ACTC"
    description: |
      Single at $210,000 - phase-out reduces credit, low liability.
      Phase-out: $10,000 over threshold -> $500 reduction
      Tentative: $2,000 - $500 = $1,500
      Liability: $200
      CTC: $200
      Unused: $1,300
      EI formula: 15% x (210,000 - 2,500) = huge
      Per-child cap: $1,700
      ACTC: min($1,300, huge, $1,700) = $1,300
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 210000
      earned_income: 210000
      tax_liability_before_credits: 200
    expected:
      tentative_ctc: 1500
      child_tax_credit: 200
      additional_child_tax_credit: 1300
      total_child_tax_credit: 1500
    citations:
      - "Section 24(b): $50 x 10 = $500 phaseout"
      - "Section 24(d): ACTC from remaining credit"

  - name: "Fully phased out - no credit"
    description: |
      Single at $250,000 - credit fully phased out.
      Phase-out: $50,000 over -> $2,500 reduction
      Tentative: max(0, $2,000 - $2,500) = $0
    inputs:
      filing_status: single
      num_qualifying_children: 1
      adjusted_gross_income: 250000
      earned_income: 250000
      tax_liability_before_credits: 100
    expected:
      tentative_ctc: 0
      child_tax_credit: 0
      additional_child_tax_credit: 0
      total_child_tax_credit: 0
    citations:
      - "Section 24(b): credit fully phased out"

  # =============================================================================
  # EDGE CASES
  # =============================================================================

  - name: "Liability equals tentative credit exactly"
    description: |
      When liability exactly equals credit, no ACTC.
      Tentative: $4,000, Liability: $4,000
      CTC: $4,000
      Unused: $0
      ACTC: $0
    inputs:
      filing_status: joint
      num_qualifying_children: 2
      adjusted_gross_income: 100000
      earned_income: 100000
      tax_liability_before_credits: 4000
    expected:
      tentative_ctc: 4000
      child_tax_credit: 4000
      additional_child_tax_credit: 0
      total_child_tax_credit: 4000
    citations:
      - "Section 24(d)(1)(A): no unused credit"

  - name: "Liability one dollar less than tentative"
    description: |
      Liability just below credit triggers small ACTC.
      Tentative: $4,000, Liability: $3,999
      CTC: $3,999
      Unused: $1
      EI formula: 15% x (100,000 - 2,500) = $14,625
      Per-child cap: 2 x $1,700 = $3,400
      ACTC: min($1, $14,625, $3,400) = $1
    inputs:
      filing_status: joint
      num_qualifying_children: 2
      adjusted_gross_income: 100000
      earned_income: 100000
      tax_liability_before_credits: 3999
    expected:
      tentative_ctc: 4000
      child_tax_credit: 3999
      additional_child_tax_credit: 1
      total_child_tax_credit: 4000
    citations:
      - "Section 24(d): even $1 unused triggers ACTC"

  - name: "High income joint - liability exceeds credit"
    description: |
      High earners - liability well above credit.
      Tentative: $6,000, Liability: $50,000
      CTC: $6,000
      ACTC: $0
    inputs:
      filing_status: joint
      num_qualifying_children: 3
      adjusted_gross_income: 350000
      earned_income: 350000
      tax_liability_before_credits: 50000
    expected:
      tentative_ctc: 6000
      child_tax_credit: 6000
      additional_child_tax_credit: 0
      total_child_tax_credit: 6000
    citations:
      - "Section 26(a): no ACTC when liability covers credit"

  # =============================================================================
  # THREE OR MORE CHILDREN - SOCIAL SECURITY ALTERNATIVE
  # =============================================================================
  # Note: Section 24(d)(1)(B)(ii) provides alternative calculation for 3+ children:
  # Social security taxes minus EITC. This is rarely beneficial but should be tested.

  - name: "3+ children - SS taxes greater than EI formula"
    description: |
      For 3+ children, ACTC can use SS taxes - EITC if greater.
      This case would require SS taxes > 15% x (EI - 2500) + EITC
      which is unusual but possible in specific scenarios.
      [For 2024, this test validates the alternative is available]
    inputs:
      filing_status: single
      num_qualifying_children: 3
      adjusted_gross_income: 15000
      earned_income: 15000
      social_security_taxes: 1148  # 7.65% x 15000
      earned_income_credit: 0  # Simplified - would need actual EITC
      tax_liability_before_credits: 0
    expected:
      tentative_ctc: 6000
      child_tax_credit: 0
      actc_earned_income_amount: 1875  # 15% x (15000 - 2500)
      actc_social_security_amount: 1148  # SS taxes - EITC
      additional_child_tax_credit: 1875  # max(1875, 1148) limited by other caps
      total_child_tax_credit: 1875
    citations:
      - "Section 24(d)(1)(B)(ii): alternative for 3+ children"
