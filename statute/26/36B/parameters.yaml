# 26 USC 36B - Premium Tax Credit Parameters
#
# The Premium Tax Credit helps eligible individuals and families afford
# health insurance purchased through the Health Insurance Marketplace.
#
# Key provisions:
# - Section 36B(a): Refundable credit against income tax
# - Section 36B(b): Calculation based on benchmark premium minus expected contribution
# - Section 36B(c)(1): Applicable percentage (contribution rate) based on % FPL
# - Section 36B(c)(2)(B): Income eligibility (100-400% FPL, expanded by IRA)
# - Section 36B(d): Definitions (coverage month, qualified health plan, etc.)
#
# Modified by:
# - Inflation Reduction Act of 2022 (P.L. 117-169): Extended enhanced subsidies through 2025
# - American Rescue Plan Act of 2021 (P.L. 117-2): Enhanced subsidies for 2021-2022
# - ACA original (P.L. 111-148): Established credit for 2014+
#
# Sources:
# - https://www.law.cornell.edu/uscode/text/26/36B
# - https://www.healthcare.gov/glossary/federal-poverty-level-fpl/
# - IRS Rev. Proc. 2023-34 (2024 values)
# - IRS Rev. Proc. 2024-40 (2025 values)

variable: premium_tax_credit
entity: TaxUnit
period: Year
dtype: Money

# =============================================================================
# APPLICABLE PERCENTAGE (CONTRIBUTION RATE) BY FPL BRACKET
# 26 USC 36B(b)(3)(A)
#
# The applicable percentage is the percentage of household income the taxpayer
# is expected to contribute toward premium costs.
#
# ACA Original (2014-2020): Sliding scale 2.0% - 9.5%, cliff at 400% FPL
# ARPA/IRA Enhanced (2021-2025): Lower rates, no cliff above 400% FPL
# =============================================================================

applicable_percentage:
  description: "Expected premium contribution as percentage of household income per 26 USC 36B(b)(3)(A)"

  # 2024 Values (IRA Enhanced - P.L. 117-169 Section 12001)
  # Extended enhanced subsidies through 2025
  # No cliff at 400% FPL - those above 400% pay 8.5% of income
  brackets_2024:
    description: "Applicable percentage brackets for 2024 tax year"

    # Bracket structure: [lower_fpl_pct, upper_fpl_pct, initial_pct, final_pct]
    # Between brackets, percentage interpolates linearly
    #
    # Per 26 USC 36B(b)(3)(A)(i): initial percentage at lower bound
    # Per 26 USC 36B(b)(3)(A)(ii): final percentage at upper bound

    bracket_1:
      description: "100-150% FPL: 0% initial, 0% final contribution"
      lower_fpl: 1.00
      upper_fpl: 1.50
      initial_pct: 0.0000
      final_pct: 0.0000
      citations:
        - "26 USC 36B(b)(3)(A)"
        - "P.L. 117-169 Section 12001 (IRA)"

    bracket_2:
      description: "150-200% FPL: 0% to 2% contribution"
      lower_fpl: 1.50
      upper_fpl: 2.00
      initial_pct: 0.0000
      final_pct: 0.0200
      citations:
        - "26 USC 36B(b)(3)(A)"
        - "P.L. 117-169 Section 12001"

    bracket_3:
      description: "200-250% FPL: 2% to 4% contribution"
      lower_fpl: 2.00
      upper_fpl: 2.50
      initial_pct: 0.0200
      final_pct: 0.0400
      citations:
        - "26 USC 36B(b)(3)(A)"
        - "P.L. 117-169 Section 12001"

    bracket_4:
      description: "250-300% FPL: 4% to 6% contribution"
      lower_fpl: 2.50
      upper_fpl: 3.00
      initial_pct: 0.0400
      final_pct: 0.0600
      citations:
        - "26 USC 36B(b)(3)(A)"
        - "P.L. 117-169 Section 12001"

    bracket_5:
      description: "300-400% FPL: 6% to 8.5% contribution"
      lower_fpl: 3.00
      upper_fpl: 4.00
      initial_pct: 0.0600
      final_pct: 0.0850
      citations:
        - "26 USC 36B(b)(3)(A)"
        - "P.L. 117-169 Section 12001"

    bracket_6:
      description: "400%+ FPL: 8.5% flat contribution (IRA removed cliff)"
      lower_fpl: 4.00
      upper_fpl: 999.99  # No upper limit under IRA
      initial_pct: 0.0850
      final_pct: 0.0850
      citations:
        - "26 USC 36B(b)(3)(A)"
        - "P.L. 117-169 Section 12001: removal of 400% FPL cliff"

  # 2025 Values (Same as 2024 - IRA extended through 2025)
  brackets_2025:
    description: "Applicable percentage brackets for 2025 tax year"
    # Same structure as 2024 - IRA provisions extended through 2025
    bracket_1:
      lower_fpl: 1.00
      upper_fpl: 1.50
      initial_pct: 0.0000
      final_pct: 0.0000

    bracket_2:
      lower_fpl: 1.50
      upper_fpl: 2.00
      initial_pct: 0.0000
      final_pct: 0.0200

    bracket_3:
      lower_fpl: 2.00
      upper_fpl: 2.50
      initial_pct: 0.0200
      final_pct: 0.0400

    bracket_4:
      lower_fpl: 2.50
      upper_fpl: 3.00
      initial_pct: 0.0400
      final_pct: 0.0600

    bracket_5:
      lower_fpl: 3.00
      upper_fpl: 4.00
      initial_pct: 0.0600
      final_pct: 0.0850

    bracket_6:
      lower_fpl: 4.00
      upper_fpl: 999.99
      initial_pct: 0.0850
      final_pct: 0.0850

  # Pre-IRA brackets (2014-2020, would apply post-2025 if not extended)
  brackets_original:
    description: "Original ACA applicable percentage brackets (pre-ARPA/IRA)"
    # These would apply if enhanced subsidies expire after 2025

    bracket_1:
      lower_fpl: 1.00
      upper_fpl: 1.33
      initial_pct: 0.0203  # 2.03%
      final_pct: 0.0318    # 3.18%

    bracket_2:
      lower_fpl: 1.33
      upper_fpl: 1.50
      initial_pct: 0.0318
      final_pct: 0.0413    # 4.13%

    bracket_3:
      lower_fpl: 1.50
      upper_fpl: 2.00
      initial_pct: 0.0413
      final_pct: 0.0656    # 6.56%

    bracket_4:
      lower_fpl: 2.00
      upper_fpl: 2.50
      initial_pct: 0.0656
      final_pct: 0.0827    # 8.27%

    bracket_5:
      lower_fpl: 2.50
      upper_fpl: 3.00
      initial_pct: 0.0827
      final_pct: 0.0950    # 9.50%

    bracket_6:
      lower_fpl: 3.00
      upper_fpl: 4.00
      initial_pct: 0.0950
      final_pct: 0.0950    # 9.50% cap
      # CLIFF: No credit above 400% FPL under original ACA

# =============================================================================
# INCOME ELIGIBILITY LIMITS
# 26 USC 36B(c)(1)(A) - Applicable taxpayer definition
# =============================================================================

income_eligibility:
  description: "Income limits for Premium Tax Credit eligibility"

  # Lower bound: 100% FPL
  # 26 USC 36B(c)(1)(A)(i): "household income is at least 100 percent but not more than..."
  lower_limit:
    description: "Minimum household income as percentage of FPL"
    unit: rate
    values:
      2014-01-01: 1.00  # 100% FPL minimum
    citations:
      - "26 USC 36B(c)(1)(A)(i)"
      - "Note: Those below 100% FPL may be eligible for Medicaid"

  # Upper bound: 400% FPL (pre-IRA) or no limit (IRA enhanced)
  upper_limit:
    description: "Maximum household income as percentage of FPL (pre-IRA)"
    unit: rate
    values:
      2014-01-01: 4.00  # 400% FPL maximum
    citations:
      - "26 USC 36B(c)(1)(A)(ii)"

  # IRA removes upper limit for 2021-2025
  upper_limit_ira:
    description: "Upper limit removed under IRA (effective through 2025)"
    unit: rate
    values:
      2021-01-01: 999.99  # No effective limit
      2020-12-31: 4.00    # Pre-ARPA: 400% FPL
    citations:
      - "P.L. 117-2 Section 9661 (ARPA 2021)"
      - "P.L. 117-169 Section 12001 (IRA 2022)"

# =============================================================================
# FEDERAL POVERTY LEVEL REFERENCE
# 26 USC 36B(d)(3) - Federal poverty line definition
# =============================================================================

federal_poverty_level:
  description: "HHS Federal Poverty Guidelines for 48 contiguous states + DC"

  # 2024 FPL (89 FR 3941)
  2024:
    description: "2024 Federal Poverty Guidelines"
    first_person:
      description: "Annual FPL for one-person household"
      unit: currency-USD
      value: 15060
    additional_person:
      description: "Additional FPL amount per household member"
      unit: currency-USD
      value: 5380
    citations:
      - "HHS Poverty Guidelines 2024"
      - "89 FR 3941 (January 17, 2024)"

  # 2025 FPL (anticipated, to be updated when published)
  2025:
    description: "2025 Federal Poverty Guidelines (estimated)"
    first_person:
      unit: currency-USD
      value: 15650  # Estimated based on CPI adjustment
    additional_person:
      unit: currency-USD
      value: 5580   # Estimated
    citations:
      - "HHS Poverty Guidelines 2025 (to be published)"

# =============================================================================
# MAXIMUM CONTRIBUTION CAP
# 26 USC 36B(b)(3)(A)(ii) - Applicable percentage final rate
# =============================================================================

maximum_applicable_percentage:
  description: "Maximum percentage of income for premium contribution"
  unit: rate
  values:
    # Original ACA: 9.5% (indexed)
    2014-01-01: 0.0950
    # 2024 indexed value: 9.12%
    2024-01-01: 0.0912
    # ARPA/IRA enhanced: 8.5% cap
    2021-01-01: 0.0850
  citations:
    - "26 USC 36B(b)(3)(A)(ii)"
    - "Rev. Proc. 2023-34 (2024 indexing)"
    - "P.L. 117-169 Section 12001 (IRA 8.5% cap)"

# =============================================================================
# SPECIAL RULES
# =============================================================================

# Married filing separately exclusion
# 26 USC 36B(c)(1)(C): Not eligible if married filing separately
# Exception for victims of domestic abuse or spousal abandonment
mfs_exclusion:
  description: "Married filing separately generally ineligible"
  unit: boolean
  values:
    2014-01-01: true
  citations:
    - "26 USC 36B(c)(1)(C)"

# Dependent exclusion
# 26 USC 36B(c)(1)(D): Cannot be claimed as dependent
dependent_exclusion:
  description: "Cannot be claimed as dependent by another taxpayer"
  unit: boolean
  values:
    2014-01-01: true
  citations:
    - "26 USC 36B(c)(1)(D)"

# Incarceration exclusion
# 26 USC 36B(c)(2)(B)(iv): Not incarcerated
incarceration_exclusion:
  description: "Cannot be incarcerated (other than pending disposition)"
  unit: boolean
  values:
    2014-01-01: true
  citations:
    - "26 USC 36B(c)(2)(B)(iv)"
