# Tests for 26 USC 25B - Saver's Credit
# Reference: IRS Form 8880 Instructions
#
# Updated to match PolicyEngine's implementation:
# - Uses detailed contribution types (401k, 403b, etc.)
# - Subtracts retirement_distributions from contributions
# - Uses is_tax_unit_head_or_spouse and claimed_as_dependent_on_another_return
# - Credit limit uses income_tax_before_credits minus preceding credits

# --- Single Filer Tests ---

- name: Single filer with 50% rate
  description: Single filer with AGI under $23,000 gets 50% credit rate
  period: 2024
  input:
    filing_status: SINGLE
    adjusted_gross_income: 20000
    traditional_401k_contributions: 1000
    traditional_ira_contributions: 500
    roth_ira_contributions: 0
    traditional_403b_contributions: 0
    roth_401k_contributions: 0
    roth_403b_contributions: 0
    self_employed_pension_contributions: 0
    able_contributions_person: 0
    retirement_distributions: 0
    age: 25
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
    income_tax_before_credits: 1500
    foreign_tax_credit: 0
    cdcc: 0
    non_refundable_american_opportunity_credit: 0
    lifetime_learning_credit: 0
  output:
    savers_credit_qualified_contributions: 1500
    savers_credit_capped_contributions: 1500
    savers_credit_applicable_percentage: 0.50
    savers_credit_person: 750
    savers_credit_potential: 750
    savers_credit: 750

