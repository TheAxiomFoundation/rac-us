# Tests for 26 USC 25B(c) - Eligible Individual
# Reference: 26 USC 25B(c)
#
# Updated to match PolicyEngine's eligibility logic:
# - Requires is_tax_unit_head_or_spouse (only filers claim the credit)
# - Uses claimed_as_dependent_on_another_return (not is_tax_unit_dependent)

# --- Age Requirement Tests (25B(c)(1)) ---

- name: Age 18 exactly - eligible (head of household)
  description: Individual who is exactly 18 at end of tax year and is head/spouse is eligible
  period: 2024
  input:
    age: 18
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

- name: Age 17 - not eligible
  description: Individual under 18 at end of tax year is not eligible
  period: 2024
  input:
    age: 17
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: False

- name: Age 65 - eligible
  description: Older individual who is head/spouse meets age requirement
  period: 2024
  input:
    age: 65
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

- name: Age 0 - not eligible (child dependent)
  description: Child is not eligible
  period: 2024
  input:
    age: 0
    is_tax_unit_head_or_spouse: False
    claimed_as_dependent_on_another_return: True
    is_full_time_student: False
  output:
    is_savers_credit_eligible: False

# --- Filer Status Tests (head or spouse requirement) ---

- name: Head of household - eligible
  description: Head of household who meets other requirements is eligible
  period: 2024
  input:
    age: 35
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

- name: Spouse - eligible
  description: Spouse who meets other requirements is eligible
  period: 2024
  input:
    age: 32
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

- name: Dependent child on tax unit - not eligible
  description: Dependent child on this tax unit cannot claim credit
  period: 2024
  input:
    age: 20
    is_tax_unit_head_or_spouse: False
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: False

# --- Dependent Exclusion Tests (25B(c)(2)(A)) ---

- name: Claimed on another return - not eligible
  description: Individual claimed as dependent on ANOTHER return is not eligible
  period: 2024
  input:
    age: 25
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: True
    is_full_time_student: False
  output:
    is_savers_credit_eligible: False

- name: Not claimed elsewhere - eligible
  description: Individual not claimed as dependent elsewhere is eligible
  period: 2024
  input:
    age: 25
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

# --- Full-Time Student Exclusion Tests (25B(c)(2)(B)) ---

- name: Full-time student - not eligible
  description: Full-time student is not eligible per 25B(c)(2)(B)
  period: 2024
  input:
    age: 22
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: True
  output:
    is_savers_credit_eligible: False

- name: Part-time student - eligible
  description: Part-time student who is filer is eligible (only full-time excluded)
  period: 2024
  input:
    age: 22
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

- name: Not a student - eligible
  description: Non-student who is filer is eligible
  period: 2024
  input:
    age: 30
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

# --- Combined Condition Tests ---

- name: All conditions met - eligible
  description: Individual meets all eligibility requirements
  period: 2024
  input:
    age: 35
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

- name: Under 18 and not filer - not eligible (multiple failures)
  description: Individual fails multiple eligibility requirements
  period: 2024
  input:
    age: 16
    is_tax_unit_head_or_spouse: False
    claimed_as_dependent_on_another_return: True
    is_full_time_student: False
  output:
    is_savers_credit_eligible: False

- name: Adult student claimed elsewhere - not eligible
  description: 22-year-old full-time student claimed as dependent on parent's return
  period: 2024
  input:
    age: 22
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: True
    is_full_time_student: True
  output:
    is_savers_credit_eligible: False

- name: Older full-time student filer - not eligible
  description: 30-year-old returning to school full-time who files own return
  period: 2024
  input:
    age: 30
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: True
  output:
    is_savers_credit_eligible: False

- name: Adult former student - eligible
  description: 25-year-old who graduated and files own return (no longer full-time student)
  period: 2024
  input:
    age: 25
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True

# --- Edge Cases ---

- name: Married couple joint filer - both spouses eligible
  description: Both head and spouse of joint return are eligible
  period: 2024
  input:
    # This test would need multiple persons in practice
    age: 40
    is_tax_unit_head_or_spouse: True
    claimed_as_dependent_on_another_return: False
    is_full_time_student: False
  output:
    is_savers_credit_eligible: True
