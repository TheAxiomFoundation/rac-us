# Encoding Metadata for 26 USC 25B (Saver's Credit)

encoding:
  created: 2024-12-26
  updated: 2024-12-26
  status: implemented
  encoded_by: claude-opus-4.5

variable:
  name: savers_credit
  entity: TaxUnit
  period: Year
  dtype: Money

coverage:
  tax_years: [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025]
  notes: |
    The Saver's Credit (Retirement Savings Contributions Credit) per 26 USC 25B:
    - Credit rates: 50%, 20%, 10%, or 0% based on AGI
    - Maximum contribution base: $2,000 per eligible individual (not indexed)
    - Eligible individual: 18+, not a dependent on another return, not a full-time student
    - Nonrefundable credit limited by tax liability after preceding credits

sources:
  statute:
    - citation: "26 USC 25B"
      title: "Elective deferrals and IRA contributions by certain individuals"
      path: statute/26/25B/
      files:
        - a/savers_credit.cosilico  # Main credit calculation
        - b/applicable_percentage.cosilico  # Rate determination
        - c/eligible_individual.cosilico  # Eligibility requirements

  guidance:
    - citation: "Rev. Proc. 2023-34"
      title: "Inflation adjustments for TY 2024"
      source: https://www.irs.gov/irb/2023-48_IRB#REV-PROC-2023-34
      provides:
        - joint_threshold_50: 46000
        - joint_threshold_20: 50000
        - joint_threshold_10: 76500

    - citation: "Rev. Proc. 2022-38"
      title: "Inflation adjustments for TY 2023"
      source: https://www.irs.gov/pub/irs-drop/rp-22-38.pdf
      provides:
        - joint_threshold_50: 43500
        - joint_threshold_20: 47500
        - joint_threshold_10: 73000

    - citation: "IRS Form 8880"
      title: "Credit for Qualified Retirement Savings Contributions"
      source: https://www.irs.gov/pub/irs-pdf/f8880.pdf

architecture:
  description: |
    The Saver's Credit encoding follows the statute structure:

    1. 25B(a) - Allowance of Credit
       - Credit = Applicable Percentage x min(Qualified Contributions, $2,000)
       - a/savers_credit.cosilico

    2. 25B(b) - Applicable Percentage
       - 50%, 20%, 10%, or 0% based on AGI and filing status
       - Joint filers are the base; other statuses use threshold adjustments
       - b/applicable_percentage.cosilico

    3. 25B(c) - Eligible Individual
       - Must be 18+ at year end
       - Must be head of household or spouse (filer)
       - Not claimed as dependent on another return
       - Not a full-time student
       - c/eligible_individual.cosilico

    4. 25B(d) - Qualified Retirement Savings Contributions
       - Elective deferrals (401k, 403b, 457b)
       - Traditional and Roth IRA contributions
       - SEP and SIMPLE contributions
       - ABLE account contributions (through 2025)
       - Reduced by distributions during testing period

  key_provisions:
    - provision: "25B(a)"
      description: "Credit formula and $2,000 cap"
      variable: savers_credit
      parameters:
        - maximum_eligible_contribution

    - provision: "25B(b)"
      description: "Applicable percentage based on AGI"
      variable: savers_credit_applicable_percentage
      parameters:
        - joint_threshold_50
        - joint_threshold_20
        - joint_threshold_10
        - threshold_adjustment_*

    - provision: "25B(c)"
      description: "Eligible individual definition"
      variable: is_savers_credit_eligible
      parameters:
        - minimum_age

    - provision: "25B(d)"
      description: "Qualified retirement savings contributions"
      variable: savers_credit_qualified_contributions
      parameters:
        - qualified_retirement_savings_contributions

  policyengine_alignment:
    notes: |
      This encoding aligns with PolicyEngine's savers_credit implementation:

      1. Eligibility (savers_credit_eligible_person)
         - Requires is_tax_unit_head_or_spouse
         - Uses claimed_as_dependent_on_another_return (not is_tax_unit_dependent)

      2. Qualified Contributions (savers_credit_qualified_contributions)
         - Includes all contribution types per 25B(d)(1)
         - Subtracts retirement_distributions per 25B(d)(2)

      3. Credit Calculation (savers_credit_person)
         - Per-person calculation with $2,000 cap
         - Rate from tax unit's applicable percentage
         - Aggregated to tax unit level

      4. Credit Limit (savers_credit_credit_limit)
         - income_tax_before_credits minus preceding credits
         - Preceding: foreign_tax_credit, cdcc, education credits

      5. Rate Thresholds (threshold_adjustment approach)
         - Joint thresholds as base
         - Other statuses multiply AGI by inverse of adjustment factor

  dependencies:
    - path: statute/26/1
      description: "Filing status"
    - path: statute/26/62/a
      description: "Adjusted gross income"
    - path: statute/26/27
      description: "Foreign tax credit (preceding)"
    - path: statute/26/21
      description: "Child and dependent care credit (preceding)"
    - path: statute/26/25A
      description: "Education credits (preceding)"

test_files:
  - a/savers_credit.test.yaml  # Comprehensive credit tests
  - b/applicable_percentage.test.yaml  # Rate bracket tests
  - c/eligible_individual.test.yaml  # Eligibility tests
