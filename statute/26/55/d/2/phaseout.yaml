# 26 USC § 55(d)(2) - Phaseout of Exemption
#
# "(A) IN GENERAL.—The exemption amount of any taxpayer shall be reduced
#      (but not below zero) by an amount equal to 25 percent of the amount
#      by which the alternative minimum taxable income of the taxpayer exceeds
#      the threshold amount."
#
# The phaseout rate is 25% and begins at threshold amounts that are
# indexed for inflation per § 55(d)(4).

phaseout_rate:
  description: "Rate at which AMT exemption is reduced per dollar over threshold"
  unit: rate
  values:
    1993-01-01: 0.25
  citations:
    - "§ 55(d)(2)(A): 25 percent phaseout rate"

phaseout_threshold_joint:
  description: "AMTI threshold where AMT exemption phaseout begins (joint)"
  unit: currency-USD
  values:
    # TCJA period (2018-2025) - significantly increased
    2018-01-01: 1000000
    2019-01-01: 1020600
    2020-01-01: 1036800
    2021-01-01: 1047200
    2022-01-01: 1079800
    2023-01-01: 1156300
    2024-01-01: 1218700
    # Post-TCJA sunset (reverts to lower amounts)
    2026-01-01: 160000  # Estimated based on pre-TCJA formula
  citations:
    - "§ 55(d)(2)(A)(i): Threshold for joint returns"
    - "§ 55(d)(4)(B): TCJA increased thresholds (2018-2025)"
    - "Rev. Proc. 2023-34, Section 3.03: $1,218,700 for 2024"

phaseout_threshold_single:
