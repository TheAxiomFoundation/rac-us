# 26 USC § 55(d)(1) - AMT Exemption Amounts
#
# Subsection (d)(1) provides the base exemption amounts before phaseout.
# These are indexed for inflation per § 55(d)(4).
#
# Reference: Rev. Proc. 2023-34, Section 3.03 for 2024 values

exemption_joint:
  description: "AMT exemption amount for joint filers"
  unit: currency-USD
  values:
    # TCJA period (2018-2025) - significantly increased
    2018-01-01: 109400
    2019-01-01: 111700
    2020-01-01: 113400
    2021-01-01: 114600
    2022-01-01: 118100
    2023-01-01: 126500
    2024-01-01: 133300
    2025-01-01: 137000
    # Post-TCJA sunset (reverts to pre-TCJA formula)
    2026-01-01: 88200  # Estimated based on inflation indexing (post-TCJA)
  citations:
    - "§ 55(d)(1)(A): Exemption for joint returns"
    - "§ 55(d)(4)(A): TCJA increased amounts (2018-2025)"
    - "Rev. Proc. 2023-34, Section 3.03: $133,300 for 2024"
    - "Rev. Proc. 2024-40: $137,000 for 2025"
    - "Post-TCJA 2026: Estimated based on pre-TCJA formula with inflation"

