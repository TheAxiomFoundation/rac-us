# 26 USC Section 1201 - Alternative Tax for Corporations
#
# Historical capital gains alternative tax rate for corporations.
# Post-TCJA (2018+), the 21% flat corporate rate makes this section
# effectively obsolete since 21% < 35%.
#
# Sources:
# - 26 USC 1201(a) - Alternative tax on capital gains
# - TCJA P.L. 115-97 Section 13001

alternative_rate:
  description: "Alternative tax rate on corporate net capital gain"
  unit: rate
  values:
    # Historical 35% rate
    1988-01-01: 0.35
    # Rate remains 35% but is never beneficial post-TCJA
    # because regular corporate rate is 21%
  citations:
    - "26 USC 1201(a)(1): 35% alternative rate"
    - "Pre-1988: Various lower rates applied"

# Regular corporate rate for comparison (cross-reference)
regular_corporate_rate_reference:
  description: "Cross-reference to regular corporate tax rate"
  note: "See statute/26/11/parameters.yaml for current rate"
  values:
    2018-01-01: "21% flat rate - always lower than 35% alternative"
    pre-2018: "Graduated rates up to 35%"
