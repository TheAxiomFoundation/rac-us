# Rev. Proc. 2023-34, Section 3.06 - EITC Amounts for 2024
#
# Inflation-adjusted amounts per 26 USC § 32(j)
# Effective for tax year 2024

source:
  document: "Rev. Proc. 2023-34"
  section: "3.06"
  url: "https://www.irs.gov/irb/2023-48_IRB#RP-2023-34"
  effective_date: 2024-01-01

# Earned income amounts per § 32(b)(2)(A)
earned_income_amount:
  implements: statute/26/32/j/1  # Authority for inflation adjustment
  overrides: statute/26/32/b/2/A/base_amounts#earned_income_amount
  indexed_by: num_qualifying_children
  values:
    0: 8_260
    1: 12_390
    2: 17_400
    3: 17_400

# Phaseout threshold amounts per § 32(b)(2)(A)
# For single/HOH filers - joint filers add joint_return_adjustment
phaseout_amount:
  implements: statute/26/32/j/1
  overrides: statute/26/32/b/2/A/base_amounts#phaseout_amount
  indexed_by: num_qualifying_children
  values:
    0: 10_330
    1: 22_720
    2: 22_720
    3: 22_720

# Joint return adjustment per § 32(b)(2)(B)
joint_return_adjustment:
  implements: statute/26/32/j/1
  overrides: statute/26/32/b/2/B/base_joint_return_adjustment#joint_return_adjustment
  value: 6_920

# Investment income limit per § 32(i)(1)
disqualified_income_limit:
  implements: statute/26/32/j/1
  overrides: statute/26/32/i/1/base_disqualified_income_limit#disqualified_income_limit
  value: 11_600
