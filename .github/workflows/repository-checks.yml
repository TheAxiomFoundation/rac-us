name: Repository Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install pytest pyyaml

      - name: Run tests
        run: python -m pytest -q

      - name: Reject obsolete generated files
        run: |
          legacy_ext="r""ac"
          matches="$(find . \( -name "*.${legacy_ext}" -o -name "*.${legacy_ext}.test" \) -print)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches" >&2
            exit 1
          fi
