# Sync RAC files to database on push to main
# Uses centralized workflow from rac-db
name: Sync RACs

on:
  push:
    branches: [main]
    paths:
      - 'statute/**/*.rac'
  workflow_dispatch:

jobs:
  sync:
    uses: RulesFoundation/rac-compile/.github/workflows/sync-racs.yml@main
    secrets:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    with:
      repo_name: rac-us
      jurisdiction: us
